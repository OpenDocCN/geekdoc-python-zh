    # 第10章


    # 新宗教：科技人文主義


    新宗教浮現的地點，不太可能是阿富汗的洞穴、或是中東的宗教學校，反而會是從事科技研究的實驗室。就像社會主義承諾以蒸汽和電力為世界提供救贖，在接下來的幾十年間，新的科技宗教也可能承諾以演算法和基因為世界提供救贖，進而征服世界。


    雖然現在大家常常談的是激進伊斯蘭和基督教基本教義派，但從宗教觀點來說，目前全世界最有趣的地方並非伊斯蘭國或美國南部的聖經帶（Bible Belt，信奉基督教福音派的地區），而是矽谷。在美國加州的矽谷，各個高科技大師正在為我們醞釀和催生出全新的宗教，這些宗教信的不是神，而是科技。科技宗教同樣提供過往宗教的一切舊獎勵：快樂、和平、繁榮、甚至是永恆的生命，但方法卻是在當下取得地球科技的協助，而不是死後接受天堂的幫忙。


    這些新的科技宗教，可以分為兩大類型：科技人文主義和數據宗教。數據宗教認為人類已經完成了自己的偉大宇宙任務，現在應該交棒給完全不同的實體。關於數據宗教的夢想和噩夢，請讓我們留到下一章討論。本章主要談的是較保守的科技人文主義，這種宗'
  - '[PAGE 400]


    教仍然認為人類是造物的巔峰之作，也堅持許多傳統的人文主義價值觀。科技人文主義同意：我們所知的智人（*Homo sapiens*）已經走完了歷史上的道路，以後不再那麼重要了；但科技人文主義同時也認為：因此我們應該運用科技，創造出神人（*Homo
    deus*）這一種更優秀的人類形式。


    神人仍會保有一些基本的人類特徵，但同時更有升級後的生理和心理能力，並且能夠對抗最複雜的無意識演算法。由於智能正在與意識脫鉤，而且非意識的智能也正以驚人的速度發展，人類如果還想留在賽局當中，就得積極將心靈升級。


    # 第二次認知革命


    七萬年前，認知革命改變了智人的心靈，讓原本毫不重要的非洲猿類成為世界的統治者。智人的心靈經過提升後，忽然能夠接觸到互為主體的領域，於是能夠創造神祇和企業、建立城市和帝國、發明文字和金錢，最後也能夠分裂原子、登上月球。據我們所知與推測，這種翻天覆地的革命，只是因為智人的DNA起了一點小變化，導致大腦稍微重新配線。如果真是如此，那麼科技人文主義或許也只需要對人類的基因組，再多做點改變，讓大腦再稍微重新配線，也就足以啟動第二次認知革命。


    第一次認知革命的心靈改造，是讓人類能夠接觸互為主體的領域，也就讓智人成了地球的統治者；第二次認知革命則可能會讓神人接觸到目前還難以想像的新領域，讓神人成為整個星系的主人。


    早在一個世紀前，進化人文主義就希望創造出超人類，而現在的科技人文主義則可說是舊夢想的新型態。希特勒等人的想法，是'
  - '[PAGE 401]


    要透過選擇性育種和種族清洗來創造超人類，但二十一世紀科技人文主義則希望透過基因工程、奈米技術和腦機介面，以更和平的方式達成這項目標。


    科技人文主義希望讓人類的心靈升級，讓我們能夠接觸到目前未知的經驗、目前未聞的意識狀態。然而，要翻新人類心靈是一項非常複雜和危險的任務。第3章〈人類的獨特之處〉就討論過，我們還無法真正瞭解心靈，不知道心靈由何而生，也不知道心靈的作用為何。透過嘗試錯誤，我們正在學習如何設計與安排人類的心理狀態，但卻很少真正全面理解這種操縱可能有怎樣的影響。更糟的是，因為我們並不熟悉最完整的心理狀態範圍為何，也就不知道該把目標定在何處。


    我們就像是一座孤島上的居民，才剛剛發明了第一條船，正準備在沒有地圖、甚至也不知道目的地的情況下，揚帆出航。而且實際情況還可能更惡劣。在這個比方裡，這些島民至少還知道自己活在一片茫茫大海中，知道自己只占據了一塊小地方。但我們卻並未意識到，我們可能也只是住在一座小小的意識島上，而外面由我們不熟悉的心理狀態所構成的海洋，卻可能是無邊無盡。


    # 意識的頻譜


    真正的光譜和聲譜範圍，都比人類能看到和聽到的更為廣泛；同樣的，心理狀態的頻譜也可能遠大於普通人的感知。人類肉眼只能看到波長在400奈米到700奈米之間的可見光，而在人眼這個小小的視覺範圍之外，還延伸出許多不可見但廣大的領域，向上有紅外線、微波、無線電波，向下則有不可見的紫外線、X射線和γ射'
- md: '線等等。同樣的，心理狀態的頻譜可能無限延伸，但科學目前還只研究了其中兩小部分：次於規範者（sub-normative）及WEIRD族。


    一個多世紀以來，對於從自閉症到思覺失調症等精神及心理疾病的病人，心理學家和生物學家進行了廣泛研究，對於這種次於規範的心理狀態頻譜，我們的瞭解雖不完美、但十分詳細：認為這一區的人類在感覺、思考或溝通的能力上，低於正常值。與此同時，對於認定為健康、處於規範的人類，科學家也進行了關於其心靈及體驗的研究，但此類研究的對象卻多半屬於WEIRD族（Western,
    educated, industrialised, rich, and democratic，來自西方、受過教育、工業化、富裕、民主）的人，無法代表所有人類。換句話說，到今天為止的人類心靈研究，是假定智人都像是《辛普森家庭》裡的荷馬。


    在2010年一項開創性的研究中，亨利希（Joseph Henrich）、海涅（Steven J. Heine）和諾倫薩揚（Ara Norenzayan）三人針對心理學六大次領域的頂尖科學期刊，系統性調查所有發表的論文。研究結果發現，雖然論文常會聲稱人類的心靈就是如何如何，但大多數的研究只是以WEIRD族的樣本為基礎。例如，在《人格與社會心理學期刊》（Journal
    of Personality and Social Psychology，可能是社會心理學這個次領域最重要的期刊）發表的論文中，有96%的抽樣個人屬於WEIRD族，並有68%都是美國人。此外，足足有67%的美國參與者、80%的非美國參與者，統統都是心理系的學生！換句話說，在這份權威期刊上發表的所有論文裡，受實驗調查的對象有超過三分之二都是西方大學的心理系學生。亨利希、海涅和諾倫薩揚就半開玩笑的建議，期刊名稱應該要改為《美國心理系學生的人格與社會心理學期刊》。²


    心理系的學生之所以參與這麼多實驗，是因為教授的要求。如果我是哈佛大學的心理學教授，用學生來做實驗，可比雇用波士頓貧民區的居民容易得多，更別說要大老遠跑去納米比亞共和國、在喀拉哈里沙漠招募狩獵採集者的受試者了。然而，波士頓貧民區居民和喀拉哈里沙漠的狩獵採集者很可能各有獨特的心理狀態，而光是逼著哈佛心理系學生回答長篇問卷、或是把頭塞到fMRI掃描儀裡，大概永遠找不到答案。


    而且，就算我們真的跑遍全球，研究每一個社群，仍然只能研究到智人心理頻譜極有限的一段。現今所有的人類都受到現代性的影響，也都是單一地球村的成員。雖然喀拉哈里沙漠採集者的現代化程度可能不比哈佛心理系學生，但仍然不像是把過去的我們封在時間膠囊裡的情況。就算是這些採集者，也已經受到基督教傳教士、歐洲商人、有錢的生態旅遊者、好奇的研究者等等影響了。就有個笑話說，在喀拉哈里沙漠裡，典型的狩獵採集者隊伍是二十個獵人、二十個採集者，再加上五十位人類學家。


    > 46. 在整個電磁波頻譜，人類只能看到其中很小的一段。整體實際的頻譜，大約是可見光這一段的十兆倍大。心理的頻譜，會不會也是如此龐大？


    ## 心靈之間的鴻溝


    在地球村出現之前，地球就像是由各個孤立的人類文化組成的星系，當年環境促成的心理狀態，如今可能都已不復存在。社會經濟現實及日常生活一旦不同，培養出的意識狀態也就不同。不論是石器時代的長毛象獵人、新石器時代的農民、鎌倉時期的武士，誰又能確知他們的心靈狀態？此外，許多前現代文化都認為，有某種更高階的意識狀態，可透過冥想、藥物或儀式而進入。薩滿巫師、僧侶或修士都很有系統的探索心靈這片神祕境地，並帶回種種激動人心的故事，訴說著我們聞所未聞的意識狀態，像是無上的寧靜、極端的敏銳、無與倫比的感性，還講著心靈如何延展至無邊無際、遁入一片虛空。


    人文主義革命之後，現代西方文化不再相信這種形而上的心理狀態、也沒興趣瞭解，反而是刻意把一般人的俗世體驗給神聖化。因此，現代西方文化有一項特殊之處：並沒有某一群人形成某個特殊階級，想追求超脫俗世的心理狀態。有人想做這件事，就會被認定是嗑藥、精神病、或是詐騙集團。所以，雖然我們十分瞭解哈佛心理系學生的心理狀態，但對於美洲原住民的薩滿巫師、佛教的僧侶、或是蘇菲神祕教派的心理狀態，反而所知非常有限。


    而且這還只是智人的心靈而已。五萬年前，地球上除了智人，還有尼安德塔人這個近親。尼安德塔人沒能發射太空船、蓋出金字塔、或是建立帝國。顯然，他們的心靈能力與智人大不相同，也比智人少了許多天分。然而，尼安德塔人的大腦容量其實比智人更大，他們的神經元都派上了什麼用場？我們對此一無所知。很可能他們就擁有許多智人從未體驗過的心理狀態。


    只不過，就算我們將史上所有曾經存在的人類物種全盤納入考量，距離要窮盡整個心理的頻譜，仍然差得太遠。任何其他動物，都可能有人類難以想像的體驗。像是蝙蝠，能夠用回聲定位來體驗這個世界。牠們會發出人耳無法聽到的超高頻率聲波，再偵測碰觸前方物體後反射回來的聲波，便能建構出周遭環境的樣貌。蝙蝠感知到的樣貌極度詳細而準確，讓牠們能夠快速穿梭於樹木和建築物之間，追逐蛾類、捕獲蚊蟲，同時還能避開貓頭鷹和其他掠食者。


    蝙蝠活在一個回聲的世界裡。就像人類的世界認為每個物品都有代表性的外形及顏色，蝙蝠的世界則認為每個物品都有專屬的回聲模式。光是從某隻蛾纖纖翅膀彈回的回聲，蝙蝠就能判斷這隻蛾究竟是美食或毒藥。至於某些可食用的蛾類，則演化出類似毒蛾的回聲模式來保護自己。還有一些蛾演化出的能力更了不起，能夠直接讓蝙蝠雷達的聲波轉向，於是這些蛾能夠像是隱形轟炸機一般，飛來飛去，而蝙蝠渾然未覺。回聲定位世界的複雜和激烈程度，並不下於我們所熟悉的視覺及聽覺世界，但我們就是毫無所悉。


    ## 當蝙蝠的感覺如何？


    關於心靈的哲學，有一篇經典之作就是〈當蝙蝠的感覺如何？〉（What Is It Like to Be a Bat?）。⁴哲學家內格爾（Thomas Nagel）在這篇1974年的文章中指出，智人的心靈無法體會蝙蝠主觀的世界。我們可以寫出各式各樣的演算法，來模仿蝙蝠的身體、模擬蝙蝠的回聲定位系統、蝙蝠的神經元，但這一切還是沒辦法告訴我們，當一隻蝙蝠是什麼感覺？在某隻蛾拍動翅膀的時候，回聲定位是啥感覺？究竟是和用眼睛看差不多，還是根本完全不同？


    向智人解釋回聲定位一隻蝴蝶的感覺，可能就像是向一隻看不見的鼴鼠解釋看到達文西畫作的感覺一樣，絕對無法達到效果。很有可能，蝙蝠的情緒也會受到回聲定位感受的深深影響。就像是對於智人來說，愛是紅色、嫉妒是綠色、憂鬱是藍色，但誰能知道，母蝙蝠對小蝙蝠的愛在回聲定位裡是什麼感覺？公蝙蝠在回聲定位裡看到敵人，又是什麼感受？


    當然，這並不只是蝙蝠特有的情況，只是無數的例子之一。正如智人無法理解當隻蝙蝠是什麼感覺，我們也同樣難以理解當一隻鯨、一隻老虎或鵜鶘是什麼感受。當然這一定是有什麼感覺，只是我們不知道。鯨和人類同樣使用大腦的邊緣系統（limbic
    system）來處理情緒，但鯨的邊緣系統卻多出一整塊人類所沒有的組織。或許因為多了這一塊，就讓鯨能夠體驗到與人類大不相同、而且極度深刻複雜的情緒？此外，鯨也可能有極驚人的音樂體驗，連巴哈或莫札特都望塵莫及。


    譬如鯨可以聽到數百公里遠的彼此，而且每條鯨都有自己獨特的「歌曲」，曲長可能長達數小時，且有非常精緻複雜的模式。三不五時就會有某條鯨譜出新的流行歌曲，整個海洋裡的鯨都會跟風模仿。科學家常常會記錄這些流行曲，再用電腦加以分析。然而人類真的能夠體會這些音樂經驗，知道鯨貝多芬和鯨小賈斯丁有何不同嗎？⁵


    這一切不該讓我們太驚訝。智人之所以統治世界，並不是因為智人的情感更深刻、或音樂經驗更複雜。所以，至少在某些經驗領域裡，智人確實可能不如鯨，不如蝙蝠、老虎或鵜鶘。


    而且，在人類、蝙蝠、鯨和其他所有動物的心理範圍之外，還有甚至更大、更奇特的領域有待探索。很有可能仍有無止境的心理狀態，但由於在這四十億年的地球演化歷程中，所有智人、蝙蝠或恐龍都還不具備能夠體驗這一切的必要能力，因此從未有所體驗。不過，到了未來，有了強大的藥物、基因工程、電子頭盔和腦機介面，就可能打開通往這些領域的通道。就像哥倫布和麥哲倫航向海平面的彼方、探索新的島嶼和未知的大陸，或許某天我們也能前往心靈的對蹠點。


    ## 我聞到恐懼的氣味 ❖


    如果醫師、工程師和顧客一心想的就是治癒精神疾病、盡情享受WEIRD社會的生活，光是研究次於規範的心理狀態及WEIRD的心靈，或許已足以滿足我們的需求。雖然常有人批評規範心理學一看到偏離規範就認為是問題，但在上個世紀，這讓無數病人得到安慰，也讓數百萬人生活順利、精神正常。


    但到了第三個千禧年的開端，我們面臨的完全是另一種挑戰：自由人文主義被科技人文主義取代，而醫學也愈來愈著重於讓健康的人升級，而非治癒病人。醫師、工程師和顧客現在並不以解決精神問題為滿足，而是要讓整個心靈升級。我們的科技能力正逐漸足以打造新的意識狀態，但我們對這塊新領域卻還沒有堪用的地圖。我們熟悉的主要只有WEIRD族規範和次於規範的心理狀態頻譜，所以甚至連該前往哪個方向，都不知道。


    > 48. 意識的頻譜：一層之外，尚有未知的一層。


    # 人類大命運


    目前心理學最熱門的子領域是正向心理學（positive psychology），就不令人意外了。1990年代，塞利格曼（Martin Seligman）、迪納（Ed
    Diener）、契克森米哈賴（Mihaly Csikszentmihalyi）等權威專家認為，心理學除了研究心理的疾病，也該研究心理的積極力量。究竟為什麼，我們對生病的心靈瞭解得如此清楚，卻對正常強健的心靈沒有一張科學的地圖？在過去二十年之間，正向心理學已經對優於規範（super-normative）的心理狀態研究，邁出了重要的第一步，可是直到2016年，科學對於這片領域仍然近乎一無所知。


    在這種情況下，我們可能就是盲目向前衝，一心提升當下經濟和政治制度需要的心靈能力，卻忽略、甚至貶抑了其他心靈能力。當然，這種現象自古皆然。幾千年來，社會都會根據當時的需求，來塑造及重塑人類的心靈。智人原本的演化，只是要成為一小群親密社群裡的成員，這種心靈能力並不會讓他們習慣當個巨大機器的小齒輪。但隨著城市、王國和帝國興起，社會培養了大規模合作所需的能力，但同時也漸漸忽略了其他技能和性向。


    舉例來說，遠古人類可能常常應用嗅覺。狩獵採集者能夠靠嗅覺，在遠方辨認出各種不同的動物、人類、甚至是情緒——像是恐懼的氣味就和勇氣不同。一個人害怕時所分泌的化學物質，與他充滿勇氣時所分泌的就是不一樣。如果你坐在某個古老的部落當中，而他們正爭執是否要和隔壁部落開戰，你是真的能夠「聞出」大家的意見為何！


    但因為嗅覺這種功能只有在成員少的時候，才派得上用場，所以等到智人組織成更大的團體，嗅覺的社會價值也就一落千丈。舉例來說，美國對中國的恐懼，可就聞不出來了。於是，人類的嗅覺能力遭到輕忽，至於在幾萬年前可能用來處理氣味的大腦區域，現在也可能挪用到更急迫的任務上，像是閱讀、數學運算和抽象推理方面。現代社會希望我們把神經元用來解微分方程式，而不是用來聞我們的鄰居。⁶


    ## 用進廢退 ❖


    我們的其他感官、或是更底層能夠注意到感官感受的能力，也同樣經歷了這種過程。


    遠古的採集者總是保持警覺。在森林裡找蘑菇的時候，他們會仔細聞著風的氣味、專心觀察地面。找到一個蘑菇之後，他們會用全心全意來吃這個蘑菇，感受最細微的味道差異，分辨這個蘑菇究竟是適合食用、或是有毒。到了今天的富裕社會，人類多半不需要如此敏銳。超市裡就有上千種食物可供選擇，食品安全都有衛生單位監督。但不管你選的是義大利披薩、還是泰國泡麵，接下來，都可能是坐在電視機前面狼吞虎嚥，幾乎不管這食物有何風味！（正因如此，食品製造商才要不斷推出刺激的新口味，希望能夠動搖一下我們的無動於衷。）


    同樣的，由於有良好的交通運輸，就算是住在城市另一邊的朋友，仍然很容易見到面。但就算真的碰到面，我們卻也不見得真的把心思都放在對方身上，總是在看手機有沒有新訊息、臉書有沒有新動態，覺得一定有什麼更有趣的事發生在別的地方。現代人類已經患上「錯失恐懼症」（Fear
    Of Missing Out, FOMO），總在擔心自己錯過了什麼；雖然手中的選擇比以往任何時候都多，但選了之後又很難付出全心全意。⁷


    除了嗅覺和注意力，人類也失去了做夢的能力。許多文化認為人類在夢中的所見所為，重要性並不下於清醒時的所見所為，因此會積極培養做夢的能力、記住夢的能力、甚至是在夢中世界控制行動的能力。這種能夠控制行動的夢，稱為清醒夢（lucid
    dreaming）。清醒夢的專家號稱可以在夢的世界裡自由活動，甚至是前往更高的存在層次，遇見來自其他世界的訪客。


    相反的，現代世界認為做夢只是潛意識發出的訊息，甚至不過就是心靈產生的垃圾。於是做夢這件事在我們的生活中，沒有那麼重要，很少有人積極培養做夢的能力，甚至有很多人表示自己從不做夢、或是從不記得自己做了什麼夢。⁸


    嗅覺、注意力和做夢的能力都不如以往，是不是讓我們的生活過得比較貧瘠而灰暗？或許沒錯。但從政經體系的角度看來，這都是值得的。老闆會希望你常檢查電子郵件信箱，而不是常聞花香、或做白日夢。出於類似的原因，未來要將人類的心靈升級時，反映的也可能是政治的需求、市場的力量。


    例如第8章〈實驗室裡的定時炸彈〉提過美軍的「專注頭盔」，就是要幫助士兵專注在明確的任務上，加速決策過程。但這也可能降低這些人的同理心，讓他們忽略心中的種種懷疑和內在衝突。人文主義心理學家指出：感到憂鬱的人常常想要的，並不是簡單的解決方案，而是希望有人能夠聆聽他們的想法，同情他們的恐懼和疑慮。


    假設你現在工作出現危機：新老闆不喜歡你的想法，堅持要你乖乖聽話就好。過了特別不順的一天，你決定拿起電話打給朋友。但朋友正在忙，撥不出什麼時間和精力，於是打斷了你講到一半的話，試著解決你的問題：「好，我知道了。在這個情況，你真的只有兩種選擇：辭職，或是留下來聽老闆的話。如果是我，就會選擇辭職。」但這大概算不上幫了什麼忙。真正感情好的朋友，會比較有耐性，不會急著找出解決方案，而是會聆聽你的憂慮，給你時間和空間，好讓種種矛盾的情緒和折磨人的焦慮一一浮現，得到慰藉。


    專注頭盔的用途，就像是那個不耐煩的朋友。確實，有些時候（例如在戰場上）我們需要迅速下定決心，但生命不是只有這樣而已。如果我們愈來愈常使用頭盔，可能最後就會像是失去了嗅覺、做夢和注意的能力一般，失去容忍各種疑惑和矛盾的能力。現代社會喜歡我們下定決心，而不是心存懷疑，所以整個政經體系也可能會推動我們往這種方向前進。然而，比起擁有懷疑和矛盾的社會，如果一切要求明快堅決，生活反而可能變得更貧瘠而膚淺。


    ## 放大版的螞蟻社會


    現代這個世界，一方面，我們已經有能力改造心靈，但另一方面，我們又幾乎完全不知道心理的完整頻譜是什麼模樣，再加上政府、軍隊和企業各懷鬼胎，簡直注定帶來災難。有可能到頭來，我們很成功的讓身體與大腦都升級了，卻在過程中失去了心靈。


    確實，科技人文主義到最後可能反而會造成人類的降級。對政經體系來說，降級後的人類反而更有利，原因不是這種人擁有什麼卓越的特點，而是這種人少了一些可能拖慢社會步調、造成困擾的人類特質。像是農夫都知道，羊群裡面最聰明的那隻，常常就會惹出最大的麻煩，所以農業革命的其中一項，就是要降低動物的心理能力。到了科技人文主義夢想所推動的第二次認知革命，則可能對人類造成一樣的效果，讓社會大機器裡的「人類小齒輪」變得比以往更能有效溝通和處理資料，但幾乎不會去注意其他事，既不會做夢、也不會有所懷疑。數百萬年來，人類曾經是加強版的黑猩猩；到了未來，人類則可能變成放大版的螞蟻。


    科技人文主義還面臨另一項恐怖威脅。一如所有人文主義教派，科技人文主義也認為人的意志是神聖的，認為這是整個宇宙的憑依。科技人文主義希望用人類的期望，來選擇要發展哪一種心靈能力，進而決定未來心靈的模樣。然而，如果未來科技進展之後，能夠重塑、改造這些期望，那會是什麼情形？


    人文主義總是強調，我們不太容易確知自己真正的意志。每次想聆聽真實的自己，總有許多吵雜的噪音撲天蓋地而來。而且事實上，有時候我們不見得真想聽到自己真實的聲音，因為那可能會是一些不受歡迎的祕密、令人難堪的要求。有許多人根本是處心積慮不想對自己瞭解太深。譬如，一位平步青雲的律師，可能就不想聽到內心叫她放輕鬆點、趕快生個寶寶的聲音。困在痛苦婚姻中的婦女，也可能害怕失去婚姻提供的安全感。背負罪惡感的士兵，曾犯下的暴行化成噩夢，如影隨形。對自己的性傾向還無法確定的年輕人，就對自己實行了「不問、不說」的政策。對人文主義來說，這任何一個情境都不會有一體適用的解決方案，但人文主義要求我們堅強起來，不論內心的聲音再醜惡，也要勇敢面對，要聽到自己最真實的聲音，再聽從它的指示，排除萬難。


    但從科技進步的觀點，一切就大不相同了。科技進展不想聽我們內在的聲音，而是要控制這些聲音。只要我們瞭解了生化系統如何產生這些聲音，我們就能玩弄這所有開關，把這裡音量調高、那裡音量調低，讓人生過得更輕鬆自在。想專心的律師可以來顆利他能（Ritalin），有罪惡感的士兵可以吞個百憂解（Prozac），至於對生活不滿的妻子，替你憂（Citao）就是答案。而且，這還只是開始。


    人文主義者對這種方法常常難以接受。但我們還是別太早就下判斷、作結論。人文主義者建議的「聽自己內心的聲音」，其實毀了許多人的生命；適當用藥，反而是大大改善了幾百萬人的幸福和關係。為了真正聽到自己內心的聲音，有些人可得先把心中現有的尖叫和怒罵音量調小。現代精神病學認為，許多「內心的聲音」和「真實的願望」只不過是生化失衡和神經疾病的產物。由於生化失衡，讓患有臨床憂鬱症的人看起事物來，都像是透過一副抑鬱的眼鏡，於是一再拋棄大好的前途、健康的人際關係。這時該做的，可能不是聆聽這種破壞性的內心的聲音，而是該直接叫它們閉嘴。像是第8章提過的記者愛蒂，她戴上頭盔、讓腦中其他聲音安靜下來之後，不但成了神射手，對自我的感覺也大大提升。


    ## 哪個聲音是「真正的自我」？


    就個人而言，每個人都可能對這些問題有不同的看法。但從歷史觀點，現在顯然是風雨欲來。人文主義的最高誡命：「聆聽你自己！」已經不再不證自明。我們學會把內心的聲音調高調低之後，也就得放棄對「真實」的信念，因為我們再也不清楚現在是誰在調整開關。把腦中的噪音關掉似乎是個大好主意，但前提是要能讓我聽到真正的自我。如果就是沒有哪個聲音是「真正的自我」，又要怎麼決定哪些聲音要小、哪些聲音該大？


    讓我們單純為了討論而做個假設：假設幾十年內，腦科學家就能讓我們輕鬆且準確的控制許多內心的聲音。再假設有個來自虔誠摩門教家庭的年輕男同性戀者，躲在櫃中生活許多年，終於存夠了錢，想去動手術。他帶著十萬美元前往診所，決心要讓自己在走出'
  mdcn: '線等等。同樣的，心理狀態的頻譜可能無限延伸，但科學目前還只研究了其中兩小部分：次於規範者（sub-normative）及WEIRD族。


    一個多世紀以來，對於從自閉症到思覺失調症等精神及心理疾病的病人，心理學家和生物學家進行了廣泛研究，對於這種次於規範的心理狀態頻譜，我們的瞭解雖不完美、但十分詳細：認為這一區的人類在感覺、思考或溝通的能力上，低於正常值。與此同時，對於認定為健康、處於規範的人類，科學家也進行了關於其心靈及體驗的研究，但此類研究的對象卻多半屬於WEIRD族（Western,
    educated, industrialised, rich, and democratic，來自西方、受過教育、工業化、富裕、民主）的人，無法代表所有人類。換句話說，到今天為止的人類心靈研究，是假定智人都像是《辛普森家庭》裡的荷馬。


    在2010年一項開創性的研究中，亨利希（Joseph Henrich）、海涅（Steven J. Heine）和諾倫薩揚（Ara Norenzayan）三人針對心理學六大次領域的頂尖科學期刊，系統性調查所有發表的論文。研究結果發現，雖然論文常會聲稱人類的心靈就是如何如何，但大多數的研究只是以WEIRD族的樣本為基礎。例如，在《人格與社會心理學期刊》（Journal
    of Personality and Social Psychology，可能是社會心理學這個次領域最重要的期刊）發表的論文中，有96%的抽樣個人屬於WEIRD族，並有68%都是美國人。此外，足足有67%的美國參與者、80%的非美國參與者，統統都是心理系的學生！換句話說，在這份權威期刊上發表的所有論文裡，受實驗調查的對象有超過三分之二都是西方大學的心理系學生。亨利希、海涅和諾倫薩揚就半開玩笑的建議，期刊名稱應該要改為《美國心理系學生的人格與社會心理學期刊》。²


    心理系的學生之所以參與這麼多實驗，是因為教授的要求。如果我是哈佛大學的心理學教授，用學生來做實驗，可比雇用波士頓貧民區的居民容易得多，更別說要大老遠跑去納米比亞共和國、在喀拉哈里沙漠招募狩獵採集者的受試者了。然而，波士頓貧民區居民和喀拉哈里沙漠的狩獵採集者很可能各有獨特的心理狀態，而光是逼著哈佛心理系學生回答長篇問卷、或是把頭塞到fMRI掃描儀裡，大概永遠找不到答案。


    而且，就算我們真的跑遍全球，研究每一個社群，仍然只能研究到智人心理頻譜極有限的一段。現今所有的人類都受到現代性的影響，也都是單一地球村的成員。雖然喀拉哈里沙漠採集者的現代化程度可能不比哈佛心理系學生，但仍然不像是把過去的我們封在時間膠囊裡的情況。就算是這些採集者，也已經受到基督教傳教士、歐洲商人、有錢的生態旅遊者、好奇的研究者等等影響了。就有個笑話說，在喀拉哈里沙漠裡，典型的狩獵採集者隊伍是二十個獵人、二十個採集者，再加上五十位人類學家。


    > 46. 在整個電磁波頻譜，人類只能看到其中很小的一段。整體實際的頻譜，大約是可見光這一段的十兆倍大。心理的頻譜，會不會也是如此龐大？


    ## 心靈之間的鴻溝


    在地球村出現之前，地球就像是由各個孤立的人類文化組成的星系，當年環境促成的心理狀態，如今可能都已不復存在。社會經濟現實及日常生活一旦不同，培養出的意識狀態也就不同。不論是石器時代的長毛象獵人、新石器時代的農民、鎌倉時期的武士，誰又能確知他們的心靈狀態？此外，許多前現代文化都認為，有某種更高階的意識狀態，可透過冥想、藥物或儀式而進入。薩滿巫師、僧侶或修士都很有系統的探索心靈這片神祕境地，並帶回種種激動人心的故事，訴說著我們聞所未聞的意識狀態，像是無上的寧靜、極端的敏銳、無與倫比的感性，還講著心靈如何延展至無邊無際、遁入一片虛空。


    人文主義革命之後，現代西方文化不再相信這種形而上的心理狀態、也沒興趣瞭解，反而是刻意把一般人的俗世體驗給神聖化。因此，現代西方文化有一項特殊之處：並沒有某一群人形成某個特殊階級，想追求超脫俗世的心理狀態。有人想做這件事，就會被認定是嗑藥、精神病、或是詐騙集團。所以，雖然我們十分瞭解哈佛心理系學生的心理狀態，但對於美洲原住民的薩滿巫師、佛教的僧侶、或是蘇菲神祕教派的心理狀態，反而所知非常有限。


    而且這還只是智人的心靈而已。五萬年前，地球上除了智人，還有尼安德塔人這個近親。尼安德塔人沒能發射太空船、蓋出金字塔、或是建立帝國。顯然，他們的心靈能力與智人大不相同，也比智人少了許多天分。然而，尼安德塔人的大腦容量其實比智人更大，他們的神經元都派上了什麼用場？我們對此一無所知。很可能他們就擁有許多智人從未體驗過的心理狀態。


    只不過，就算我們將史上所有曾經存在的人類物種全盤納入考量，距離要窮盡整個心理的頻譜，仍然差得太遠。任何其他動物，都可能有人類難以想像的體驗。像是蝙蝠，能夠用回聲定位來體驗這個世界。牠們會發出人耳無法聽到的超高頻率聲波，再偵測碰觸前方物體後反射回來的聲波，便能建構出周遭環境的樣貌。蝙蝠感知到的樣貌極度詳細而準確，讓牠們能夠快速穿梭於樹木和建築物之間，追逐蛾類、捕獲蚊蟲，同時還能避開貓頭鷹和其他掠食者。


    蝙蝠活在一個回聲的世界裡。就像人類的世界認為每個物品都有代表性的外形及顏色，蝙蝠的世界則認為每個物品都有專屬的回聲模式。光是從某隻蛾纖纖翅膀彈回的回聲，蝙蝠就能判斷這隻蛾究竟是美食或毒藥。至於某些可食用的蛾類，則演化出類似毒蛾的回聲模式來保護自己。還有一些蛾演化出的能力更了不起，能夠直接讓蝙蝠雷達的聲波轉向，於是這些蛾能夠像是隱形轟炸機一般，飛來飛去，而蝙蝠渾然未覺。回聲定位世界的複雜和激烈程度，並不下於我們所熟悉的視覺及聽覺世界，但我們就是毫無所悉。


    ## 當蝙蝠的感覺如何？


    關於心靈的哲學，有一篇經典之作就是〈當蝙蝠的感覺如何？〉（What Is It Like to Be a Bat?）。⁴哲學家內格爾（Thomas Nagel）在這篇1974年的文章中指出，智人的心靈無法體會蝙蝠主觀的世界。我們可以寫出各式各樣的演算法，來模仿蝙蝠的身體、模擬蝙蝠的回聲定位系統、蝙蝠的神經元，但這一切還是沒辦法告訴我們，當一隻蝙蝠是什麼感覺？在某隻蛾拍動翅膀的時候，回聲定位是啥感覺？究竟是和用眼睛看差不多，還是根本完全不同？


    向智人解釋回聲定位一隻蝴蝶的感覺，可能就像是向一隻看不見的鼴鼠解釋看到達文西畫作的感覺一樣，絕對無法達到效果。很有可能，蝙蝠的情緒也會受到回聲定位感受的深深影響。就像是對於智人來說，愛是紅色、嫉妒是綠色、憂鬱是藍色，但誰能知道，母蝙蝠對小蝙蝠的愛在回聲定位裡是什麼感覺？公蝙蝠在回聲定位裡看到敵人，又是什麼感受？


    當然，這並不只是蝙蝠特有的情況，只是無數的例子之一。正如智人無法理解當隻蝙蝠是什麼感覺，我們也同樣難以理解當一隻鯨、一隻老虎或鵜鶘是什麼感受。當然這一定是有什麼感覺，只是我們不知道。鯨和人類同樣使用大腦的邊緣系統（limbic
    system）來處理情緒，但鯨的邊緣系統卻多出一整塊人類所沒有的組織。或許因為多了這一塊，就讓鯨能夠體驗到與人類大不相同、而且極度深刻複雜的情緒？此外，鯨也可能有極驚人的音樂體驗，連巴哈或莫札特都望塵莫及。


    譬如鯨可以聽到數百公里遠的彼此，而且每條鯨都有自己獨特的「歌曲」，曲長可能長達數小時，且有非常精緻複雜的模式。三不五時就會有某條鯨譜出新的流行歌曲，整個海洋裡的鯨都會跟風模仿。科學家常常會記錄這些流行曲，再用電腦加以分析。然而人類真的能夠體會這些音樂經驗，知道鯨貝多芬和鯨小賈斯丁有何不同嗎？⁵


    這一切不該讓我們太驚訝。智人之所以統治世界，並不是因為智人的情感更深刻、或音樂經驗更複雜。所以，至少在某些經驗領域裡，智人確實可能不如鯨，不如蝙蝠、老虎或鵜鶘。


    而且，在人類、蝙蝠、鯨和其他所有動物的心理範圍之外，還有甚至更大、更奇特的領域有待探索。很有可能仍有無止境的心理狀態，但由於在這四十億年的地球演化歷程中，所有智人、蝙蝠或恐龍都還不具備能夠體驗這一切的必要能力，因此從未有所體驗。不過，到了未來，有了強大的藥物、基因工程、電子頭盔和腦機介面，就可能打開通往這些領域的通道。就像哥倫布和麥哲倫航向海平面的彼方、探索新的島嶼和未知的大陸，或許某天我們也能前往心靈的對蹠點。


    ## 我聞到恐懼的氣味 ❖


    如果醫師、工程師和顧客一心想的就是治癒精神疾病、盡情享受WEIRD社會的生活，光是研究次於規範的心理狀態及WEIRD的心靈，或許已足以滿足我們的需求。雖然常有人批評規範心理學一看到偏離規範就認為是問題，但在上個世紀，這讓無數病人得到安慰，也讓數百萬人生活順利、精神正常。


    但到了第三個千禧年的開端，我們面臨的完全是另一種挑戰：自由人文主義被科技人文主義取代，而醫學也愈來愈著重於讓健康的人升級，而非治癒病人。醫師、工程師和顧客現在並不以解決精神問題為滿足，而是要讓整個心靈升級。我們的科技能力正逐漸足以打造新的意識狀態，但我們對這塊新領域卻還沒有堪用的地圖。我們熟悉的主要只有WEIRD族規範和次於規範的心理狀態頻譜，所以甚至連該前往哪個方向，都不知道。


    > 48. 意識的頻譜：一層之外，尚有未知的一層。


    # 人類大命運


    目前心理學最熱門的子領域是正向心理學（positive psychology），就不令人意外了。1990年代，塞利格曼（Martin Seligman）、迪納（Ed
    Diener）、契克森米哈賴（Mihaly Csikszentmihalyi）等權威專家認為，心理學除了研究心理的疾病，也該研究心理的積極力量。究竟為什麼，我們對生病的心靈瞭解得如此清楚，卻對正常強健的心靈沒有一張科學的地圖？在過去二十年之間，正向心理學已經對優於規範（super-normative）的心理狀態研究，邁出了重要的第一步，可是直到2016年，科學對於這片領域仍然近乎一無所知。


    在這種情況下，我們可能就是盲目向前衝，一心提升當下經濟和政治制度需要的心靈能力，卻忽略、甚至貶抑了其他心靈能力。當然，這種現象自古皆然。幾千年來，社會都會根據當時的需求，來塑造及重塑人類的心靈。智人原本的演化，只是要成為一小群親密社群裡的成員，這種心靈能力並不會讓他們習慣當個巨大機器的小齒輪。但隨著城市、王國和帝國興起，社會培養了大規模合作所需的能力，但同時也漸漸忽略了其他技能和性向。


    舉例來說，遠古人類可能常常應用嗅覺。狩獵採集者能夠靠嗅覺，在遠方辨認出各種不同的動物、人類、甚至是情緒——像是恐懼的氣味就和勇氣不同。一個人害怕時所分泌的化學物質，與他充滿勇氣時所分泌的就是不一樣。如果你坐在某個古老的部落當中，而他們正爭執是否要和隔壁部落開戰，你是真的能夠「聞出」大家的意見為何！


    但因為嗅覺這種功能只有在成員少的時候，才派得上用場，所以等到智人組織成更大的團體，嗅覺的社會價值也就一落千丈。舉例來說，美國對中國的恐懼，可就聞不出來了。於是，人類的嗅覺能力遭到輕忽，至於在幾萬年前可能用來處理氣味的大腦區域，現在也可能挪用到更急迫的任務上，像是閱讀、數學運算和抽象推理方面。現代社會希望我們把神經元用來解微分方程式，而不是用來聞我們的鄰居。⁶


    ## 用進廢退 ❖


    我們的其他感官、或是更底層能夠注意到感官感受的能力，也同樣經歷了這種過程。


    遠古的採集者總是保持警覺。在森林裡找蘑菇的時候，他們會仔細聞著風的氣味、專心觀察地面。找到一個蘑菇之後，他們會用全心全意來吃這個蘑菇，感受最細微的味道差異，分辨這個蘑菇究竟是適合食用、或是有毒。到了今天的富裕社會，人類多半不需要如此敏銳。超市裡就有上千種食物可供選擇，食品安全都有衛生單位監督。但不管你選的是義大利披薩、還是泰國泡麵，接下來，都可能是坐在電視機前面狼吞虎嚥，幾乎不管這食物有何風味！（正因如此，食品製造商才要不斷推出刺激的新口味，希望能夠動搖一下我們的無動於衷。）


    同樣的，由於有良好的交通運輸，就算是住在城市另一邊的朋友，仍然很容易見到面。但就算真的碰到面，我們卻也不見得真的把心思都放在對方身上，總是在看手機有沒有新訊息、臉書有沒有新動態，覺得一定有什麼更有趣的事發生在別的地方。現代人類已經患上「錯失恐懼症」（Fear
    Of Missing Out, FOMO），總在擔心自己錯過了什麼；雖然手中的選擇比以往任何時候都多，但選了之後又很難付出全心全意。⁷


    除了嗅覺和注意力，人類也失去了做夢的能力。許多文化認為人類在夢中的所見所為，重要性並不下於清醒時的所見所為，因此會積極培養做夢的能力、記住夢的能力、甚至是在夢中世界控制行動的能力。這種能夠控制行動的夢，稱為清醒夢（lucid
    dreaming）。清醒夢的專家號稱可以在夢的世界裡自由活動，甚至是前往更高的存在層次，遇見來自其他世界的訪客。


    相反的，現代世界認為做夢只是潛意識發出的訊息，甚至不過就是心靈產生的垃圾。於是做夢這件事在我們的生活中，沒有那麼重要，很少有人積極培養做夢的能力，甚至有很多人表示自己從不做夢、或是從不記得自己做了什麼夢。⁸


    嗅覺、注意力和做夢的能力都不如以往，是不是讓我們的生活過得比較貧瘠而灰暗？或許沒錯。但從政經體系的角度看來，這都是值得的。老闆會希望你常檢查電子郵件信箱，而不是常聞花香、或做白日夢。出於類似的原因，未來要將人類的心靈升級時，反映的也可能是政治的需求、市場的力量。


    例如第8章〈實驗室裡的定時炸彈〉提過美軍的「專注頭盔」，就是要幫助士兵專注在明確的任務上，加速決策過程。但這也可能降低這些人的同理心，讓他們忽略心中的種種懷疑和內在衝突。人文主義心理學家指出：感到憂鬱的人常常想要的，並不是簡單的解決方案，而是希望有人能夠聆聽他們的想法，同情他們的恐懼和疑慮。


    假設你現在工作出現危機：新老闆不喜歡你的想法，堅持要你乖乖聽話就好。過了特別不順的一天，你決定拿起電話打給朋友。但朋友正在忙，撥不出什麼時間和精力，於是打斷了你講到一半的話，試著解決你的問題：「好，我知道了。在這個情況，你真的只有兩種選擇：辭職，或是留下來聽老闆的話。如果是我，就會選擇辭職。」但這大概算不上幫了什麼忙。真正感情好的朋友，會比較有耐性，不會急著找出解決方案，而是會聆聽你的憂慮，給你時間和空間，好讓種種矛盾的情緒和折磨人的焦慮一一浮現，得到慰藉。


    專注頭盔的用途，就像是那個不耐煩的朋友。確實，有些時候（例如在戰場上）我們需要迅速下定決心，但生命不是只有這樣而已。如果我們愈來愈常使用頭盔，可能最後就會像是失去了嗅覺、做夢和注意的能力一般，失去容忍各種疑惑和矛盾的能力。現代社會喜歡我們下定決心，而不是心存懷疑，所以整個政經體系也可能會推動我們往這種方向前進。然而，比起擁有懷疑和矛盾的社會，如果一切要求明快堅決，生活反而可能變得更貧瘠而膚淺。


    ## 放大版的螞蟻社會


    現代這個世界，一方面，我們已經有能力改造心靈，但另一方面，我們又幾乎完全不知道心理的完整頻譜是什麼模樣，再加上政府、軍隊和企業各懷鬼胎，簡直注定帶來災難。有可能到頭來，我們很成功的讓身體與大腦都升級了，卻在過程中失去了心靈。


    確實，科技人文主義到最後可能反而會造成人類的降級。對政經體系來說，降級後的人類反而更有利，原因不是這種人擁有什麼卓越的特點，而是這種人少了一些可能拖慢社會步調、造成困擾的人類特質。像是農夫都知道，羊群裡面最聰明的那隻，常常就會惹出最大的麻煩，所以農業革命的其中一項，就是要降低動物的心理能力。到了科技人文主義夢想所推動的第二次認知革命，則可能對人類造成一樣的效果，讓社會大機器裡的「人類小齒輪」變得比以往更能有效溝通和處理資料，但幾乎不會去注意其他事，既不會做夢、也不會有所懷疑。數百萬年來，人類曾經是加強版的黑猩猩；到了未來，人類則可能變成放大版的螞蟻。


    科技人文主義還面臨另一項恐怖威脅。一如所有人文主義教派，科技人文主義也認為人的意志是神聖的，認為這是整個宇宙的憑依。科技人文主義希望用人類的期望，來選擇要發展哪一種心靈能力，進而決定未來心靈的模樣。然而，如果未來科技進展之後，能夠重塑、改造這些期望，那會是什麼情形？


    人文主義總是強調，我們不太容易確知自己真正的意志。每次想聆聽真實的自己，總有許多吵雜的噪音撲天蓋地而來。而且事實上，有時候我們不見得真想聽到自己真實的聲音，因為那可能會是一些不受歡迎的祕密、令人難堪的要求。有許多人根本是處心積慮不想對自己瞭解太深。譬如，一位平步青雲的律師，可能就不想聽到內心叫她放輕鬆點、趕快生個寶寶的聲音。困在痛苦婚姻中的婦女，也可能害怕失去婚姻提供的安全感。背負罪惡感的士兵，曾犯下的暴行化成噩夢，如影隨形。對自己的性傾向還無法確定的年輕人，就對自己實行了「不問、不說」的政策。對人文主義來說，這任何一個情境都不會有一體適用的解決方案，但人文主義要求我們堅強起來，不論內心的聲音再醜惡，也要勇敢面對，要聽到自己最真實的聲音，再聽從它的指示，排除萬難。


    但從科技進步的觀點，一切就大不相同了。科技進展不想聽我們內在的聲音，而是要控制這些聲音。只要我們瞭解了生化系統如何產生這些聲音，我們就能玩弄這所有開關，把這裡音量調高、那裡音量調低，讓人生過得更輕鬆自在。想專心的律師可以來顆利他能（Ritalin），有罪惡感的士兵可以吞個百憂解（Prozac），至於對生活不滿的妻子，替你憂（Citao）就是答案。而且，這還只是開始。


    人文主義者對這種方法常常難以接受。但我們還是別太早就下判斷、作結論。人文主義者建議的「聽自己內心的聲音」，其實毀了許多人的生命；適當用藥，反而是大大改善了幾百萬人的幸福和關係。為了真正聽到自己內心的聲音，有些人可得先把心中現有的尖叫和怒罵音量調小。現代精神病學認為，許多「內心的聲音」和「真實的願望」只不過是生化失衡和神經疾病的產物。由於生化失衡，讓患有臨床憂鬱症的人看起事物來，都像是透過一副抑鬱的眼鏡，於是一再拋棄大好的前途、健康的人際關係。這時該做的，可能不是聆聽這種破壞性的內心的聲音，而是該直接叫它們閉嘴。像是第8章提過的記者愛蒂，她戴上頭盔、讓腦中其他聲音安靜下來之後，不但成了神射手，對自我的感覺也大大提升。


    ## 哪個聲音是「真正的自我」？


    就個人而言，每個人都可能對這些問題有不同的看法。但從歷史觀點，現在顯然是風雨欲來。人文主義的最高誡命：「聆聽你自己！」已經不再不證自明。我們學會把內心的聲音調高調低之後，也就得放棄對「真實」的信念，因為我們再也不清楚現在是誰在調整開關。把腦中的噪音關掉似乎是個大好主意，但前提是要能讓我聽到真正的自我。如果就是沒有哪個聲音是「真正的自我」，又要怎麼決定哪些聲音要小、哪些聲音該大？


    讓我們單純為了討論而做個假設：假設幾十年內，腦科學家就能讓我們輕鬆且準確的控制許多內心的聲音。再假設有個來自虔誠摩門教家庭的年輕男同性戀者，躲在櫃中生活許多年，終於存夠了錢，想去動手術。他帶著十萬美元前往診所，決心要讓自己在走出'
