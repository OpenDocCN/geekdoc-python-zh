  md: '人類大命運


    這種想法並不只是理論。在2008年,谷歌確實推出了谷歌流感趨勢(Google Flu Trends)服務,靠著監控在谷歌搜尋的內容,追蹤流感爆發的跡象。這項服務目前仍在開發中,而且基於隱私考量,據稱只會追蹤搜尋字眼,而不會閱讀私人電子郵件。但光是這樣,已經讓它得以比傳統公衛體系,早了十天發出流感警報。29


    至於谷歌基線研究(Google Baseline Study)專案,則更加雄心勃勃。谷歌希望建起一座龐大的人類健康資料庫,找出「健康完美」的人類基因模型。這樣一來,只要發現健康資料與模型有出入,就能警告民眾可能健康出現問題,須及早防患未然。基線研究又與稱為Google
    Fit的整套產品系列搭配,包括服裝、手環、鞋子和眼鏡等穿戴式裝備。Google Fit的各項產品,正是要蒐集永無止境的生物資料流,提供給基線研究運用。30


    然而,像谷歌這樣的公司,想深入的程度絕不只是穿戴式裝備而已。目前,DNA測試的市場成長飛快。市場龍頭之一是私人企業23andMe,由谷歌聯合創辦人布林(Sergey
    Brin)的前妻沃希基(Anne Wojcicki)所創辦。公司名稱23andMe的23,指的正是承載人類基因組的二十三對染色體,23andMe就代表自己的染色體與自己有非常特殊的關係。只要有人能理解這些染色體正在說什麼,就能告訴你一些你自己從沒想過的事。


    如果你想知道你的基因組,只需向23andMe支付九十九美元,他們就會寄給你一個檢測包,裡面有一根唾液收集試管。你向試管裡吐口水,密封,再寄到加州山景城的公司所在地,他們就會分析你唾液中的DNA,並透過網路將結果傳給你。你得到的是一份列表,列出你可能面對的健康危機,以及從基因看出你可能發生的各種健康情況及體質,從禿頭到失明不等。


