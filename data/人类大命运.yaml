    什麼應用？因此，我們也可以說，人類的新議題其實只有一個真正的議題（但有許多分支）：取得神性。


    # 「神人」不是萬能的神


    如果你覺得這聽起來實在太不科學、或覺得根本是胡言亂語，那是因為大眾往往誤解神性的意義。神性並不是某個模糊的形而上特質，也不是所謂的全能。這裡說要讓人類演化為神，講的比較像是希臘神話或印度教的諸神，而不是《聖經》裡那天上全能的父。我們的後代還是會各有弱點、怪癖和限制，就像宙斯和因陀羅也並非完美。只不過，他們的愛、恨、創造和毀滅，都可能在規模上遠大於現今。


    縱觀歷史，一般相信大多數的神並不是無所不能，而只是擁有特定的超能力，像是能夠設計和創造生命、能夠改造自己的身體、能夠控制環境和天氣、能夠讀心及遠距溝通、能夠以高速移動，當然也包括能夠逃避死亡而永生。人類正努力取得以上所有超能力，甚至更多超能力。


