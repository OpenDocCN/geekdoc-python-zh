  md: '# 共產主義也是宗教


    自由主義者、共產主義者、或其他現代信仰的追隨者，並不喜歡自己相信的系統被稱為「宗教」，原因就在於他們總覺得宗教就是迷信、相信超自然的力量。如果你告訴共產主義者或自由主義者，說他們是宗教信徒，他們可能會覺得你在罵他們、說他們是盲目相信著白日夢。但事實上，說他們信仰的主義也是一種宗教，這只意味著他們也相信某些道德法則系統，認為這些法則雖然不是人類所發明，但人類仍然需要遵守。


    據我們所知，所有人類社會都有此類信仰。每個社會都會告訴成員，他們必須服從一些高於一般人的道德法則，而如果違反這些法則，就會導致災難。


    當然，不同的宗教就會有不同的故事細節、不同的誡命、以及不同的獎懲。像是在中世紀歐洲，天主教的教會就認為上帝不喜歡富人。耶穌曾說，駱駝穿過針的眼，比財主進神的國還容易。而為了讓富人也能進入神的國，教會鼓勵他們要多多奉獻，並且威脅說「否則就等著在地獄裡燃燒」。現代共產主義也不喜歡富人，但威脅的方式卻不是說「等著死後被地獄之火焚燒」，而是說現在就會產生階級衝突。共產主義所說的「歷史規律」，其實就像是基督教上帝的誡命，都代表著高於一般人的力量，無法透過人類意志加以改變。人類可以決定明天上午的足球賽不要管越位規則，因為是人類發明了那條規定，當然也就能夠任意改變。但至少就馬克思看來，歷史規律並非人力所能改變。不管資本家做什麼，只要他們繼續累積私人財富，就必然造成階級衝突，也就注定會被無產階級站起來推翻。'
