  md: '象符號的中介，來體驗現實，於是更容易相信這樣的虛構實體確實存在。


    狩獵採集者整天爬樹、找蘑菇、追野豬、抓兔子，於是他們每天的現實也就是樹木、蘑菇、野豬和兔子。農民整天在田裡工作，耕地、收割、磨玉米、照顧家畜，於是他們每天的現實就是赤腳踩著泥土的感覺，牛拖著犁發出的味道，以及剛出爐的熱騰騰麵包的口感。相較之下，古埃及的書吏將大把的時間花在閱讀、書寫和計算，於是他們每天的現實就是莎草紙上的墨痕，能夠決定誰擁有哪塊地、每頭牛該值多少、哪個農民每年該繳多少稅金。用他寫莎草紙的鐵筆，書吏就能左右整個村落的命運。


    在時間來到現代之前，絕大多數人仍然不識字，但最重要的管理者愈來愈是透過書面文字，來看到現實。對於識字的精英份子來說（不管是在古埃及、或是二十世紀歐洲），一張紙上寫的任何事情，都至少與樹木、牛隻和人類一樣真實。


    1940年春，納粹從北方攻進法國，大部分的法國猶太人都嘗試往南逃離法國。如果要跨越邊界，就需要取得西班牙和葡萄牙的入境簽證。於是成千上萬的猶太人夾雜在洪水般的難民潮中，一起包圍了波爾多（Bordeaux）的葡萄牙領事館，希望得到這張能救命的紙。雖然葡萄牙政府下令，駐法領事需要經過外交部批准，才能簽發入境簽證，但在波爾多的領事德索薩·曼德斯（Aristides
    de Sousa Mendes, 1885-1954）決定無視命令。這個舉動最終讓他三十年的外交職涯隨風而逝。納粹坦克正不斷進逼波爾多，德索薩·曼德斯等人長達十天，夜以繼日工作，幾乎不睡，就是不停簽發入境簽證、在文件上蓋章。德索薩·曼德斯簽發了數千張簽證，最後疲憊不支倒地。'
