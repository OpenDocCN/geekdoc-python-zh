    # 自由主義捲土重來


    接著，一切都改變了。自由民主從歷史的垃圾箱裡爬了出來，抖了抖身子，接著征服了世界。事實證明，超市的力量遠大於古拉格集中營。


    這場閃電戰始於南歐，希臘、西班牙和葡萄牙的專制政權崩潰，讓位給民主政府。1977年，英迪拉·甘地解除緊急狀態，在印度重建民主。1980年代，東亞和拉丁美洲的軍事獨裁政權也由民主政府取代，例如巴西、阿根廷、臺灣和南韓。直到1980年代末、1990年代初，自由主義的浪潮化為一波十足的海嘯，沖垮了強大的蘇聯帝國，讓人對於眼前的歷史終局，懷有更高的期望。經過數十年的失敗和挫折，自由主義在冷戰取得決定性的勝利，縱然千瘡百孔，還是成了這場人文主義宗教戰爭的最後贏家。


    隨著蘇聯帝國垮臺，自由民主政體不僅取代了東歐共產政權，甚至也取代了許多前蘇聯加盟共和國，例如波羅的海三小國、烏克蘭、喬治亞和亞美尼亞。就連俄羅斯，現在也假裝自己是個民主政體。冷戰勝利形成了一股新動力，將自由主義模式傳向世界其他地


