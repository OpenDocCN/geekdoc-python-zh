  md: '洲和中國之間並無連結，也幾乎不可能相信，某天所有智人居然會連結成單一的資料處理網路。


    第二階段從農業革命開始，持續到大約五千年前、發明了文字和金錢的時候。農業加速人口成長，使人類處理器數量急劇上升。同時，農業讓更多人能夠群聚生活，形成密集的局部網路，各自擁有數量空前的處理器。此外，農業也為各個局部網路創造動機和契機，鼓勵彼此貿易和溝通交流。但即使發展到這第二階段，仍然是以離心力為主。因為沒有文字和金錢的概念，人類難以建立城市、王國或帝國，仍然只是無數個小部落，各有自己的生活方式和世界觀。要說所有人類會團結形成一體，當時連做夢也想不到。


    第三階段始於大約五千年前發明了文字和金錢，並持續到科學革命肇始。有了文字和金錢之後，人類合作的重力場最終超過了離心力，讓各個團體融合起來，形成城市和王國，而各個城市和王國的政治和商業連結也更為密切。至少到了西元前第一個千禧年（出現了錢幣、帝國和普世宗教），人類已經開始有意識的想像著要建立涵括整個地球的單一網路。


    到了歷史的第四階段、也是最後一個階段，大約始於1492年，這個夢想成為現實。早期的現代探險家、征服者和交易者，一起編織出覆蓋整個世界的頭幾條絲線。到了近代晚期，這些絲線變得更加結實緊密了，在哥倫布時期已如同蛛網；到了二十一世紀，則已經是由鋼鐵和瀝青構成的網路。更重要的是，資訊能夠在這個全球網路裡愈來愈自由的流動。哥倫布剛剛把歐亞網路連結到美國網路時，每年只有極少量資訊能夠越過海洋，還得應付各種文化偏見、嚴格審查和政治打壓。但隨著時間過去，不論是自由市場、科學社群、法治概念或民主傳播，都有助於消除種種障礙。我們常常有所'
