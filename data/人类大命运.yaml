  md: '世紀初建構現代教育體系的重要人物威廉·洪堡德（Wilhelm von Humboldt）曾說，存在的目的就是「用生命能體驗到最廣泛的經驗，蒸餾成智慧。」他也寫道：「生命只有一座要征服的高峰：設法感受一切身為人的感覺。」⁴


