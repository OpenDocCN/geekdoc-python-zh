    # 打破弱肉強食的叢林法則※


    第三個好消息是戰爭也正在消失。在整個歷史上,大多數人都以為有戰爭是必然,和平只是暫時狀態。國際關係也是由叢林法則掌控,就算兩個政體看來和平共處,戰爭也始終會是一個選項。舉例來說,雖然德國和法國在1913年處於和平狀態,但大家都知道他們可能在1914年掀起戰火。每當政客、將領、商人和一般大眾籌劃未來的時候,總會想到戰爭這項因素。從石器時代到蒸氣時代,從北極到撒哈拉大沙漠,地球上每個人都知道,鄰國隨時可能前來侵犯領土,擊垮軍隊、屠殺人民,占領土地。


    直到二十世紀下半葉,這種叢林法則才終於遭到打破(或說取消)。大多數地區,戰爭已經比以往更為罕見。在遠古農業社會,人類暴力占了死亡總數的15%,而在二十世紀,暴力事件只占死亡總數5%,到了二十一世紀初,更是只占全球死亡總數約1%。23例如2012年,全球約有五千六百萬人死亡,其中六十二萬人死於人類暴力(戰爭致死十二萬人、犯罪致死五十萬人)。相較之下,自殺的人數有八十萬,死於糖尿病的更有一百五十萬人。24現在,糖可比火藥更致命呢!


    更重要的是,已經有愈來愈多人覺得不可能發生戰爭了。這是


    20'
  - '[PAGE 24]


    史上首次，當政府、企業和個人籌劃不遠的將來，多半不會考慮到戰爭的可能性。核武發明之後，超級大國之間如果還想掀起戰端，無異於集體自殺的瘋狂舉動，於是逼著全球最強大的幾個國家，得找出和平的替代方案，來解決衝突。同時，全球經濟的導向也已經從物料走向知識。過去主要的財富來源是物質資產，例如金礦、麥田、油井，而現在的主要財富來源則是知識。發動戰爭雖然能搶下油田，卻無法霸占知識。因此，隨著知識成為最重要的經濟資源，戰爭能帶來的獲利便下降；可能發生戰爭的地方，愈來愈局限在世界的特定區域（像是中東和中非），這些地方仍然維持老式的物料導向經濟。


    盧安達在1998年入侵鄰國剛果，奪占該國豐富的鈮鉭鐵礦；這件事之所以不令人意外，是因為這種礦產是手機和筆記型電腦不可或缺的重要原料，而剛果鈮鉭鐵礦的蘊藏量足足占了全球的80%。盧安達靠著掠奪來的鈮鉭鐵礦，每年能賺到二億四千萬美元，對於貧困的盧安達來說，可是一大筆收入。25


