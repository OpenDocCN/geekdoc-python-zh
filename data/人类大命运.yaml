    如今,科學家又提供了更詳細的描繪:人看到獅子,電訊號便從眼睛傳向大腦,刺激某些神經元,神經元又放出更多訊號,於是沿線上的神經元一個個受到刺激、放出訊號。如果能有夠多的神經元、用夠快的速率放出訊號,指令就能傳到腎上腺、讓大量腎上腺素傳遍全身,心臟也收到指令要它跳快一些,同時,在運動中樞的神經元也向腿部肌肉發出訊號,讓肌肉開始伸展或收縮,於是這個人從獅子旁邊逃之夭夭。


    諷刺的是,我們愈能清楚描繪這個過程,反而愈難解釋為何要有各種意識和主觀經驗。我們愈理解大腦,心靈反而愈顯多餘。如果整個系統就是電訊號從這裡傳到那裡,那我們何必去感覺這種事情?如果就只是一連串的電化學反應,從眼睛裡的神經細胞一路傳到腿部肌肉,何必還要在這個反應串裡加入主觀經驗?主觀經驗到底有什麼作用?骨牌不用有任何主觀經驗,還是能夠一塊一塊自己倒下。那為什麼神經元要有感覺,才能互相刺激、或是告訴腎上腺開始分泌?


