    在祕魯、瓜地馬拉、菲律賓和阿爾巴尼亞這些貧困而政治不穩定的國家，平均每年每十萬人有一人自殺。但是在瑞士、法國、日本、紐西蘭這種富裕與和平的國家，平均每年每十萬人卻有二十五人結束自己的生命。在1985年，大多數南韓民眾生活貧窮、未受教育、深受傳統束縛，且活在專制獨裁統治之下。到了今天，南韓已經是領先的經濟強國，國民教育水準在全球數一數二，並享有穩定而相對自由的民主制度。然而，南韓在1985年大約每十萬人有九人自殺，現今的自殺率卻飆破三倍，來到每十萬人有三十人自殺。32


