    人類祖先並非處心積慮要殲滅猛獁象，而是根本不知道自己的行為會有什麼後果。猛獁象等大型動物的滅絕，就演化的時間尺度來看，十分迅速；但就人類觀感而言，卻是個緩慢的進程。當時人類的壽命頂多七、八十年，但整個滅絕的過程卻花了幾個世紀。遠古的智人可能壓根就沒注意到，每年獵一次猛獁象、每次只獵個兩三頭，竟然會讓這些毛茸茸的巨獸就此滅絕。大不了可能就只是某位懷舊的老人家，告訴族裡的年輕人：「我年輕的時候，猛獁象可比現在多得多啊。乳齒象和大角鹿也一樣。還有，當然那時候的部落酋長比較誠實，小孩也比較敬老尊賢。」


