    # 人文主義的經濟觀點


    這種人文主義的思維，也深深影響了經濟層面。在中世紀，整個生產流程是由公會操縱，個別的工匠或客戶很少有機會表達自己的意見或品味。怎樣叫好椅子，由木匠公會決定；怎樣是好麵包，由麵包師公會定義；哪些歌曲算是高尚、哪些又是垃圾，也有「名歌手（Meistersinger）公會」來判斷。與此同時，王公貴族與市議會控制了工資和價格，偶爾也會逼迫民眾購買特定貨品，價格數量都不由民眾決定。但是在現代自由市場中，這些公會、議會和王公貴族，都被一個新的最高權威取而代之：顧客的自由意志。


    假設豐田（Toyota）想製造出一款完美的汽車，公司可能會成立一個包含各領域的專家委員會——找來最好的工程師和設計師，集合最好的物理學家和經濟學家，甚至再聘幾位社會學家和心理學家當顧問；為了萬無一失，或許再加上一、兩位諾貝爾獎得主，一位奧斯卡最佳女主角，以及幾位全球知名的藝術家。經過五年研究開發，豐田終於推出一款完美的汽車，生產了幾百萬輛，運往世界各地的汽車經銷商。然而，這款車卻一輛都沒賣出去。這是否代表顧客犯了錯，有眼無珠？


    在自由市場上，顧客永遠是對的。如果顧客不想要、不想買，就代表這款車不好。就算所有大學教授和所有神職人員都高聲疾呼這是一輛非常棒的車，也不會有任何影響；顧客不要，就是爛車。沒有人有權說顧客錯了，而且如果哪國政府斗膽強迫公民違背意願一定得買某輛車，這個政府的下場會如何，可得求老天保佑。


    汽車的這種情形，也適用於其他所有產品。讓我們聽聽瑞典烏普薩拉大學（University of Uppsala）的安德森（Leif Andersson）教'
- md: '授怎麼說。他的專長是農場動物的基因改良，讓豬長得更快、牛產乳產得更多、雞的肉量也增加。接受《國土報》（Haaretz）訪問時，記者達隆（Naomi Darom）詢問安德森，這樣的基因操作是否會給動物造成許多痛苦。這些「加強版」的乳牛乳房太大，幾乎無法走路，而「升級版」的雞也是肉量過多，幾乎站不起來。安德森教授的答案十分堅定：「一切都要回到個別消費者、以及消費者願意為肉品付出多少價格的問題……我們必須記住，如果沒有（加強版的）現代雞隻，就不可能維持現在的全球肉品消耗量……如果客戶只問什麼肉最便宜，這就是我們給的答案……客戶需要決定自己最看重什麼，看看究竟是價錢、還是其他。」³


    安德森教授晚上就寢時，並不會良心不安。只要顧客願意購買這些強化版動物的各種產品，就代表他已經滿足了顧客的需求和欲望，也就代表他做得再正確不過。


    同樣的邏輯，如果某一間跨國企業想判斷自己是否還符合「不作惡」（Don''t be evil）的座右銘，判斷標準也就在於財務報表。如果現在看來財源滾滾，代表有幾百萬人都愛它的產品，也就代表這是一股善的力量。如果有人對此提出反對，說民眾也可能做出錯誤的選擇；很快就會有人提醒他，顧客永遠是對的，人的感受感覺才是一切意義和權威的源頭。如果有幾百萬人都是透過自由選擇，購買了這間公司的產品，你憑什麼說他們錯了？


    ## 人文主義的教育觀點


    最後，人文主義思想的興起，也徹底改變了教育制度。在中世紀，所有意義和權威都來自外部，因此教育的重點就在於順從、背誦經文、研讀古老傳統。教師向學生提出問題，學生就得背出亞里斯多德、所羅門王、或聖湯瑪士·阿奎那（St.
    Thomas Aquinas，歐洲中世紀經院派哲學家暨神學家）是如何回答的。


    相較之下，現代人文主義教育則要教導學生自己思考。能知道亞里斯多德、所羅門王和阿奎那等先賢先哲對政治、藝術和經濟有何想法，是很不錯，但因為意義和權威的本源在於我們的內心，所以更重要的是你自己對這些事情的看法。


    不管是在幼兒園、中小學或是大學，你可以隨便找一位老師，問她想教的是什麼。她可能就會回答：「這個嘛，我教的科目是歷史（或量子物理、或藝術），但最重要的是我想教學生如何思考。」雖然不見得總是成功，但這正是人文主義教育的目標。


