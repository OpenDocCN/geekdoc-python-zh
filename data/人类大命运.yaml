    我們現在已經有大批科學方法，能夠找出是誰在何時寫成《聖經》。相關的科學研究已經進行超過一個世紀了，如果對這些發現有興趣，已有許多專著可供參考。我把結論簡單說來：多數經過同儕審查的科學研究都一致認為，《聖經》是許多不同文本的集合，而這些文本則是由許多不同的人類作家，在他們聲稱的事件過了幾百年之後才寫成的，要等到《聖經》時代過了許久，這些文本才終於集結成一本宗教經典。


    舉例來說，雖然大衛王的時代應該是在西元前1000年左右，但是一般認定：〈申命記〉是在大約西元前620年，於猶大王約西亞（King Josiah）的宮廷所寫成，做為加強約西亞權威的宣傳活動。〈利未記〉的成書年代甚至還要更晚，絕不早於西元前500年。


    至於要說古代的猶太人很小心的保存了《聖經》文本、絕不增刪任何一字，科學家也指出了破綻：《聖經》時代的猶太教，根本不是以經文為基礎的宗教。相反的，當時的猶太教正如許多中東的鄰近宗教，是典型的鐵器時代異教，既沒有猶太會堂、猶太初等學校（yeshiva）、拉比，甚至連猶太經典都沒有。當時擁有的是繁複的聖殿儀式，多半就是將動物獻祭給一位善妒的天神，希望祂能保佑人民、賜下每季的雨水和戰爭的勝利。此時的宗教精英是一群祭司家族，只談出身，不論智力。祭司多半是文盲，忙著處理聖殿儀式，無暇書寫或研讀任何經文。


    在第二聖殿（Second Temple）時期，另一批對立的宗教精英逐漸成形。部分受到波斯和希臘的影響，撰寫和詮釋文本的猶太學者地位愈來愈高，最後終於成為我們所知的「拉比」，而他們編纂的文本也成了《聖經》。至於拉比能享有何種權威，則是出於個人的智力，而非出身。這群新的文人精英和舊有的祭司家族之間，衝


