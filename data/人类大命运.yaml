    # 計算「知識」的三條公式


    正如所有其他權威來源，「感受」也有其缺點。人文主義假設每個人都有一個真正的內在自我，但是我們去叩內心之門的時候，卻常常是沒有回應、或是眾聲喧囂。為了克服這個問題，人文主義又宣稱有另一個新的權威來源，同時還提出配套的新方法，告知大家如何使用這種權威，以取得真正的知識。


    在中世紀歐洲，取得知識的主要公式是：


    ```

    知識 = 經文 × 邏輯*

    ```


    如果想知道某個重要問題的答案，他們會閱讀相關經文，並用邏輯來理解經文的確切含義。舉例來說，學者如果想知道地球是什麼形狀，就會快速掃過《聖經》裡的內容，尋找相關參考記述。有人就會指出，〈約伯記〉第38章第13節提到，上帝「叫這光普照地的四極，將惡人從其中驅逐出來。」於是學者就會用邏輯推斷，因為這個世界有「四極」，一定就是個平坦的正方形。但另一位賢者不接受這種詮釋，要大家看看〈以賽亞書〉第40章第22節，裡面提到「神坐在地球大圈之上，地上的居民好像蝗蟲。」這豈不就證明了地球是圓的？


    在實務上，這代表著追求知識的學者會花費多年時間，泡在學


    > * 這裡的公式用的是乘法，是因為兩項元素需要彼此，才能運作。至少在中世紀學者看來，沒有邏輯，就不可能理解《聖經》。如果你的邏輯值為零，就算你把《聖經》每一頁都讀得滾瓜爛熟，知識總值仍然為零。反過來說，如果你的經文值為零，邏輯再好也沒用。如果公式裡用的是加法，代表的就是如果邏輯很好，就算不讀經文，也能擁有很多知識。這在你我看來可能覺得合理，但中世紀學術圈並不同意。'
  - '[PAGE 272]


    校和圖書館裡，讀著愈來愈多的經文文本，不斷鍛鍊自己的邏輯，讓自己能夠正確瞭解文本的意義。


    科學革命的知識公式，則非常不同：


    知識 = 實驗數據 × 數學


    如果想知道某個重要問題的答案，我們要做的就是蒐集相關的實驗數據，再用數學工具加以分析。舉例來說，要測量地球真正的形狀為何，可以先從在世界各地觀測太陽、月亮和行星開始。等到累積了足夠的觀測值，只要運用三角學，不僅能推斷地球的形狀，就連整個太陽系的結構也能推知。在實務上，這代表著追求知識的科學家花費多年時間，泡在觀測站、實驗室和研究考察裡，蒐集愈來愈多的實驗數據，不斷鍛鍊自己的數學工具，讓自己能夠正確解讀數據的意義。


    這條計算知識的科學公式，讓我們在天文學、物理學、醫學等學門取得驚人突破，但是它有一個重大缺點：無法處理價值和意義的問題。中世紀學者可以完全肯定謀殺和偷竊是錯的，也知道人類生活的目的，就是要遵行上帝的指示，因為經文裡就是這麼說的。但科學家無法做出這樣的倫理判斷。不管有多少實驗數據、數學功力多強，都不可能證明謀殺是錯的。然而，人類社會如果缺乏這種價值判斷，就無以維繫。


    要克服這種困難，方法之一是在新的科學公式之外，繼續運用舊的中世紀公式。如果碰上的是很實際的問題，像是確定地球的形狀、搭橋、或治病，就蒐集實驗數據，做數學分析。但如果碰上倫理問題，像是能不能允許離婚、墮胎和同性戀，就轉向經文求助。'
  - '[PAGE 273]


    從維多利亞時代的英國、到二十一世紀的伊朗,許多現代社會都採用這種解決方案。但人文主義還提供了另一種選擇。等到人類對自己有了足夠的信心之後,一條取得倫理知識的新公式出現了:


    知識=經驗×感性


    如果我們想知道任何道德問題的答案,我們需要連接到我們內心的經驗,並以最大的感性來觀察它們。在實務上,這代表著追求知識的方法要靠多年的經驗累積,並鍛鍊感性,好讓我們正確理解這些經驗。


    究竟「經驗」是什麼?經驗並不是實驗數據,也不是由原子、電磁波、蛋白質或數字所組成。經驗是一種主觀現象,有三個主要成分:知覺、情緒及想法。在任何時刻,我的經驗都包括了我的一切感知(熱、愉悅、緊張等等);我所感覺到的情緒(愛、恐懼、憤怒等等);以及一切出現在我腦海中的想法。


    而「感性」又是什麼?感性包括兩件事。第一,是注意到自己的知覺、情緒和想法。第二,是允許這些知覺、情緒和想法影響自己。當然,並不是略有風吹草動,就反應激烈,但重點是要對新的經驗抱持開放態度,允許新的經驗改變自己的觀點、改變自己的行為、甚至改變自己的個性。


    經驗和感性會形成彼此加強的無限迴圈。沒有感性,就無法經驗體會任何事物;沒有經驗體會各種事物,又無法培養感性。感性並不是什麼能夠靠著讀書或聽演講來培養的抽象能力,而是一種實作技巧,必須在實踐中慢慢成熟。'
