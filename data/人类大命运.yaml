  md: '尼羅河的部分河水引至法雍，創造了一座巨大的人工湖，蓄水量足足有五百億立方公尺。¹相較之下，胡佛水壩攔水形成的米德湖是美國最大的人造湖，最大蓄水量只有三百五十億立方公尺。


    法雍工程計畫賦予法老能力，讓法老得以約束尼羅河，避免土地遭到大洪水的蹂躪，並在乾旱時提供寶貴的水源。此外，法雍谷地本來是一片鱷魚肆虐、沙漠圍繞的沼澤，現在搖身一變，也成了埃及的糧倉。在這個新的人工湖岸邊，建起了一座新城，古埃及稱之為
    Shedet，而希臘人稱為 Crocodilopolis，也就是「鱷魚之城」。全城最重要的建物就是鱷魚神索貝克（Sobek）的神廟，索貝克的地位等同於法老（當代雕像有時也會看到有鱷魚頭的法老）。神廟裡有一頭名為佩蘇卓斯（Petsuchos）的聖鱷，咸認為是索貝克的神靈轉世。就像活神法老，這位活神佩蘇卓斯也有滿是關愛眼神的祭司悉心照料，為這隻幸運的爬蟲類提供美食、甚至玩具，讓祂穿上金色披風、戴上鑲嵌著寶石的王冠。畢竟，佩蘇卓斯正是這些祭司依附的品牌、一切權威和生計的依靠。一旦佩蘇卓斯過世，立刻就會有一隻新的鱷魚被選出來填補空缺，而過世的鱷魚則被仔細防腐，製成木乃伊。


