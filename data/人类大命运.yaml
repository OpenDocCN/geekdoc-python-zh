    以人眼為例，就是由許多更小的部分所組成的複雜系統，包含像是水晶體、角膜和視網膜。眼睛可不是橫空出世、一現身就備齊所有部分，而是經過幾百萬年一小步、一小步演化，才成了現在的樣子。與大約一百萬年前的直立人（Homo
    erectus）相較，智人和他們的眼睛還非常類似。與大約五百萬年前的南猿（Australopithecus）相較，相似的地方就少了一點。再與一億五千萬年前的史前哺乳動物Dryolestes相比，則已是天差地別了。與億萬年前住在地球上的單細胞生物相比，看來就是毫不相似。


    然而，就算是單細胞生物，其實也有微小的胞器，能讓這隻微生物辨別明暗，以便向光或背光移動。從這種最原始的感測器，演化成現在的人眼，整個過程曲折而漫長——但如果你也有幾億年的時間，當然就能一步一步走完。要能做到這件事，正是因為眼睛能夠分成許多不同的部分。只要每隔幾代、在某一個部分有了一點小小的變化（像是角膜曲度大了一點），經過幾百萬代，就可能演化出人眼來。如果眼睛就是一個完整的實體、無法再分出任何部分，就絕不可能透過天擇，演化成現在的樣子。


    正因如此，如果要說靈魂就是一種不可分割、不會改變、可能永恆的東西，演化論當然無法接受。天擇之所以能夠塑造人類的眼睛，正是因為眼睛可以再分成許多不同的部分。然而，靈魂卻不能再分出局部。如果要說智人的靈魂是從直立人的靈魂一步步演化而來，到底步驟是什麼？智人的靈魂有什麼部分，是比直立人的靈魂更發達的？事實是，若真有靈魂，也沒辦法再分出局部。'
