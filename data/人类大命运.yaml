    如今，知識界常常抨擊自由市場資本主義。確實，由於資本主義主導了這個世界，我們應該盡全力瞭解它有何缺點，以免末日就在眼前。但是在批評資本主義的當下，我們仍應看到它的優點與成就。


    如果我們暫時忽略生態可能在未來崩潰，並以人口和成長做為成功的標準，資本主義可說是極其成功。以2016年為例，雖然我們的世界可能是充滿壓力、一片混沌，但各種關於崩潰和暴力的末日預言並未成真，反而是關於永遠成長和全球合作的吹牛誇口，確實實現。雖然偶爾也會出現經濟危機和國際戰爭，但是長期而言，資本主義不僅勝出，甚至還克服了饑荒、瘟疫和戰爭。在幾千年間，不論是祭司、神父、牧師、拉比、或是穆夫提（mufti，伊斯蘭教的法典說明官），都說人類不可能只靠自己就解決饑荒、瘟疫和戰爭等問題。但接著出現了銀行家、投資家和產業人士，不到兩百年的時光，就實現了這些夢想。


    於是，這份與現代的契約承諾，給予我們前所未有的力量，而且確實兌現了。但代價又如何？為了換來力量，這份契約要求我'
- md: "人類大命運\n\n  們放棄意義。這種叫人心裡發寒的要求，人類該如何應對？遵守要求，可能會帶來一個黑暗的世界，沒有任何倫理、美學或同理心。然而從目前看到的事實，人類不僅比過去任何時候都更有力量，而且也更為和平、合作愉快。人類是怎麼做到的？在一個似乎沒有神祇、沒有天堂、沒有地獄的世界上，道德、美麗、甚至是同理心，是如何不但存活、而且發展蓬勃？\n\
    \n  當然，資本家又會說這一切都要歸功於市場那隻看不見的手。但市場那隻手不僅我們看不見，就連它本身也是盲目的，光靠它本身，絕不可能挽救人類社會。事實上，如果沒有某些神祇、國王或教會也伸出一隻看不見的手，別說整個市場，就連一個市集也難以維持。如果真的萬物可賣，包括法院和警察也能收買，信任就會煙消雲散，信用將會蕩然無存，商業也就無以為繼。6\n\
    \n  所以，究竟是什麼讓現代社會免於崩潰的命運？拯救人類的並不是供需法則，而是因為興起了一種革命性的新宗教：人文主義。\n\n# 第6章 與「現代」的契約\n\
    \n# 第7章 人文主義革命\n\n  與「現代」的契約給了人類力量，但條件是我們不再相信整個世界有個偉大的宇宙計畫，能讓生命有意義。然而，如果細查契約條款，會發現有一條賴皮的例外條款：如果人類不用透過偉大宇宙計畫也能找到意義，就不算是違背契約。\n\
    \n  這條例外條款正是現代社會的救贖，因為如果真的沒有意義，就不可能維持秩序。現代在政治、藝術和宗教方面成就斐然，都是並未透過什麼偉大宇宙計畫，就為生活找到了意義。雖然我們現在知道，自己不是什麼神聖戲劇裡的角色，也沒有誰真的在意我們或我們的行為，因此不會有人限制我們的力量，但我們仍然相信自己的生活有意義。\n\
    \n  在2016年，人類確實是魚與熊掌都能兼得。不但擁有的力量遠超以往，而且讓前人都跌破眼鏡：上帝已死，但社會並未崩潰。縱觀歷史，先知和哲學家都認為，如果人類不再相信有個偉大宇宙計畫，所有的法律和秩序都會消失。但今天，對全球法律和秩序造成最大威脅的，卻正是那些還在繼續相信唯一真神和偉大計畫的人。\n\
    \n# 向人心探尋\n\n  對神懷有畏懼的敘利亞，比起世俗的荷蘭，要來得暴力許多。\n\n  如果沒有什麼宇宙計畫，我們也不用遵守什麼神聖的典律或自然律了。那為什麼社會不會崩潰呢？是為什麼，你能夠旅行數千公里，從荷蘭的阿姆斯特丹到羅馬尼亞首都布加勒斯特、或從紐奧良到蒙特婁，而不會被販奴者綁架、遭亡命之徒伏擊、或被敵對的部落殺害？\n\
    \n  正是人文主義（humanism），讓人類擺脫了人生無意義、存在沒依據的困境。人文主義這個革命性的新信念，在過去幾個世紀間，征服了世界。人文主義宗教崇拜人性，期望由「人文」來扮演神在基督教或伊斯蘭教裡的角色，或是大自然的法則在佛教和道教扮演的角色。傳統認為，是偉大宇宙計畫為人類生活帶來意義，但人文主義讓角色逆轉，認為是人類經驗為宇宙賦予意義。\n\
    \n  根據人文主義的想法，人類必須從自己的內在經驗找出意義，而且不只是自己的意義、更是整個宇宙的意義。這是人文主義的主要誡命：為無意義的世界創造意義。\n\
    \n  因此，現代帶來的主要宗教革命，並不是對神失去信心，而是對人類有了信心。要走到這一步，足足花了數個世紀。思想家寫著宣傳小冊、詩人寫著詩、音樂家譜著交響曲、政治家推動了各種契約，他們共同使人相信，人文可以讓宇宙充滿意義。\n\
    \n  想知道人文主義革命的影響有多麼深遠，可以看看現代歐洲文化與中世紀歐洲文化有多麼不同。在西元1300年，倫敦、巴黎和西班牙托萊多（Toledo）的市民，還不相信人類自己就能判斷善惡、正誤、美醜，認為只有神才能創造和定義善良、公義和美麗。雖然當時已經認為人類確實享有獨特的能力和機會，但同時也認為人類就是一種無知和墮落的生物，如果沒有外力監督指導，就不可能理解永恆的真理，而會沉溺在一時的感官享受及世俗幻象之中。中世紀的思想家還指出人類不免一死，各種意見和感覺就如風般易逝。今天全心愛著某樣東西，明天就覺得厭惡，而等到下星期，甚至連自己也已過世，深埋地底。因此，任何根據人類意見而得的意義，都必然是脆弱且短暫的。\n\
    \n  這麼說來，如果要講絕對的真理、講生命的意義和宇宙的意義，其根據就必須是某種高於人類的來源所產生的永恆法則。從這個觀點，神不但成了意義的本源，也成了權威的本源。意義和權威始終是攜手共進。那些判斷著我們的行動究竟屬於好壞、對錯、美醜等等意義的人，同時也就取得權威，能告訴我們該如何思考、如何行動。\n\
    \n  以神做為意義和權威的源頭，這可不只是個哲學上的理論，而是影響了日常生活的方方面面。假設在西元1300年的某個英國小鎮，有位已婚婦女很喜歡到隔壁鄰居家，與他做愛。等她溜回家，忍住笑意、整理衣服的時候，心裡卻會開始不停想著：「這是怎麼回事？我為什麼會這麼做？這是好事還是壞事呢？這代表我是怎樣的人？我還該繼續這樣嗎？」為了回答這樣的問題，這位婦女該做的事就是去找當地的神父，向他告罪，並請求聖父給予指導。神父對《聖經》內容瞭若指掌，而《聖經》內容已記載了上帝對於通姦的看法。基於上帝永恆不變的話語，這位神父可以明確判斷：這個女人犯了一項不可饒恕的罪，如果不悔改，就會下地獄。所以她必須立即悔改，捐十枚金幣給即將成行的十字軍，六個月內不得吃肉，還得前往坎特伯里，到聖多默·白凱（St.\
    \ Thomas Becket）主教的安息地朝聖。而且不用說，這種可怕的罪惡絕對不可以再犯。\n\n# 向心理治療師「告解」\n\n  現在的情況就大不相同了。幾世紀以來，人文主義一直想讓我們認為，人類自己就是意義的本源，因此自由意志也正是最高的權威。我們不需要等待某個外在的實體說三道四，而能夠用自己的感覺和欲望來判斷。從小，我們就不斷聽到各種人文主義的口號：「要聆聽自己的聲音，對自己真誠，相信自己，跟著你的心，做讓自己快樂的事。」\n\
    \n  盧梭的教養小說《愛彌兒》（Émile）正是集各家大成，可說是十八世紀討論感受的聖經。盧梭認為，要尋找生活的行為規則時，發現這些規則是「在我心深處，出於自然，無人能抹去。想做什麼，只需要請教自己；我覺得好、就是好，我覺得壞、就是壞。」¹\n\
    \n  因此，如果是一位現代女性，想知道自己外遇有何意義，她不太可能會再盲目接受神父或某本古書的判斷，而是仔細審視自己內心的感覺。如果這時的感覺還不太清楚，她會打電話給閨蜜，兩人見面喝喝咖啡，傾吐心聲。如果就連這樣也還是覺得捉摸不定，她就會找上心理治療師，把一切都告訴他。理論上，現代的心理治療師與中世紀的神父，倒是站在同一個位置（已經有太多人做過兩者的比較了），但實際上，兩者有一項巨大的差別：心理治療師並沒有一本規定著善惡對錯的聖經。\n\
    \n  這位婦女說完故事的時候，心理治療師很不可能忽然破口大罵「妳這個邪惡的女人！妳犯了一條可怕的罪！」當然，他也一樣很不可能讚美「太好了！妳真棒！」相反的，不管這位婦女究竟說了什麼和做了什麼，心理治療師最有可能做的事，就是用一種溫暖關懷的聲音，問道：「那妳對這一切有什麼感覺呢？」\n\
    \n  確實，心理治療師的書架上，還擺著佛洛伊德、榮格等人的著作，也有厚達千頁的《精神疾病診斷與統計手冊》，簡直能把書架壓垮。但這些都不是什麼神聖的經典。《精神疾病診斷與統計手冊》診斷的是生命中的疾病，而不是生命的意義。大多數心理學家相信，唯有從人的感覺出發，才有權判斷人類行為的真正意義。\n\
    \n  因此，不論這位心理治療師對病人的婚外情有何看法，也不管佛洛伊德、榮格或《精神疾病診斷與統計手冊》對婚外情又有何看法，這位心理治療師都不該把自己的意見，強加在病人身上。相反的，他該做的是幫她走進心中最私密的房間。只有在那裡，她才能找到答案。中世紀的神父彷彿和上帝有一條熱線，能夠為我們區辨好壞，但現代的心理治療師只會幫助我們接觸到自己內心的感覺。\n\
    \n  這可以部分解釋為何婚姻制度的命運不斷變化。中世紀將婚姻視為由神授予的聖事，神同時也授權給父親，能依據自己的願望和利益，為孩子安排嫁娶。於是，婚外情等於是明目張膽的同時挑戰了神權和父權。不管這一對戀人怎麼想、怎麼感覺，這都是一種不可饒恕的罪。\n\
    \n  今天，人們是因為相愛而結婚，而這種關係的價值是來自於他們的個人感受。因此，如果曾經把你送入某人懷抱的這種感受，今天又把你送進另一人的懷抱，又會有什麼問題呢？如果今天，結髮二十年的配偶已經不再能滿足你的情慾和性慾，而這個新情人既善良又熱情，而且還很能感受到你的需求，為什麼不好好享受呢？\n\
    \n# 人文主義的倫理觀點\n\n  不過你可能會跳出來說，等等！我們也不能忽視另一方的感覺啊！這位婦女和情人可能在彼此的懷中是覺得很甜蜜，但如果被彼此的另一半發現，大家可能都會有一段時間痛苦萬分。而如果導致離婚，就連孩子也可能有幾十年帶著情感上的傷痕。而且就算配偶從未察覺，光是要隱瞞這件事，就會造成極大的壓力，並讓人愈來愈覺得孤立和憤怒。\n\
    \n  在人文主義的倫理中，最有趣的討論就是像婚外情這種彼此感覺有所衝突的情境。如果某個行為讓一方感覺良好、另一方卻感覺痛苦，情況會如何？這些感受該如何彼此衡量？兩個情人之間感覺幸福，是否會比配偶和孩子感覺不幸更重要？\n\
    \n  不論你想站在哪一邊都沒關係，這裡更重要的，是要看出雙方其實用的都是同一套論點。現代人對婚外情的看法各有不同，但無論立場如何，理由都比較偏向於人的感受，而不會是因為《聖經》或神的誡命。人文主義告訴我們，除非這件事讓人感覺不好，才有可能是件壞事。\n\
    \n  謀殺之所以是錯的，並不是因為有什麼神曾說「不可殺人」，而單純就是因為這會讓被害人與被害人家屬和親友十分痛苦。偷竊之所以是錯的，並不是因為有什麼古籍說過「不可偷盜」，而單純就是因為如果有人失去財產，會感覺不開心。如果某種行為不會讓任何人感覺不好，就等於沒什麼錯。如果在同一份古代的文本裡，說上帝曾經告誡我們：不可以製作任何人類或動物的形象（〈出埃及記〉第20章第4節）；但我就是喜歡雕刻這些人物動物，過程中又不會傷害到任何人，這究竟能有什麼錯？\n\
    \n![](img/319dca06e22893e942053da0432e9f19_257_0.png)\n\n  同樣的邏輯也能應用到同性戀的論爭上。如果兩個成年男性喜歡與彼此發生性行為，過程中不會傷害到任何人，這又有什麼錯？為什麼該用法律禁止呢？這就是兩個男人間的私事，應該可以根據他們自己的個人感受來自由決定。如果在中世紀，兩個男人向神父告解，說他們彼此相愛、感受到前所未有的快樂，神父的判斷並不會因為他們究竟高不高興而有任何改變；而且，他們居然不感到愧咎，這可是罪上加罪！今天的情況就不同了，如果兩個男人相愛，大家會說：「如果感覺對了，就愛吧！不要讓什麼神父牧師的影響你，傾聽你的心就對了，你自己最知道什麼對你好。」\n\
    \n  很有趣的是，今天就算是宗教狂熱份子，也會在試圖煽動大眾時，採用這種人文主義的論調。例如過去十年間，以色列的LGBT社群每年都會在耶路撒冷的街道，舉行同志遊行。在這個充滿衝突的城市，這天難得顯得如此和平，因為不管是猶太教徒、穆斯林或基督徒，都忽然有了共同的敵人：同志遊行。真正有趣的是這些教徒的論點。他們並不會說「這些罪人不該舉辦同志遊行，因為上帝禁止同性戀！」而是透過所有麥克風和攝影鏡頭，高聲疾呼「看到同志遊行居然穿過耶路撒冷這座聖城的中心，實在深深傷害了我們的感情！同志希望我們要尊重他們的感受，那他們也應該要尊重我們的感受！」\n\
    \n  法國《查理週刊》（Charlie Hebdo）曾刊出伊斯蘭教先知穆罕默德的漫畫，結果在2015年1月7日，便有穆斯林狂熱份子屠殺《查理週刊》的員工。\n\
    \n  接下來幾天裡，許多穆斯林組織紛紛發出聲明，譴責恐怖攻擊行為，但有些就是忍不住加入一條但書。例如埃及記者組織（EJS）雖然譴責恐怖份子使用暴力，但同樣譴責《查理週刊》「傷害全世界數百萬穆斯林的感情」。²請注意，埃及記者組織並未譴責《查理週刊》不服從神的旨意。而這種情形，我們就能稱之為進步。\n\
    \n# 人文主義的政治觀點\n\n  我們的感覺不只能提供私人生活中的意義，也能為社會和政治程序提供意義。想知道該由誰來統治國家、採用何種外交政策、使用何種經濟手段時，我們不會從古籍經典裡找答案，也不會只聽教宗或諾貝爾獎得主的命令。相反的，大多數國家都是用民主選舉，詢問人民對當前事務的看法。我們相信選民能做出最好的選擇，而個人的自由意志選擇，正是最終的政治權威。\n\
    \n  然而，選民又是怎麼知道該選什麼？至少在理論上，選民要探索自己內心最深處的感受、順心而為。但這並不容易。想要碰觸到自己真正的感受，就得先過濾掉那些沒有意義的宣傳口號、無恥政客無盡的謊言、狡猾公關放出的各種煙霧彈，以及被收買的專家提出貌似專業的想法。先清掉所有這些喧囂吵雜，才能聽到自己真正內心的聲音。接著，我真正內心的聲音會在我耳裡輕聲說「投給卡麥隆」、「投給莫迪」、或是「投給希拉蕊」，於是我就在選票上蓋下印記——這就是我們決定該由誰來領導國家的方式。\n\
    \n  在中世紀，大家會覺得這種方法實在愚不可及。對於重要的政治決定，怎麼可能會以無知俗人一時的感覺，做為判斷基礎呢？當英格蘭在玫瑰戰爭之後面臨分裂時，從來沒人提過要用全國公投來解決。哪有可能讓每個鄉巴佬或妓女都能有一票，選擇要蘭開斯特家族、還是約克家族！\n\
    \n  同樣的，在教皇伍朋二世（Urban II）發起第一次十字軍東征時，也從沒說這是人民的意願。這當然是神的旨意——政治權威是從天而降，而不是升起於凡人的心。\n\
    \n![](img/319dca06e22893e942053da0432e9f19_259_0.png)\n\n27. 聖靈以鴿子的形態出現，送來裝滿聖油的壺，好為法蘭克王國創始人克洛維國王（King\
    \ Clovis）進行洗禮。這張圖片出自大約西元 1380 年的《法蘭西大編年史》。根據法國的建國神話，這個壺之後保存在蘭斯大教堂（Rheims Cathedral），之後繼任的法國國王加冕，也都是用這些聖油進行塗油。每次要加冕時，這個壺都會自動填滿，因此每次加冕都是一項奇蹟，顯示是上帝自己選定了這位國王，並給予祝福。如果上帝不希望路易十世、路易十四或路易十六成為國王，這個壺就不會重新填滿。\n\
    \n# 人文主義的美學觀點\n\n  在倫理和政治上是這樣，到了美學領域也同樣適用。\n\n  在中世紀，藝術已有客觀的標準。這些美學標準不會因為人的喜好而隨波逐流，而是人類的品味應該要去適應這些高於一般人的標準。這在當時十分合理，因為當時認為，啟發藝術的是一些超越人類的力量，不是人類自身的感受。他們認為，是繆斯、天使和聖靈執起了畫家、詩人、作曲家和建築師的手，完成各種創作。很多時候，如果作曲家譜出一首美麗的聖歌，眾口讚頌的不是那位作曲家，原因就像是大家不會去讚頌那支筆一樣。筆只不過是由人的手指所控制和指引，而人又是由上帝的手來控制和指引。\n\
    \n  中世紀的學者深信古希臘理論，認為是星辰在天上的運動，創造出天堂的音樂，滲透到整個宇宙。如果人類身體和靈魂的內在運動，能夠與星辰所創造的天堂音樂達到和諧同調，就能享有身心的健康。因此，人類音樂該回應的是整個宇宙的神聖旋律，而不是血肉之軀的作曲家心中的意見和奇想。最美麗的聖歌和曲調，通常都不是出自人類藝術家的天分，而是神靈所降下的靈感。\n\
    \n  這種觀點到了現代，當然已不再流行。今天，人文主義者認為藝術創作和美學價值的唯一來源，就是人的感受。音樂是由我們內心所發、也依我們內心判斷，既不需要遵循星辰的韻律，也不需要聽從繆斯和天使的命令。星辰根本就是悄然無聲，而繆斯和天使也只存在於我們的想像之中。現代藝術家試圖接觸的是自己的內心和感受，不是上帝。也就難怪，現在我們要評判藝術時，已經不再認為有任何客觀的標準了，而是再次轉向我們的主觀感受。\n\
    \n![](img/319dca06e22893e942053da0432e9f19_261_0.png)\n\n28. 教皇聖國瑞一世 (Gregory\
    \ the Great) 譜出了以他為名的〈國瑞聖歌〉 (Gregorian chant)。聖靈仍是以最愛的鴿子形象出現，坐在他右肩上，在他耳邊低語。聖靈才是聖歌的真正作者，聖國瑞一世只是管道，上帝才是藝術和美麗的本源。\n\
    \n  在倫理上，人文主義的座右銘是「感覺對了，就做吧」。在政治上，人文主義告訴我們「選民能做出最好的選擇」。在美學上，人文主義說「看的人覺得美，就是美」。因此，藝術的定義變得開放了。\n\
    \n  1917年，藝術家杜象（Marcel Duchamp）買了一座量產的普通小便斗，他宣布這是一件藝術品，並命名為「噴泉」（Fountain，見第264頁），簽了名，放到巴黎博物館裡。這件作品若是給中世紀的人看到，根本理都懶得理，會認為簡直是胡言亂語，連批評都是浪費氧氣。\n\
    \n  但是在現代人文主義的世界，杜象這件作品咸認是重要的藝術里程碑。在全球各地無數的美術教室裡，都會給學美術的大一學生看看杜象的這件「噴泉」。接著在老師一聲指示下，就像是群魔亂舞吵了起來。這是藝術！不是！就是！不可能！\n\
    \n  等到學生好好發洩了一陣，老師就會讓討論重新聚焦，詢問：「藝術究竟是什麼？我們怎麼判斷某件事物是藝術作品？」經過幾分鐘你來我往，最後老師就會把全班引向正確的方向：「只要有人認為是藝術，就是藝術！有人認為美，就是美！」\n\
    \n  如果有人認為一座小便斗也是一件美麗的藝術品，它就是藝術品。難道還有什麼更高的權威，能說大家都錯了？\n\n  今天，杜象這件傑作的複製品，在全球許多最重要的博物館展出，包括舊金山現代藝術博物館、加拿大國家美術館、倫敦泰特美術館和巴黎龐畢度藝術中心。（這些複製品可是展在畫廊裡，而不是洗手間。）\n\
    \n# 人文主義的經濟觀點\n\n  這種人文主義的思維，也深深影響了經濟層面。在中世紀，整個生產流程是由公會操縱，個別的工匠或客戶很少有機會表達自己的意見或品味。怎樣叫好椅子，由木匠公會決定；怎樣是好麵包，由麵包師公會定義；哪些歌曲算是高尚、哪些又是垃圾，也有「名歌手（Meistersinger）公會」來判斷。與此同時，王公貴族與市議會控制了工資和價格，偶爾也會逼迫民眾購買特定貨品，價格數量都不由民眾決定。但是在現代自由市場中，這些公會、議會和王公貴族，都被一個新的最高權威取而代之：顧客的自由意志。\n\
    \n  假設豐田（Toyota）想製造出一款完美的汽車，公司可能會成立一個包含各領域的專家委員會——找來最好的工程師和設計師，集合最好的物理學家和經濟學家，甚至再聘幾位社會學家和心理學家當顧問；為了萬無一失，或許再加上一、兩位諾貝爾獎得主，一位奧斯卡最佳女主角，以及幾位全球知名的藝術家。經過五年研究開發，豐田終於推出一款完美的汽車，生產了幾百萬輛，運往世界各地的汽車經銷商。然而，這款車卻一輛都沒賣出去。這是否代表顧客犯了錯，有眼無珠？\n\
    \n  在自由市場上，顧客永遠是對的。如果顧客不想要、不想買，就代表這款車不好。就算所有大學教授和所有神職人員都高聲疾呼這是一輛非常棒的車，也不會有任何影響；顧客不要，就是爛車。沒有人有權說顧客錯了，而且如果哪國政府斗膽強迫公民違背意願一定得買某輛車，這個政府的下場會如何，可得求老天保佑。\n\
    \n  汽車的這種情形，也適用於其他所有產品。讓我們聽聽瑞典烏普薩拉大學（University of Uppsala）的安德森（Leif Andersson）教授"
  mdcn: "人類大命運\n\n  們放棄意義。這種叫人心裡發寒的要求，人類該如何應對？遵守要求，可能會帶來一個黑暗的世界，沒有任何倫理、美學或同理心。然而從目前看到的事實，人類不僅比過去任何時候都更有力量，而且也更為和平、合作愉快。人類是怎麼做到的？在一個似乎沒有神祇、沒有天堂、沒有地獄的世界上，道德、美麗、甚至是同理心，是如何不但存活、而且發展蓬勃？\n\
    \n  當然，資本家又會說這一切都要歸功於市場那隻看不見的手。但市場那隻手不僅我們看不見，就連它本身也是盲目的，光靠它本身，絕不可能挽救人類社會。事實上，如果沒有某些神祇、國王或教會也伸出一隻看不見的手，別說整個市場，就連一個市集也難以維持。如果真的萬物可賣，包括法院和警察也能收買，信任就會煙消雲散，信用將會蕩然無存，商業也就無以為繼。6\n\
    \n  所以，究竟是什麼讓現代社會免於崩潰的命運？拯救人類的並不是供需法則，而是因為興起了一種革命性的新宗教：人文主義。\n\n# 第6章 與「現代」的契約\n\
    \n# 第7章 人文主義革命\n\n  與「現代」的契約給了人類力量，但條件是我們不再相信整個世界有個偉大的宇宙計畫，能讓生命有意義。然而，如果細查契約條款，會發現有一條賴皮的例外條款：如果人類不用透過偉大宇宙計畫也能找到意義，就不算是違背契約。\n\
    \n  這條例外條款正是現代社會的救贖，因為如果真的沒有意義，就不可能維持秩序。現代在政治、藝術和宗教方面成就斐然，都是並未透過什麼偉大宇宙計畫，就為生活找到了意義。雖然我們現在知道，自己不是什麼神聖戲劇裡的角色，也沒有誰真的在意我們或我們的行為，因此不會有人限制我們的力量，但我們仍然相信自己的生活有意義。\n\
    \n  在2016年，人類確實是魚與熊掌都能兼得。不但擁有的力量遠超以往，而且讓前人都跌破眼鏡：上帝已死，但社會並未崩潰。縱觀歷史，先知和哲學家都認為，如果人類不再相信有個偉大宇宙計畫，所有的法律和秩序都會消失。但今天，對全球法律和秩序造成最大威脅的，卻正是那些還在繼續相信唯一真神和偉大計畫的人。\n\
    \n# 向人心探尋\n\n  對神懷有畏懼的敘利亞，比起世俗的荷蘭，要來得暴力許多。\n\n  如果沒有什麼宇宙計畫，我們也不用遵守什麼神聖的典律或自然律了。那為什麼社會不會崩潰呢？是為什麼，你能夠旅行數千公里，從荷蘭的阿姆斯特丹到羅馬尼亞首都布加勒斯特、或從紐奧良到蒙特婁，而不會被販奴者綁架、遭亡命之徒伏擊、或被敵對的部落殺害？\n\
    \n  正是人文主義（humanism），讓人類擺脫了人生無意義、存在沒依據的困境。人文主義這個革命性的新信念，在過去幾個世紀間，征服了世界。人文主義宗教崇拜人性，期望由「人文」來扮演神在基督教或伊斯蘭教裡的角色，或是大自然的法則在佛教和道教扮演的角色。傳統認為，是偉大宇宙計畫為人類生活帶來意義，但人文主義讓角色逆轉，認為是人類經驗為宇宙賦予意義。\n\
    \n  根據人文主義的想法，人類必須從自己的內在經驗找出意義，而且不只是自己的意義、更是整個宇宙的意義。這是人文主義的主要誡命：為無意義的世界創造意義。\n\
    \n  因此，現代帶來的主要宗教革命，並不是對神失去信心，而是對人類有了信心。要走到這一步，足足花了數個世紀。思想家寫著宣傳小冊、詩人寫著詩、音樂家譜著交響曲、政治家推動了各種契約，他們共同使人相信，人文可以讓宇宙充滿意義。\n\
    \n  想知道人文主義革命的影響有多麼深遠，可以看看現代歐洲文化與中世紀歐洲文化有多麼不同。在西元1300年，倫敦、巴黎和西班牙托萊多（Toledo）的市民，還不相信人類自己就能判斷善惡、正誤、美醜，認為只有神才能創造和定義善良、公義和美麗。雖然當時已經認為人類確實享有獨特的能力和機會，但同時也認為人類就是一種無知和墮落的生物，如果沒有外力監督指導，就不可能理解永恆的真理，而會沉溺在一時的感官享受及世俗幻象之中。中世紀的思想家還指出人類不免一死，各種意見和感覺就如風般易逝。今天全心愛著某樣東西，明天就覺得厭惡，而等到下星期，甚至連自己也已過世，深埋地底。因此，任何根據人類意見而得的意義，都必然是脆弱且短暫的。\n\
    \n  這麼說來，如果要講絕對的真理、講生命的意義和宇宙的意義，其根據就必須是某種高於人類的來源所產生的永恆法則。從這個觀點，神不但成了意義的本源，也成了權威的本源。意義和權威始終是攜手共進。那些判斷著我們的行動究竟屬於好壞、對錯、美醜等等意義的人，同時也就取得權威，能告訴我們該如何思考、如何行動。\n\
    \n  以神做為意義和權威的源頭，這可不只是個哲學上的理論，而是影響了日常生活的方方面面。假設在西元1300年的某個英國小鎮，有位已婚婦女很喜歡到隔壁鄰居家，與他做愛。等她溜回家，忍住笑意、整理衣服的時候，心裡卻會開始不停想著：「這是怎麼回事？我為什麼會這麼做？這是好事還是壞事呢？這代表我是怎樣的人？我還該繼續這樣嗎？」為了回答這樣的問題，這位婦女該做的事就是去找當地的神父，向他告罪，並請求聖父給予指導。神父對《聖經》內容瞭若指掌，而《聖經》內容已記載了上帝對於通姦的看法。基於上帝永恆不變的話語，這位神父可以明確判斷：這個女人犯了一項不可饒恕的罪，如果不悔改，就會下地獄。所以她必須立即悔改，捐十枚金幣給即將成行的十字軍，六個月內不得吃肉，還得前往坎特伯里，到聖多默·白凱（St.\
    \ Thomas Becket）主教的安息地朝聖。而且不用說，這種可怕的罪惡絕對不可以再犯。\n\n# 向心理治療師「告解」\n\n  現在的情況就大不相同了。幾世紀以來，人文主義一直想讓我們認為，人類自己就是意義的本源，因此自由意志也正是最高的權威。我們不需要等待某個外在的實體說三道四，而能夠用自己的感覺和欲望來判斷。從小，我們就不斷聽到各種人文主義的口號：「要聆聽自己的聲音，對自己真誠，相信自己，跟著你的心，做讓自己快樂的事。」\n\
    \n  盧梭的教養小說《愛彌兒》（Émile）正是集各家大成，可說是十八世紀討論感受的聖經。盧梭認為，要尋找生活的行為規則時，發現這些規則是「在我心深處，出於自然，無人能抹去。想做什麼，只需要請教自己；我覺得好、就是好，我覺得壞、就是壞。」¹\n\
    \n  因此，如果是一位現代女性，想知道自己外遇有何意義，她不太可能會再盲目接受神父或某本古書的判斷，而是仔細審視自己內心的感覺。如果這時的感覺還不太清楚，她會打電話給閨蜜，兩人見面喝喝咖啡，傾吐心聲。如果就連這樣也還是覺得捉摸不定，她就會找上心理治療師，把一切都告訴他。理論上，現代的心理治療師與中世紀的神父，倒是站在同一個位置（已經有太多人做過兩者的比較了），但實際上，兩者有一項巨大的差別：心理治療師並沒有一本規定著善惡對錯的聖經。\n\
    \n  這位婦女說完故事的時候，心理治療師很不可能忽然破口大罵「妳這個邪惡的女人！妳犯了一條可怕的罪！」當然，他也一樣很不可能讚美「太好了！妳真棒！」相反的，不管這位婦女究竟說了什麼和做了什麼，心理治療師最有可能做的事，就是用一種溫暖關懷的聲音，問道：「那妳對這一切有什麼感覺呢？」\n\
    \n  確實，心理治療師的書架上，還擺著佛洛伊德、榮格等人的著作，也有厚達千頁的《精神疾病診斷與統計手冊》，簡直能把書架壓垮。但這些都不是什麼神聖的經典。《精神疾病診斷與統計手冊》診斷的是生命中的疾病，而不是生命的意義。大多數心理學家相信，唯有從人的感覺出發，才有權判斷人類行為的真正意義。\n\
    \n  因此，不論這位心理治療師對病人的婚外情有何看法，也不管佛洛伊德、榮格或《精神疾病診斷與統計手冊》對婚外情又有何看法，這位心理治療師都不該把自己的意見，強加在病人身上。相反的，他該做的是幫她走進心中最私密的房間。只有在那裡，她才能找到答案。中世紀的神父彷彿和上帝有一條熱線，能夠為我們區辨好壞，但現代的心理治療師只會幫助我們接觸到自己內心的感覺。\n\
    \n  這可以部分解釋為何婚姻制度的命運不斷變化。中世紀將婚姻視為由神授予的聖事，神同時也授權給父親，能依據自己的願望和利益，為孩子安排嫁娶。於是，婚外情等於是明目張膽的同時挑戰了神權和父權。不管這一對戀人怎麼想、怎麼感覺，這都是一種不可饒恕的罪。\n\
    \n  今天，人們是因為相愛而結婚，而這種關係的價值是來自於他們的個人感受。因此，如果曾經把你送入某人懷抱的這種感受，今天又把你送進另一人的懷抱，又會有什麼問題呢？如果今天，結髮二十年的配偶已經不再能滿足你的情慾和性慾，而這個新情人既善良又熱情，而且還很能感受到你的需求，為什麼不好好享受呢？\n\
    \n# 人文主義的倫理觀點\n\n  不過你可能會跳出來說，等等！我們也不能忽視另一方的感覺啊！這位婦女和情人可能在彼此的懷中是覺得很甜蜜，但如果被彼此的另一半發現，大家可能都會有一段時間痛苦萬分。而如果導致離婚，就連孩子也可能有幾十年帶著情感上的傷痕。而且就算配偶從未察覺，光是要隱瞞這件事，就會造成極大的壓力，並讓人愈來愈覺得孤立和憤怒。\n\
    \n  在人文主義的倫理中，最有趣的討論就是像婚外情這種彼此感覺有所衝突的情境。如果某個行為讓一方感覺良好、另一方卻感覺痛苦，情況會如何？這些感受該如何彼此衡量？兩個情人之間感覺幸福，是否會比配偶和孩子感覺不幸更重要？\n\
    \n  不論你想站在哪一邊都沒關係，這裡更重要的，是要看出雙方其實用的都是同一套論點。現代人對婚外情的看法各有不同，但無論立場如何，理由都比較偏向於人的感受，而不會是因為《聖經》或神的誡命。人文主義告訴我們，除非這件事讓人感覺不好，才有可能是件壞事。\n\
    \n  謀殺之所以是錯的，並不是因為有什麼神曾說「不可殺人」，而單純就是因為這會讓被害人與被害人家屬和親友十分痛苦。偷竊之所以是錯的，並不是因為有什麼古籍說過「不可偷盜」，而單純就是因為如果有人失去財產，會感覺不開心。如果某種行為不會讓任何人感覺不好，就等於沒什麼錯。如果在同一份古代的文本裡，說上帝曾經告誡我們：不可以製作任何人類或動物的形象（〈出埃及記〉第20章第4節）；但我就是喜歡雕刻這些人物動物，過程中又不會傷害到任何人，這究竟能有什麼錯？\n\
    \n![](img/319dca06e22893e942053da0432e9f19_257_0.png)\n\n  同樣的邏輯也能應用到同性戀的論爭上。如果兩個成年男性喜歡與彼此發生性行為，過程中不會傷害到任何人，這又有什麼錯？為什麼該用法律禁止呢？這就是兩個男人間的私事，應該可以根據他們自己的個人感受來自由決定。如果在中世紀，兩個男人向神父告解，說他們彼此相愛、感受到前所未有的快樂，神父的判斷並不會因為他們究竟高不高興而有任何改變；而且，他們居然不感到愧咎，這可是罪上加罪！今天的情況就不同了，如果兩個男人相愛，大家會說：「如果感覺對了，就愛吧！不要讓什麼神父牧師的影響你，傾聽你的心就對了，你自己最知道什麼對你好。」\n\
    \n  很有趣的是，今天就算是宗教狂熱份子，也會在試圖煽動大眾時，採用這種人文主義的論調。例如過去十年間，以色列的LGBT社群每年都會在耶路撒冷的街道，舉行同志遊行。在這個充滿衝突的城市，這天難得顯得如此和平，因為不管是猶太教徒、穆斯林或基督徒，都忽然有了共同的敵人：同志遊行。真正有趣的是這些教徒的論點。他們並不會說「這些罪人不該舉辦同志遊行，因為上帝禁止同性戀！」而是透過所有麥克風和攝影鏡頭，高聲疾呼「看到同志遊行居然穿過耶路撒冷這座聖城的中心，實在深深傷害了我們的感情！同志希望我們要尊重他們的感受，那他們也應該要尊重我們的感受！」\n\
    \n  法國《查理週刊》（Charlie Hebdo）曾刊出伊斯蘭教先知穆罕默德的漫畫，結果在2015年1月7日，便有穆斯林狂熱份子屠殺《查理週刊》的員工。\n\
    \n  接下來幾天裡，許多穆斯林組織紛紛發出聲明，譴責恐怖攻擊行為，但有些就是忍不住加入一條但書。例如埃及記者組織（EJS）雖然譴責恐怖份子使用暴力，但同樣譴責《查理週刊》「傷害全世界數百萬穆斯林的感情」。²請注意，埃及記者組織並未譴責《查理週刊》不服從神的旨意。而這種情形，我們就能稱之為進步。\n\
    \n# 人文主義的政治觀點\n\n  我們的感覺不只能提供私人生活中的意義，也能為社會和政治程序提供意義。想知道該由誰來統治國家、採用何種外交政策、使用何種經濟手段時，我們不會從古籍經典裡找答案，也不會只聽教宗或諾貝爾獎得主的命令。相反的，大多數國家都是用民主選舉，詢問人民對當前事務的看法。我們相信選民能做出最好的選擇，而個人的自由意志選擇，正是最終的政治權威。\n\
    \n  然而，選民又是怎麼知道該選什麼？至少在理論上，選民要探索自己內心最深處的感受、順心而為。但這並不容易。想要碰觸到自己真正的感受，就得先過濾掉那些沒有意義的宣傳口號、無恥政客無盡的謊言、狡猾公關放出的各種煙霧彈，以及被收買的專家提出貌似專業的想法。先清掉所有這些喧囂吵雜，才能聽到自己真正內心的聲音。接著，我真正內心的聲音會在我耳裡輕聲說「投給卡麥隆」、「投給莫迪」、或是「投給希拉蕊」，於是我就在選票上蓋下印記——這就是我們決定該由誰來領導國家的方式。\n\
    \n  在中世紀，大家會覺得這種方法實在愚不可及。對於重要的政治決定，怎麼可能會以無知俗人一時的感覺，做為判斷基礎呢？當英格蘭在玫瑰戰爭之後面臨分裂時，從來沒人提過要用全國公投來解決。哪有可能讓每個鄉巴佬或妓女都能有一票，選擇要蘭開斯特家族、還是約克家族！\n\
    \n  同樣的，在教皇伍朋二世（Urban II）發起第一次十字軍東征時，也從沒說這是人民的意願。這當然是神的旨意——政治權威是從天而降，而不是升起於凡人的心。\n\
    \n![](img/319dca06e22893e942053da0432e9f19_259_0.png)\n\n27. 聖靈以鴿子的形態出現，送來裝滿聖油的壺，好為法蘭克王國創始人克洛維國王（King\
    \ Clovis）進行洗禮。這張圖片出自大約西元 1380 年的《法蘭西大編年史》。根據法國的建國神話，這個壺之後保存在蘭斯大教堂（Rheims Cathedral），之後繼任的法國國王加冕，也都是用這些聖油進行塗油。每次要加冕時，這個壺都會自動填滿，因此每次加冕都是一項奇蹟，顯示是上帝自己選定了這位國王，並給予祝福。如果上帝不希望路易十世、路易十四或路易十六成為國王，這個壺就不會重新填滿。\n\
    \n# 人文主義的美學觀點\n\n  在倫理和政治上是這樣，到了美學領域也同樣適用。\n\n  在中世紀，藝術已有客觀的標準。這些美學標準不會因為人的喜好而隨波逐流，而是人類的品味應該要去適應這些高於一般人的標準。這在當時十分合理，因為當時認為，啟發藝術的是一些超越人類的力量，不是人類自身的感受。他們認為，是繆斯、天使和聖靈執起了畫家、詩人、作曲家和建築師的手，完成各種創作。很多時候，如果作曲家譜出一首美麗的聖歌，眾口讚頌的不是那位作曲家，原因就像是大家不會去讚頌那支筆一樣。筆只不過是由人的手指所控制和指引，而人又是由上帝的手來控制和指引。\n\
    \n  中世紀的學者深信古希臘理論，認為是星辰在天上的運動，創造出天堂的音樂，滲透到整個宇宙。如果人類身體和靈魂的內在運動，能夠與星辰所創造的天堂音樂達到和諧同調，就能享有身心的健康。因此，人類音樂該回應的是整個宇宙的神聖旋律，而不是血肉之軀的作曲家心中的意見和奇想。最美麗的聖歌和曲調，通常都不是出自人類藝術家的天分，而是神靈所降下的靈感。\n\
    \n  這種觀點到了現代，當然已不再流行。今天，人文主義者認為藝術創作和美學價值的唯一來源，就是人的感受。音樂是由我們內心所發、也依我們內心判斷，既不需要遵循星辰的韻律，也不需要聽從繆斯和天使的命令。星辰根本就是悄然無聲，而繆斯和天使也只存在於我們的想像之中。現代藝術家試圖接觸的是自己的內心和感受，不是上帝。也就難怪，現在我們要評判藝術時，已經不再認為有任何客觀的標準了，而是再次轉向我們的主觀感受。\n\
    \n![](img/319dca06e22893e942053da0432e9f19_261_0.png)\n\n28. 教皇聖國瑞一世 (Gregory\
    \ the Great) 譜出了以他為名的〈國瑞聖歌〉 (Gregorian chant)。聖靈仍是以最愛的鴿子形象出現，坐在他右肩上，在他耳邊低語。聖靈才是聖歌的真正作者，聖國瑞一世只是管道，上帝才是藝術和美麗的本源。\n\
    \n  在倫理上，人文主義的座右銘是「感覺對了，就做吧」。在政治上，人文主義告訴我們「選民能做出最好的選擇」。在美學上，人文主義說「看的人覺得美，就是美」。因此，藝術的定義變得開放了。\n\
    \n  1917年，藝術家杜象（Marcel Duchamp）買了一座量產的普通小便斗，他宣布這是一件藝術品，並命名為「噴泉」（Fountain，見第264頁），簽了名，放到巴黎博物館裡。這件作品若是給中世紀的人看到，根本理都懶得理，會認為簡直是胡言亂語，連批評都是浪費氧氣。\n\
    \n  但是在現代人文主義的世界，杜象這件作品咸認是重要的藝術里程碑。在全球各地無數的美術教室裡，都會給學美術的大一學生看看杜象的這件「噴泉」。接著在老師一聲指示下，就像是群魔亂舞吵了起來。這是藝術！不是！就是！不可能！\n\
    \n  等到學生好好發洩了一陣，老師就會讓討論重新聚焦，詢問：「藝術究竟是什麼？我們怎麼判斷某件事物是藝術作品？」經過幾分鐘你來我往，最後老師就會把全班引向正確的方向：「只要有人認為是藝術，就是藝術！有人認為美，就是美！」\n\
    \n  如果有人認為一座小便斗也是一件美麗的藝術品，它就是藝術品。難道還有什麼更高的權威，能說大家都錯了？\n\n  今天，杜象這件傑作的複製品，在全球許多最重要的博物館展出，包括舊金山現代藝術博物館、加拿大國家美術館、倫敦泰特美術館和巴黎龐畢度藝術中心。（這些複製品可是展在畫廊裡，而不是洗手間。）\n\
    \n# 人文主義的經濟觀點\n\n  這種人文主義的思維，也深深影響了經濟層面。在中世紀，整個生產流程是由公會操縱，個別的工匠或客戶很少有機會表達自己的意見或品味。怎樣叫好椅子，由木匠公會決定；怎樣是好麵包，由麵包師公會定義；哪些歌曲算是高尚、哪些又是垃圾，也有「名歌手（Meistersinger）公會」來判斷。與此同時，王公貴族與市議會控制了工資和價格，偶爾也會逼迫民眾購買特定貨品，價格數量都不由民眾決定。但是在現代自由市場中，這些公會、議會和王公貴族，都被一個新的最高權威取而代之：顧客的自由意志。\n\
    \n  假設豐田（Toyota）想製造出一款完美的汽車，公司可能會成立一個包含各領域的專家委員會——找來最好的工程師和設計師，集合最好的物理學家和經濟學家，甚至再聘幾位社會學家和心理學家當顧問；為了萬無一失，或許再加上一、兩位諾貝爾獎得主，一位奧斯卡最佳女主角，以及幾位全球知名的藝術家。經過五年研究開發，豐田終於推出一款完美的汽車，生產了幾百萬輛，運往世界各地的汽車經銷商。然而，這款車卻一輛都沒賣出去。這是否代表顧客犯了錯，有眼無珠？\n\
    \n  在自由市場上，顧客永遠是對的。如果顧客不想要、不想買，就代表這款車不好。就算所有大學教授和所有神職人員都高聲疾呼這是一輛非常棒的車，也不會有任何影響；顧客不要，就是爛車。沒有人有權說顧客錯了，而且如果哪國政府斗膽強迫公民違背意願一定得買某輛車，這個政府的下場會如何，可得求老天保佑。\n\
    \n  汽車的這種情形，也適用於其他所有產品。讓我們聽聽瑞典烏普薩拉大學（University of Uppsala）的安德森（Leif Andersson）教授"
