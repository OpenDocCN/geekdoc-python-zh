    ## 第7章 人文主義革命


    迪克斯曾在第一次世界大戰期間服役於德軍，李亞則曾為《生活》雜誌報導1944年的貝里琉島（Peleliu Island）戰役。在華特和斯奈爾斯的眼中，戰爭是一種軍事和政治現象，想讓我們知道的是某場戰役發生了什麼事；而在迪克斯和李亞的眼中，戰爭則是一種情感現象，想讓我們知道的是戰爭造成什麼感受。他們並不在乎將軍有多天才、或是哪場戰役有什麼戰術上的細節。


    迪克斯所畫的士兵可能是在凡爾登（Verdun）、伊普爾（Ypres）或索姆河（Somme），但這無關緊要，因為不管身在何處，戰爭都是地獄。李亞所畫的，剛好是一名貝里琉島上的美國大兵，就算換成硫磺島上的日本士兵、史達林格勒的德國士兵、或是敦克爾克大撤退的英國士兵，臉上也會出現一模一樣的兩千碼凝視。


    在迪克斯和李亞的畫中，戰爭的意義並不是來自戰術調動或神聖的宣告。想要瞭解戰爭，不該去仰望山頂的將軍、或是天上的天使，反而該看進二等兵的眼睛。李亞畫出了受創士兵張大的眼睛，為我們打開一扇窗，一窺戰爭的恐怖真相。而在迪克斯的畫裡，真相已經如此令人難以承受，必須用防毒面具加以掩飾。戰場上空並沒有飛翔的天使，只有一具腐爛的屍體，掛在殘破的拱梁上，手指定定的指責這殘酷的戰地煉獄。


    像迪克斯和李亞這樣的藝術家，便協助推翻了傳統上的戰爭階級。更早的許多戰爭，殘酷程度當然不下於二十世紀的戰爭。但在那之前，這些殘酷的經歷都是處於更廣大的背景中，賦予了正面的意義。戰爭可能彷若地獄，同時也是通往天堂的門戶。在白山戰役中的天主教士兵，可以安慰自己：「確實，我感到苦痛。不過教皇和皇帝曾宣布，我們是為了公義而戰，所以我的苦痛是有意義的。」


    迪克斯的邏輯則相反。他認為個人經驗才是所有意義的源頭，因此他的想法會是：「我感到苦痛，而這是壞事，所以整場戰爭也就是壞事。如果德意志皇帝和神職人員支持這場戰爭，他們肯定是犯了錯。」⁷


    ### 人文主義的分裂 ❖


    到目前為止，我們一直把人文主義講得好像是個單一而連貫的世界觀。但事實上，人文主義就像是任何興盛的宗教（如基督教和佛教）一樣，不免分裂。經過傳播和演變，人文主義已分裂成幾個互相衝突的教派。雖然所有人文主義教派都認為人類經驗是權威和意義的本源，但對於人類的經驗卻各有詮釋。


    人文主義主要有三大分支。第一是正統教派，認為每個人都是獨特的個人，擁有獨一無二的內在聲音、永不重複的一連串經驗。每個人都像是一道不同的光線，從不同的角度照亮世界，為這個宇宙增添色彩、深度和意義。因此，我們應該讓每個人都盡量自由自在的體驗世界，聽從自己內心的聲音，表達自己心中的真實。不管在政治、經濟或藝術領域，個人的自由意志都應該比國家利益或宗教原則更重要。個人能享有愈多自由，整個世界就會變得更美麗、更豐富、更具有意義。由於這種正統教派強調自由，也就稱為自由人文主義（liberal
    humanism），或簡稱自由主義（liberalism）。*


    自由主義政治認為，選民能做出最好的選擇。自由主義藝術認為，看的人覺得美，就是美。自由主義經濟學認為，顧客永遠是對的。自由主義倫理認為，只要感覺對了，就該去做。自由主義教育認為，我們要為自己思考，因為我們從內心就能找到所有答案。


    > *在美國政治裡，常常把自由主義解釋得太過狹隘，而與「保守主義」相對。但廣義而言，多數美國保守派其實仍然屬於自由主義。


    在十九世紀和二十世紀，人文主義的社會公信度及政治力量與日俱增，開始產生兩個截然不同的分支：社會人文主義（包括各種社會主義和共產主義運動），以及進化人文主義（以納粹為最著名代表）。兩個分支都同意自由主義的看法，也就是人類的經驗是意義和權威的本源，也都不相信有什麼超自然力量或神聖的法則經典。舉例來說，如果你問馬克思，讓十歲小孩在煙霧瀰漫的工廠裡工作十二個小時，究竟有什麼錯？他會告訴你，這讓孩子感覺不舒服。我們之所以應該避免剝削、壓迫和不平等，不是因為上帝的旨意，而是因為這使人痛苦。


    然而，社會人文主義者和進化人文主義者都指出，自由主義對人類經驗的理解還有不足。自由主義認為，人類的經驗就是個人現象。但世界上有這麼多人，常常感受到的是各種不同的事，彼此的欲望也有所衝突。如果所有的權威和意義都來自個人經驗，在彼此之間發生衝突時，又該怎麼辦？


    2015年7月17日，德國總理梅克爾碰上一名來自黎巴嫩的巴勒斯坦難民少女，她的家人正在德國尋求庇護，但即將遭驅逐出境。這位名為琳姆（Reem）的少女，以流利的德語向梅克爾說：「看到別人能享受生命，自己卻不能，真的很痛苦。我不知道我的未來會如何。」梅克爾回答「政治有時是很殘酷的」，並解釋道，目前在黎巴嫩的巴勒斯坦難民多達數十萬，德國不可能全部接受。這直言不諱的回覆，讓琳姆大為驚愕，落下淚來。梅克爾拍了拍這位絕望女孩的背，但立場並未動搖。


    這件事掀起一場公關風暴，指責梅克爾冷血無感。為了平息批評，梅克爾改變了方向，讓琳姆及家人得到庇護。在接下來幾個月裡，梅克爾把門開得更大，迎入數十萬難民。然而，事情不可能人人都滿意。她很快便遭受嚴厲抨擊，說她被情感蒙蔽、立場不夠堅定。許多德國父母擔心，梅克爾這樣的急遽政治轉向，可能會讓自己孩子未來的生活水準降低，甚至得面對一波伊斯蘭化的浪潮。他們為什麼要冒著犧牲自己家庭的安和樂利的風險，幫助一些甚至可能不相信自由主義價值的陌生人？


    ### 民主投票只適用於有共同關係的人


    每個人對這件事的感受都很強烈。一邊是絕望的難民，一邊是焦慮的德國人。在這兩種感受之間的矛盾，該如何解決？⁸


    自由主義者永遠都會因為這種矛盾而苦惱。洛克（John Locke）、傑佛遜、穆勒（John Stuart Mill）等自由主義大家苦心思索，仍然未能為這種難題提出簡便的解決方案。民主投票幫不上忙，因為接下來的問題就是誰有投票權？是只有德國公民？還是也包括那數百萬想移民到德國的亞洲人和非洲人？為什麼把某一群人的感受看得比另一群人高呢？同樣的，講到以巴衝突，以色列公民人數八百萬，阿拉伯國家聯盟人數三億五千萬，又怎麼可能用公投表決？出於顯然的原因，以色列人對於這種公投的結果不可能有信心。


    民主投票要有約束力，前提是投票的人覺得大家還算是某種自己人。如果其他投票人的經驗對我來說十分陌生，而且我相信這些人並不瞭解我的感受、也不在意我最在意的事，就算最後的投票結果是100比1，我也不會接受這個結果。民主投票通常只能適用於一群有共同關係的人，像是有共同的宗教信仰、或是有共同的民族神話。這些人早已有基本的共識，只是仍有某些異議尚待解決。


    因此很多時候，自由主義會與古老的集體認同、部落情感，相互融合，形成現代民族主義。現在許多人認為，民族主義是一種反對自由主義的力量；但至少在十九世紀，民族主義是與自由主義密切相關。自由主義歌頌個人的獨特經驗。每個人都有獨一無二的感受、品味和癖好，而且只要不傷害到他人，就應該擁有表達和探索的自由。同樣的，像是馬志尼（Giuseppe
    Mazzini）這樣的十九世紀民族主義者，也是歌頌著個別國家的獨特之處。他們強調，許多人類經驗屬於集體的經驗，像是人不能自己跳波爾卡舞（polka）、也不可能自己發明和保存德語。透過語言、舞蹈、食物和飲料，每個國家就會讓自己的國民共同擁有與他國不同的經驗，並發展出自身獨特的感性。


    像馬志尼這樣的自由民族主義者，畢生致力於保護自己國家獨特的經驗，不受帝國壓迫或消滅；他們也希望各國能形成和平的國際社群，各自都能自由表達和探索自己國民共有的感覺，而不傷害鄰國。至今，這仍然是歐盟的官方意識型態。歐盟的2004年憲章就提到歐洲「多元一體」（united
    in diversity），各國仍然「對自己的民族特性感到自豪」。而為了保存德國民族共有經驗，就算是自由主義的德國人，也有可能反對大開移民閘門。


    當然，自由主義與民族主義攜手共進，非但無法解決所有的難題，還會創造出許多新難題。集體經驗的價值，與個人經驗的價值，究竟孰高孰低？為了保存波爾卡舞、德國臘腸和德語，是否就能不惜讓數百萬難民面臨貧困、甚至死亡？此外，像是1933年的德國、1861年的美國、1936年的西班牙、2011年的埃及，如果是國家內部對基本認同爆發的衝突，又該如何解決？在這些時候，民主投票並不能解決問題，因為各方就是沒有理由會尊重結果。


    最後，跳著自己國家的波爾卡舞時，只要再跨出微小、但又重要的一步，就會讓你從只是相信自己的國家與其他國家「不同」，走向相信自己的國家「更優」。十九世紀的自由民族主義，是要求哈布斯堡和沙皇尊重德國人、義大利人、波蘭人和斯洛維尼亞人的獨特經驗。到了二十世紀的極端民族主義，就成了發動征服戰爭，把那些跳著不同舞蹈的人，關進了集中營。


    ### 社會主義與自由主義之辯


    社會人文主義走的路，則非常不同。社會主義責怪自由主義太過注重自己的感覺、不管他人的經驗。沒錯，人類的經驗是一切意義的根源，但世界上有幾十億人，每個人的價值都不下於我。自由主義要人眼光向內，強調自己或本國的獨特性；而社會主義則要人別再迷戀於自己和自身的感覺，要注意他人的感受，注意自己的行動如何影響他人的經驗。


    社會主義主張：想達成全球和平，方法並不是去歌頌每個國家的獨特，而是要讓全世界的勞工都結合起來；想達成社會和諧，方式並不是讓每個人都很自戀的探索自己的內在，而是要請所有的人先放下自己的願望，把他人的需要和經驗視為優先。


    自由主義者可能提出反駁，認為透過探索自己的內心世界，才能培養對他人的同理心及瞭解。但這種論點並無法說服列寧或毛澤東。他們會解釋說，個人的自我探索是一種資產階級耽溺的罪惡，要接觸自我的內在，就很可能落入資本主義的陷阱。我當下的政治觀點、喜好與厭惡、興趣和抱負，都並非反映真實的自我，只是反映出我的成長和社會環境。而這都是由我的階級、鄰里、教育所造的。無論富有或貧窮，都是從一出生就遭到洗腦。富人被教導要無視窮人，而窮人則被教導要無視自己真正的興趣。無論再多的自我反思或心理治療，也不可能有所幫助，因為心理治療師也是為了資本主義制度而工作。


    事實上，自我反思很有可能只是讓我更無法瞭解真正的自己，因為這讓人太注意個人的抉擇，卻忽略了社會的情境。如果我現在很富有，會以為是因為我做了聰明的選擇。如果我現在很貧困，會以為是自己犯了什麼錯誤。如果我感到憂鬱，自由主義的心理治療師很可能說，這是我父母的錯，並鼓勵我找些新的生活目標。而如果我說，我之所以憂鬱，可能是因為遭到資本家剝削、並在主流社會制度下無法實現自己的目標，這位治療師很可能就會回答，我只是把自己內心的困難，投射到整個「社會制度」，以及把自己和母親之間未解決的問題，投射到「資本家」身上。


    但如果是從社會主義的觀點，我並不需要花上好幾年，來談我的母親、我的情感、我的種種情結，而是該問問自己，是誰掌握了我國的生產工具？國家的主要進出口貨物為何？執政的政客和國際金融之間有何連結？必須瞭解當前的社會經濟制度、考量所有其他人的經驗，我才能真正瞭解自己的感受；也只有透過共同的行動，才能改變整個制度。然而，哪有人能夠真正考量所有人的經驗，真正公平的逐一衡量？


    正因如此，社會主義並不鼓勵自我探索，而是主張建立強而有力的集體制度，像是社會主義政黨和工會，為我們解讀這個世界。如果做個比較：自由主義政治認為選民能做出最好的選擇，自由主義經濟認為客戶永遠是對的；但社會主義政治認為黨能做出最好的選擇，社會主義經濟認為工會永遠是對的——各種權威和意義仍然來自人類的經驗（因為無論黨或工會，都仍然是由人民組成，以減輕人民苦難為目的），但是個人必須聽從黨和工會的決定，而不是聆聽自己的個人感受。


    ### 進化人文主義登場


    對於人類經驗互相衝突的問題，進化人文主義有不同的解決方案。進化人文主義根源於達爾文的演化論，認為衝突是福不是禍，能夠促成天擇，推動進步。畢竟，就是有些人比別人更優越，而在人類經驗有所衝突時，最優越者就該勝出。


    進化人文主義者認為，就是這一套「進化」邏輯（編注：進化與演化的英文都是 evolution，但進化觀已不同於達爾文的演化觀），驅使人類消滅了野狼，讓牧人無情剝削著馴化的羊，同時也要求在上位者壓迫在下位者。也因此，歐洲人征服非洲人、聰明的商人讓愚蠢的人破產，也都算是好事。只要遵照這種進化邏輯，人類就會不斷變得更加強壯、更加優越，最後成為超人類。進化並不是到了智人就停止，後面還有很長的路要走。如果光是因為人權或人類平等之名，就去壓抑人類的最優越者，就不可能產生超人類，甚至可能導致智人退化、滅絕。


    但究竟誰才是這些上位者，引領著未來超人類的到來？這可能是整個種族、某些特定部落，又或是橫空出世的個別天才。但不論是誰，讓他們處於上位的就是更優越的能力，表現出來的也就是能創造更新的知識、發展更先進的科技、打造更繁榮的社會，又或開創更美麗的藝術。愛因斯坦或貝多芬的經驗，絕對比某個誰都不是的醉鬼，來得更有價值；把兩者視為平等，豈不可笑？


    同樣的，如果某個國家一向領導著人類的進步，比起某些對人類進化少有貢獻、甚至根本毫無貢獻的國家，該國當然就應該視為在上位的國家。


    於是，進化人文主義的想法反而與迪克斯這種自由主義藝術家完全相反。進化人文主義認為，人類的戰爭經驗不但極有價值，甚至屬於必要。電影「黑獄亡魂」（The Third
    Man）的場景位於二次大戰後的維也納。劇中的蘭姆（Harry Lime）回想當時的衝突，說道：「到頭來，情況也不是那麼糟……義大利被波吉亞家族（Borgias）統治三十年，戰亂、謀殺、流血事件頻頻，仍然出現了米開朗基羅、達文西、以及文藝復興。而在瑞士，大家一片友好、情同手足，五百年來民主又和平，但他們有什麼成就？還不就是咕咕鐘。」


    首先，蘭姆在事實方面幾乎是全錯，瑞士大概是近代初期歐洲最血腥的一個角落（最主要的輸出就是傭兵），而咕咕鐘其實是德國人發明的；但這些事實的重要性，遠不及蘭姆的想法本身，也就是戰爭經驗能夠推動人類有所成就，戰爭讓天擇全然脫韁，藉此消滅弱者、獎勵殘暴及野心。戰爭暴露出生命的真相，喚醒人類去擁抱力量和榮耀，喚起優越者征服四方的意願。尼采的結論是：戰爭是「生命的學校」，「殺不死我的，就會使我更強」。


    英軍的瓊斯（Henry Jones）中尉也表達了類似的想法。二十一歲的瓊斯，於第一次世界大戰西線陣亡的三天前，給弟弟寄了一封信，描述他的戰爭經歷：


    你有沒有想過，雖然戰爭這麼恐怖，至少還算是件大事？我是說，在戰爭裡，人得面對現實。和平的時候，全世界大概有九成的人，過的大概都是邪惡而商業化的生活，愚蠢、自私、豪奢、執著在雞毛蒜皮的小事；但到了戰時，一切換成了野蠻，但至少更誠實了、也更直接。換個方法來看：和平的時候，每個人過的只是自己的小生命，做些瑣碎小事，擔心的是自己舒不舒服、錢夠不夠用這種事，一切只是為自己活著。這種生活也太噁心了吧！但在戰時，就算你確實被殺（而且人本來就只能多活幾年，難免一死），卻能確切知道，自己的死，是為了幫助自己的國家。事實上，你是完成了一個理想，而在我看來，這在一般的日常生活裡很少能夠做到。因為日常生活的基礎是商業化和自私；如果你也想「有點成就」，就不可能當不沾鍋。


    就我個人而言，我常常很高興自己碰上了戰爭。這讓我意識到生命真是一件小事。我認為戰爭讓每個人都有機會「跳出自己」，大概可以這麼說吧……確實，就說我自己，我敢說自己一輩子從沒這麼激動興奮過，簡直像是眼看著一場大特技秀要開場了，就像四月的時候那樣。我在過去大約半小時裡感覺到的興奮，實在不是這個世上任何事情能比的。9


    記者波登（Mark Bowden）的暢銷著作《黑鷹計畫》裡，也有類似的話，講到美國士兵尼爾森（Shawn Nelson）的戰鬥經驗：


    很難描述他的感覺……就像是忽然頓悟。接近死亡，反而讓他感到前所未有的活著。過去在生命裡，他也曾經有過幾分之幾秒的時間，感覺死亡擦身而過，就像曾有一輛狂飆的車忽然急轉彎，差那麼一點就要把他撞個正著。而在那天，他就是一直活在那種感覺裡，死亡就在他臉前呼吸……一刻、一刻、又一刻，時間有三小時以上……戰鬥就是……一種心理和身體意識全開的狀態。在街上的那些時候，他不是尼爾森，他沒有與什麼更大的世界相連，沒有帳單要付，沒有情感連結，什麼都沒有。他只是一個人，要從這一奈秒活到下一奈秒，從這口氣活到下一口氣，清楚知道這可能是自己的最後一奈秒、最後一口氣。他覺得自己永遠不一樣了。10


    希特勒也是受到自己的戰爭經驗所改變和啟發。在自傳《我的奮鬥》裡，他談到自己的單位到達前線後不久，士兵剛開始的熱情轉成恐懼，這就像是每個士兵都得打一場無情的內心戰爭，繃緊每條神經，才不會被恐懼擊倒。希特勒說，他是在跨越1915年到1916年的那個冬天，贏得了這場內心的戰爭。他寫道：「終於，我的意志成了無可爭議的主人……我現在感到平靜而堅定，而且這種感覺能夠持久不衰。現在就算命運帶來終極的種種考驗，也無法擊潰我的精神、或是打破我的理性。」11


    戰爭的經驗向希特勒揭示了世界的真相：這是一座叢林，遵守著無情的天擇法則。人要是拒絕承認這項真理，就無法生存。想要成功，不僅需要瞭解叢林法則，還得開心的擁抱叢林法則。


    該強調的是，就像反戰的自由主義藝術家一樣，希特勒也認為普通士兵的經驗十分神聖。事實上，講到在二十世紀將普通人的個人經驗，冠上巨大權威，希特勒的政治生涯可說是最好的例子。在為期四年的戰爭中，希特勒並非高級軍官，最高應該只升到下士。他沒受過正式教育、沒有專業技能，也沒有政治背景。他不是成功的商人或工會份子，沒有什麼位居高位的親友，也沒有值得說嘴的財富。一開始，他甚至還不是德國公民，只是個一文不名的移民。


    希特勒向德國選民懇求信任時,只說得出一項對他有利的論點:他在戰壕裡的經驗所學到的,是在任何大學、企業總部或政府部門永遠學不到的東西。人們跟隨他、投票支持他,是因為認同了他的想法,也認為這個世界是一座叢林,殺不死我們的,只會讓我們更強壯。


    自由主義是與溫和版的民族主義結合,希望保護每個人類社群的獨特經驗。但像是希特勒這種進化人文主義者,則認為只有特定國家是人類進步的引擎,認定這些國家必須教訓、甚至是消滅任何阻礙他們的人。


    但我還是要提醒一下,希特勒和納粹只是進化人文主義的一個極端版本。就像是史達林的古拉格勞改營,並不會讓我們全盤否定所有社會主義理念和論點;納粹主義雖然造成許多恐怖,也不該妨礙我們找出其中可能有價值的見解。納粹主義的誕生,是把進化人文主義搭配了特定的種族理論,再加上極端民族主義情感。並非所有進化人文主義者都是種族主義者,也不是只要相信人類有進化的潛力,就得建立警察國家和集中營。


    到了現在,奧許威茲集中營的意義,應該像是一個血紅的警告標誌,而不是像黑幕直接掩蓋了人類地平線的一整個區塊。對於形塑現代文化,進化人文主義已經扮演過重要的角色;到了二十一世紀,進化人文主義要扮演的角色,有可能甚至更為重要。


    ### 哪一種音樂較高級?


    為了確保讀者瞭解這三種人文主義分支的差異,請讓我們比較幾項人類經驗:'
  mdcn: '成了戰爭敘事的最終權威，每個人都學會必須給予尊重。像有個冷笑話就是這麼說的：「要有幾個越戰退伍老兵，才能換好一顆燈泡？」「你不會知道，因為你當時不在那裡。」⁶


    至於畫家，筆下也不再出現馬背上的將軍、或戰場上的調度，而是努力描繪小兵的感受。請先回頭看一下《布萊登菲爾德戰役》和《白山戰役》。接著再請看下面兩幅，咸認為二十世紀描繪戰爭的傑作：迪克斯（Otto
