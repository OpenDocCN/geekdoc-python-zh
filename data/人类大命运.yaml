    ## 「量化自我」蔚為風潮


    有些人用這些應用程式時，並沒想太多，但對某些人來說，這已經構成一種意識型態、甚至是宗教。這個「量化自我」（Quantified Self）的運動認為，所謂的自我，就是數學模式。但因為這些模式非常複雜，人類心靈並無法理解。所以，如果真想遵從德爾菲神殿的神諭「認識你自己」（know
    thyself），就別再浪費時間研究哲學、冥想或精神分析了，反而應該系統性蒐集自己的生物統計資料，允許演算法為你分析這些資料，好告訴你：你是誰、又該做些什麼。這波運動的箴言，就是「透過數字，得到對自己的知識。」25


    2000年，以色列歌手沙班（Shlomi Shavan）以一曲〈亞瑞克〉（Arik）登上當地流行排行榜首。內容講的是有個男人，一直很糾結於女友的前男友亞瑞克。他想知道，究竟他和亞瑞克誰床上表現更佳。女友不想回答這個問題，只說各有長處。但這傢伙並不滿意，追問：「小姐，告訴我明確的數字。」這個嘛，正是為了滿足這種人，有一間名為「床柱」（Bedpost）的公司，賣的正是一種生物統計臂環，讓你在做愛時戴著，就能蒐集各種像是心跳、排汗、性交持續時間、性高潮持續時間、燃燒卡路里等數據。這些資料會再傳到電腦加以分析，就能用精確的數字來評斷您表現如何。這下，可不能再假高潮、也不用再問「剛才爽不爽」了。26


    ### 人類大命運


    像這樣透過設備、無情揭露一切真相來了解自己之後，可能就會讓人開始覺得：自己是許多生化系統的集合，而不是不可分割的個體；而且，這些人所做的決定，也愈來愈會反映其中各種系統需求的拉扯。27
    假設你每週有兩小時空檔，正在考慮該拿來下棋、還是打網球。可能有個好友會問：「你的心怎麼說？」但你的回答可能是：「心臟嗎？那當然打網球是比較好，而且這也更能控制膽固醇和血壓。只不過，我的
    fMRI 掃描也說，我該加強左前額葉皮質，畢竟我家族常有失智的病史，有個叔叔還很年輕，就出現症狀了。最新研究指出，每週下一次棋，能延緩失智症狀發生。」


    去到醫院的老年病房，還能找到更多透過設備進行外部調節的例子。人文主義總是頌揚老年，說這時期智慧滿溢、洞察世情。一位理想中的長者，雖然身體可能染病衰弱，但心靈敏銳明快，更有長達八十年的人生智慧可以分享，世事無不在其掌握，也總能為兒孫或其他訪客提出卓絕的建議。


    不過，到了二十一世紀，八十歲的人可能無法符合這個理想的長者形象，因為有太多人可以活超過八十歲了。隨著我們愈來愈瞭解人類生物學，醫學雖然能讓人活命延壽、一息尚存，但是心靈和那個「真正的自我」卻已經崩解潰散了。常常最後剩下的，只是各種已經功能失調的生物系統的集合，必須倚靠各種監測器、電腦和幫浦，才得以勉力維持下去。


    在更深的層次，隨著基因科技應用至日常生活，每個人和自己的DNA發展出日益密切的關係。過去單一的內在自我聲音，也可能潰散成一群基因的眾聲喧譁。現在再遇到兩難或困難的抉擇，我可能不會再問自己內心的聲音，而是諮詢我體內的整個基因國會，究竟有何決定。


    2013年5月14日，女星安潔莉娜·裘莉在《紐約時報》發表一篇文章，解釋她為何決定進行雙乳房切除術。多年來，由於母親和外祖母雙雙在相對年輕時罹癌過世，她一直活在乳癌的陰影下。她自己做了基因檢測，也證實帶有抑癌基因BRCA1的變異，根據統計調查，帶有此類基因變異的婦女，罹患乳癌的機率高達87%。雖然當時她並未罹癌，但她決定預防這項可怕的疾病，於是進行了雙乳房切除術。在文章中，裘莉解釋道：「我選擇把自己的故事說出來，是因為有很多女性並不知道自己可能活在癌症的陰影下。我希望她們也能夠進行基因檢測，而如果發現自己風險很高，也能知道有個有力的選項。」<sup>28</sup>


    乳房切除術是一項很困難、也可能致命的抉擇。除了種種不適和風險、手術及術後照護的成本之外，這項決定也可能深深影響個人的健康、身材、情緒及人際關係。裘莉這項抉擇，加上當時決定公開的勇氣，掀起一片轟動，為她贏得全世界的盛譽讚賞。有許多人希望這樣的公開舉動，能讓大眾更認識基因醫學及潛在效益。


    從歷史觀點來看，有趣的是演算法在這個案例所扮演的關鍵角色。裘莉要做出對生活如此重要的決定時，並不是登上山巔俯瞰海洋、看著太陽沉入海中，接觸自己內心最深處的感覺。反而是寧願聽聽自己的基因怎麼說，而基因的表達方式並不是什麼感覺，而是數字。當時，裘莉的身體並沒有任何疼痛或不適，她的感覺告訴自己：「放輕鬆啦，一切沒事啊。」但醫師用的電腦演算法，說法卻完全不同：「你並未感覺有任何不適，但你的DNA裡有個定時炸彈正在滴答倒數。你必須處理這個問題，而且是現在立刻！」


    當然，裘莉的情緒和獨特人格也扮演關鍵角色。如果是另一位個性不同的女性，就算發現自己也有同樣的基因變異，也可能不會進行乳房切除術。現在就讓我們來到灰色地帶，假設這另一位女性發現，自己不但帶有危險的BRCA1基因變異，還帶有另一個變異的基因ABCD3（並沒有這個基因，只是假設），會損害負責評估機率的大腦區域、進而使人們低估風險，她該怎麼辦？如果又有統計學家告訴她，她的母親、外祖母和其他幾位親戚都是因為低估各種健康風險、未能採取預防措施，於是英年早逝，這時候她又會如何？


    很有可能，你在未來也需要像安潔莉娜·裘莉一樣，對自己的健康做出重大抉擇。經過基因檢測、血液測試或fMRI，演算法就能根據巨大的統計資料庫，來分析結果，讓你接受演算法的建議。但這並不是世界末日的情節，演算法並不會忽然要占領地球、奴役人類，反而是能夠幫上大忙，為我們做出各種明智的抉擇。這時候不聽它們的，才是不智的決定。


    ## 「谷歌大神」太神了


    安潔莉娜·裘莉首次擔綱女主角，是在1993年的科幻動作片「無影終結者」（Cyborg 2）。她在片中飾演的角色是半機械人瑞絲（Casella Reese），在2074年由紙風車機器人公司（Pinwheel
    Robotics）開發，用於間諜和暗殺。瑞絲的程式也設計帶有人類的情感，好讓她更能融入人類社會，完成任務。等到瑞絲發現公司不僅控制她，還打算銷毀她，就逃了出來，為自己的生命和自由而戰。「無影終結者」是一個自由主義的幻想，講的是個人為爭取自由和隱私，對抗國際企業無所不在的觸手。


    但是在現實生活中，裘莉卻寧願犧牲隱私和自主，追求健康。像這種為求健康的類似願望，很可能讓我們大多數人，都願意放下保護個人隱私的阻礙，允許國家官僚制度或跨國公司進入我們身體的最深處。舉例來說，允許谷歌閱讀我們的電子郵件、追蹤我們的各種活動，就可能讓谷歌在流行病爆發、而傳統衛生機構還渾然不覺的時候，向我們提出警告。


    英國國民保健署（NHS）如何得知倫敦爆發流感疫情？答案是分析幾百間診所、上千位醫師提出的通報。但這些醫師又是怎麼知道相關資訊？假設有位瑪麗，某天一早醒來覺得不太舒服，她並不會直接跑去看醫生。而是會先等個幾小時、甚至是一兩天，希望喝個幾杯加了蜂蜜的熱茶之後，身體就會舒服一點。等到病情一直沒改善，她才會預約掛號，上診所去看病。醫師將資料輸入電腦後，理想的狀況是NHS的某人會分析這些和其他數千名醫師所通報的資料，得出流感正在蔓延的結論。但這一切得花上許多時間。


    然而對谷歌來說，這只是幾分鐘的事。谷歌所做的，就是監控倫敦居民在電子郵件和谷歌搜尋引擎所輸入的詞彙，再與疾病症狀資料庫做交叉比對。假設一般來說，「頭痛」、「發燒」、「噁心」和「打噴嚏」每天在倫敦居民的電子郵件和搜尋中，會出現大約十萬筆，如果今天谷歌演算法發現這些詞彙的使用次數忽然飆到三十萬筆，就知道這下出了問題，正有流感肆虐！我們不用再等到瑪麗去看醫生了。第一天早上，她早上起床覺得不太舒服，就在上班前給同事寄了一封電子郵件：「我頭痛，但還是會去上班。」只要這樣，谷歌就已經知道了。


    然而，想讓谷歌發揮這種神力，瑪麗不僅得允許谷歌閱讀自己發出的電子郵件，還得允許谷歌與衛生當局分享資訊。如果連安潔莉娜．裘莉都願意犧牲自己的隱私，提高眾人对乳癌的警覺，瑪麗為什麼不做一個類似的小小犧牲，以避免流行病爆發呢？


    這種想法並不只是理論。在2008年,谷歌確實推出了谷歌流感趨勢(Google Flu Trends)服務,靠著監控在谷歌搜尋的內容,追蹤流感爆發的跡象。這項服務目前仍在開發中,而且基於隱私考量,據稱只會追蹤搜尋字眼,而不會閱讀私人電子郵件。但光是這樣,已經讓它得以比傳統公衛體系,早了十天發出流感警報。29


    至於谷歌基線研究(Google Baseline Study)專案,則更加雄心勃勃。谷歌希望建起一座龐大的人類健康資料庫,找出「健康完美」的人類基因模型。這樣一來,只要發現健康資料與模型有出入,就能警告民眾可能健康出現問題,須及早防患未然。基線研究又與稱為Google
    Fit的整套產品系列搭配,包括服裝、手環、鞋子和眼鏡等穿戴式裝備。Google Fit的各項產品,正是要蒐集永無止境的生物資料流,提供給基線研究運用。30


    然而,像谷歌這樣的公司,想深入的程度絕不只是穿戴式裝備而已。目前,DNA測試的市場成長飛快。市場龍頭之一是私人企業23andMe,由谷歌聯合創辦人布林(Sergey
    Brin)的前妻沃希基(Anne Wojcicki)所創辦。公司名稱23andMe的23,指的正是承載人類基因組的二十三對染色體,23andMe就代表自己的染色體與自己有非常特殊的關係。只要有人能理解這些染色體正在說什麼,就能告訴你一些你自己從沒想過的事。


    如果你想知道你的基因組,只需向23andMe支付九十九美元,他們就會寄給你一個檢測包,裡面有一根唾液收集試管。你向試管裡吐口水,密封,再寄到加州山景城的公司所在地,他們就會分析你唾液中的DNA,並透過網路將結果傳給你。你得到的是一份列表,列出你可能面對的健康危機,以及從基因看出你可能發生的各種健康情況及體質,從禿頭到失明不等。


    「認識你自己」可從來沒這麼簡單或這麼便宜過。由於這一切都是根據統計數據而來，資料庫的規模也就成為預測是否準確的關鍵。因此，最早建起龐大基因資料庫的公司，就能為顧客提供最準確的預測，也就可能從此壟斷市場。美國生物科技公司日益擔心，由於美國嚴格控管個人隱私，而中國又完全不管個人隱私，未來可能會將整個基因市場拱手讓給中國。


    如果我們能打破所有阻礙，讓谷歌和其競爭對手自由存取我們的各種生物統計裝置、DNA掃描結果和醫療紀錄，就能得到全面的醫療健康服務，不僅能對抗流行病，還能對抗癌症、心臟病和阿茲海默症。然而，一旦有了這樣的資料庫，谷歌能做的絕不只這樣而已。正如警察合唱團（The
    Police）的名曲〈你的每次呼吸〉（Every Breath You Take），這樣的系統能夠監控你的每次呼吸、你的每個動作、你掙脫的每個枷鎖；這樣的系統會仔細注意你的帳戶、你的心跳、你的血糖值，甚至是你每次的出軌偷情。它對你的認識，絕對遠高於你自己。


    人類常常因為自我欺騙和自我幻想，陷在不適合的關係、不適合的職業、不良的習慣，而無法自拔，但這一切都將逃不過谷歌的法眼。我們現在是由敘事自我所操控，但谷歌不一樣，它不會用那些遭到操弄的故事來做決定，也不會因為走了認知捷徑、受峰終法則影響，而遭到誤導。谷歌會確確實實的，記住我們走的每一步，記得我們握過的每一雙手。


    許多人會很樂意將大多數決策過程，交給這樣的系統，或者至少是在面臨重要抉擇時，參考一下意見。谷歌將能夠建議我們該看哪部電影、去哪裡度假、上大學讀什麼、選哪個工作機會，甚至是該和誰約會及結婚。例如，我可能會說：「嘿，谷歌你好。約翰和保羅都在追我，我兩個都很喜歡，但喜歡的點不太一樣，很難下決定。根據你手上所有的資料，你怎麼建議？」


    谷歌就會回答：「這個嘛，我從你出生那天就認識你了。我讀過你所有的電子郵件、聽過你所有電話的錄音，知道你最愛的電影，也有你的DNA資料和完整的心跳資料。你過去每次約會，我都留下精確的資料，如果你要的話，我可以把你過去和約翰或保羅約會時的資料調出來，以秒為單位，來顯示你的心跳、血壓或血糖值變化。如果有必要，我甚至也能把你們每次做愛的資料調出來，用數學比較誰高誰低。而且當然，我對他們兩人的認識也不下於對你的認識。所以，基於以上所有資訊、我傑出的演算法、加上幾十年來幾百萬對伴侶的統計資料，我建議你挑約翰。大約有87%的機率，你們長期滿意度會比較高。」


    谷歌繼續分析：「確實，也因為我這麼瞭解你，我知道你不會喜歡這個答案。保羅長得比約翰更帥，而你對外表的看重程度又太高，你其實暗中希望我的答案是『保羅』。當然，外表很重要，但實在沒有你想的那麼重要。你體內的生化演算法是從數萬年前的非洲大草原演化而來的，在對於可能配偶的整體評價之中，外表占了35%。至於我的演算法，是基於最新的研究和統計數據而來，認為外表對於浪漫關係的長期成功，只有14%的影響。所以，雖然我已經把保羅的外表納入考量，還是建議約翰是你更好的選擇。」31


    想得到這種完全忠誠的諮詢服務，我們就必須改變想法，不要認為人類都是不可分割的個體，不要堅信每個人都有自由意志，能用來決定什麼最好、什麼才美、什麼又是生命的意義。從以前到現在，人類都是自主的實體，個別由敘事自我發明的故事所操縱；但在未來，每個人類都將會是整個巨大全球網路的一部分。


    ## 都是我們免費奉上的資料！ ✱


    自由主義將敘事自我奉為圭臬，不論在投票所、超市或婚姻市場，都讓敘事自我來做決定。在這幾個世紀以來，這種做法很有道理，因為雖然敘事自我相信的常常是各種虛構和幻想的故事，但我們確實沒有更好的替代方案。然而，一旦有了能夠替代的系統，能比敘事自我更瞭解我們自己，這時再把權力留在敘事自我的手中，就只能說是愚蠢的做法。


    例如民主選舉這種自由主義的做法，將會遭到淘汰，因為谷歌將會比我自己更瞭解我的政治觀點。我站在投票亭裡的時候，自由主義叫我要聽聽內心真實自我的聲音，選擇能夠反映我最深期望的政黨或候選人。但生命科學卻指出，我站在投票亭裡的時候，根本並不真正記得上次選舉以來這幾年的所有感受和想法。此外，我還被各種宣傳、公關手法和隨機記憶不斷轟炸，很可能已扭曲了我該做的選擇。正如康納曼的冷水實驗，敘事自我到了政治領域，一樣會遵循峰終法則，忘了絕大多數的事情，只記得幾項極端的事件，並對最近的事件賦予完全不成比例的高權重。


    在這四年之間，我可能不斷抱怨現任總統的政策，一直告訴自己和任何願意聽我說話的人，這個總統「會毀了我們所有人」。然而離下次選舉投票只剩幾個月的時候，政府忽然減稅、大方開出各種支票。執政黨找來最好的撰稿人，打出一波漂亮的競選文宣，既有威脅、又有利誘，直接打入我大腦的恐懼中心。到了選舉當天一大早，我醒來的時候有點感冒，腦子不太好使，也讓我覺得安全和穩定實在比其他一切都更重要。結果出爐！我又把那個「會毀了我們所有人」的傢伙送上臺，讓這個人還能再做四年。


    如果我授權谷歌來幫我投票，就能擺脫這樣的命運了。你也知道，谷歌可不是選舉前一天才忽然蹦出來，雖然它也會注意到最近的減稅和選舉支票，但過去四年的點點滴滴一樣是記得清清楚楚。它會知道我每次讀早報時的血壓，也知道我看晚間新聞時，多巴胺分泌量是否下降。谷歌會知道怎樣看穿公關人員華而不實的口號，谷歌也瞭解人生病的時候會稍微傾向右翼，於是據以調整。因此，谷歌投票時，根據的不是我當下瞬間的心態，也不是敘事自我的幻想，而是根據集合所有生化演算法真正的感受和興趣，而得出的結果；這一切生化演算法的集合，正是所謂的「我」。


    當然，谷歌也不見得永遠是對的，畢竟這一切都只是機率。但只要谷歌做出夠多正確的決定，人類就會將更多權力交給它。隨著時間慢慢過去，資料庫規模會逐漸成長，統計數字將會更準確，演算法將會繼續改進，決策的品質也會逐步提高。雖然這套系統永遠不可能完全認識我，也不可能完全不會出錯，但本來就沒有這種必要，只要到了谷歌系統比我自己更認識我的那一天，自由主義就會頹然崩垮。這點其實並沒有聽起來這麼困難，因為大多數人根本就沒有真正瞭解自己。


    而臉書這個谷歌的死敵，最近所委託的一項研究就指出：到了今天，如果要判斷某人的性格和性情，臉書演算法會比這個人的朋友、父母或配偶更為準確。這項研究共有86,220位志願者參與，他們都有個人的臉書帳號，並且填寫了有上百題的人格問卷。臉書演算法接著會根據受測者平常在臉書對文章、圖片、影片等等按讚的紀錄，預測這些志願參與者的回答。過去按讚的次數愈多，預測的準確度就愈高。接著，再把演算法預測的結果，與參與者的同事、朋友、家人和配偶的預測進行比較。了不起的地方在於，演算法只需要過去按讚次數超過10次，預測準確度就已經高於同事了；70個讚，預測準確度就會高於朋友；150個讚，準確度會高於家人；到了300個讚，預測準確度就會高於配偶。換句話說，如果你至今已經在臉書上按了超過300個讚，臉書就可能比你的另一半，更能預測你的想法和期望。


    事實上，臉書演算法在某些領域對人的瞭解，甚至超過那個人自己。例如臉書的研究調查，也請參與者評估自己使用成癮物質的程度、以及社交網路的規模，而在這些項目裡，參與者自己的判斷就不如演算法來得準確。該項研究最後的結論提出以下的預測（這倒是由人類作者寫的，而不是臉書的演算法所擬）：「人類如果遇到重大的人生抉擇，像是要選擇從事何種活動、職涯道路、甚至是交往對象，可以考慮放下自己心理上的判斷，而依賴電腦所做的選擇。這種資料導向的決策，有可能會讓人類的生活過得更好。」32


    至於比較邪惡的一面，同一份研究報告也暗示：在未來的美國總統大選裡，臉書不僅早就知道數千萬美國人的政治意見，還知道哪些是關鍵的搖擺選民，以及怎樣使他們搖擺。臉書會知道，共和黨和民主黨在奧克拉荷馬州的選情特別緊繃，還有32,417位選民尚未下定決心，甚至也知道每個候選人該說什麼，才能讓天平倒向自己這邊。臉書為什麼能夠得到這些有無上價值的民調資料？當然都是我們免費親手奉上的！


    在歐洲帝國主義的全盛時期，征服者和商人用彩色的珠子，就向當地人換來了整座島嶼、換來整個國家。在二十一世紀，個人資料可能是大多數人類最後一項能夠提供的最寶貴資源，但我們正親手把這些資料交給各大科技企業，好換來免費的電子郵件信箱、或是有趣的小貓影片。


    ## 從神使到代理人、再成為君主


    等到谷歌、臉書和其他演算法成為無所不知的神使（oracle，在古希臘神殿傳神諭者）之後，很有可能就會進一步演化成代理人，最後成為君主。33 為了解釋這個過程，讓我們以Waze為例。這是一個GPS導航程式，許多司機現在都會使用。Waze絕不只是地圖；它靠著數百萬用戶的不斷更新，就能得知各種塞車、事故和警車位置的資訊。因此，Waze知道怎樣讓你躲過繁忙的路段，讓你以最快的路線到達目的地。你到了某個路口，直覺要你往右、但Waze要你往左的時候，用戶遲早都會學到，自己最好相信Waze，不要相信自己的感覺。34


    乍看之下，Waze演算法應該只是神使的等級。你問問題，神使給你答覆，但最後還是由你決定。然而，如果神使開始贏得你的信任，合理的下一步驟就是讓它成為你的代理人。你只是向演算法指定一個最終目標，它就會在沒有你的監督之下，自行動作、達成目標。以Waze為例，就是你將Waze連結到自動駕駛的汽車上，並告訴Waze「走最快的路回家」或是「走風景最漂亮的路線」，又或是「走造成汙染最少的路線」。由你來發號施令，但是交給Waze來執行。


    最後，Waze可能就會成為君主。它手中握有大權，所知又遠超於你，就可能開始操縱你和其他駕駛人，形塑你們的欲望，讓你們做出顧全大局的決定。例如，假設因為Waze實在太好用，所有駕駛人都開始使用。再假設今天一號公路大塞車，而替代的二號公路車流相對順暢。如果Waze只是讓大家都知道二號公路順暢，所有駕駛人就會一窩蜂開向二號公路，最後又全塞在一起。一旦所有'
  mdcn: '子的健康狀況。2014年11月，微軟也推出智慧運動手環Microsoft Band，能夠監控心跳、睡眠品質、每天行走步數等資訊。更令人驚奇的是，有個名為「死線」（Deadline）的應用程式還更進一步，會告訴你，根據你現在的生活習慣，你大概還有幾年可活。


    ## 「量化自我」蔚為風潮


    有些人用這些應用程式時，並沒想太多，但對某些人來說，這已經構成一種意識型態、甚至是宗教。這個「量化自我」（Quantified Self）的運動認為，所謂的自我，就是數學模式。但因為這些模式非常複雜，人類心靈並無法理解。所以，如果真想遵從德爾菲神殿的神諭「認識你自己」（know
    thyself），就別再浪費時間研究哲學、冥想或精神分析了，反而應該系統性蒐集自己的生物統計資料，允許演算法為你分析這些資料，好告訴你：你是誰、又該做些什麼。這波運動的箴言，就是「透過數字，得到對自己的知識。」25


    2000年，以色列歌手沙班（Shlomi Shavan）以一曲〈亞瑞克〉（Arik）登上當地流行排行榜首。內容講的是有個男人，一直很糾結於女友的前男友亞瑞克。他想知道，究竟他和亞瑞克誰床上表現更佳。女友不想回答這個問題，只說各有長處。但這傢伙並不滿意，追問：「小姐，告訴我明確的數字。」這個嘛，正是為了滿足這種人，有一間名為「床柱」（Bedpost）的公司，賣的正是一種生物統計臂環，讓你在做愛時戴著，就能蒐集各種像是心跳、排汗、性交持續時間、性高潮持續時間、燃燒卡路里等數據。這些資料會再傳到電腦加以分析，就能用精確的數字來評斷您表現如何。這下，可不能再假高潮、也不用再問「剛才爽不爽」了。26


    ### 人類大命運


    像這樣透過設備、無情揭露一切真相來了解自己之後，可能就會讓人開始覺得：自己是許多生化系統的集合，而不是不可分割的個體；而且，這些人所做的決定，也愈來愈會反映其中各種系統需求的拉扯。27
    假設你每週有兩小時空檔，正在考慮該拿來下棋、還是打網球。可能有個好友會問：「你的心怎麼說？」但你的回答可能是：「心臟嗎？那當然打網球是比較好，而且這也更能控制膽固醇和血壓。只不過，我的
    fMRI 掃描也說，我該加強左前額葉皮質，畢竟我家族常有失智的病史，有個叔叔還很年輕，就出現症狀了。最新研究指出，每週下一次棋，能延緩失智症狀發生。」


    去到醫院的老年病房，還能找到更多透過設備進行外部調節的例子。人文主義總是頌揚老年，說這時期智慧滿溢、洞察世情。一位理想中的長者，雖然身體可能染病衰弱，但心靈敏銳明快，更有長達八十年的人生智慧可以分享，世事無不在其掌握，也總能為兒孫或其他訪客提出卓絕的建議。


    不過，到了二十一世紀，八十歲的人可能無法符合這個理想的長者形象，因為有太多人可以活超過八十歲了。隨著我們愈來愈瞭解人類生物學，醫學雖然能讓人活命延壽、一息尚存，但是心靈和那個「真正的自我」卻已經崩解潰散了。常常最後剩下的，只是各種已經功能失調的生物系統的集合，必須倚靠各種監測器、電腦和幫浦，才得以勉力維持下去。


    在更深的層次，隨著基因科技應用至日常生活，每個人和自己的DNA發展出日益密切的關係。過去單一的內在自我聲音，也可能潰散成一群基因的眾聲喧譁。現在再遇到兩難或困難的抉擇，我可能不會再問自己內心的聲音，而是諮詢我體內的整個基因國會，究竟有何決定。


    2013年5月14日，女星安潔莉娜·裘莉在《紐約時報》發表一篇文章，解釋她為何決定進行雙乳房切除術。多年來，由於母親和外祖母雙雙在相對年輕時罹癌過世，她一直活在乳癌的陰影下。她自己做了基因檢測，也證實帶有抑癌基因BRCA1的變異，根據統計調查，帶有此類基因變異的婦女，罹患乳癌的機率高達87%。雖然當時她並未罹癌，但她決定預防這項可怕的疾病，於是進行了雙乳房切除術。在文章中，裘莉解釋道：「我選擇把自己的故事說出來，是因為有很多女性並不知道自己可能活在癌症的陰影下。我希望她們也能夠進行基因檢測，而如果發現自己風險很高，也能知道有個有力的選項。」<sup>28</sup>


    乳房切除術是一項很困難、也可能致命的抉擇。除了種種不適和風險、手術及術後照護的成本之外，這項決定也可能深深影響個人的健康、身材、情緒及人際關係。裘莉這項抉擇，加上當時決定公開的勇氣，掀起一片轟動，為她贏得全世界的盛譽讚賞。有許多人希望這樣的公開舉動，能讓大眾更認識基因醫學及潛在效益。


    從歷史觀點來看，有趣的是演算法在這個案例所扮演的關鍵角色。裘莉要做出對生活如此重要的決定時，並不是登上山巔俯瞰海洋、看著太陽沉入海中，接觸自己內心最深處的感覺。反而是寧願聽聽自己的基因怎麼說，而基因的表達方式並不是什麼感覺，而是數字。當時，裘莉的身體並沒有任何疼痛或不適，她的感覺告訴自己：「放輕鬆啦，一切沒事啊。」但醫師用的電腦演算法，說法卻完全不同：「你並未感覺有任何不適，但你的DNA裡有個定時炸彈正在滴答倒數。你必須處理這個問題，而且是現在立刻！」


    當然，裘莉的情緒和獨特人格也扮演關鍵角色。如果是另一位個性不同的女性，就算發現自己也有同樣的基因變異，也可能不會進行乳房切除術。現在就讓我們來到灰色地帶，假設這另一位女性發現，自己不但帶有危險的BRCA1基因變異，還帶有另一個變異的基因ABCD3（並沒有這個基因，只是假設），會損害負責評估機率的大腦區域、進而使人們低估風險，她該怎麼辦？如果又有統計學家告訴她，她的母親、外祖母和其他幾位親戚都是因為低估各種健康風險、未能採取預防措施，於是英年早逝，這時候她又會如何？


    很有可能，你在未來也需要像安潔莉娜·裘莉一樣，對自己的健康做出重大抉擇。經過基因檢測、血液測試或fMRI，演算法就能根據巨大的統計資料庫，來分析結果，讓你接受演算法的建議。但這並不是世界末日的情節，演算法並不會忽然要占領地球、奴役人類，反而是能夠幫上大忙，為我們做出各種明智的抉擇。這時候不聽它們的，才是不智的決定。


    ## 「谷歌大神」太神了


    安潔莉娜·裘莉首次擔綱女主角，是在1993年的科幻動作片「無影終結者」（Cyborg 2）。她在片中飾演的角色是半機械人瑞絲（Casella Reese），在2074年由紙風車機器人公司（Pinwheel
    Robotics）開發，用於間諜和暗殺。瑞絲的程式也設計帶有人類的情感，好讓她更能融入人類社會，完成任務。等到瑞絲發現公司不僅控制她，還打算銷毀她，就逃了出來，為自己的生命和自由而戰。「無影終結者」是一個自由主義的幻想，講的是個人為爭取自由和隱私，對抗國際企業無所不在的觸手。


    但是在現實生活中，裘莉卻寧願犧牲隱私和自主，追求健康。像這種為求健康的類似願望，很可能讓我們大多數人，都願意放下保護個人隱私的阻礙，允許國家官僚制度或跨國公司進入我們身體的最深處。舉例來說，允許谷歌閱讀我們的電子郵件、追蹤我們的各種活動，就可能讓谷歌在流行病爆發、而傳統衛生機構還渾然不覺的時候，向我們提出警告。


    英國國民保健署（NHS）如何得知倫敦爆發流感疫情？答案是分析幾百間診所、上千位醫師提出的通報。但這些醫師又是怎麼知道相關資訊？假設有位瑪麗，某天一早醒來覺得不太舒服，她並不會直接跑去看醫生。而是會先等個幾小時、甚至是一兩天，希望喝個幾杯加了蜂蜜的熱茶之後，身體就會舒服一點。等到病情一直沒改善，她才會預約掛號，上診所去看病。醫師將資料輸入電腦後，理想的狀況是NHS的某人會分析這些和其他數千名醫師所通報的資料，得出流感正在蔓延的結論。但這一切得花上許多時間。


    然而對谷歌來說，這只是幾分鐘的事。谷歌所做的，就是監控倫敦居民在電子郵件和谷歌搜尋引擎所輸入的詞彙，再與疾病症狀資料庫做交叉比對。假設一般來說，「頭痛」、「發燒」、「噁心」和「打噴嚏」每天在倫敦居民的電子郵件和搜尋中，會出現大約十萬筆，如果今天谷歌演算法發現這些詞彙的使用次數忽然飆到三十萬筆，就知道這下出了問題，正有流感肆虐！我們不用再等到瑪麗去看醫生了。第一天早上，她早上起床覺得不太舒服，就在上班前給同事寄了一封電子郵件：「我頭痛，但還是會去上班。」只要這樣，谷歌就已經知道了。


    然而，想讓谷歌發揮這種神力，瑪麗不僅得允許谷歌閱讀自己發出的電子郵件，還得允許谷歌與衛生當局分享資訊。如果連安潔莉娜．裘莉都願意犧牲自己的隱私，提高眾人对乳癌的警覺，瑪麗為什麼不做一個類似的小小犧牲，以避免流行病爆發呢？


    這種想法並不只是理論。在2008年,谷歌確實推出了谷歌流感趨勢(Google Flu Trends)服務,靠著監控在谷歌搜尋的內容,追蹤流感爆發的跡象。這項服務目前仍在開發中,而且基於隱私考量,據稱只會追蹤搜尋字眼,而不會閱讀私人電子郵件。但光是這樣,已經讓它得以比傳統公衛體系,早了十天發出流感警報。29


    至於谷歌基線研究(Google Baseline Study)專案,則更加雄心勃勃。谷歌希望建起一座龐大的人類健康資料庫,找出「健康完美」的人類基因模型。這樣一來,只要發現健康資料與模型有出入,就能警告民眾可能健康出現問題,須及早防患未然。基線研究又與稱為Google
    Fit的整套產品系列搭配,包括服裝、手環、鞋子和眼鏡等穿戴式裝備。Google Fit的各項產品,正是要蒐集永無止境的生物資料流,提供給基線研究運用。30


    然而,像谷歌這樣的公司,想深入的程度絕不只是穿戴式裝備而已。目前,DNA測試的市場成長飛快。市場龍頭之一是私人企業23andMe,由谷歌聯合創辦人布林(Sergey
    Brin)的前妻沃希基(Anne Wojcicki)所創辦。公司名稱23andMe的23,指的正是承載人類基因組的二十三對染色體,23andMe就代表自己的染色體與自己有非常特殊的關係。只要有人能理解這些染色體正在說什麼,就能告訴你一些你自己從沒想過的事。


    如果你想知道你的基因組,只需向23andMe支付九十九美元,他們就會寄給你一個檢測包,裡面有一根唾液收集試管。你向試管裡吐口水,密封,再寄到加州山景城的公司所在地,他們就會分析你唾液中的DNA,並透過網路將結果傳給你。你得到的是一份列表,列出你可能面對的健康危機,以及從基因看出你可能發生的各種健康情況及體質,從禿頭到失明不等。


    「認識你自己」可從來沒這麼簡單或這麼便宜過。由於這一切都是根據統計數據而來，資料庫的規模也就成為預測是否準確的關鍵。因此，最早建起龐大基因資料庫的公司，就能為顧客提供最準確的預測，也就可能從此壟斷市場。美國生物科技公司日益擔心，由於美國嚴格控管個人隱私，而中國又完全不管個人隱私，未來可能會將整個基因市場拱手讓給中國。


    如果我們能打破所有阻礙，讓谷歌和其競爭對手自由存取我們的各種生物統計裝置、DNA掃描結果和醫療紀錄，就能得到全面的醫療健康服務，不僅能對抗流行病，還能對抗癌症、心臟病和阿茲海默症。然而，一旦有了這樣的資料庫，谷歌能做的絕不只這樣而已。正如警察合唱團（The
    Police）的名曲〈你的每次呼吸〉（Every Breath You Take），這樣的系統能夠監控你的每次呼吸、你的每個動作、你掙脫的每個枷鎖；這樣的系統會仔細注意你的帳戶、你的心跳、你的血糖值，甚至是你每次的出軌偷情。它對你的認識，絕對遠高於你自己。


    人類常常因為自我欺騙和自我幻想，陷在不適合的關係、不適合的職業、不良的習慣，而無法自拔，但這一切都將逃不過谷歌的法眼。我們現在是由敘事自我所操控，但谷歌不一樣，它不會用那些遭到操弄的故事來做決定，也不會因為走了認知捷徑、受峰終法則影響，而遭到誤導。谷歌會確確實實的，記住我們走的每一步，記得我們握過的每一雙手。


    許多人會很樂意將大多數決策過程，交給這樣的系統，或者至少是在面臨重要抉擇時，參考一下意見。谷歌將能夠建議我們該看哪部電影、去哪裡度假、上大學讀什麼、選哪個工作機會，甚至是該和誰約會及結婚。例如，我可能會說：「嘿，谷歌你好。約翰和保羅都在追我，我兩個都很喜歡，但喜歡的點不太一樣，很難下決定。根據你手上所有的資料，你怎麼建議？」


    谷歌就會回答：「這個嘛，我從你出生那天就認識你了。我讀過你所有的電子郵件、聽過你所有電話的錄音，知道你最愛的電影，也有你的DNA資料和完整的心跳資料。你過去每次約會，我都留下精確的資料，如果你要的話，我可以把你過去和約翰或保羅約會時的資料調出來，以秒為單位，來顯示你的心跳、血壓或血糖值變化。如果有必要，我甚至也能把你們每次做愛的資料調出來，用數學比較誰高誰低。而且當然，我對他們兩人的認識也不下於對你的認識。所以，基於以上所有資訊、我傑出的演算法、加上幾十年來幾百萬對伴侶的統計資料，我建議你挑約翰。大約有87%的機率，你們長期滿意度會比較高。」


    谷歌繼續分析：「確實，也因為我這麼瞭解你，我知道你不會喜歡這個答案。保羅長得比約翰更帥，而你對外表的看重程度又太高，你其實暗中希望我的答案是『保羅』。當然，外表很重要，但實在沒有你想的那麼重要。你體內的生化演算法是從數萬年前的非洲大草原演化而來的，在對於可能配偶的整體評價之中，外表占了35%。至於我的演算法，是基於最新的研究和統計數據而來，認為外表對於浪漫關係的長期成功，只有14%的影響。所以，雖然我已經把保羅的外表納入考量，還是建議約翰是你更好的選擇。」31


    想得到這種完全忠誠的諮詢服務，我們就必須改變想法，不要認為人類都是不可分割的個體，不要堅信每個人都有自由意志，能用來決定什麼最好、什麼才美、什麼又是生命的意義。從以前到現在，人類都是自主的實體，個別由敘事自我發明的故事所操縱；但在未來，每個人類都將會是整個巨大全球網路的一部分。


    ## 都是我們免費奉上的資料！ ✱


    自由主義將敘事自我奉為圭臬，不論在投票所、超市或婚姻市場，都讓敘事自我來做決定。在這幾個世紀以來，這種做法很有道理，因為雖然敘事自我相信的常常是各種虛構和幻想的故事，但我們確實沒有更好的替代方案。然而，一旦有了能夠替代的系統，能比敘事自我更瞭解我們自己，這時再把權力留在敘事自我的手中，就只能說是愚蠢的做法。


    例如民主選舉這種自由主義的做法，將會遭到淘汰，因為谷歌將會比我自己更瞭解我的政治觀點。我站在投票亭裡的時候，自由主義叫我要聽聽內心真實自我的聲音，選擇能夠反映我最深期望的政黨或候選人。但生命科學卻指出，我站在投票亭裡的時候，根本並不真正記得上次選舉以來這幾年的所有感受和想法。此外，我還被各種宣傳、公關手法和隨機記憶不斷轟炸，很可能已扭曲了我該做的選擇。正如康納曼的冷水實驗，敘事自我到了政治領域，一樣會遵循峰終法則，忘了絕大多數的事情，只記得幾項極端的事件，並對最近的事件賦予完全不成比例的高權重。


    在這四年之間，我可能不斷抱怨現任總統的政策，一直告訴自己和任何願意聽我說話的人，這個總統「會毀了我們所有人」。然而離下次選舉投票只剩幾個月的時候，政府忽然減稅、大方開出各種支票。執政黨找來最好的撰稿人，打出一波漂亮的競選文宣，既有威脅、又有利誘，直接打入我大腦的恐懼中心。到了選舉當天一大早，我醒來的時候有點感冒，腦子不太好使，也讓我覺得安全和穩定實在比其他一切都更重要。結果出爐！我又把那個「會毀了我們所有人」的傢伙送上臺，讓這個人還能再做四年。


    如果我授權谷歌來幫我投票，就能擺脫這樣的命運了。你也知道，谷歌可不是選舉前一天才忽然蹦出來，雖然它也會注意到最近的減稅和選舉支票，但過去四年的點點滴滴一樣是記得清清楚楚。它會知道我每次讀早報時的血壓，也知道我看晚間新聞時，多巴胺分泌量是否下降。谷歌會知道怎樣看穿公關人員華而不實的口號，谷歌也瞭解人生病的時候會稍微傾向右翼，於是據以調整。因此，谷歌投票時，根據的不是我當下瞬間的心態，也不是敘事自我的幻想，而是根據集合所有生化演算法真正的感受和興趣，而得出的結果；這一切生化演算法的集合，正是所謂的「我」。


    當然，谷歌也不見得永遠是對的，畢竟這一切都只是機率。但只要谷歌做出夠多正確的決定，人類就會將更多權力交給它。隨著時間慢慢過去，資料庫規模會逐漸成長，統計數字將會更準確，演算法將會繼續改進，決策的品質也會逐步提高。雖然這套系統永遠不可能完全認識我，也不可能完全不會出錯，但本來就沒有這種必要，只要到了谷歌系統比我自己更認識我的那一天，自由主義就會頹然崩垮。這點其實並沒有聽起來這麼困難，因為大多數人根本就沒有真正瞭解自己。


    而臉書這個谷歌的死敵，最近所委託的一項研究就指出：到了今天，如果要判斷某人的性格和性情，臉書演算法會比這個人的朋友、父母或配偶更為準確。這項研究共有86,220位志願者參與，他們都有個人的臉書帳號，並且填寫了有上百題的人格問卷。臉書演算法接著會根據受測者平常在臉書對文章、圖片、影片等等按讚的紀錄，預測這些志願參與者的回答。過去按讚的次數愈多，預測的準確度就愈高。接著，再把演算法預測的結果，與參與者的同事、朋友、家人和配偶的預測進行比較。了不起的地方在於，演算法只需要過去按讚次數超過10次，預測準確度就已經高於同事了；70個讚，預測準確度就會高於朋友；150個讚，準確度會高於家人；到了300個讚，預測準確度就會高於配偶。換句話說，如果你至今已經在臉書上按了超過300個讚，臉書就可能比你的另一半，更能預測你的想法和期望。


    事實上，臉書演算法在某些領域對人的瞭解，甚至超過那個人自己。例如臉書的研究調查，也請參與者評估自己使用成癮物質的程度、以及社交網路的規模，而在這些項目裡，參與者自己的判斷就不如演算法來得準確。該項研究最後的結論提出以下的預測（這倒是由人類作者寫的，而不是臉書的演算法所擬）：「人類如果遇到重大的人生抉擇，像是要選擇從事何種活動、職涯道路、甚至是交往對象，可以考慮放下自己心理上的判斷，而依賴電腦所做的選擇。這種資料導向的決策，有可能會讓人類的生活過得更好。」32


    至於比較邪惡的一面，同一份研究報告也暗示：在未來的美國總統大選裡，臉書不僅早就知道數千萬美國人的政治意見，還知道哪些是關鍵的搖擺選民，以及怎樣使他們搖擺。臉書會知道，共和黨和民主黨在奧克拉荷馬州的選情特別緊繃，還有32,417位選民尚未下定決心，甚至也知道每個候選人該說什麼，才能讓天平倒向自己這邊。臉書為什麼能夠得到這些有無上價值的民調資料？當然都是我們免費親手奉上的！


    在歐洲帝國主義的全盛時期，征服者和商人用彩色的珠子，就向當地人換來了整座島嶼、換來整個國家。在二十一世紀，個人資料可能是大多數人類最後一項能夠提供的最寶貴資源，但我們正親手把這些資料交給各大科技企業，好換來免費的電子郵件信箱、或是有趣的小貓影片。


    ## 從神使到代理人、再成為君主


    等到谷歌、臉書和其他演算法成為無所不知的神使（oracle，在古希臘神殿傳神諭者）之後，很有可能就會進一步演化成代理人，最後成為君主。33 為了解釋這個過程，讓我們以Waze為例。這是一個GPS導航程式，許多司機現在都會使用。Waze絕不只是地圖；它靠著數百萬用戶的不斷更新，就能得知各種塞車、事故和警車位置的資訊。因此，Waze知道怎樣讓你躲過繁忙的路段，讓你以最快的路線到達目的地。你到了某個路口，直覺要你往右、但Waze要你往左的時候，用戶遲早都會學到，自己最好相信Waze，不要相信自己的感覺。34


    乍看之下，Waze演算法應該只是神使的等級。你問問題，神使給你答覆，但最後還是由你決定。然而，如果神使開始贏得你的信任，合理的下一步驟就是讓它成為你的代理人。你只是向演算法指定一個最終目標，它就會在沒有你的監督之下，自行動作、達成目標。以Waze為例，就是你將Waze連結到自動駕駛的汽車上，並告訴Waze「走最快的路回家」或是「走風景最漂亮的路線」，又或是「走造成汙染最少的路線」。由你來發號施令，但是交給Waze來執行。


    最後，Waze可能就會成為君主。它手中握有大權，所知又遠超於你，就可能開始操縱你和其他駕駛人，形塑你們的欲望，讓你們做出顧全大局的決定。例如，假設因為Waze實在太好用，所有駕駛人都開始使用。再假設今天一號公路大塞車，而替代的二號公路車流相對順暢。如果Waze只是讓大家都知道二號公路順暢，所有駕駛人就會一窩蜂開向二號公路，最後又全塞在一起。一旦所有'
