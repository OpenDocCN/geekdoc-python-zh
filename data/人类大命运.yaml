- md: '## 科學不是萬靈丹


    突已無可避免。拉比的幸運之處，在於羅馬人為了敉平猶太戰爭（Great Jewish Revolt），於西元70年一把火燒毀了耶路撒冷及聖殿。聖殿成了斷垣頹瓦，祭司家族剎時失去了宗教權威與經濟權力基礎，甚至失去了根本的存在理由。


    以猶太教聖殿、祭司和英勇戰士為特點的傳統猶太教，從此消失於史上。取而代之的，是一個以書籍、拉比和細心學者為特點的新猶太教。學者的強項在於詮釋，而運用這種能力，他們不只能解釋為何全能的上帝允許自己的聖殿遭毀滅，還能說出一套大道理，解釋為何《聖經》故事裡的舊猶太教與當時的猶太教大不相同。5


    因此，從目前最科學的證據來看，《利未記》裡反對同性戀的看法，反映的不過是古代耶路撒冷幾個祭司和學者的偏見。雖然科學無法判斷人類究竟是否應該服從上帝的旨意，但對於《聖經》的源頭就有許多話可說。如果烏干達的政客認為，只要兩個男人在一起找了樂子，創造出宇宙、銀河和黑洞的那股力量就會因此震怒，這時科學就能派上用場，駁斥這個實在沒道理的念頭。


    事實上，要分辨倫理判斷與事實聲明，並不總是那麼容易。宗教就是有一種麻煩的傾向，喜歡將事實聲明轉化為倫理判斷，使得原本應該很簡單的爭議，變得混沌而模糊。例如，原本只該是事實聲明的「《聖經》是由上帝所著」，就常常成為倫理上的禁令：「你應該要相信《聖經》是由上帝所著」。於是，不分青紅皂白的相信某項事實聲明，就成了美德；而懷疑這項聲明，則成了罪過。


    相對的，倫理判斷之中，卻又往往隱藏著事實聲明，支持者不會特別去提，因為他們認為這早已是不證自明的事實。於是，像是「人命神聖」這種倫理判斷（無法用科學測試），裡面就可能包含著「每個人都擁有永恆的靈魂」這種事實聲明（而這是可以用科學來爭論的）。


    同樣的，美國民族主義者宣稱「美國民族是神聖的」，這種看似屬於倫理判斷的說法，實際上仍是以某些事實聲明為基礎，例如「在過去幾個世紀裡，美國帶領著大多數的科學、經濟和道德進步」。雖然我們不可能用科學來檢查究竟美國民族是否神聖，但只要拆解一下這個議題，我們就能用科學來檢查美國帶來的科學、經濟和道德進展，貢獻度是否確實如他們所宣稱。


    正因為人類的價值觀裡永遠都藏著一些事實聲明，也就讓有些哲學家，如哈里斯（Sam Harris, 1967-）等人認為，科學能夠解開一切的倫理困境。哈里斯主張，所有人的終極價值都是同一項：將痛苦最小化、快樂最大化；因此，所有的倫理爭論都是關於「如何將快樂最大化」的事實論證。⁶伊斯蘭基本教義派想上天堂，是為了快樂；自由主義者想增加人類自由，是因為這樣能得到最大的快樂；德國民族主義者也認為，如果讓柏林控制整個世界，每個人都會更快樂。哈里斯認為，伊斯蘭基本教義派、自由主義者和民族主義者之間並沒有倫理上的爭議，只是對於如何達到大家共同的目標，彼此之間出現了在事實上的意見不合。


    然而，就算哈里斯說得沒錯，所有人都重視快樂，但實際上也很難用這種觀點來平息倫理爭議，特別是「快樂」根本沒有科學上的定義或測量方法。讓我們再次以三峽大壩為例。就算我們同意，這項計畫的終極目標是讓世界成為一個更快樂的地方，可是該怎麼度量和計算，才能判定「製造出廉價電力」會比「保護傳統生活方式」或「拯救稀有的白鱀豚」更有益於全球的快樂？只要我們還無法真正理解意識，就無法為快樂和痛苦制定出通用的度量標準，也就無法比較不同人之間的快樂和痛苦，更不用說跨物種的情況了。


    十億中國人享有更廉價的電力時，會產生多少單位的快樂？整個白鱀豚物種滅絕時，又會產生多少單位的痛苦？甚至回歸根本，難道快樂和痛苦真的是可以用數學相加相減的實體嗎？吃冰淇淋很愉悅，找到真愛更令人愉悅，但難道只要有足夠的冰淇淋，累積起來的快樂就能等於找到真愛的快樂？


    因此，雖然科學在倫理爭論能發揮的作用，比一般想像要多，但仍有極限（至少目前如此）。如果沒有一些宗教元素做為引導，就不可能維持大規模的社會秩序。就算是大學和實驗室，也需要宗教的支持。宗教能為科學研究提供倫理上的理由，也因此能夠影響科學研究的議題、以及科學發現和科研成果的運用方式。


    想要真正理解科學的歷史，就不能不談宗教信仰。科學家很少會談這項事實，但科學革命的背景，也正是出於史上最教條武斷、最觀念偏狹、也最宗教狂熱的一個社會。


    ## 冤家路窄常碰頭


    我們常常認為，科學與世俗主義、寬容包容的價值觀有關。但若真是如此，絕對難以想像科學革命竟然出現在近代歐洲的初期。在哥倫布、哥白尼和牛頓的時代，歐洲的宗教狂熱者密度是全球最高，而容忍度又是全球最低。亮起科學革命這道光芒的社會，驅逐了猶太人和穆斯林、燒死了成批的異端份子、把每個愛貓的老太太都當作女巫、每次滿月都發起一場新的宗教戰爭。


    如果你在大約西元1600年前往開羅或伊斯坦堡，看到的是擁有多元文化和寬容的大都市，有遜尼派、什葉派、東正教基督徒、天主教徒、亞美尼亞人、科普特人（Copt）、猶太人、甚至偶爾還有印度教徒，足以稱得上是各教派和平共存。雖然仍有意見分歧和爭端騷亂、鄂圖曼帝國也經常出現宗教歧視，但和歐洲相比，這裡仍然是自由主義的天堂。


    如果你接著去了當時的巴黎或倫敦，看到的會是城裡充滿宗教極端主義，只有主流教派得以生存。在倫敦是天主教徒殞命，在巴黎是新教徒喪生，猶太人早遭驅逐，穆斯林更是想都別想進城。然而，科學革命卻是始於倫敦和巴黎，而非開羅或伊斯坦堡。


    講到現代性（modernity）的歷史，一般習慣將它講成是一場科學與宗教之爭。理論上，科學和宗教都是為了追求真理；而因為各自推崇不同的真理，也就注定有所衝突。但事實上，科學或宗教根本都沒那麼在乎真理，因此兩者十分容易妥協、共存，甚至合作。


    宗教最在乎的，其實是秩序。宗教的目的就是創造和維持社會結構。科學最在乎的，則是力量。科學的目的是透過研究，得到力量，以治療疾病、征討作戰、生產食物。個人而言，科學家和神職人員可能很在意真理；但整體而言，科學和宗教對真理的喜好，還不及於力量和秩序。因此，兩者一拍即合。對於真理毫不妥協的追求，其實是一種靈性之旅，宗教或科學機構之內很少得見。


    所以，對於現代歷史更準確的一種看法，其實是：科學與特定宗教（也就是人文主義）達成協議的過程。現代社會相信人文主義的教條，而科學的用途不是為了質疑這些教條，反而是為了實現。就算在二十一世紀，也不太可能有純粹的科學理論取代人文主義教條，但讓兩者目前攜手同行的契約，可能會瓦解，取而代之的是科學與其他後人文主義宗教之間、截然不同的契約。


    《人類大命運》接下來的兩章，將會談談科學與人文主義之間的現代契約。至於第三部、也是本書最後一部，將會解釋為何這項契約正在瓦解、又將由什麼新的契約取代。


    ## 第6章


    ## 與「現代」的契約


    「現代」就是一份交易契約，所有人都在出生的那天簽了契約，從此規範了我們的生活，直到死亡為止。很少有人能夠撤銷或超越這份契約，這份契約形塑了我們吃什麼、做什麼、夢想什麼，也決定了我們定居在哪裡、要愛什麼人，甚至是如何死去。


    乍看之下，這份契約非常複雜，因此很少有人會去瞭解自己究竟簽了什麼。這就像是下載某個軟體後，有一份使用同意書，裡面有幾十頁的法律語言；於是你瞄了一眼，立刻向下滾到最後一頁，勾了「我同意」，接著完全忘了這件事。但事實上，這份契約簡單到不可思議。只要一句話就能總結：人類同意放棄意義、換取力量。


    在現代之前，多數文化都相信人類是某個偉大宇宙計畫的一部分。這個計畫的設計者是某些萬能的神、又或是永恆的自然律，人類無法改變。是這個宇宙計畫讓人的生命有了意義，但同時也限制了人的力量。人類就像是舞臺上的演員，腳本讓他們所講的每個字、所掉的每滴眼淚、所做的每個手勢，都有了意義；但同時也對他們的表演設下嚴格限制。哈姆雷特不能在第一幕就殺了克勞迪烏斯（Claudius），也不可能忽然離開丹麥，跑去印度打坐冥想。莎士比亞不可能允許這種事發生。同樣的，人類也不可能永生不死、不可能免於一切疾病、不可能一切恣意妄為，這些事情就是不在腳本中。


    前現代的人放棄了力量，而相信自己的生命換得了意義。對當時的人來說，是否在戰場上英勇戰鬥、是否擁護嫡傳的國王、是否在早餐吃了禁忌的食物、甚至是否和隔壁鄰居有了姦情，都承擔著重要的意義。當然，這會帶來一些不便，但卻能讓人心裡覺得受到保護。如果發生什麼可怕的事，譬如戰爭、瘟疫或乾旱，大家還是能安慰自己說，「我們都是在一齣偉大的宇宙戲劇裡，扮演著自己的角色，這一切都是神或自然律的旨意。雖然我們不知道腳本，但可以放心，一切都有目的。就算是這場可怕的戰爭、瘟疫或乾旱，也都是在某個更偉大的計畫裡的場景。而且，我們知道這位劇作家值得信賴，故事最後一定有個美好而有意義的結局。因此就算發生了戰爭、瘟疫或乾旱，也都是為了最後的美好結局；就算現在看不到美好結局，來世總會等到的。」


    現代文化則不再相信有這種偉大的宇宙計畫存在。我們並不是活在一齣比日常生活更高位階的戲劇之中，生活沒有劇本、沒有劇作家、沒有導演、沒有製片；而且，也沒有意義！就我們目前最進步的科學所知，整個宇宙就是個「盲目而沒有目的」的過程，充滿各種雜音和憤怒，但毫無意義。我們只是在一顆行星上，占據著再小不過的一點，存在了一段再短不過的時間，如馬克白所說的那個可悲演員，在臺上得意或失意了一會，就再也悄無聲息。


    既然沒有劇本，人類也不是在什麼偉大戲劇中扮演什麼角色，雖然人類還是可能面臨各種可怕的事，但並不會有什麼神祇來拯救我們，或是讓這一切痛苦有意義。整件事不會有個快樂的結局，也不會有什麼悲慘的結局，其實根本就不會有結局。事情就是一直發生，一件接著一件串接下去。


    現代世界並不相信目的，只相信原因。如果要幫「現代」訂個座右銘，應該就會是「衰事總是會降臨」。


    但另一方面，如果說衰事就是會降臨，那也並非因為有什麼劇本或目的；因此之故，人類也不用自限於任何預定的角色，只要能找對方法，我們就能為所欲為。除了自己的無知之外，沒有什麼能限制我們。瘟疫和乾旱的背後沒有什麼宇宙計畫，我們能夠消滅它們。戰爭並不是通往美好未來的必要之惡，我們能夠帶來和平。我們死後並沒有天堂等著我們，但我們能夠在地球上就創造天堂，永遠活在天堂裡。一切只要克服一些技術困難，就行了。


    投入更多研究資金，就能促成科學突破，加速科技進展。新科技會促進經濟成長，而經濟成長又能投入更多研究資金。時間每再過個十年，我們就能享受更豐足的食物、更快速的交通工具、更有效的藥物。總有一天，我們會累積夠多的知識、夠先進的科技，終於能夠發明各種萬靈丹，讓人青春永駐、快樂幸福，而且這一切將不會有什麼神祇前來阻擋。


    於是，這份現代契約向人類提出巨大的誘惑，但也伴隨著巨大的威脅。「無所不能」似乎是伸手可得，但在我們腳下卻也有著完全虛無的深淵，隨時可讓我們跌落。就實務而言，現代生活就是在一個沒有意義的宇宙裡，不斷追求更多力量。現代文化的力量是史上最強，而且還在不停研究、發明、發現、成長。但同時，現代文化也比史上任何文化，更感受到存在性焦慮（existential
    angst）。


    本章討論現代對力量的追求，下一章則會檢視人類如何利用這種不斷成長的力量，試圖以某種方式，將意義重新帶回這個無限空虛的宇宙。沒錯，我們現代人曾經承諾要放棄意義，以換取力量；但也沒人押著我們，逼我們非得實現承諾。我們認為自己夠聰明，能夠盡享這份現代契約的好處，而無須付出代價。


    ## 從前，經濟停滯是常態


    科學進步與經濟成長攜手共進，更進一步推動了現代對力量的追求。整部人類歷史上，科學多半是以蝸速進展，經濟更是遭到深度冰封。雖然人口的緩步成長確實使生產隨之成長，而每次科學偶有發現，也有可能帶動平均每人的經濟成長，但拉大鏡頭來看，整個過程是極度緩慢的。


    如果在西元1000年，是100個村民生產了100噸小麥，到了西元1100年，可能是105個村民生產了107噸小麥，這種成長可說是有名無實，既不改變生活節奏、也不影響社會政治秩序。今天所有的人熱切追求成長，但在前現代時期，人民對此卻是毫不在意。不論王公貴族、牧師神父或農民大眾，都認為人類生產大致就是維持穩定，某人想得到更多，就只能從別人那兒偷；也認為到了孫輩的生活水準，大概也不會有何躍進。


    這種停滯現象，有一大部分原因在於很難為新計畫籌措資金。沒有足夠的資金，就很難排乾沼澤、建築橋梁、開闢港口，更別提要培育新的小麥品種、發現新的能源、或是開拓新的貿易路線。當時資金稀缺，是因為沒有什麼信用（credit）的概念；之所以沒有什麼信用，是因為人類不相信成長；而之所以不相信成長，正是因為經濟停滯不前。於是，停滯就成了個惡性循環。


    假設你是住在一座每年都會爆發痢疾的中世紀城鎮。你下定決心，一定要找到解方。於是，你需要資金成立一間工作坊，購買藥草和各種罕見的化學品，付助手薪水，還得前往遠地拜訪名醫。另外，在你全心投入研究時，還得養活自己和家人。但你自己沒什麼錢。你想去找當地的磨坊主、麵包師傅和鐵匠，拜託他們在這幾年間供應你的需求；你也向他們保證，等到你找出解方、財源滾滾，就會還債。


    很遺憾，磨坊主、麵包師傅和鐵匠不太可能同意。他們今天就得養活家人，而且對你能找到什麼靈丹妙藥，並沒有信心。他們可不是什麼三歲小孩，但從小到大，哪聽過有人能為可怕的疾病找出新藥物？想拿到食物和各種生活必需品，就得付現。但你都還沒找到這種良藥，所有時間又都投入研究，怎麼可能有錢？你只好心不甘情不願，再回田裡去耕作。於是痢疾依舊每年給城鎮帶來苦難，沒人嘗試找出新療法，也沒有任何一枚金幣換了手。就是這樣，經濟沒了活力，科學停滯不前。


    ## 銀行家與吸血蝙蝠有何不同？


    一直要到了現代，因為人們開始相信未來，促成了信貸這項奇蹟，才終於打破這個惡性循環。信貸正是信任在經濟上的表現。如今，如果我想開發新藥、但手上資金不足，我可以去向銀行貸款，或是找上私人投資或創投基金。2014年夏天，伊波拉病毒在西非爆發疫情，你猜猜那些忙著開發抗伊波拉藥物和疫苗的製藥公司，股票表現如何？股價簡直是一飛衝天。德克米拉（Tekmira）製藥公司的股價上漲五成，百歐克斯（BioCryst）更大漲九成！


    在中世紀，每當爆發瘟疫，人們只能淚眼望天，祈求上帝原諒他們的罪過。而現在，如果民眾聽說又有了什麼致命的新流行病，則是立刻拿起手機，趕快打給股票經紀商。對於證券交易所來說，流行病也是商機。


    如果有夠多人創業成功，民眾對未來的信任也就會增加。信用擴張，利率下降，企業家更容易募資，於是經濟成長。因此，民眾對未來更加信任，經濟繼續成長，科學也隨之進步。


    這件事說來容易。如果真那麼簡單，又為什麼得等到現代，經濟成長才終於啟動？幾千年來，人類之所以不相信未來會成長，不是因為前人太過愚魯，而是因為這根本違反直覺、違反演化經驗、違反世界運作的方式。自然系統多半是呈現平衡狀態，而且生存之爭又多半是零和賽局，有一方蓬勃成長，就必有另一方付出代價。


    舉例來說，在某個山谷裡，每年長出的草量都差不多。這些青草能夠養活大約一萬隻兔子，而這些兔子裡動作慢、腦袋笨或運氣差的，又差不多能養活一百隻狐狸。如果某隻狐狸特別聰明努力，吃掉的兔子比較多，就有其他狐狸可能餓死。而如果所有狐狸都忽然比以前更會抓兔子，兔群數量將會大減，但隔年就會有更多狐狸餓死。就算這個「兔子市場」偶有波動，但長遠來看，狐狸絕不會期望每年都能成長3%的獵兔量。


    當然，真正的生態系更為複雜，並非所有生存之爭都是零和賽局。許多動物能合作愉快，甚至有些還有貸款機制。自然界最著名的例子就是吸血蝙蝠。這些蝙蝠成千上萬住在洞穴裡，每天晚上飛出來找尋獵物。只要發現有鳥類睡著、或是哺乳動物心不在焉，牠們就會在獵物的皮膚上切出一個小口，吸血為食。然而，不是每隻吸血蝙蝠每天晚上都能找到受害者。為了應付這種生命裡的不確定性，吸血蝙蝠就會彼此「貸血」。沒找到獵物的吸血蝙蝠回家之後，會去找上那些運氣比較好的朋友，分一些牠們偷來的血。這些蝙蝠對於自己曾把血借給誰，記得一清二楚，所以如果哪天自己餓著肚子回家，就會去找那隻欠債的蝙蝠，討點血回來。


    不過，蝙蝠不像銀行家，牠們從不收利息。如果A蝙蝠曾讓B蝙蝠吸過 10 cc 的血，B蝙蝠還的就是 10 cc。而且蝙蝠之所以貸血，並不是為了創立什麼新的蝙蝠業務、或是促進吸血市場成長。由於所吸取的血液是由其他動物產生，蝙蝠並無法增加產量。雖然血液市場也有波動，但蝙蝠並不會假設2017年的血量會比2016年成長3%、而且到了2018年還會再漲3%。因此，蝙蝠也不相信會有成長這回事。¹


    幾百萬年以來，人類的生活條件也和吸血蝙蝠、狐狸和兔子相去不遠。於是，人類也很難相信成長的概念。


    ## 奇蹟般的大餅


    由於演化的壓力，讓人類習慣把世界看作一大塊靜態的大餅。如果有人拿走的那一小塊比較大，一定有另一個人拿到的比較小。雖然可能有某個家族或城市似乎蓬勃成長，但人類整體明天的生產量並不會超過今天。因此，像是基督教和伊斯蘭教等傳統宗教，都是希望運用現有的資源來解決人類的問題，可能是將這塊大餅重新分配，又或是承諾給一塊空中的大餅。


    相反的，「現代」則堅信：經濟成長不僅可能，還是絕對必要的！雖然祈禱、行善和冥想能帶來心靈的安慰和啟發，但想解決饑荒、瘟疫和戰爭等問題，唯一的方法就是成長。「現代」的基本教條，可以總結為一個簡單的想法：「如果有個問題要解決，可能就需要有更多東西；為了有更多東西，就得生產更多才行。」


    現代政治和現代經濟篤信成長的必要，原因有三。首先，生產愈多、能消費的就愈多，愈能提升生活水準，號稱也就能享受更快樂的生活。第二，只要人類持續繁衍成長，光是為了維持現狀，經濟成長就已經是必要的了。例如，印度的人口年增率為1.2%。也就是說，除非印度經濟每年成長至少1.2%，否則失業率就會上升，薪資將會下降，平均生活水準也會下滑。第三，就算印度的人口停止成長，中產階級也對目前的生活水準感到滿意，但那些為數仍有數億的貧困印度人民，又該怎麼辦？


    經濟不成長，整塊經濟大餅也就這麼大，想多給窮人一點，就必須從富人那裡挖來一些。這必定會造成一些非常困難的選擇，也很可能導致諸多不滿、甚或暴力相向。如果想避開這些選擇、不滿或暴力，我們就需要一塊更大的餅。


    不論是宗教的基本教義派、第三世界的獨裁主義、又或只是婚姻觸礁，在「現代」的眼中，幾乎任何公共或私人的問題，都能用「更多東西」來解決。像巴基斯坦或埃及這樣的國家，只要能維持亮眼的經濟成長率，國民也就能享受得起私家車和冰箱之類的種種好處，走著俗世幸福的道路，而不會隨著那些基本教義派起舞。同樣的，像剛果或緬甸這樣的國家，如果能有經濟成長，就能產生繁榮的中產階級，做為自由民主的基石。至於夫妻失和這種問題，只要能買棟更大的房子（不用擠在一個狹小的房間）、買臺洗碗機（不用吵著該輪到誰洗碗）、每週兩次參加昂貴的婚姻治療，據稱也就能挽回婚姻，繼續廝守下去。


    ## 成長掛帥


    於是，經濟成長就成了幾乎所有現代宗教、意識型態和運動的共通重點。例如蘇聯妄自尊大的五年計畫，對成長的迷戀絲毫不下於美洲最殘酷的剝削資本家。也正如基督徒和穆斯林都相信天堂、只是對於路徑有所異議，冷戰時期的資本主義者和共產主義者，也都相信能夠透過經濟成長在地球上創造天堂，只是對於該用什麼方法有所異議。


    今天，不論是印度教復興主義者、虔誠的穆斯林、日本民族主義者或中國共產黨員，雖然可能各自宣稱，自己有非常不同的價值觀和目標，但都同樣相信，實現這些目標的關鍵就在於經濟成長。例如，虔誠的印度教徒莫迪（Narendra
    Modi）之所以能在2014年當選印度總理，主因正是他成功促進了家鄉古吉拉特邦（Gujarat）的經濟成長，許多選民認為只有莫迪，才能讓印度低迷的經濟起死回生。類似的觀點也讓伊斯蘭教徒艾爾多安（Recep
    Tayyip Erdoğan）自2003年起，在土耳其掌權至今。他所屬的政黨名為「正義與發展黨」（JDP），正強調對經濟發展的承諾，而艾爾多安政府也確實在超過十年間，維持著令人佩服的經濟成長率。


    至於日本首相、民族主義者安倍晉三，自2012年上臺，承諾將挽救日本沉寂二十年的經濟困局，其措施大膽而不尋常，有「安倍經濟學」（Abenomics）之稱。與此同時，鄰國中國的共產黨，雖然嘴上仍推崇馬列思想，但實際作為卻是依循鄧小平的名言：「發展才是硬道理」以及「不管白貓黑貓，能抓到老鼠就是好貓」。用一般話來說，也就是：不擇手段，推動經濟成長，哪管馬克思和列寧高不高興。'
  mdcn: '## 科學不是萬靈丹


    突已無可避免。拉比的幸運之處，在於羅馬人為了敉平猶太戰爭（Great Jewish Revolt），於西元70年一把火燒毀了耶路撒冷及聖殿。聖殿成了斷垣頹瓦，祭司家族剎時失去了宗教權威與經濟權力基礎，甚至失去了根本的存在理由。


    以猶太教聖殿、祭司和英勇戰士為特點的傳統猶太教，從此消失於史上。取而代之的，是一個以書籍、拉比和細心學者為特點的新猶太教。學者的強項在於詮釋，而運用這種能力，他們不只能解釋為何全能的上帝允許自己的聖殿遭毀滅，還能說出一套大道理，解釋為何《聖經》故事裡的舊猶太教與當時的猶太教大不相同。5


    因此，從目前最科學的證據來看，《利未記》裡反對同性戀的看法，反映的不過是古代耶路撒冷幾個祭司和學者的偏見。雖然科學無法判斷人類究竟是否應該服從上帝的旨意，但對於《聖經》的源頭就有許多話可說。如果烏干達的政客認為，只要兩個男人在一起找了樂子，創造出宇宙、銀河和黑洞的那股力量就會因此震怒，這時科學就能派上用場，駁斥這個實在沒道理的念頭。


    事實上，要分辨倫理判斷與事實聲明，並不總是那麼容易。宗教就是有一種麻煩的傾向，喜歡將事實聲明轉化為倫理判斷，使得原本應該很簡單的爭議，變得混沌而模糊。例如，原本只該是事實聲明的「《聖經》是由上帝所著」，就常常成為倫理上的禁令：「你應該要相信《聖經》是由上帝所著」。於是，不分青紅皂白的相信某項事實聲明，就成了美德；而懷疑這項聲明，則成了罪過。


    相對的，倫理判斷之中，卻又往往隱藏著事實聲明，支持者不會特別去提，因為他們認為這早已是不證自明的事實。於是，像是「人命神聖」這種倫理判斷（無法用科學測試），裡面就可能包含著「每個人都擁有永恆的靈魂」這種事實聲明（而這是可以用科學來爭論的）。


    同樣的，美國民族主義者宣稱「美國民族是神聖的」，這種看似屬於倫理判斷的說法，實際上仍是以某些事實聲明為基礎，例如「在過去幾個世紀裡，美國帶領著大多數的科學、經濟和道德進步」。雖然我們不可能用科學來檢查究竟美國民族是否神聖，但只要拆解一下這個議題，我們就能用科學來檢查美國帶來的科學、經濟和道德進展，貢獻度是否確實如他們所宣稱。


    正因為人類的價值觀裡永遠都藏著一些事實聲明，也就讓有些哲學家，如哈里斯（Sam Harris, 1967-）等人認為，科學能夠解開一切的倫理困境。哈里斯主張，所有人的終極價值都是同一項：將痛苦最小化、快樂最大化；因此，所有的倫理爭論都是關於「如何將快樂最大化」的事實論證。⁶伊斯蘭基本教義派想上天堂，是為了快樂；自由主義者想增加人類自由，是因為這樣能得到最大的快樂；德國民族主義者也認為，如果讓柏林控制整個世界，每個人都會更快樂。哈里斯認為，伊斯蘭基本教義派、自由主義者和民族主義者之間並沒有倫理上的爭議，只是對於如何達到大家共同的目標，彼此之間出現了在事實上的意見不合。


    然而，就算哈里斯說得沒錯，所有人都重視快樂，但實際上也很難用這種觀點來平息倫理爭議，特別是「快樂」根本沒有科學上的定義或測量方法。讓我們再次以三峽大壩為例。就算我們同意，這項計畫的終極目標是讓世界成為一個更快樂的地方，可是該怎麼度量和計算，才能判定「製造出廉價電力」會比「保護傳統生活方式」或「拯救稀有的白鱀豚」更有益於全球的快樂？只要我們還無法真正理解意識，就無法為快樂和痛苦制定出通用的度量標準，也就無法比較不同人之間的快樂和痛苦，更不用說跨物種的情況了。


    十億中國人享有更廉價的電力時，會產生多少單位的快樂？整個白鱀豚物種滅絕時，又會產生多少單位的痛苦？甚至回歸根本，難道快樂和痛苦真的是可以用數學相加相減的實體嗎？吃冰淇淋很愉悅，找到真愛更令人愉悅，但難道只要有足夠的冰淇淋，累積起來的快樂就能等於找到真愛的快樂？


    因此，雖然科學在倫理爭論能發揮的作用，比一般想像要多，但仍有極限（至少目前如此）。如果沒有一些宗教元素做為引導，就不可能維持大規模的社會秩序。就算是大學和實驗室，也需要宗教的支持。宗教能為科學研究提供倫理上的理由，也因此能夠影響科學研究的議題、以及科學發現和科研成果的運用方式。


    想要真正理解科學的歷史，就不能不談宗教信仰。科學家很少會談這項事實，但科學革命的背景，也正是出於史上最教條武斷、最觀念偏狹、也最宗教狂熱的一個社會。


    ## 冤家路窄常碰頭


    我們常常認為，科學與世俗主義、寬容包容的價值觀有關。但若真是如此，絕對難以想像科學革命竟然出現在近代歐洲的初期。在哥倫布、哥白尼和牛頓的時代，歐洲的宗教狂熱者密度是全球最高，而容忍度又是全球最低。亮起科學革命這道光芒的社會，驅逐了猶太人和穆斯林、燒死了成批的異端份子、把每個愛貓的老太太都當作女巫、每次滿月都發起一場新的宗教戰爭。


    如果你在大約西元1600年前往開羅或伊斯坦堡，看到的是擁有多元文化和寬容的大都市，有遜尼派、什葉派、東正教基督徒、天主教徒、亞美尼亞人、科普特人（Copt）、猶太人、甚至偶爾還有印度教徒，足以稱得上是各教派和平共存。雖然仍有意見分歧和爭端騷亂、鄂圖曼帝國也經常出現宗教歧視，但和歐洲相比，這裡仍然是自由主義的天堂。


    如果你接著去了當時的巴黎或倫敦，看到的會是城裡充滿宗教極端主義，只有主流教派得以生存。在倫敦是天主教徒殞命，在巴黎是新教徒喪生，猶太人早遭驅逐，穆斯林更是想都別想進城。然而，科學革命卻是始於倫敦和巴黎，而非開羅或伊斯坦堡。


    講到現代性（modernity）的歷史，一般習慣將它講成是一場科學與宗教之爭。理論上，科學和宗教都是為了追求真理；而因為各自推崇不同的真理，也就注定有所衝突。但事實上，科學或宗教根本都沒那麼在乎真理，因此兩者十分容易妥協、共存，甚至合作。


    宗教最在乎的，其實是秩序。宗教的目的就是創造和維持社會結構。科學最在乎的，則是力量。科學的目的是透過研究，得到力量，以治療疾病、征討作戰、生產食物。個人而言，科學家和神職人員可能很在意真理；但整體而言，科學和宗教對真理的喜好，還不及於力量和秩序。因此，兩者一拍即合。對於真理毫不妥協的追求，其實是一種靈性之旅，宗教或科學機構之內很少得見。


    所以，對於現代歷史更準確的一種看法，其實是：科學與特定宗教（也就是人文主義）達成協議的過程。現代社會相信人文主義的教條，而科學的用途不是為了質疑這些教條，反而是為了實現。就算在二十一世紀，也不太可能有純粹的科學理論取代人文主義教條，但讓兩者目前攜手同行的契約，可能會瓦解，取而代之的是科學與其他後人文主義宗教之間、截然不同的契約。


    《人類大命運》接下來的兩章，將會談談科學與人文主義之間的現代契約。至於第三部、也是本書最後一部，將會解釋為何這項契約正在瓦解、又將由什麼新的契約取代。


    ## 第6章


    ## 與「現代」的契約


    「現代」就是一份交易契約，所有人都在出生的那天簽了契約，從此規範了我們的生活，直到死亡為止。很少有人能夠撤銷或超越這份契約，這份契約形塑了我們吃什麼、做什麼、夢想什麼，也決定了我們定居在哪裡、要愛什麼人，甚至是如何死去。


    乍看之下，這份契約非常複雜，因此很少有人會去瞭解自己究竟簽了什麼。這就像是下載某個軟體後，有一份使用同意書，裡面有幾十頁的法律語言；於是你瞄了一眼，立刻向下滾到最後一頁，勾了「我同意」，接著完全忘了這件事。但事實上，這份契約簡單到不可思議。只要一句話就能總結：人類同意放棄意義、換取力量。


    在現代之前，多數文化都相信人類是某個偉大宇宙計畫的一部分。這個計畫的設計者是某些萬能的神、又或是永恆的自然律，人類無法改變。是這個宇宙計畫讓人的生命有了意義，但同時也限制了人的力量。人類就像是舞臺上的演員，腳本讓他們所講的每個字、所掉的每滴眼淚、所做的每個手勢，都有了意義；但同時也對他們的表演設下嚴格限制。哈姆雷特不能在第一幕就殺了克勞迪烏斯（Claudius），也不可能忽然離開丹麥，跑去印度打坐冥想。莎士比亞不可能允許這種事發生。同樣的，人類也不可能永生不死、不可能免於一切疾病、不可能一切恣意妄為，這些事情就是不在腳本中。


    前現代的人放棄了力量，而相信自己的生命換得了意義。對當時的人來說，是否在戰場上英勇戰鬥、是否擁護嫡傳的國王、是否在早餐吃了禁忌的食物、甚至是否和隔壁鄰居有了姦情，都承擔著重要的意義。當然，這會帶來一些不便，但卻能讓人心裡覺得受到保護。如果發生什麼可怕的事，譬如戰爭、瘟疫或乾旱，大家還是能安慰自己說，「我們都是在一齣偉大的宇宙戲劇裡，扮演著自己的角色，這一切都是神或自然律的旨意。雖然我們不知道腳本，但可以放心，一切都有目的。就算是這場可怕的戰爭、瘟疫或乾旱，也都是在某個更偉大的計畫裡的場景。而且，我們知道這位劇作家值得信賴，故事最後一定有個美好而有意義的結局。因此就算發生了戰爭、瘟疫或乾旱，也都是為了最後的美好結局；就算現在看不到美好結局，來世總會等到的。」


    現代文化則不再相信有這種偉大的宇宙計畫存在。我們並不是活在一齣比日常生活更高位階的戲劇之中，生活沒有劇本、沒有劇作家、沒有導演、沒有製片；而且，也沒有意義！就我們目前最進步的科學所知，整個宇宙就是個「盲目而沒有目的」的過程，充滿各種雜音和憤怒，但毫無意義。我們只是在一顆行星上，占據著再小不過的一點，存在了一段再短不過的時間，如馬克白所說的那個可悲演員，在臺上得意或失意了一會，就再也悄無聲息。


    既然沒有劇本，人類也不是在什麼偉大戲劇中扮演什麼角色，雖然人類還是可能面臨各種可怕的事，但並不會有什麼神祇來拯救我們，或是讓這一切痛苦有意義。整件事不會有個快樂的結局，也不會有什麼悲慘的結局，其實根本就不會有結局。事情就是一直發生，一件接著一件串接下去。


    現代世界並不相信目的，只相信原因。如果要幫「現代」訂個座右銘，應該就會是「衰事總是會降臨」。


    但另一方面，如果說衰事就是會降臨，那也並非因為有什麼劇本或目的；因此之故，人類也不用自限於任何預定的角色，只要能找對方法，我們就能為所欲為。除了自己的無知之外，沒有什麼能限制我們。瘟疫和乾旱的背後沒有什麼宇宙計畫，我們能夠消滅它們。戰爭並不是通往美好未來的必要之惡，我們能夠帶來和平。我們死後並沒有天堂等著我們，但我們能夠在地球上就創造天堂，永遠活在天堂裡。一切只要克服一些技術困難，就行了。


    投入更多研究資金，就能促成科學突破，加速科技進展。新科技會促進經濟成長，而經濟成長又能投入更多研究資金。時間每再過個十年，我們就能享受更豐足的食物、更快速的交通工具、更有效的藥物。總有一天，我們會累積夠多的知識、夠先進的科技，終於能夠發明各種萬靈丹，讓人青春永駐、快樂幸福，而且這一切將不會有什麼神祇前來阻擋。


    於是，這份現代契約向人類提出巨大的誘惑，但也伴隨著巨大的威脅。「無所不能」似乎是伸手可得，但在我們腳下卻也有著完全虛無的深淵，隨時可讓我們跌落。就實務而言，現代生活就是在一個沒有意義的宇宙裡，不斷追求更多力量。現代文化的力量是史上最強，而且還在不停研究、發明、發現、成長。但同時，現代文化也比史上任何文化，更感受到存在性焦慮（existential
    angst）。


    本章討論現代對力量的追求，下一章則會檢視人類如何利用這種不斷成長的力量，試圖以某種方式，將意義重新帶回這個無限空虛的宇宙。沒錯，我們現代人曾經承諾要放棄意義，以換取力量；但也沒人押著我們，逼我們非得實現承諾。我們認為自己夠聰明，能夠盡享這份現代契約的好處，而無須付出代價。


    ## 從前，經濟停滯是常態


    科學進步與經濟成長攜手共進，更進一步推動了現代對力量的追求。整部人類歷史上，科學多半是以蝸速進展，經濟更是遭到深度冰封。雖然人口的緩步成長確實使生產隨之成長，而每次科學偶有發現，也有可能帶動平均每人的經濟成長，但拉大鏡頭來看，整個過程是極度緩慢的。


    如果在西元1000年，是100個村民生產了100噸小麥，到了西元1100年，可能是105個村民生產了107噸小麥，這種成長可說是有名無實，既不改變生活節奏、也不影響社會政治秩序。今天所有的人熱切追求成長，但在前現代時期，人民對此卻是毫不在意。不論王公貴族、牧師神父或農民大眾，都認為人類生產大致就是維持穩定，某人想得到更多，就只能從別人那兒偷；也認為到了孫輩的生活水準，大概也不會有何躍進。


    這種停滯現象，有一大部分原因在於很難為新計畫籌措資金。沒有足夠的資金，就很難排乾沼澤、建築橋梁、開闢港口，更別提要培育新的小麥品種、發現新的能源、或是開拓新的貿易路線。當時資金稀缺，是因為沒有什麼信用（credit）的概念；之所以沒有什麼信用，是因為人類不相信成長；而之所以不相信成長，正是因為經濟停滯不前。於是，停滯就成了個惡性循環。


    假設你是住在一座每年都會爆發痢疾的中世紀城鎮。你下定決心，一定要找到解方。於是，你需要資金成立一間工作坊，購買藥草和各種罕見的化學品，付助手薪水，還得前往遠地拜訪名醫。另外，在你全心投入研究時，還得養活自己和家人。但你自己沒什麼錢。你想去找當地的磨坊主、麵包師傅和鐵匠，拜託他們在這幾年間供應你的需求；你也向他們保證，等到你找出解方、財源滾滾，就會還債。


    很遺憾，磨坊主、麵包師傅和鐵匠不太可能同意。他們今天就得養活家人，而且對你能找到什麼靈丹妙藥，並沒有信心。他們可不是什麼三歲小孩，但從小到大，哪聽過有人能為可怕的疾病找出新藥物？想拿到食物和各種生活必需品，就得付現。但你都還沒找到這種良藥，所有時間又都投入研究，怎麼可能有錢？你只好心不甘情不願，再回田裡去耕作。於是痢疾依舊每年給城鎮帶來苦難，沒人嘗試找出新療法，也沒有任何一枚金幣換了手。就是這樣，經濟沒了活力，科學停滯不前。


    ## 銀行家與吸血蝙蝠有何不同？


    一直要到了現代，因為人們開始相信未來，促成了信貸這項奇蹟，才終於打破這個惡性循環。信貸正是信任在經濟上的表現。如今，如果我想開發新藥、但手上資金不足，我可以去向銀行貸款，或是找上私人投資或創投基金。2014年夏天，伊波拉病毒在西非爆發疫情，你猜猜那些忙著開發抗伊波拉藥物和疫苗的製藥公司，股票表現如何？股價簡直是一飛衝天。德克米拉（Tekmira）製藥公司的股價上漲五成，百歐克斯（BioCryst）更大漲九成！


    在中世紀，每當爆發瘟疫，人們只能淚眼望天，祈求上帝原諒他們的罪過。而現在，如果民眾聽說又有了什麼致命的新流行病，則是立刻拿起手機，趕快打給股票經紀商。對於證券交易所來說，流行病也是商機。


    如果有夠多人創業成功，民眾對未來的信任也就會增加。信用擴張，利率下降，企業家更容易募資，於是經濟成長。因此，民眾對未來更加信任，經濟繼續成長，科學也隨之進步。


    這件事說來容易。如果真那麼簡單，又為什麼得等到現代，經濟成長才終於啟動？幾千年來，人類之所以不相信未來會成長，不是因為前人太過愚魯，而是因為這根本違反直覺、違反演化經驗、違反世界運作的方式。自然系統多半是呈現平衡狀態，而且生存之爭又多半是零和賽局，有一方蓬勃成長，就必有另一方付出代價。


    舉例來說，在某個山谷裡，每年長出的草量都差不多。這些青草能夠養活大約一萬隻兔子，而這些兔子裡動作慢、腦袋笨或運氣差的，又差不多能養活一百隻狐狸。如果某隻狐狸特別聰明努力，吃掉的兔子比較多，就有其他狐狸可能餓死。而如果所有狐狸都忽然比以前更會抓兔子，兔群數量將會大減，但隔年就會有更多狐狸餓死。就算這個「兔子市場」偶有波動，但長遠來看，狐狸絕不會期望每年都能成長3%的獵兔量。


    當然，真正的生態系更為複雜，並非所有生存之爭都是零和賽局。許多動物能合作愉快，甚至有些還有貸款機制。自然界最著名的例子就是吸血蝙蝠。這些蝙蝠成千上萬住在洞穴裡，每天晚上飛出來找尋獵物。只要發現有鳥類睡著、或是哺乳動物心不在焉，牠們就會在獵物的皮膚上切出一個小口，吸血為食。然而，不是每隻吸血蝙蝠每天晚上都能找到受害者。為了應付這種生命裡的不確定性，吸血蝙蝠就會彼此「貸血」。沒找到獵物的吸血蝙蝠回家之後，會去找上那些運氣比較好的朋友，分一些牠們偷來的血。這些蝙蝠對於自己曾把血借給誰，記得一清二楚，所以如果哪天自己餓著肚子回家，就會去找那隻欠債的蝙蝠，討點血回來。


    不過，蝙蝠不像銀行家，牠們從不收利息。如果A蝙蝠曾讓B蝙蝠吸過 10 cc 的血，B蝙蝠還的就是 10 cc。而且蝙蝠之所以貸血，並不是為了創立什麼新的蝙蝠業務、或是促進吸血市場成長。由於所吸取的血液是由其他動物產生，蝙蝠並無法增加產量。雖然血液市場也有波動，但蝙蝠並不會假設2017年的血量會比2016年成長3%、而且到了2018年還會再漲3%。因此，蝙蝠也不相信會有成長這回事。¹


    幾百萬年以來，人類的生活條件也和吸血蝙蝠、狐狸和兔子相去不遠。於是，人類也很難相信成長的概念。


    ## 奇蹟般的大餅


    由於演化的壓力，讓人類習慣把世界看作一大塊靜態的大餅。如果有人拿走的那一小塊比較大，一定有另一個人拿到的比較小。雖然可能有某個家族或城市似乎蓬勃成長，但人類整體明天的生產量並不會超過今天。因此，像是基督教和伊斯蘭教等傳統宗教，都是希望運用現有的資源來解決人類的問題，可能是將這塊大餅重新分配，又或是承諾給一塊空中的大餅。


    相反的，「現代」則堅信：經濟成長不僅可能，還是絕對必要的！雖然祈禱、行善和冥想能帶來心靈的安慰和啟發，但想解決饑荒、瘟疫和戰爭等問題，唯一的方法就是成長。「現代」的基本教條，可以總結為一個簡單的想法：「如果有個問題要解決，可能就需要有更多東西；為了有更多東西，就得生產更多才行。」


    現代政治和現代經濟篤信成長的必要，原因有三。首先，生產愈多、能消費的就愈多，愈能提升生活水準，號稱也就能享受更快樂的生活。第二，只要人類持續繁衍成長，光是為了維持現狀，經濟成長就已經是必要的了。例如，印度的人口年增率為1.2%。也就是說，除非印度經濟每年成長至少1.2%，否則失業率就會上升，薪資將會下降，平均生活水準也會下滑。第三，就算印度的人口停止成長，中產階級也對目前的生活水準感到滿意，但那些為數仍有數億的貧困印度人民，又該怎麼辦？


    經濟不成長，整塊經濟大餅也就這麼大，想多給窮人一點，就必須從富人那裡挖來一些。這必定會造成一些非常困難的選擇，也很可能導致諸多不滿、甚或暴力相向。如果想避開這些選擇、不滿或暴力，我們就需要一塊更大的餅。


    不論是宗教的基本教義派、第三世界的獨裁主義、又或只是婚姻觸礁，在「現代」的眼中，幾乎任何公共或私人的問題，都能用「更多東西」來解決。像巴基斯坦或埃及這樣的國家，只要能維持亮眼的經濟成長率，國民也就能享受得起私家車和冰箱之類的種種好處，走著俗世幸福的道路，而不會隨著那些基本教義派起舞。同樣的，像剛果或緬甸這樣的國家，如果能有經濟成長，就能產生繁榮的中產階級，做為自由民主的基石。至於夫妻失和這種問題，只要能買棟更大的房子（不用擠在一個狹小的房間）、買臺洗碗機（不用吵著該輪到誰洗碗）、每週兩次參加昂貴的婚姻治療，據稱也就能挽回婚姻，繼續廝守下去。


    ## 成長掛帥


    於是，經濟成長就成了幾乎所有現代宗教、意識型態和運動的共通重點。例如蘇聯妄自尊大的五年計畫，對成長的迷戀絲毫不下於美洲最殘酷的剝削資本家。也正如基督徒和穆斯林都相信天堂、只是對於路徑有所異議，冷戰時期的資本主義者和共產主義者，也都相信能夠透過經濟成長在地球上創造天堂，只是對於該用什麼方法有所異議。


    今天，不論是印度教復興主義者、虔誠的穆斯林、日本民族主義者或中國共產黨員，雖然可能各自宣稱，自己有非常不同的價值觀和目標，但都同樣相信，實現這些目標的關鍵就在於經濟成長。例如，虔誠的印度教徒莫迪（Narendra
    Modi）之所以能在2014年當選印度總理，主因正是他成功促進了家鄉古吉拉特邦（Gujarat）的經濟成長，許多選民認為只有莫迪，才能讓印度低迷的經濟起死回生。類似的觀點也讓伊斯蘭教徒艾爾多安（Recep
    Tayyip Erdoğan）自2003年起，在土耳其掌權至今。他所屬的政黨名為「正義與發展黨」（JDP），正強調對經濟發展的承諾，而艾爾多安政府也確實在超過十年間，維持著令人佩服的經濟成長率。


    至於日本首相、民族主義者安倍晉三，自2012年上臺，承諾將挽救日本沉寂二十年的經濟困局，其措施大膽而不尋常，有「安倍經濟學」（Abenomics）之稱。與此同時，鄰國中國的共產黨，雖然嘴上仍推崇馬列思想，但實際作為卻是依循鄧小平的名言：「發展才是硬道理」以及「不管白貓黑貓，能抓到老鼠就是好貓」。用一般話來說，也就是：不擇手段，推動經濟成長，哪管馬克思和列寧高不高興。'
