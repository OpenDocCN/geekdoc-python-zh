    # 快閃崩盤事件


    股票交易員同樣陷入這種危險。現在大多數的金融交易都已經透過演算法來管理，只要一秒，能處理的資料量就比個人花上一年處理的資料量更大，而且也只要花上一眨眼的時間就能做出反應。2013年4月23日，敘利亞駭客入侵美聯社官方推特帳戶。當天13點07分，他們發出推文，指稱白宮遭到攻擊、歐巴馬總統受傷。各個持續監控所有新聞媒體的交易演算法，瞬間開始反應，瘋狂出售股票。道瓊指數如同自由落體，短短六十秒，大跌了一百五十點，相當於有一千三百六十億美元瞬間蒸發！三分鐘後的13點10分，美聯社發出澄清，表示該推文並非事實。於是演算法開始倒車，到了13點13分，道瓊指數幾乎已經完全回升。


    再三年前，2010年5月6日，紐約證券交易所還有過更劇烈的震盪。從14點42分到14點47分這不過五分鐘的時間，道瓊指數狂跌一千點，一兆美元煙消雲散。但接下來，只花了稍微超過三分鐘，指數同樣回到了狂跌前的水準。


    把我們的錢交給超高速電腦程式來操作，就是會發生這種事。這次的事件稱為「快閃崩盤」（Flash Crash），而專家還在努力研究一切究竟是怎麼回事。他們知道一定是演算法出了問題，但卻無法確認是錯在哪裡。'
