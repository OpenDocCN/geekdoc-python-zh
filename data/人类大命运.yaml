    # 第8章 實驗室裡的定時炸彈


    晶片，希望能治療患了「創傷後壓力症」的士兵。⁴在耶路撒冷的哈達薩醫院（Hadassah hospital），醫師為躁鬱症處於急性鬱期的病人，用了一種創新療法。他們將電極植入病人大腦，並連接到植入病人胸部的微型電腦。每次從電腦得到命令，電極就會放出一道微弱的電流，使造成憂鬱的大腦區域麻痺。這種療法並非萬無一失，但有部分病患就表示，那些一直折磨他們的空虛和黑暗，就好像變魔法一樣消失無蹤。


    曾有一位病人抱怨症狀在術後幾個月復發，讓他整個人陷入嚴重憂鬱。但經過檢查，醫師發現了問題根源：電腦的電池沒電了。他們一換了電池，憂鬱也就煙消雲散。⁵


    這種療法顯然有其倫理限制，研究人員只能在某些特殊病例，才能將電極植入人腦，其他人體實驗多半還是使用非侵入性的頭盔裝置——技術上稱為「經顱直流電刺激器」（transcranial
    direct-current stimulator）。這種頭盔配有電極，連接頭皮外側，能夠產生弱電磁場，瞄準特定大腦區域，進而刺激或抑制所選定的大腦活動。


    美國軍方正在測試這種頭盔，希望能提升士兵在訓練或實戰時的專注力和表現。主要實驗由位於俄亥俄州空軍基地的人類效能指揮部（Human Effectiveness
    Directorate）進行。目前距離能下定論還很遠，而且經顱刺激器的效用還是名過於實，但有幾項研究指出，像是無人機操作員、空中交通管制員、狙擊手等等需要長期保持高度專注的職務，都能夠透過這種方式，提升認知能力。⁶


