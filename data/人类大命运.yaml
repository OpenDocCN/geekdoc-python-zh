    # 共產主義也是宗教


    自由主義者、共產主義者、或其他現代信仰的追隨者，並不喜歡自己相信的系統被稱為「宗教」，原因就在於他們總覺得宗教就是迷信、相信超自然的力量。如果你告訴共產主義者或自由主義者，說他們是宗教信徒，他們可能會覺得你在罵他們、說他們是盲目相信著白日夢。但事實上，說他們信仰的主義也是一種宗教，這只意味著他們也相信某些道德法則系統，認為這些法則雖然不是人類所發明，但人類仍然需要遵守。


    據我們所知，所有人類社會都有此類信仰。每個社會都會告訴成員，他們必須服從一些高於一般人的道德法則，而如果違反這些法則，就會導致災難。


    當然，不同的宗教就會有不同的故事細節、不同的誡命、以及不同的獎懲。像是在中世紀歐洲，天主教的教會就認為上帝不喜歡富人。耶穌曾說，駱駝穿過針的眼，比財主進神的國還容易。而為了讓富人也能進入神的國，教會鼓勵他們要多多奉獻，並且威脅說「否則就等著在地獄裡燃燒」。現代共產主義也不喜歡富人，但威脅的方式卻不是說「等著死後被地獄之火焚燒」，而是說現在就會產生階級衝突。共產主義所說的「歷史規律」，其實就像是基督教上帝的誡命，都代表著高於一般人的力量，無法透過人類意志加以改變。人類可以決定明天上午的足球賽不要管越位規則，因為是人類發明了那條規定，當然也就能夠任意改變。但至少就馬克思看來，歷史規律並非人力所能改變。不管資本家做什麼，只要他們繼續累積私人財富，就必然造成階級衝突，也就注定會被無產階級站起來推翻。'
  - '[PAGE 209]


    如果你碰巧是個共產主義人士，可能會認為共產主義和基督教當然大不相同，因為共產主義是對的、而基督教義是錯的。資本主義制度本身就是帶有階級衝突，但是富人可不會在死後落入地獄、遭受永恆的折磨。不過，即使共產主義是對的，也不代表共產主義就不是一種宗教，反而證明共產主義就是個真金實銀的宗教。不論任何宗教的追隨者，都相信只有自己的宗教才是真實的。而或許，真有一種宗教是對的？


    # 如果你遇見佛陀


    我們說宗教是一種工具，用來維護社會秩序、組織人類進行大規模合作，這種說法可能讓某些人感到惱怒，因為對他們來說，宗教最重要的，就是代表一條通往靈性的途徑。然而，一方面宗教和科學的差距比我們一般認為的更小，另一方面，宗教和靈性的差距卻比想像的更大。宗教就是一份契約，而靈性卻是一趟旅程。


    宗教對世界提出一套完整的描述，並且提供一份定義清晰的契約，載明各項預定目標。「上帝存在。祂告訴我們該遵守某些作為。如果你服從上帝，你就能進天國。如果你不服從祂，你就會在地獄燃燒。」正是因為這類契約寫得清清楚楚，才讓社會得以訂出各種共同的規範和價值觀，約束人類的行為。


    但靈性之旅就不是這麼一回事了。這通常都是以神祕的方式，要把人帶向未知的目的地。旅程的一開始，通常都是某些大哉問，例如：我是誰？生命的意義是什麼？什麼是善？在大多數人欣然接受由當權者提供的現成答案時，真正的靈性追求者可不會那麼容易滿足。他們會下定決心，追尋著某一個大哉問，不論要追到何方，'
  - '[PAGE 210]


    也不僅僅是前往熟悉或願意前往的去處。


    因此，對大多數學者來說，做學術研究也是一份契約，而不是一趟靈性之旅，因為做學術研究也就是把我們帶往前人、政府和銀行所認同的預定目的罷了，這就像大學生說「我要讀個四年，通過所有考試，拿到大學畢業證書，找份薪水夠好的工作。」但如果你到了半路碰上某些大哉問，將你轉向某個預料之外、起初絲毫沒想過的目的地，學術研究也可能忽然變成一趟靈性之旅。舉例來說，某個學生可能一開始主修經濟學，想找份華爾街的賺錢工作；學著學著，卻不知怎的，最後進了印度教的修行所、或是到了辛巴威去幫助愛滋病毒帶原者，我們就可以說這是一趟靈性之旅了。


    為什麼說這樣的過程有「靈性」？這是來自古代二元論宗教的遺緒。二元論相信有兩個神，一善一惡，善神創造了純潔而永恆的靈魂，住在一個充滿靈性而幸福的世界；惡神（有時稱為撒旦）則創造了另一個由物質和物慾構成的世界。撒旦不知道怎樣才能讓自己創造的事物永續，因此在物質和物慾的世界裡，一切終將腐敗瓦解。而為了將祂所創出的瑕疵品賦予生命，撒旦就會誘惑來自純潔靈性世界的靈魂，再將靈魂關在物質構成的身體裡。這就成了人：一個美好而有靈性的靈魂，被困在邪惡的臭皮囊裡。由於靈魂的監獄（也就是身體）會衰老死亡，撒旦就必須不斷用各種肉體的歡愉來誘惑靈魂，其中最重要的就是食物、性和權力。等到這身臭皮囊終於回歸塵土、讓靈魂有機會逃回靈性世界，對肉體歡愉的渴望就會誘惑它再次回到另一具臭皮囊裡。於是，靈魂就這樣從一具臭皮囊轉移到另一具臭皮囊裡，虛耗光陰，追求食物、性和權力。


    二元論告誡人們要打破這些物質枷鎖，踏上回歸靈性世界的旅程——我們對靈性世界完全陌生，但那才是我們真正的家。在這趟'
  - '[PAGE 211]


    旅程中，我們必須拒絕所有物質上的誘惑和契約。出於這種二元論的背景，只要是在旅程中質疑著各種俗世的習慣和契約、前往未知的目的地，我們都會稱為「靈性」之旅。


    這種旅程與宗教有根本的差異，因為宗教是要鞏固世俗秩序，但靈性之旅反而是要逃離世俗秩序。通常，靈性之旅的流浪者最重要的義務之一，就是要挑戰各大宗教的信仰和慣例。禪宗佛教就曾說「逢佛殺佛」，講的是在靈性的道路上，如果發現佛教已經落入制式、僵化、固定，就必須連這些一起擺脫。


    對宗教來說，靈性是個危險的威脅。宗教通常會努力避免信眾踏上靈性的追求之旅，而許多宗教系統所面對的挑戰，也不是來自那些追求食物、性和權力的普通人，而是來自那些追求靈性和真實、無法用陳腔爛調打發的人。正因如此，推動新教徒反抗天主教教會權威的，並非抱持享樂主義的無神論者，而是一位虔誠而苦修的修士：馬丁·路德（Martin
    Luther, 1483-1546）。路德對於生命有許多存在主義的疑惑，希望得到解答，而且他拒絕接受教會用各種儀禮、儀式和契約提出的答案。


    當時，教會向信眾提出一些非常誘人的契約交易。如果你犯了罪，擔心死後受到永恆的詛咒，該做的就只是打開錢包、買張贖罪券。十六世紀初，教會還雇用了專業的「贖罪券販子」，來去於歐洲各個城鎮村莊，定價販售贖罪券。想要一張進入天堂的簽證嗎？十枚金幣。想讓已過世的爺爺奶奶一起上天堂嗎？沒問題，但得要三十枚金幣。在販子當中，最著名的就是道明會的修士約翰尼斯·帖次勒（Johannes
    Tetzel），據傳有句名言：「銀錢叮噹落銀庫，靈魂立即出煉獄。」¹'
  - '[PAGE 212]


