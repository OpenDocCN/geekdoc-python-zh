    ## 長生不死之夢


    絕大多數科學家、醫師和學者，並不會說自己正努力達成讓人長生不死的夢想，只會說自己正在努力克服這個或那個特定問題。但因為衰老和死亡也只不過就是許多特定問題的總和結果，醫師和科學家可不會哪天忽然停手，宣布：「到此為止，不要再研究了。我們已經解決了肺結核和癌症，但不打算處理阿茲海默症。大家就繼續因為阿茲海默症而去世吧。」〈世界人權宣言〉可不是說人類「有權享有生命，直到九十歲為止」，而是說「人人有權享有生命」，沒有附帶條件、沒有任何到期日的限制。


    雖是少數，但已有愈來愈多科學家和思想家公開表示，現代科學的中心任務就是要戰勝死亡，賦予人類永恆的青春。著名的人物包括老年病學家德格瑞（Aubrey de Grey）、以及身兼博學家和發明家身分的庫茲威爾（Ray
    Kurzweil，曾獲頒1999年美國科技創新國家獎章）。2012年，庫茲威爾獲谷歌（Google）任命為工程總監，一年後谷歌成立子公司Calico，明定公司使命就是要「解決死亡」。27


    2009年，谷歌任命真心相信人能長生不死的馬里斯（Bill Maris）擔任創投公司谷歌風投（Google Ventures）的執行長。2015年1月接受採訪時，馬里斯說：「如果你今天問我，人是否有可能活到五百歲，我的答案是肯定的。」馬里斯這番豪語的背後，是大批金彈支援。谷歌風投的總投資金額高達二十億美元，其中36%將投入生技新創公司，也包括幾項深具雄心的壽命延長計畫。馬里斯用美式足球打比方，解釋這場與死亡的對決：「我們不只要挺進幾碼，而且要贏下這場比賽。」為什麼？馬里斯說：「因為活著總比死好啊。」28


    許多矽谷巨擘，都抱持這樣的大夢想。PayPal共同創辦人泰爾（Peter Thiel）最近就承認，他希望永遠活下去。他解釋道：「我認為，處理方式大概有三種：接受死亡、拒絕死亡、或是對抗死亡。我覺得社會上大多數人不是拒絕就是接受，而我寧願和它對抗。」很多人可能對此嗤之以鼻，以為這是不成熟的幻想。但泰爾可不是什麼可以小看的人物，他是矽谷頂尖的成功創業家，影響力驚人，光是私人財富估計就有二十二億美元。29我們已經可以感受風雨欲來之勢：人類不再平等，不死就在眼前。


    某些領域的進展飛快，例如基因工程、再生醫學和奈米科技，也讓預言愈來愈趨向樂觀。有專家認為，人類到了2200年就能打敗死亡，也有人認為是2100年。庫茲威爾和德格瑞甚至更為樂觀，他們認為到了2050年，只要身體健康，鈔票也夠多，都可以大約每十年騙過死神一次，藉此達到長生不死。他們所想的方式是：我們大約十年接受一次全面治療，除了醫治疾病，也讓衰老的組織再生，並讓手、眼、腦都得到升級。而在下次治療之前，醫師又會發明各種更新的藥、更高級的技術和工具。如果庫茲威爾和德格瑞講得沒錯，很可能已經有些像這樣的不死人，就走在你身邊的路上——尤其是你剛好走在華爾街或第五大道的時候。


    事實上，他們只是達到「長生」（a-mortal），而不是真正「不死」（immortal）。這些未來的人類並不像神絕對不死，他們仍然可能死於戰爭或意外，而且無法起死回生；只不過，他們也不像我們這些凡人終有一死，他們的生命並不會有到期日。只要沒有炸彈把他們炸個粉碎、沒有卡車把他們輾成肉醬，就能永生。這樣一來，可能會讓他們成為歷史上最焦慮的一群人。凡人知道生也有涯，因此願意冒險體驗人生，像是登上喜馬拉雅山或泳渡怒海，又或是走過街道、上餐廳吃吃飯，這些事或多或少也算相當危險。但如果你相信自己可以永遠活下去，像這樣不時賭上一把，可能就太不智了。


    這麼說來，或許我們先把目標訂得溫和點，別追求長生，先把壽命加倍如何？在二十世紀，人類的預期壽命已從四十歲增加到七十歲，幾乎翻了一倍，所以在二十一世紀，至少應該可以再翻倍到一百五十歲吧。雖然這和「不死」還遠遠差了一截，但仍然會讓人類社會翻天覆地。


    首先，家庭結構、婚姻和親子關係，就將大為改觀。現在人們對結婚的期許仍然是「至死不渝」，而生命有一大部分是用來養育後代。想像一下，如果人能活一百五十歲是什麼概念。就算四十歲才結婚，後面仍然有一百一十年可活。希望這段婚姻能持續一百一十年，這個想法實際嗎？就算是天主教教義派也可能得猶豫猶豫。所以像現在多次結婚的情形，可能會日益普遍。還有，如果在四十多歲生了兩個孩子，等到她一百二十歲，養育孩子已經像是頗遙遠的記憶了，只算得上是長長人生中的一段小插曲。在這種情況下，很難說究竟會發展出怎樣的親子關係。


    又或者講到職業生涯。今天，我們假設人會在十幾、二十歲學會某種專業，接著一生奉獻在這個專業。當然，人就算到了四、五十歲還是會學到新知，但我們大致還是把人生分成「學習階段」、以及之後的「工作階段」。如果人會活到一百五十歲，這套生涯系統就不管用了，特別是這個世界還不斷出現震撼世界的新科技。人類的職業生涯將會比現在長得多，甚至到了九十歲，仍然必須日日新、又日新。


    ## 長生不死是好事嗎？


    與此同時，人類也不會在六十五歲就退休、讓路給新一代和他們創新的想法與期望。德國理論物理學家普朗克（Max Planck）有句名言：「科學在一次一次的葬禮中進步。」他所說的是，必須等到一個世代離去，新的理論才有機會剷除舊理論。這絕非科學獨然。想像一下你現在的工作環境，不管你是學者、記者、廚師、還是足球員，如果你的上司已經一百二十歲了，概念都是在維多利亞女王時代建立的、而且他可能還要再當你上司幾十年，這給人什麼感覺？


    到了政治領域，情況可能還更為險惡。如果俄羅斯總統普丁繼續在位九十年，你覺得如何？再想想，如果人本來就會活到一百五十歲，那麼在2016年，掌控莫斯科的還會是史達林，現年一百三十八歲，老當益壯；毛主席一百二十三歲，正值中年；伊莉莎白還是公主，等著從一百二十一歲的喬治六世手中繼承王位。至於她的兒子查爾斯，可得等到2076年。


    讓我們回到現實，現在還遠遠無法肯定，庫茲威爾和德格瑞的預言究竟能否在2050年或2100年成真。就我自己看來，在二十一世紀想永保青春，為時過早，現在就抱太大期望，大概只會迎來很大的失望。知道自己終將一死並不好過，但如果是一心以為長生不死、卻夢想破滅，可能更難接受。


    雖然過去一百年，已經讓平均壽命增加一倍，但如果要依此推論，認為在未來一百年，定會再翻倍達到一百五十歲，也還言之過早。1900年全球的平均壽命之所以不到四十歲，是因為營養不良、傳染病和暴力，讓許多人還很年輕便離開人世。但只要避開饑荒、瘟疫和戰爭，就能活到七十、八十歲，這是智人自然的壽命長度。一般人可能沒想到，其實在幾百年前，活到七十幾歲也不是什麼罕見的怪事。伽利略享年七十七，牛頓享年八十四，米開朗基羅更是高齡八十八，而且當時還沒有抗生素、疫苗或器官移植的協助。甚至，就連叢林中的黑猩猩，有時候都能活到六十好幾。30


    事實上，到目前為止，現代醫學連自然壽命的一年，都還沒能延長。現代醫學的成功之處，是讓我們免於早夭早逝，能夠完整過完應有的人生。就算我們打敗了癌症、糖尿病和其他主要殺手，也只代表幾乎每個人都能夠活到九十歲，但和一百五十歲還差得遠，更別說五百歲了。想達成活到一百五十歲的目標，醫學必須重新打造人體最基本的結構和運作，並設法再生各種器官和組織。究竟在2100年能不能做到，現在絕對仍在未定之數。


    然而，每次失敗的嘗試，都是讓我們向戰勝死亡又邁進一步，也將帶來更多希望，鼓勵投入更多心力。谷歌旗下的Calico公司可能來不及讓聯合創辦人布林（Sergey
    Brin）和佩吉（Larry Page）長生不死，但很有可能會在細胞生物學、遺傳醫學、健康醫護方面有重大發現。這樣一來，新一代的谷歌員工就能站在更好的位置，向死亡進攻。高呼著人類不死的科學家，其實就像是〈狼來了〉故事裡的那個男孩——狼要來，只是早晚的事。


    因此，就算在我們有生之年還無法達成永生，這場與死亡的戰爭，仍有可能是接下來這個世紀的旗艦計畫。想到我們對於「生命神聖」的信念、整個科學界的動向、加上最重要的是資本經濟的需求，一場對死亡的無情戰爭似乎已無可避免。我們的意識型態看重人類的生命，絕不允許我們輕易接受人類死亡。只要人是因為某種原因而死，我們就會努力克服這種原因。


    對於這項挑戰，科學界和資本經濟絕對是樂於承擔。只要讓他們得到新發現、奪得新商機，大多數的科學家和銀行家並不在乎要做的是什麼事情。而又有誰能想到，比戰勝死亡更令人興奮的科學議題，或是比永保青春更有前景的市場？如果你已年過四十，請閉上眼睛一分鐘，回想自己當初二十五歲的身體，不只是外表，更是當時那種感覺。如果能讓你回到當時的生理狀態，你會願意付出多少價錢？當然，有些人會對此不屑一顧，但願意不惜一切的顧客，也必然不在少數，已足以構成一個幾乎無限大的市場。


    如果光這些還不夠，單就對死亡的恐懼這一點，就已經深植在多數人心中，足以推動向死亡宣戰。只要人們認為死亡無可避免，就會從小訓練自己，壓抑想要永生不死的欲望，又或是駕馭這種欲望，運用到其他目標。正是因為人們渴求永生不死，才能譜出「不朽」的交響曲、在戰爭中奮力爭取「永恆的榮耀」，甚至願意犧牲生命，希望自己的靈魂能「在天堂享受永遠的幸福」。不論是藝術的創造、政治的投入或宗教的虔誠，很大部分其實正是由「對死亡的恐懼」所推動。


    伍迪·艾倫（Woody Allen）就從對死亡的恐懼，發展出燦爛的職涯。曾有人問他，是否想在大銀幕上永遠活下去。他回答：「我寧可活在我的公寓裡。」接著又說：「我並不想靠作品來達成永生，我希望靠的是我不要死。」不論是永恆的榮耀、全國性的悼念會、又或是對天堂的夢想，都很難替代像伍迪·艾倫這種人真正想要的：不要死！一旦人們覺得（不論理由充分與否）有很好的機會能躲避死亡，求生的渴望就不會讓他們再去承擔像是藝術、意識型態或宗教這樣的重擔，於是便引起如雪崩般的連鎖反應。


    如果你覺得那些眼睛像要冒火、鬍鬚迎風揚起的宗教狂熱份子已經夠嚇人，就請拭目以待：一旦行將就木的零售業巨擘和年華老去的好萊塢小牌明星，以為發現了長生的靈藥，他們會出現怎樣的舉動！在這場對死亡的戰爭中，如果科學上出現顯著進展，真正的戰場就會從實驗室轉移到國會、法院和街頭。如果科學的努力宣告獲勝，那更會引發激烈的政治衝突。


    過往歷史上所有的戰爭和衝突，很可能規模都將遠遠不及接下來的這場爭鬥：爭奪永恆的青春。


    ## 新議題之二：幸福快樂的權利


    人類未來的第二大議題，可能是要找出幸福快樂的關鍵。歷史上已有無數思想家、先知和一般大眾認為，所謂的「至善」與其說是擁有生命本身，還不如說是能夠幸福快樂。古希臘哲學家伊比鳩魯（Epicurus）就曾說：崇拜神祇是浪費時間，死後一切不復存在，而生命的唯一目的就是享樂。


    古代大多數人並不接受享樂主義，但今天這已經成為我們的預設思想。由於對「來世」的概念有所懷疑，讓人已不只想追求長生不死，也想追求俗世人間的快樂。畢竟，哪有人想活在永恆的苦難裡？


    對伊比鳩魯來說，追求快樂是件個人的事。但近代思想家則相反，認為這需要大家群策群力。如果沒有政府規劃、經濟資源投入和科學研究，個人追求快樂並不會有太大成效。如果你的國家遭到戰火肆虐、經濟陷入危機、健康照護求而不得，快樂就似乎是天方夜譚。十八世紀末，英國哲學家邊沁（Jeremy
    Bentham）主張，所謂至善就是「為最多人帶來最大的快樂」，並認為國家、市場和科學界唯一值得追尋的目標，就是提升全球的快樂——政治家應該追求和平、商人應該促進繁榮、學者應該研究大自然，但不是為了榮耀什麼國王、國家或神祇，而是為了讓你我都享有更快樂的生活。


    在十九世紀和二十世紀，雖然許多政府、企業和實驗室也曾號稱追尋著邊沁的理想，但實際上仍然專注於更直接和明確的目標。要評斷國家是否強大，看的是領土大小、人口增加、GDP（國內生產毛額）成長，而不是國民是否幸福快樂。像是德、法、日這些工業化國家，雖然打造了巨大的教育、健康和福利系統，但仍然是為了強化國家，而不是確保個人福祉。


    之所以成立學校，是為了培養溫順而有技能的國民，忠誠為國服務。男生到了十八歲必須當兵，年輕人除了愛國、也得識字，才能讀懂將領的命令、制定明天的作戰計畫。他們也得懂數學，才能計算炮彈的軌跡，或是破解敵人的密碼。另外還得一定程度瞭解電子學、機械原理和醫藥，才能操作無線電、駕駛戰車、照顧受傷的同袍。等到這些人離開軍隊，則會期待他們成為辦事員、教師或工程師，撐起一個現代經濟體，而且繳出許多稅來。


    衛生系統也是如此。在十九世紀末，法、德、日等國開始為大眾提供免費醫療服務，為嬰兒接種疫苗、為兒童提供營養均衡的飲食，也為青少年提供體育課程。另外還將腐臭的沼澤排乾、消滅蚊害，並建立中央汗水處理系統。目的同樣不是為了讓人民快樂，而是讓國家更強大。國家需要有強健的士兵和工人，需要有健康的婦女，才能生育更多的士兵和工人，也需要官僚人員能夠上午八點準時打卡上班、而不是病倒在家。


    就連福利制度，一開始也是為了國家的利益，而不是個體的需求。德意志帝國的鐵血宰相俾斯麥（Otto von Bismarck）於十九世紀末，率先開辦國家養老金及社會安全福利，但他的主要目標是確保國民忠誠，而不是增加國民福祉。你在十八歲為國家打仗、在四十歲願意納稅，是因為希望到了七十歲的時候，能獲得國家的照顧。31


    1776年，除了生命權和自由權以外，美國的開國元勳也把「追求幸福的權利」列為人人不可剝奪的權利。但請注意，〈美國獨立宣言〉保障的是追求幸福的權利，而不是享有幸福的權利。事實上，傑佛遜（Thomas
    Jefferson）並未要求國家對國民的幸福負起責任，而是要限縮國家的權力。當時是希望讓人民能夠保有私人選擇的權利，不用受到國家監督。如果我覺得自己和約翰結婚、比和瑪麗結婚快樂，住在舊金山比住在鹽湖城幸福，當酒保比當酪農更開心，那我就有權利去追求這些幸福，就算我做了錯誤的決定，國家也不該干涉。


    但是在過去幾十年間，情況已有改變，有愈來愈多人開始認真看待邊沁的願景。人們愈來愈相信，這些為了強化國家統治基礎而生的巨大系統，其實應該是要為每一位國民的幸福與福祉而服務。不是我們要服務國家，而是國家要服務我們！「追求幸福的權利」原本只是為了約束國家權力，但已經在不知不覺中，演變成「幸福快樂的權利」，彷彿說人類天生有權要求幸福快樂，如果有什麼讓我們不能滿足，就等於違反我們的基本人權，而國家此時就該介入。


    在二十世紀，想評估國家是否成功，或許公認的標準在於平均每人國內生產毛額（per capita GDP）。用這種標準，新加坡每一位公民每年生產的商品和服務，平均總價值為56,000美元，比起每位公民只生產平均總值14,000美元的哥斯大黎加，實在是成功太多。


    ## 我們最幸福？


    然而現在的思想家、政治家、甚至經濟學家，都呼籲要用GDH（gross domestic happiness，國內幸福毛額）來補充，甚至應取代GDP。說實在的，人們到底想要什麼？他們不想總是忙著生產，而是想要幸福快樂。生產之所以重要，是因為能夠為幸福提供物質基礎。生產只是手段，不是目的。在一次又一次的調查中，哥斯大黎加人報告的生活滿意度，都遠高於新加坡人。而你是寧願當個生產力高、但不太開心的新加坡人，還是當生產力較低、但心滿意足的哥斯大黎加人？


    可能就是這樣的邏輯，會推動人類把「幸福快樂」當作二十一世紀的第二項主要目標。乍看之下，這項計畫似乎相對比較容易，畢竟饑荒、瘟疫和戰爭正逐漸絕跡，人類正經歷前所未有的和平與繁榮，預期壽命也顯著增加。有了這麼多，人們想必都很幸福快樂了吧？


    事實不然。伊比鳩魯把至善定義成幸福快樂的時候，就曾告誡弟子，快樂是件辛苦的差事。光是物質成就，無法讓我們長久感到滿足。盲目追求金錢、名譽和歡愉，只會讓我們痛苦不堪。舉例來說，伊比鳩魯就建議吃喝要適量，性慾也要節制。從長遠來看，深厚的友誼會比一夜狂歡，讓人更快樂。通往幸福快樂的道路其實暗藏艱險，而伊比鳩魯就規劃出整套倫理上的行為準則，希望藉此引導民眾。


    伊比鳩魯顯然意識到一件事：快樂得來不易。雖然我們在過去幾十年間，已達到前所未有的成就，卻很難看到有哪個現象，證明當代人顯然比過去的前人更為滿足。事實上，甚至還有些令人不安的跡象：雖然已開發國家更為繁榮、舒適及安全，但是自殺率卻也遠高於傳統社會。


    在祕魯、瓜地馬拉、菲律賓和阿爾巴尼亞這些貧困而政治不穩定的國家，平均每年每十萬人有一人自殺。但是在瑞士、法國、日本、紐西蘭這種富裕與和平的國家，平均每年每十萬人卻有二十五人結束自己的生命。在1985年，大多數南韓民眾生活貧窮、未受教育、深受傳統束縛，且活在專制獨裁統治之下。到了今天，南韓已經是領先的經濟強國，國民教育水準在全球數一數二，並享有穩定而相對自由的民主制度。然而，南韓在1985年大約每十萬人有九人自殺，現今的自殺率卻飆破三倍，來到每十萬人有三十人自殺。32


    當然，也有些趨勢是日漸好轉，令人樂觀。像是兒童死亡率急遽下降，肯定是讓全體人類的幸福提升了，也部分補償了現代生活的壓力。然而，就算我們確實比先人快樂了那麼一些，整體福祉的增加幅度，還是遠遠小於預期。在石器時代，人類平均每天必須取得4,000大卡的熱量，其中除了餵飽肚子之外，也要用在衣服保暖、製作工具、藝術和升起營火。到了今日，美國人平均每天使用228,000大卡的熱量，除了填飽自己的胃，也包括供給自己的汽車、電腦、冰箱、電視所需。33
    這麼說來，美國人平均使用的能量，將近是石器時代狩獵採集者的六十倍。但一般美國人真的有比以前快樂六十倍嗎？這種美好的想法，可能只是一廂情願。


    就算我們已經克服了許多昨日的苦難，想要正面取得快樂，這可能遠比從負面解除痛苦，還來得更加困難。如果是一位瀕臨餓死邊緣的中世紀農民，只要一塊麵包，就能讓他非常快樂。但如果是一位百無聊賴、薪水超高、體重過重的現代科技新貴工程師，你要'
  mdcn: '但是在現實中，人類之所以死亡，可不是因為有個披黑色斗篷的人，在敲他們的肩膀；不是因為上帝的旨意，也不是因為這是什麼宇宙計畫的重要部分。人會死亡只有一個原因：人體運作出了一點技術問題。心臟不跳、大動脈遭脂肪堵住、癌細胞在肝臟裡擴散、病菌在肺部裡繁殖。


    到底是什麼造成這些技術問題？答案是其他的技術問題。心臟不跳，是因為沒有足夠的氧氣到達心肌。癌細胞擴散，是因為突變的基因改寫了生化指令。病菌住到我的肺裡，是因為有人在捷運上打了個噴嚏。這裡沒什麼形而上的事，一切都只是技術問題而已。


    而只要是技術問題，就會有技術上的解決方案。要克服死亡，並不需要等到耶穌再臨，只要實驗室裡的幾個科技咖就成了。如果說，傳統上死亡屬於牧師和神學家的飯碗，現在工程師正在接手這筆生意。用化療或奈米機器人，我們就能殺死癌細胞；用抗生素，就能消滅肺部病菌；心臟不跳了，可以用藥物和電擊，讓它重新開始跳動，如果真的不行，還能乾脆直接換個新的心。確實，現在並不是所有技術問題都已經找到解決方案。但也正因如此，我們才會投入這麼多時間和金錢，研究癌症、細菌、基因和奈米科技。


    就連不屬於科學界的一般民眾，也已經習慣把死亡當成一個技術問題。如果有位婦女問醫師：「醫師，我是哪裡出了問題？」醫師有可能說「你得了流感」、「你得了肺結核」、「你得了癌症」，但沒有醫師會說「你得了死亡」。對我們來說，人會死，是因為流感、肺結核、癌症，而這些統統算是技術問題，總有一天能找到技術上的解決方案！


    現在就算有人死於颱風、車禍或戰爭，我們還是可能認為，這是一種技術問題，可以預防的、而且是應該要預防：政府應該要有更好的天災對策，市政府應該要有更好的交通規劃，將領應該做出更好的軍事決定，這樣就能避免颱風、車禍或戰爭導致的死亡了。現在只要一出現死亡，幾乎訴訟和調查就自動隨之而來。「他們怎麼會死？一定是哪裡有人做錯了！」


    ## 長生不死之夢


    絕大多數科學家、醫師和學者，並不會說自己正努力達成讓人長生不死的夢想，只會說自己正在努力克服這個或那個特定問題。但因為衰老和死亡也只不過就是許多特定問題的總和結果，醫師和科學家可不會哪天忽然停手，宣布：「到此為止，不要再研究了。我們已經解決了肺結核和癌症，但不打算處理阿茲海默症。大家就繼續因為阿茲海默症而去世吧。」〈世界人權宣言〉可不是說人類「有權享有生命，直到九十歲為止」，而是說「人人有權享有生命」，沒有附帶條件、沒有任何到期日的限制。


    雖是少數，但已有愈來愈多科學家和思想家公開表示，現代科學的中心任務就是要戰勝死亡，賦予人類永恆的青春。著名的人物包括老年病學家德格瑞（Aubrey de Grey）、以及身兼博學家和發明家身分的庫茲威爾（Ray
    Kurzweil，曾獲頒1999年美國科技創新國家獎章）。2012年，庫茲威爾獲谷歌（Google）任命為工程總監，一年後谷歌成立子公司Calico，明定公司使命就是要「解決死亡」。27


    2009年，谷歌任命真心相信人能長生不死的馬里斯（Bill Maris）擔任創投公司谷歌風投（Google Ventures）的執行長。2015年1月接受採訪時，馬里斯說：「如果你今天問我，人是否有可能活到五百歲，我的答案是肯定的。」馬里斯這番豪語的背後，是大批金彈支援。谷歌風投的總投資金額高達二十億美元，其中36%將投入生技新創公司，也包括幾項深具雄心的壽命延長計畫。馬里斯用美式足球打比方，解釋這場與死亡的對決：「我們不只要挺進幾碼，而且要贏下這場比賽。」為什麼？馬里斯說：「因為活著總比死好啊。」28


    許多矽谷巨擘，都抱持這樣的大夢想。PayPal共同創辦人泰爾（Peter Thiel）最近就承認，他希望永遠活下去。他解釋道：「我認為，處理方式大概有三種：接受死亡、拒絕死亡、或是對抗死亡。我覺得社會上大多數人不是拒絕就是接受，而我寧願和它對抗。」很多人可能對此嗤之以鼻，以為這是不成熟的幻想。但泰爾可不是什麼可以小看的人物，他是矽谷頂尖的成功創業家，影響力驚人，光是私人財富估計就有二十二億美元。29我們已經可以感受風雨欲來之勢：人類不再平等，不死就在眼前。


    某些領域的進展飛快，例如基因工程、再生醫學和奈米科技，也讓預言愈來愈趨向樂觀。有專家認為，人類到了2200年就能打敗死亡，也有人認為是2100年。庫茲威爾和德格瑞甚至更為樂觀，他們認為到了2050年，只要身體健康，鈔票也夠多，都可以大約每十年騙過死神一次，藉此達到長生不死。他們所想的方式是：我們大約十年接受一次全面治療，除了醫治疾病，也讓衰老的組織再生，並讓手、眼、腦都得到升級。而在下次治療之前，醫師又會發明各種更新的藥、更高級的技術和工具。如果庫茲威爾和德格瑞講得沒錯，很可能已經有些像這樣的不死人，就走在你身邊的路上——尤其是你剛好走在華爾街或第五大道的時候。


    事實上，他們只是達到「長生」（a-mortal），而不是真正「不死」（immortal）。這些未來的人類並不像神絕對不死，他們仍然可能死於戰爭或意外，而且無法起死回生；只不過，他們也不像我們這些凡人終有一死，他們的生命並不會有到期日。只要沒有炸彈把他們炸個粉碎、沒有卡車把他們輾成肉醬，就能永生。這樣一來，可能會讓他們成為歷史上最焦慮的一群人。凡人知道生也有涯，因此願意冒險體驗人生，像是登上喜馬拉雅山或泳渡怒海，又或是走過街道、上餐廳吃吃飯，這些事或多或少也算相當危險。但如果你相信自己可以永遠活下去，像這樣不時賭上一把，可能就太不智了。


    這麼說來，或許我們先把目標訂得溫和點，別追求長生，先把壽命加倍如何？在二十世紀，人類的預期壽命已從四十歲增加到七十歲，幾乎翻了一倍，所以在二十一世紀，至少應該可以再翻倍到一百五十歲吧。雖然這和「不死」還遠遠差了一截，但仍然會讓人類社會翻天覆地。


    首先，家庭結構、婚姻和親子關係，就將大為改觀。現在人們對結婚的期許仍然是「至死不渝」，而生命有一大部分是用來養育後代。想像一下，如果人能活一百五十歲是什麼概念。就算四十歲才結婚，後面仍然有一百一十年可活。希望這段婚姻能持續一百一十年，這個想法實際嗎？就算是天主教教義派也可能得猶豫猶豫。所以像現在多次結婚的情形，可能會日益普遍。還有，如果在四十多歲生了兩個孩子，等到她一百二十歲，養育孩子已經像是頗遙遠的記憶了，只算得上是長長人生中的一段小插曲。在這種情況下，很難說究竟會發展出怎樣的親子關係。


    又或者講到職業生涯。今天，我們假設人會在十幾、二十歲學會某種專業，接著一生奉獻在這個專業。當然，人就算到了四、五十歲還是會學到新知，但我們大致還是把人生分成「學習階段」、以及之後的「工作階段」。如果人會活到一百五十歲，這套生涯系統就不管用了，特別是這個世界還不斷出現震撼世界的新科技。人類的職業生涯將會比現在長得多，甚至到了九十歲，仍然必須日日新、又日新。


    ## 長生不死是好事嗎？


    與此同時，人類也不會在六十五歲就退休、讓路給新一代和他們創新的想法與期望。德國理論物理學家普朗克（Max Planck）有句名言：「科學在一次一次的葬禮中進步。」他所說的是，必須等到一個世代離去，新的理論才有機會剷除舊理論。這絕非科學獨然。想像一下你現在的工作環境，不管你是學者、記者、廚師、還是足球員，如果你的上司已經一百二十歲了，概念都是在維多利亞女王時代建立的、而且他可能還要再當你上司幾十年，這給人什麼感覺？


    到了政治領域，情況可能還更為險惡。如果俄羅斯總統普丁繼續在位九十年，你覺得如何？再想想，如果人本來就會活到一百五十歲，那麼在2016年，掌控莫斯科的還會是史達林，現年一百三十八歲，老當益壯；毛主席一百二十三歲，正值中年；伊莉莎白還是公主，等著從一百二十一歲的喬治六世手中繼承王位。至於她的兒子查爾斯，可得等到2076年。


    讓我們回到現實，現在還遠遠無法肯定，庫茲威爾和德格瑞的預言究竟能否在2050年或2100年成真。就我自己看來，在二十一世紀想永保青春，為時過早，現在就抱太大期望，大概只會迎來很大的失望。知道自己終將一死並不好過，但如果是一心以為長生不死、卻夢想破滅，可能更難接受。


    雖然過去一百年，已經讓平均壽命增加一倍，但如果要依此推論，認為在未來一百年，定會再翻倍達到一百五十歲，也還言之過早。1900年全球的平均壽命之所以不到四十歲，是因為營養不良、傳染病和暴力，讓許多人還很年輕便離開人世。但只要避開饑荒、瘟疫和戰爭，就能活到七十、八十歲，這是智人自然的壽命長度。一般人可能沒想到，其實在幾百年前，活到七十幾歲也不是什麼罕見的怪事。伽利略享年七十七，牛頓享年八十四，米開朗基羅更是高齡八十八，而且當時還沒有抗生素、疫苗或器官移植的協助。甚至，就連叢林中的黑猩猩，有時候都能活到六十好幾。30


    事實上，到目前為止，現代醫學連自然壽命的一年，都還沒能延長。現代醫學的成功之處，是讓我們免於早夭早逝，能夠完整過完應有的人生。就算我們打敗了癌症、糖尿病和其他主要殺手，也只代表幾乎每個人都能夠活到九十歲，但和一百五十歲還差得遠，更別說五百歲了。想達成活到一百五十歲的目標，醫學必須重新打造人體最基本的結構和運作，並設法再生各種器官和組織。究竟在2100年能不能做到，現在絕對仍在未定之數。


    然而，每次失敗的嘗試，都是讓我們向戰勝死亡又邁進一步，也將帶來更多希望，鼓勵投入更多心力。谷歌旗下的Calico公司可能來不及讓聯合創辦人布林（Sergey
    Brin）和佩吉（Larry Page）長生不死，但很有可能會在細胞生物學、遺傳醫學、健康醫護方面有重大發現。這樣一來，新一代的谷歌員工就能站在更好的位置，向死亡進攻。高呼著人類不死的科學家，其實就像是〈狼來了〉故事裡的那個男孩——狼要來，只是早晚的事。


    因此，就算在我們有生之年還無法達成永生，這場與死亡的戰爭，仍有可能是接下來這個世紀的旗艦計畫。想到我們對於「生命神聖」的信念、整個科學界的動向、加上最重要的是資本經濟的需求，一場對死亡的無情戰爭似乎已無可避免。我們的意識型態看重人類的生命，絕不允許我們輕易接受人類死亡。只要人是因為某種原因而死，我們就會努力克服這種原因。


    對於這項挑戰，科學界和資本經濟絕對是樂於承擔。只要讓他們得到新發現、奪得新商機，大多數的科學家和銀行家並不在乎要做的是什麼事情。而又有誰能想到，比戰勝死亡更令人興奮的科學議題，或是比永保青春更有前景的市場？如果你已年過四十，請閉上眼睛一分鐘，回想自己當初二十五歲的身體，不只是外表，更是當時那種感覺。如果能讓你回到當時的生理狀態，你會願意付出多少價錢？當然，有些人會對此不屑一顧，但願意不惜一切的顧客，也必然不在少數，已足以構成一個幾乎無限大的市場。


    如果光這些還不夠，單就對死亡的恐懼這一點，就已經深植在多數人心中，足以推動向死亡宣戰。只要人們認為死亡無可避免，就會從小訓練自己，壓抑想要永生不死的欲望，又或是駕馭這種欲望，運用到其他目標。正是因為人們渴求永生不死，才能譜出「不朽」的交響曲、在戰爭中奮力爭取「永恆的榮耀」，甚至願意犧牲生命，希望自己的靈魂能「在天堂享受永遠的幸福」。不論是藝術的創造、政治的投入或宗教的虔誠，很大部分其實正是由「對死亡的恐懼」所推動。


    伍迪·艾倫（Woody Allen）就從對死亡的恐懼，發展出燦爛的職涯。曾有人問他，是否想在大銀幕上永遠活下去。他回答：「我寧可活在我的公寓裡。」接著又說：「我並不想靠作品來達成永生，我希望靠的是我不要死。」不論是永恆的榮耀、全國性的悼念會、又或是對天堂的夢想，都很難替代像伍迪·艾倫這種人真正想要的：不要死！一旦人們覺得（不論理由充分與否）有很好的機會能躲避死亡，求生的渴望就不會讓他們再去承擔像是藝術、意識型態或宗教這樣的重擔，於是便引起如雪崩般的連鎖反應。


    如果你覺得那些眼睛像要冒火、鬍鬚迎風揚起的宗教狂熱份子已經夠嚇人，就請拭目以待：一旦行將就木的零售業巨擘和年華老去的好萊塢小牌明星，以為發現了長生的靈藥，他們會出現怎樣的舉動！在這場對死亡的戰爭中，如果科學上出現顯著進展，真正的戰場就會從實驗室轉移到國會、法院和街頭。如果科學的努力宣告獲勝，那更會引發激烈的政治衝突。


    過往歷史上所有的戰爭和衝突，很可能規模都將遠遠不及接下來的這場爭鬥：爭奪永恆的青春。


    ## 新議題之二：幸福快樂的權利


    人類未來的第二大議題，可能是要找出幸福快樂的關鍵。歷史上已有無數思想家、先知和一般大眾認為，所謂的「至善」與其說是擁有生命本身，還不如說是能夠幸福快樂。古希臘哲學家伊比鳩魯（Epicurus）就曾說：崇拜神祇是浪費時間，死後一切不復存在，而生命的唯一目的就是享樂。


    古代大多數人並不接受享樂主義，但今天這已經成為我們的預設思想。由於對「來世」的概念有所懷疑，讓人已不只想追求長生不死，也想追求俗世人間的快樂。畢竟，哪有人想活在永恆的苦難裡？


    對伊比鳩魯來說，追求快樂是件個人的事。但近代思想家則相反，認為這需要大家群策群力。如果沒有政府規劃、經濟資源投入和科學研究，個人追求快樂並不會有太大成效。如果你的國家遭到戰火肆虐、經濟陷入危機、健康照護求而不得，快樂就似乎是天方夜譚。十八世紀末，英國哲學家邊沁（Jeremy
    Bentham）主張，所謂至善就是「為最多人帶來最大的快樂」，並認為國家、市場和科學界唯一值得追尋的目標，就是提升全球的快樂——政治家應該追求和平、商人應該促進繁榮、學者應該研究大自然，但不是為了榮耀什麼國王、國家或神祇，而是為了讓你我都享有更快樂的生活。


    在十九世紀和二十世紀，雖然許多政府、企業和實驗室也曾號稱追尋著邊沁的理想，但實際上仍然專注於更直接和明確的目標。要評斷國家是否強大，看的是領土大小、人口增加、GDP（國內生產毛額）成長，而不是國民是否幸福快樂。像是德、法、日這些工業化國家，雖然打造了巨大的教育、健康和福利系統，但仍然是為了強化國家，而不是確保個人福祉。


    之所以成立學校，是為了培養溫順而有技能的國民，忠誠為國服務。男生到了十八歲必須當兵，年輕人除了愛國、也得識字，才能讀懂將領的命令、制定明天的作戰計畫。他們也得懂數學，才能計算炮彈的軌跡，或是破解敵人的密碼。另外還得一定程度瞭解電子學、機械原理和醫藥，才能操作無線電、駕駛戰車、照顧受傷的同袍。等到這些人離開軍隊，則會期待他們成為辦事員、教師或工程師，撐起一個現代經濟體，而且繳出許多稅來。


    衛生系統也是如此。在十九世紀末，法、德、日等國開始為大眾提供免費醫療服務，為嬰兒接種疫苗、為兒童提供營養均衡的飲食，也為青少年提供體育課程。另外還將腐臭的沼澤排乾、消滅蚊害，並建立中央汗水處理系統。目的同樣不是為了讓人民快樂，而是讓國家更強大。國家需要有強健的士兵和工人，需要有健康的婦女，才能生育更多的士兵和工人，也需要官僚人員能夠上午八點準時打卡上班、而不是病倒在家。


    就連福利制度，一開始也是為了國家的利益，而不是個體的需求。德意志帝國的鐵血宰相俾斯麥（Otto von Bismarck）於十九世紀末，率先開辦國家養老金及社會安全福利，但他的主要目標是確保國民忠誠，而不是增加國民福祉。你在十八歲為國家打仗、在四十歲願意納稅，是因為希望到了七十歲的時候，能獲得國家的照顧。31


    1776年，除了生命權和自由權以外，美國的開國元勳也把「追求幸福的權利」列為人人不可剝奪的權利。但請注意，〈美國獨立宣言〉保障的是追求幸福的權利，而不是享有幸福的權利。事實上，傑佛遜（Thomas
    Jefferson）並未要求國家對國民的幸福負起責任，而是要限縮國家的權力。當時是希望讓人民能夠保有私人選擇的權利，不用受到國家監督。如果我覺得自己和約翰結婚、比和瑪麗結婚快樂，住在舊金山比住在鹽湖城幸福，當酒保比當酪農更開心，那我就有權利去追求這些幸福，就算我做了錯誤的決定，國家也不該干涉。


    但是在過去幾十年間，情況已有改變，有愈來愈多人開始認真看待邊沁的願景。人們愈來愈相信，這些為了強化國家統治基礎而生的巨大系統，其實應該是要為每一位國民的幸福與福祉而服務。不是我們要服務國家，而是國家要服務我們！「追求幸福的權利」原本只是為了約束國家權力，但已經在不知不覺中，演變成「幸福快樂的權利」，彷彿說人類天生有權要求幸福快樂，如果有什麼讓我們不能滿足，就等於違反我們的基本人權，而國家此時就該介入。


    在二十世紀，想評估國家是否成功，或許公認的標準在於平均每人國內生產毛額（per capita GDP）。用這種標準，新加坡每一位公民每年生產的商品和服務，平均總價值為56,000美元，比起每位公民只生產平均總值14,000美元的哥斯大黎加，實在是成功太多。


    ## 我們最幸福？


    然而現在的思想家、政治家、甚至經濟學家，都呼籲要用GDH（gross domestic happiness，國內幸福毛額）來補充，甚至應取代GDP。說實在的，人們到底想要什麼？他們不想總是忙著生產，而是想要幸福快樂。生產之所以重要，是因為能夠為幸福提供物質基礎。生產只是手段，不是目的。在一次又一次的調查中，哥斯大黎加人報告的生活滿意度，都遠高於新加坡人。而你是寧願當個生產力高、但不太開心的新加坡人，還是當生產力較低、但心滿意足的哥斯大黎加人？


    可能就是這樣的邏輯，會推動人類把「幸福快樂」當作二十一世紀的第二項主要目標。乍看之下，這項計畫似乎相對比較容易，畢竟饑荒、瘟疫和戰爭正逐漸絕跡，人類正經歷前所未有的和平與繁榮，預期壽命也顯著增加。有了這麼多，人們想必都很幸福快樂了吧？


    事實不然。伊比鳩魯把至善定義成幸福快樂的時候，就曾告誡弟子，快樂是件辛苦的差事。光是物質成就，無法讓我們長久感到滿足。盲目追求金錢、名譽和歡愉，只會讓我們痛苦不堪。舉例來說，伊比鳩魯就建議吃喝要適量，性慾也要節制。從長遠來看，深厚的友誼會比一夜狂歡，讓人更快樂。通往幸福快樂的道路其實暗藏艱險，而伊比鳩魯就規劃出整套倫理上的行為準則，希望藉此引導民眾。


    伊比鳩魯顯然意識到一件事：快樂得來不易。雖然我們在過去幾十年間，已達到前所未有的成就，卻很難看到有哪個現象，證明當代人顯然比過去的前人更為滿足。事實上，甚至還有些令人不安的跡象：雖然已開發國家更為繁榮、舒適及安全，但是自殺率卻也遠高於傳統社會。


    在祕魯、瓜地馬拉、菲律賓和阿爾巴尼亞這些貧困而政治不穩定的國家，平均每年每十萬人有一人自殺。但是在瑞士、法國、日本、紐西蘭這種富裕與和平的國家，平均每年每十萬人卻有二十五人結束自己的生命。在1985年，大多數南韓民眾生活貧窮、未受教育、深受傳統束縛，且活在專制獨裁統治之下。到了今天，南韓已經是領先的經濟強國，國民教育水準在全球數一數二，並享有穩定而相對自由的民主制度。然而，南韓在1985年大約每十萬人有九人自殺，現今的自殺率卻飆破三倍，來到每十萬人有三十人自殺。32


    當然，也有些趨勢是日漸好轉，令人樂觀。像是兒童死亡率急遽下降，肯定是讓全體人類的幸福提升了，也部分補償了現代生活的壓力。然而，就算我們確實比先人快樂了那麼一些，整體福祉的增加幅度，還是遠遠小於預期。在石器時代，人類平均每天必須取得4,000大卡的熱量，其中除了餵飽肚子之外，也要用在衣服保暖、製作工具、藝術和升起營火。到了今日，美國人平均每天使用228,000大卡的熱量，除了填飽自己的胃，也包括供給自己的汽車、電腦、冰箱、電視所需。33
    這麼說來，美國人平均使用的能量，將近是石器時代狩獵採集者的六十倍。但一般美國人真的有比以前快樂六十倍嗎？這種美好的想法，可能只是一廂情願。


    就算我們已經克服了許多昨日的苦難，想要正面取得快樂，這可能遠比從負面解除痛苦，還來得更加困難。如果是一位瀕臨餓死邊緣的中世紀農民，只要一塊麵包，就能讓他非常快樂。但如果是一位百無聊賴、薪水超高、體重過重的現代科技新貴工程師，你要'
