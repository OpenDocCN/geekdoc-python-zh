    人類大命運


    會特別去提，因為他們認為這早已是不證自明的事實。於是，像是「人命神聖」這種倫理判斷（無法用科學測試），裡面就可能包含著「每個人都擁有永恆的靈魂」這種事實聲明（而這是可以用科學來爭論的）。


    同樣的，美國民族主義者宣稱「美國民族是神聖的」，這種看似屬於倫理判斷的說法，實際上仍是以某些事實聲明為基礎，例如「在過去幾個世紀裡，美國帶領著大多數的科學、經濟和道德進步」。雖然我們不可能用科學來檢查究竟美國民族是否神聖，但只要拆解一下這個議題，我們就能用科學來檢查美國帶來的科學、經濟和道德進展，貢獻度是否確實如他們所宣稱。


    正因為人類的價值觀裡永遠都藏著一些事實聲明，也就讓有些哲學家，如哈里斯（Sam Harris, 1967-）等人認為，科學能夠解開一切的倫理困境。哈里斯主張，所有人的終極價值都是同一項：將痛苦最小化、快樂最大化；因此，所有的倫理爭論都是關於「如何將快樂最大化」的事實論證。⁶伊斯蘭基本教義派想上天堂，是為了快樂；自由主義者想增加人類自由，是因為這樣能得到最大的快樂；德國民族主義者也認為，如果讓柏林控制整個世界，每個人都會更快樂。哈里斯認為，伊斯蘭基本教義派、自由主義者和民族主義者之間並沒有倫理上的爭議，只是對於如何達到大家共同的目標，彼此之間出現了在事實上的意見不合。


    然而，就算哈里斯說得沒錯，所有人都重視快樂，但實際上也很難用這種觀點來平息倫理爭議，特別是「快樂」根本沒有科學上的定義或測量方法。讓我們再次以三峽大壩為例。就算我們同意，這項計畫的終極目標是讓世界成為一個更快樂的地方，可是該怎麼度量和計算，才能判定「製造出廉價電力」會比「保護傳統生活方


    220'
  - '[PAGE 224]


    式」或「拯救稀有的白鱀豚」更有益於全球的快樂？只要我們還無法真正理解意識，就無法為快樂和痛苦制定出通用的度量標準，也就無法比較不同人之間的快樂和痛苦，更不用說跨物種的情況了。


    十億中國人享有更廉價的電力時，會產生多少單位的快樂？整個白鱀豚物種滅絕時，又會產生多少單位的痛苦？甚至回歸根本，難道快樂和痛苦真的是可以用數學相加相減的實體嗎？吃冰淇淋很愉悅，找到真愛更令人愉悅，但難道只要有足夠的冰淇淋，累積起來的快樂就能等於找到真愛的快樂？


    因此，雖然科學在倫理爭論能發揮的作用，比一般想像要多，但仍有極限（至少目前如此）。如果沒有一些宗教元素做為引導，就不可能維持大規模的社會秩序。就算是大學和實驗室，也需要宗教的支持。宗教能為科學研究提供倫理上的理由，也因此能夠影響科學研究的議題、以及科學發現和科研成果的運用方式。


    想要真正理解科學的歷史，就不能不談宗教信仰。科學家很少會談這項事實，但科學革命的背景，也正是出於史上最教條武斷、最觀念偏狹、也最宗教狂熱的一個社會。


    # 冤家路窄常碰頭


    我們常常認為，科學與世俗主義、寬容包容的價值觀有關。但若真是如此，絕對難以想像科學革命竟然出現在近代歐洲的初期。在哥倫布、哥白尼和牛頓的時代，歐洲的宗教狂熱者密度是全球最高，而容忍度又是全球最低。亮起科學革命這道光芒的社會，驅逐了猶太人和穆斯林、燒死了成批的異端份子、把每個愛貓的老太太都當作女巫、每次滿月都發起一場新的宗教戰爭。'
