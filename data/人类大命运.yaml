    讀歷史正是看著這些「意義的網」的編織和拆散，

    並讓人意識到，對這個世代的人來說最重要的事情，

    很有可能對他們的後代變得毫無意義。

    ——第3章〈人類的獨特之處〉


    金錢、宗教、國家、公司……這些故事只是工具，

    不該成為目標、甚至標準。

    一旦我們忘了這些都只是虛構，就會開始與現實漸行漸遠。

    於是，可能只是為了「替公司賺很多錢」或是「保護國家利益」，

    就讓我們掀起無邊戰火。

    公司、金錢和國家，都只存在於我們的想像之中。

    是人類發明了這些概念，好讓它們為人類服務；

    但為什麼最後反而是人類要為這些概念服務，甚至犧牲性命？

    ——第4章〈說書人〉


    現代科學和宗教的關係，究竟為何？

    這個問題似乎早已提了百萬遍，能說的早已說完。

    但實際上，科學和宗教就像夫妻，

    上了五百年的婚姻諮商，仍然未能真正瞭解彼此。

    他還是一心想著灰姑娘，而她也還是一心念著白馬王子，

    但兩人卻吵著該輪到誰倒垃圾。

    ——第5章〈一對冤家〉


    二十一世紀初，進步的列車又將再次離站，

    而且這可能是「智人」這站發出的末班車。

    錯過的人，永遠都不會再有上車的機會。

    想上車，就必須瞭解二十一世紀的科技，

    特別是生物科技和電腦演算法的力量。

    ——第7章〈人文主義革命〉


    在十八世紀，人文主義從以神為中心的世界觀，

    走向以人為中心的世界觀，於是把神推到了一旁。

    在二十一世紀，數據主義則可能是從以人為中心，

    走向以資料為中心，於是把人也給推到了一邊。

    ——第11章〈信數據得永生？〉


    > 《人類大命運》會震撼你！會振奮你！

    更重要的是，它會讓你以未曾思慮過的觀點，深思細想。

    ——康納曼（Daniel Kahneman）《快思慢想》作者


    在《人類大歷史》作者哈拉瑞展現了他「後見之明」的洞見，

    深刻闡述了「A Brief History of Humankind」。

    而在這本《人類大命運》，哈拉瑞則改以「先見之明」的姿態，

    提出三個大哉問，並用他一貫銳利幽默的筆調，旁徵博引，深入淺出

    為我們預示了「A Brief History of Tomorrow」！


    幾千年來，不管是中國人、印度人或是埃及人，

    都面臨著同樣的三大問題：饑荒、瘟疫、戰爭。

    這三個問題永遠是人們的心頭大患。

    但是在過去幾十年間，我們竟然已經成功遏制了饑荒、瘟疫和戰爭！

    當然這些問題還算不上完全解決，

    但已經從過去「不可理解、無法控制的自然力量」轉化為「可應付的挑戰」了。

    我們不再需要祈求某位神祇或聖人來解救人類，

    而已經相當瞭解，該怎樣做就能預防饑荒、瘟疫和戰爭，而且通常都能成功。

    如今，人類面臨的是三大新議題：

    第一、當「死亡」將逐步走向末日，長生不老之夢可能實現，人們該如何面對？

    第二、當幸福快樂成為天賦人權，個人主義凌駕國族主義，社會將如何變遷？

    第三、當生物醫學工程、半機械人工程、無機生命工程持續進展，

    人類將從「智人」的位階躍升成為「神人」（Homo Deus），

    形同握有上帝的權力，那麼人類的終極命運將會如何？


