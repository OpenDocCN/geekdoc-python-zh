  md: '旅程中，我們必須拒絕所有物質上的誘惑和契約。出於這種二元論的背景，只要是在旅程中質疑著各種俗世的習慣和契約、前往未知的目的地，我們都會稱為「靈性」之旅。


    這種旅程與宗教有根本的差異，因為宗教是要鞏固世俗秩序，但靈性之旅反而是要逃離世俗秩序。通常，靈性之旅的流浪者最重要的義務之一，就是要挑戰各大宗教的信仰和慣例。禪宗佛教就曾說「逢佛殺佛」，講的是在靈性的道路上，如果發現佛教已經落入制式、僵化、固定，就必須連這些一起擺脫。


    對宗教來說，靈性是個危險的威脅。宗教通常會努力避免信眾踏上靈性的追求之旅，而許多宗教系統所面對的挑戰，也不是來自那些追求食物、性和權力的普通人，而是來自那些追求靈性和真實、無法用陳腔爛調打發的人。正因如此，推動新教徒反抗天主教教會權威的，並非抱持享樂主義的無神論者，而是一位虔誠而苦修的修士：馬丁·路德（Martin
    Luther, 1483-1546）。路德對於生命有許多存在主義的疑惑，希望得到解答，而且他拒絕接受教會用各種儀禮、儀式和契約提出的答案。


    當時，教會向信眾提出一些非常誘人的契約交易。如果你犯了罪，擔心死後受到永恆的詛咒，該做的就只是打開錢包、買張贖罪券。十六世紀初，教會還雇用了專業的「贖罪券販子」，來去於歐洲各個城鎮村莊，定價販售贖罪券。想要一張進入天堂的簽證嗎？十枚金幣。想讓已過世的爺爺奶奶一起上天堂嗎？沒問題，但得要三十枚金幣。在販子當中，最著名的就是道明會的修士約翰尼斯·帖次勒（Johannes
    Tetzel），據傳有句名言：「銀錢叮噹落銀庫，靈魂立即出煉獄。」¹'
