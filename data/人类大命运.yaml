    交易對人和神都好,卻犧牲了整個其他生態系。


    在現今的尼泊爾巴利雅普(Bariyapur)村,信徒每五年會慶祝一次女神嘉蒂麥(Gadhimai)的節日。2009年創下紀錄,二十五萬頭動物遭宰殺,獻祭給女神。有一位當地司機,向來訪的英國記者解釋:「如果我們想要什麼,便帶著祭品來這裡獻給女神,所有的夢想就能在五年之內實現。」26


    # 犧牲了動物的利益


    在有神論的許多神話裡,會解釋這筆交易的微妙細節。美索不達米亞的史詩作品《吉爾伽美什》(Gilgamesh)就提到,諸神放出大洪水毀滅世界,幾乎所有人類和動物都淪為波臣。衝動的神祇此時才驚覺,這下沒人對他們奉獻了,飢餓和痛苦逼得祂們簡直要發狂。千幸萬幸,還有一個人類家庭存活了下來,這得感謝恩基(Enki)這位神祇的先見之明,安排信徒烏特納庇什提(Utnapishtim)躲在一艘木製的大方舟裡,方舟上也載著烏特納庇什提的親戚,以及各種動物。等到洪水消退,這位美索不達米亞神話裡的挪亞,便從方舟中現身,第一件事就是將一些動物獻祭給神祇。根據史詩說法,所有大神立刻衝到現場:「諸神嗅到香氣,諸神嗅到美味的香氣,諸神如蒼蠅群聚至祭品周圍。」27


    至於《聖經》中的洪水故事(寫成時間比美索不達米亞神話晚了超過一千年),同樣寫到挪亞一出了方舟,就「為耶和華築了一座壇,拿各類潔淨的牲畜、飛鳥獻在壇上為燔祭。耶和華聞那馨香之氣,就心裡說:我不再因人的緣故咒詛地,也不再按著我才行的,滅各種的活物了。」(出自〈創世記〉第8章第20至21節)。'
  - '[PAGE 109]


    人類大命運


    這種洪水故事成為農業世界的奠基神話。當然，我們也可以給它添上一點現代環保的色彩，說這場洪水是在教訓人類，要我們知道人類的作為可能會毀掉整個生態系，而人類得負起保護剩餘萬物的神聖使命。只是就傳統的宗教詮釋而言，洪水正證明了人類的優越傑出、以及動物的毫無價值。在傳統的宗教詮釋中，挪亞雖然奉命拯救整個生態系，但目的是保護神和人類的共同利益，而不是為了動物的利益。非人類的生物本身並沒有價值，就只是為了人類的利益而存在。


    畢竟，當「耶和華見人在地上罪惡很大」，就決定「要將所造的人和走獸，並昆蟲，以及空中的飛鳥，都從地上除滅，因為我造他們後悔了。」（〈創世記〉第6章第7節）。可見《聖經》覺得，為了懲罰智人犯下的罪行，把所有動物都消滅掉，也是天經地義，但這就好像只因為人類不乖，所有長頸鹿、鵜鶘和瓢蟲也都不再有意義。《聖經》沒能想到另一種情節：耶和華後悔創造了智人，於是把這種罪惡的猿類，從地球表面抹去，接著就能享受鴕鳥、袋鼠和貓熊的各種可愛表演，直到永遠。


    # 農業革命也成了宗教革命


    不過，有神論宗教仍然存有一些對動物友善的想法。諸神讓人有權掌控動物界，但享有權力的同時，也要負點責任。例如猶太人就奉命必須讓家畜在安息日休息，並盡可能不造成牠們不必要的痛苦。（只不過，每當發生利益衝突，人類的利益仍然永遠勝過動物的利益。28）


    在猶太經典《塔木德》（Talmud）裡有一則故事，一頭小牛在前


    106'
  - '[PAGE 110]


    往屠宰场的路上逃掉，求助於拉比猶太教的創始人之一：葉胡達拉比（Rabbi Yehuda HaNasi）。小牛把頭鑽到這位拉比的長袍下，開始哭泣。但拉比把小牛推開，說道：「去吧，你被創造就是為了這個目的。」由於這位拉比如此不慈悲，神便處罰他，讓他生了一場痛苦的疾病，長達十三年。直到有一天，僕人正在打掃拉比的家，發現幾隻剛生出來的老鼠，就把牠們掃地出門。但拉比立刻趕去拯救了這幾隻無助的小生物，要僕人放過牠們，因為「耶和華善待萬民；他的慈悲覆庇他一切所造的。」（《詩篇》145：9）。而因為這位拉比展現對老鼠的慈悲，神也就展現對他的憐憫，治癒他的疾病。29


    其他宗教則對動物展現了更高的同理心，特別是源自印度的耆那教（Jainism）、佛教和印度教。這些宗教強調人類和生態系其他部分仍有連結，而且最重要的道德戒律就是不殺生。《聖經》只說「不可殺人」，但古印度的「ahimsa」（非暴力）原則卻適用於眾生。在這方面，耆那教的僧侶特別留意，總是用一塊白布蒙住嘴巴，以免呼吸時不小心殺害小昆蟲，走路的時候也總是帶著掃把，輕輕將路上的螞蟻或甲蟲掃到一旁。30


    然而，所有農業宗教（也包括耆那教、佛教和印度教在內）都有一套說詞，認為人類就是比較高等，剝削利用動物實屬正當（就算不是殺生取肉，至少也是獲取乳汁、或是借助其勞力）。這些宗教都聲稱，確有一種自然的階層結構，賦予人類控制和使用其他動物的權力，唯一的條件就是人類得遵守一定的限制。舉例來說，印度教雖然認為牛是神聖的動物、並禁吃牛肉，但仍然能為酪農業找到冠冕堂皇的藉口，聲稱牛是一種慷慨的生物，很渴望和人類分享牠們產出的牛乳。


    因此，人類就這樣自己談成了一場「農業交易」。根據這項交'
- md: '人類大命運


    易，某種宇宙間的大能，給了人類控制其他動物的權力，條件是人類要對神祇、對自然、以及對動物本身履行某些義務。而人們在農耕生活裡，每天都會感覺宇宙間確實有一股力量存在，也就更容易接受這種說法。


    狩獵採集者並不覺得自己比其他生物高級，原因就在於他們很少意識到自己會對生態系造成影響。當時典型的部落大概只有幾十人，部落周遭卻有幾千隻以上的野生動物，部落能否存活，有賴於理解和尊重這些動物的欲望。負責找食物的人得要不斷問自己，野鹿會想做什麼？獅子又會想要什麼？否則他們就捕不到鹿、也逃不過獅子。


    但農民卻與此相反，他們所居住的是一個由人類的夢想及想法所控制和塑造的世界。雖然人類仍然逃不了強大恐怖的天災（例如颱風和地震），但已經不再那麼需要理解其他動物的想法了。農場上的小夥子很早就懂得怎麼騎馬、給牛套上犁、鞭打倔強的驢子，以及把羊趕去吃草。每天這樣過日子，很容易就會認為，這一定是某種自然秩序、或是上天的旨意。


    於是，農業革命既是經濟上的革命，也成了宗教上的革命。新的經濟關係興起，新的宗教信念也同時產生，而替殘酷剝削利用動物的行為，找到了藉口。每次只要哪個碩果僅存的狩獵採集部落，也開始走向農耕，我們就會再次見證這種古老的過程。近年來，印度南部的納雅卡人已經開始出現一些農耕行為，像是養牛、養雞、種茶。毫不意外，他們也開始對動物有了新的態度，而且對於家畜及農作物的態度，明顯與野生生物有所不同。


    在納雅卡人的語言中，具有獨特個性的生物稱為「mansan」。例如人類學家那瓦問他們的時候，納雅卡人會說：所有的大象都屬於 mansan，「我們住在森林裡，他們也住在森林裡。我們和他們都是
    mansan⋯⋯還有熊、鹿、老虎也都是。都是森林裡的動物。」那乳牛呢？「乳牛不一樣。到哪裡你都得帶牠們走。」那雞呢？「牠們什麼都不是。牠們不是 mansan。」那森林裡的樹呢？「算是，他們已經活了這麼久了。」那茶樹呢？「喔，那是我種的，我把茶葉賣掉，才能從店裡頭買我要的東西。它們不算是
    mansan。」^{31}


    像這樣，就把動物從有情感、值得尊重的生命，降格成為不過是人類的資產。這種過程很少僅止於牛和雞，大多數農業社會也開始把不同等級的人，視為只是一種資產。像在古埃及、《聖經》時代的以色列和古代中國，都曾將人類當作奴隸，恣意虐待，僅因細故，便將之處決。正如農民不會去問牛和雞對於農場營運的意見，當時的一國之主，也絕不會想到要問問農民，該怎樣治理國家。此外，每當某些族群、團體或宗教社群起了衝突，常常就是互相指責「不配當人」。像這樣先將「他者」稱之以野獸，之後也才能待之以野獸。於是，農場也就成了新社會的原型——有著目空一切的農場主人、比較低等而可以剝削利用的其他動物、值得消滅的外部野獸；以及在一切之上有位偉大的神，對這一切安排給予祝福。


    # 科學革命造就了神人


    現代科學和工業的崛起，也帶來人與動物關係的第二波革命。在農業革命時，人類已經刪去了動植物的臺詞，讓泛靈論的這齣大戲只剩下人類與神之間的對話。到了科學革命，連神祇的臺詞也就此刪去。現在，整個世界已經成了獨角戲。人類獨自站在空盪盪的舞臺中間自言自語，不用和任何其他角色談判妥協，不但得到無比的權力，而且不用負擔任何義務。破解了物理、化學和生物無聲的定律之後，現在人類在這些領域硬是為所欲為。


    遠古的獵人到草原上狩獵，會要求野牛的協助，而野牛也向獵人要求一些東西。遠古的農民希望乳牛產出更多奶，會祈求神祇的協助，而神祇也會向農民開出祂的條件。但是在雀巢（Nestlé）的研發部門裡，穿著白色實驗衣的研發人員想提升乳牛的產乳量，他們會去研究遺傳學和基因，而基因不會向他們要求任何回報。


    只不過，正如獵人和農民各有自己的神話，研發人員其實也有一套他們相信的神話。他們最有名的神話，根本就是無恥的抄襲了知善惡樹和伊甸園的傳說，只是把地點搬到英格蘭林肯郡的伍爾索普莊園。根據這個神話，有個叫牛頓的人，坐在一棵蘋果樹下，而一顆熟蘋果就這麼掉在他頭上。於是牛頓開始思考，為什麼蘋果是直直落下，而不是往旁邊掉、或是向上飛？這個疑問讓他發現了萬有引力和牛頓運動定律。


    牛頓的故事讓知善惡樹的神話再也不同了。在伊甸園裡，是由蛇來開場，引誘人類犯罪，而使神將憤怒降在他們身上。不管對蛇或是對神來說，亞當和夏娃都只是個玩物。但在伍爾索普莊園裡，人類是唯一的主角。雖然牛頓本人是虔誠的基督徒，花在研讀《聖經》的時間遠比研究物理定律要多，但他所促成的科學革命，卻讓上帝就此退場。自此之後，牛頓的繼任者開始寫下他們自己的〈創世記〉神話，不管是神或是蛇，都再也沒有露臉的機會。伍爾索普莊園裡發生的事，是基於單純的自然律（natural
    law），而想找出這些自然律，則完全是人類自發的行為。雖然故事的開頭是有顆蘋果掉到了牛頓的頭上，但蘋果可不是故意的。


    在伊甸園的神話裡，人類因為好奇、希望得到知識，而遭到懲罰，被上帝趕出天堂。但在伍爾索普莊園的神話裡，不但沒人懲罰牛頓，情況還正好相反。多虧他的好奇心，人類才能進一步瞭解宇宙、變得更加強大，並且往科技的天堂又近了一步。全球無數教師傳頌著牛頓的神話，鼓勵學生要有好奇心，暗示著只要我們得到足夠的知識，就能在地球上創造出天堂。


    事實上，就算在牛頓的神話裡，還是有神的角色：牛頓自己就是神。等到生物科技、奈米科技和其他科學的果實終於成熟，智人就會得到神的大能，兜了一圈，而再次回到能給人知識的知善惡樹下。


    遠古的狩獵採集者，只不過就是另一種動物。到了農民，以為自己是神所造萬物的頂峰。但再到了科學家，則是要讓人類都演化升級為神。


    # 我們有何獨特之處？


    農業革命促成了有神論的宗教，科學革命則是催生了人文主義宗教：以人取代了神。有神論者崇拜的是神（希臘文裡的 theos），人文主義者則是崇拜人。像是自由主義、共產主義和納粹主義這樣的人文主義，其奠基概念認為：智人擁有某些獨特而神聖的本質，這些本質是宇宙間所有意義和權力的來源。宇宙間發生的所有事，都會以「對智人的影響」做為好壞判斷的依據。


    有神論以神之名，做為傳統農業的理由；人文主義則是以人之名，做為現代工業化農業的藉口。工業化農業將人的需求、任性和願望視為神聖，至於其他因素則不值一哂。例如動物，既然沒有人性的高貴，工業化農業自然不會把牠們放在眼裡。甚至是神，既然現代科技已經讓人類擁有了超過遠古神祇的力量，自然也沒有祂們派上用場的地方。科技讓現代產業對待牛、豬和雞的方式，甚至比傳統農業社會的飼養方式，更為嚴苛。


    在古埃及、羅馬帝國、或古代中國，人類對於生物化學、遺傳學、動物學和流行病學的所知都很有限，於是操縱這一切的力量也很有限。在那些時候，豬、牛和雞可以自由在屋間奔跑，從垃圾堆或附近的樹林裡，找出各種可吃的寶藏。如果有哪個異想天開的農夫，想把幾千隻雞都關在一間擁擠的雞舍裡，大概就會爆發致命的流行病，不但殺死整個雞群，可能連許多村民也會遭殃。這時候，任何祭司、薩滿巫師或神祇，都無法阻擋。


    然而，一等到現代科學解開流行病、病原體和抗生素的祕密，工業化的雞舍、牛欄、豬圈也就成為可行。靠著疫苗、藥物、荷爾蒙、殺蟲劑、中央空調系統、自動餵食裝置，現在我們能把成千上萬隻的豬、牛、雞，塞進整齊畫一的狹小籠子裡，用前所未有的效率，生產豬肉、牛奶和雞蛋。


    近年來，隨著人們重新思考人與動物的關係，這樣的做法也開始招致愈來愈多的批評。忽然之間，我們對於所謂低等生物的命運有了前所未有的興趣；或許也是因為自己快要變成低等生物了？


    如果電腦程式取得了超乎人類的智慧、前所未有的能力，我們是不是該認為這些程式比人類更重要？舉例來說，未來超乎人類智慧的人工智慧，能不能利用人類、剝削人類，甚至為了它自身的需求和欲望，而殺死人類？


    如果你認為，就算電腦的智慧和力量都遠超於人，這種事情還是萬萬不可以發生。那麼究竟是什麼道理，讓人類可以利用乳牛、剝削蛋雞、屠殺豬隻？難道除了有更高的智慧、更大的能力之外，人類還有什麼獨特之處，讓我們與牛、雞、豬、黑猩猩和電腦程式有所不同？


    如果覺得確實有所不同，那麼這種獨特之處究竟從何而來？我們又怎麼能夠肯定，人工智慧永遠無法取得這種獨特之處？而如果覺得沒有不同，那麼等到電腦超越了人類的智慧和力量，又有什麼理由說人類的生命有特殊價值呢？


    究竟，人類最早是怎麼變得如此聰明、強大？非人類的實體又有多大可能將會超過我們？


    下一章將會討論智人的本質和能力，一方面進一步理解我們與其他動物的關係，另一方面也要看看人類可能的未來，以及人類與超人類可能有怎樣的關係。


    ![](img/319dca06e22893e942053da0432e9f19_117_0.png)


    # 第3章


    # 人類的獨特之處


    毫無疑問，智人是目前世界上最強大的物種。但智人也很喜歡認為自己的道德地位較為高尚，自己的生命比豬、大象或狼更有價值。然而要講道德地位，智人的高度可就沒那麼明顯了。難道，真的是拳頭大就贏？就只因為全體人類的力量大於全體豬隻的力量，就能說人命比豬命更珍貴？美國國力遠勝過阿富汗，難道美國人的人命就比阿富汗人更有價值？


    在目前的現實處境上，美國人的人命確實更有價值。一般美國人在教育、健康和安全方面能得到的金錢投資，確實遠超過一般的阿富汗人。殺死一名美國公民，引起的國際譴責聲浪也會遠大於殺死一名阿富汗公民。然而一般人會認為，這只不過是因為地緣政治上的權力不對等。雖然阿富汗的影響力遠不及美國，但在托拉博拉（Tora
    Bora）山間孩子的生命，大家還是會認為：和比佛利山孩子的生命一樣，神聖不可侵犯。


    然而，如果說人類兒童的生命比小豬的生命重要，我們卻希望這不光是生態上的權力不對等，更希望在某些重要的方面，人命的就是比較優越。我們智人喜歡告訴自己，人類一定有某些神奇的特質，不僅能讓我們有如此偉大的能力，也為我們這種特權地位，找到道德上的理由。那麼，究竟人類獨特之處何在？


    傳統的一神論會說，只有智人擁有永恆的靈魂。雖然身體會衰老、腐爛，但靈魂會踏上通往救贖或詛咒的旅程，不是在天堂享受永恆的幸福，就是在地獄承受永遠的痛苦。但豬和其他動物沒有靈魂，自然也就不會出演這場宇宙大戲，不過就是活個幾年，接著就死去、化為虛無。因此，我們與其擔心生命短暫的豬，不如多把心思花在人類永恆的靈魂上。


    這絕不是幼兒園裡逗小孩的童話，而是非常強大的神話，即使到了二十一世紀初，仍然不斷影響著數十億人類和動物的生命。就現有的法律、政治和經濟制度而言，相信人類有永恆的靈魂、但動物只有短暫的肉體，可說是這些制度的中心支柱。舉例來說，這能夠解釋為什麼人類能夠宰殺動物為食，甚至只是為樂，就恣意欺凌屠戮！


    但是最新的科學發現，卻完全與這個一神論的神話互相牴觸。科學實驗確實也證明了這個神話的一部分：正如一神論宗教所言，動物沒有靈魂。經過各種小心研究、仔細檢視，都未發現線索證明豬、鼠或獼猴擁有靈魂。但遺憾的是：同樣的實驗卻也影響了一神論神話更重要的第二項假設，也就是人類擁有靈魂。科學家已經讓智人做過千千萬萬種怪異的實驗，找遍了人心臟裡的每個角落、看遍了大腦裡的每一道縫隙，卻仍未發現什麼獨特之處。完全沒有任何科學證據，能夠證明人擁有靈魂、豬則沒有。


    如果只是這樣，或許還能說科學家該繼續找就是了。他們還沒找到靈魂，可能只是找得還不夠仔細？然而，生命科學之所以質疑靈魂這個概念，並不是因為缺乏證據，而是因為這個概念根本違反演化的基本原理。也正是因為這種矛盾，使得虔誠一神論信徒，對演化論恨之入骨。


    # 誰怕達爾文?


    2012年的蓋洛普（Gallup）調查顯示，美國人只有15%認為智人演化全靠天擇，並無神祇介入；32%認為，人類可能是經由持續幾百萬年的過程，才從早期生命形式演化成現在的模樣，但整件事正是上帝的精心安排；46%則認為，人正如《聖經》所言，是由上帝在大約一萬年前所創。就算大學讀了三年，也完全不會影響這些看法。同一項調查發現，大學畢業生中，46%相信《聖經》裡神造萬物的故事，只有14%認為人類演化沒有什麼神祇監督。就算是碩士和博士畢業生，還是有25%相信《聖經》，只有29%相信人類是單純由天擇所演化而成。1


    顯然，目前學校對於演化的教學成效已經夠差了，但還有宗教狂熱份子堅持根本不該教孩子演化論，或聲稱應該帶入其他觀點，像是智慧設計論，也就是認為：所有的生物都是由某種更高的智慧（也稱為「上帝」）所設計。狂熱份子說：「兩種都教，再讓孩子自己決定。」


    為什麼演化論引起這麼強烈的反彈，但一講到相對論、量子力學，卻似乎一片靜悄悄？為什麼講到物質、能量、空間和時間的理論時，不會有政客要求應該教「其他觀點」？畢竟第一眼看來，和愛因斯坦的相對論或海森堡（Werner
    Heisenberg）的量子力學相比，達爾文的概念實在沒什麼可怕的。演化論的基本原理就是「生殖成就最高（fittest）者生存」，這個想法再簡單明瞭不過，甚至可說有點單調。相較之下，相對論和量子力學認為人可以扭曲時空、無中生有、某隻貓可以同時既是死的也是活的，這簡直是在嘲弄我們的一般常識，卻沒有人站起來說要保護無辜的學童，不要接觸這些可笑的想法。這究竟為什麼？


    相對論不會讓什麼人生氣，是因為它並不牴觸什麼我們寶貴的信仰。空間和時間究竟是絕對或相對，大多數人壓根就不在乎。如果你說空間和時間可以彎曲，好啊，請自便。彎就彎吧，干我什麼事呢？但相較之下，達爾文卻會讓我們失去靈魂。如果真的去理解演化論，就會發現沒有靈魂這件事，而這個想法不只會驚嚇到虔誠的基督徒或穆斯林，還會嚇到許多一般人。雖然他們不見得有任何明確的宗教信仰，但仍希望每個人都具有一生不變的個人本質，甚至在死後也能保存完好。


    從字面來看，英文的individual（個體、個人）指的就是：無法（in-）再分割（divide）的東西。於是，說自己是個in-dividual，也就暗示著我是個完整的整體，而不是個別獨立部分的集合。有人就主張，這種不可分割的本質就算隨著時間過去，也能不增不減，保持原樣。我的身體和大腦會不斷變化，像是神經元會觸發（firing）、荷爾蒙會分泌、肌肉會收縮；但是我的性格、期望和人際關係，從來不會停滯不變，幾年或幾十年後很有可能完全不同；然而，在一切的最深處，我從出生到死亡都還是同一個人，而且我還希望這一點能夠超越死亡。


    不幸的是，演化論並不認為有什麼不可分割、不會改變、可能永恆的自我本質。根據演化論的看法，所有生物（從大象和櫟樹，到細胞和DNA分子）都是由更小、更簡單的單位所組成，會不斷連結和分離。大象和細胞之所以會不斷演變，正是因為不斷有著新的連結和分離。如果是無法分割或改變的東西，就不可能透過天擇而出現。


    以人眼為例，就是由許多更小的部分所組成的複雜系統，包含像是水晶體、角膜和視網膜。眼睛可不是橫空出世、一現身就備齊所有部分，而是經過幾百萬年一小步、一小步演化，才成了現在的樣子。與大約一百萬年前的直立人（Homo
    erectus）相較，智人和他們的眼睛還非常類似。與大約五百萬年前的南猿（Australopithecus）相較，相似的地方就少了一點。再與一億五千萬年前的史前哺乳動物Dryolestes相比，則已是天差地別了。與億萬年前住在地球上的單細胞生物相比，看來就是毫不相似。


    然而，就算是單細胞生物，其實也有微小的胞器，能讓這隻微生物辨別明暗，以便向光或背光移動。從這種最原始的感測器，演化成現在的人眼，整個過程曲折而漫長——但如果你也有幾億年的時間，當然就能一步一步走完。要能做到這件事，正是因為眼睛能夠分成許多不同的部分。只要每隔幾代、在某一個部分有了一點小小的變化（像是角膜曲度大了一點），經過幾百萬代，就可能演化出人眼來。如果眼睛就是一個完整的實體、無法再分出任何部分，就絕不可能透過天擇，演化成現在的樣子。


    正因如此，如果要說靈魂就是一種不可分割、不會改變、可能永恆的東西，演化論當然無法接受。天擇之所以能夠塑造人類的眼睛，正是因為眼睛可以再分成許多不同的部分。然而，靈魂卻不能再分出局部。如果要說智人的靈魂是從直立人的靈魂一步步演化而來，到底步驟是什麼？智人的靈魂有什麼部分，是比直立人的靈魂更發達的？事實是，若真有靈魂，也沒辦法再分出局部。


    可能有人會說，人類的靈魂就不是演化來的，而是在某一天突然出現的，一出現就完整無缺。只不過，這某一天究竟是哪一天？我們仔細檢視人類的演化歷程，卻怎麼找都找不出這一天。


    從古至今的所有人類，都是男性精子使女性卵子受精的結果。讓我們想像一下，第一個有靈魂的嬰兒會是怎樣。這個嬰兒可能很像爸爸媽媽，只不過小孩有靈魂，但爸媽沒有。確實，生物學絕對可以解釋像是小孩角膜曲度比爸媽大一點的情形，只要有某個基因出現一點點的突變，就有可能；然而要說爸媽一絲一毫的靈魂都沒有，小孩身上卻出現了永恆的靈魂，這可就不是生物學說得通的事了。難道只要一次突變（甚至要說多次突變也無妨），就足以讓某隻動物有了一種足以抵抗一切改變、甚至能夠超越死亡的本質？


    正因如此，靈魂這件事從演化論無法解釋。演化就是變化，而且無法產生永恆的實體。從演化角度來看，我們最接近人類本質的就是我們的DNA，但DNA承載的絕非永恆，而是突變！這讓很多人嚇壞了，寧可不信演化論，也不想放棄自己的靈魂。


    # 心靈是什麼？


    另一種用來證明人類比其他動物優越的說法，是說地球上所有動物中，只有智人擁有心靈。


    心靈（mind）和靈魂大有不同。心靈並不是什麼神祕而永恆的概念，也不是眼睛或大腦之類的器官，而是腦中主觀經驗的流動，例如痛苦、快樂、憤怒和愛。這些心理上的經驗，就是各種緊密相連的感覺、情感和思想，忽然閃現、立刻消失……其他經驗再接著倏然浮現與消散，於電光石火間來去。（我們若回想起這些經驗，常常會想把它們分成感覺、情感和思想之類，但事實上一切都是混合在一起的。）把這種種經驗集合起來，就構成了意識流（stream
    of consciousness）。心靈不像是永恆的靈魂，心靈可以分成許多部分，變動不休，而且沒有理由認為這會直到永恆。


    靈魂是個有人相信、有人不相信的故事。但意識流則相反，這是我們每分每秒都能直接觀察到的具體現實，再明確也不過，無法懷疑它的存在。甚至就算我們充滿懷疑，自問：「真的有主觀經驗這種事嗎？」我們也能百分百確定，自己就是正在經驗著懷疑。


    到底是哪些意識經驗構成了心流？主觀經驗有兩項基本特徵：感覺、欲望。之所以說機器人和電腦沒有意識，是因為雖然它們能力強大，卻沒有什麼感覺，也沒有什麼欲望。機器人可能有電量感測器，在電池快沒電時，向中央處理器發出訊號，讓機器人移向插座、自己插上插頭充電。但是在整個過程中，機器人不會有什麼感覺。相對的，快要耗盡能量的人，則會感覺飢餓，一心渴望能停止這種不愉快的感覺。正因為如此，我們才會說：人類是有意識的生物，而機器人則否；逼人工作到過度飢餓和疲憊而崩潰是一種罪，然而讓機器人工作到電池耗盡，卻沒有任何道德問題。


    那麼，動物呢？牠們有意識嗎？牠們有主觀經驗嗎？如果逼一匹馬工作，直到牠筋疲力竭而崩潰，有沒有道德問題？


    前面已經提過，生命科學認為：所有哺乳動物和鳥類、以及某些爬蟲類和魚類，都具有感覺和情感。但也有最新理論認為：感覺和情感都只是生化的資料處理演算法。既然機器人和電腦處理資料的時候，不會有任何主觀經驗，也許動物也是一樣？事實上，我們知道就算是人類，大腦也有許多感覺迴路和情感迴路，是在人類完全無意識的情況下處理資料的。所以，或許我們以為動物會有的感'
  mdcn: '人類大命運


    易，某種宇宙間的大能，給了人類控制其他動物的權力，條件是人類要對神祇、對自然、以及對動物本身履行某些義務。而人們在農耕生活裡，每天都會感覺宇宙間確實有一股力量存在，也就更容易接受這種說法。


    狩獵採集者並不覺得自己比其他生物高級，原因就在於他們很少意識到自己會對生態系造成影響。當時典型的部落大概只有幾十人，部落周遭卻有幾千隻以上的野生動物，部落能否存活，有賴於理解和尊重這些動物的欲望。負責找食物的人得要不斷問自己，野鹿會想做什麼？獅子又會想要什麼？否則他們就捕不到鹿、也逃不過獅子。


    但農民卻與此相反，他們所居住的是一個由人類的夢想及想法所控制和塑造的世界。雖然人類仍然逃不了強大恐怖的天災（例如颱風和地震），但已經不再那麼需要理解其他動物的想法了。農場上的小夥子很早就懂得怎麼騎馬、給牛套上犁、鞭打倔強的驢子，以及把羊趕去吃草。每天這樣過日子，很容易就會認為，這一定是某種自然秩序、或是上天的旨意。


    於是，農業革命既是經濟上的革命，也成了宗教上的革命。新的經濟關係興起，新的宗教信念也同時產生，而替殘酷剝削利用動物的行為，找到了藉口。每次只要哪個碩果僅存的狩獵採集部落，也開始走向農耕，我們就會再次見證這種古老的過程。近年來，印度南部的納雅卡人已經開始出現一些農耕行為，像是養牛、養雞、種茶。毫不意外，他們也開始對動物有了新的態度，而且對於家畜及農作物的態度，明顯與野生生物有所不同。


    在納雅卡人的語言中，具有獨特個性的生物稱為「mansan」。例如人類學家那瓦問他們的時候，納雅卡人會說：所有的大象都屬於 mansan，「我們住在森林裡，他們也住在森林裡。我們和他們都是
    mansan⋯⋯還有熊、鹿、老虎也都是。都是森林裡的動物。」那乳牛呢？「乳牛不一樣。到哪裡你都得帶牠們走。」那雞呢？「牠們什麼都不是。牠們不是 mansan。」那森林裡的樹呢？「算是，他們已經活了這麼久了。」那茶樹呢？「喔，那是我種的，我把茶葉賣掉，才能從店裡頭買我要的東西。它們不算是
    mansan。」^{31}


    像這樣，就把動物從有情感、值得尊重的生命，降格成為不過是人類的資產。這種過程很少僅止於牛和雞，大多數農業社會也開始把不同等級的人，視為只是一種資產。像在古埃及、《聖經》時代的以色列和古代中國，都曾將人類當作奴隸，恣意虐待，僅因細故，便將之處決。正如農民不會去問牛和雞對於農場營運的意見，當時的一國之主，也絕不會想到要問問農民，該怎樣治理國家。此外，每當某些族群、團體或宗教社群起了衝突，常常就是互相指責「不配當人」。像這樣先將「他者」稱之以野獸，之後也才能待之以野獸。於是，農場也就成了新社會的原型——有著目空一切的農場主人、比較低等而可以剝削利用的其他動物、值得消滅的外部野獸；以及在一切之上有位偉大的神，對這一切安排給予祝福。


    # 科學革命造就了神人


    現代科學和工業的崛起，也帶來人與動物關係的第二波革命。在農業革命時，人類已經刪去了動植物的臺詞，讓泛靈論的這齣大戲只剩下人類與神之間的對話。到了科學革命，連神祇的臺詞也就此刪去。現在，整個世界已經成了獨角戲。人類獨自站在空盪盪的舞臺中間自言自語，不用和任何其他角色談判妥協，不但得到無比的權力，而且不用負擔任何義務。破解了物理、化學和生物無聲的定律之後，現在人類在這些領域硬是為所欲為。


    遠古的獵人到草原上狩獵，會要求野牛的協助，而野牛也向獵人要求一些東西。遠古的農民希望乳牛產出更多奶，會祈求神祇的協助，而神祇也會向農民開出祂的條件。但是在雀巢（Nestlé）的研發部門裡，穿著白色實驗衣的研發人員想提升乳牛的產乳量，他們會去研究遺傳學和基因，而基因不會向他們要求任何回報。


    只不過，正如獵人和農民各有自己的神話，研發人員其實也有一套他們相信的神話。他們最有名的神話，根本就是無恥的抄襲了知善惡樹和伊甸園的傳說，只是把地點搬到英格蘭林肯郡的伍爾索普莊園。根據這個神話，有個叫牛頓的人，坐在一棵蘋果樹下，而一顆熟蘋果就這麼掉在他頭上。於是牛頓開始思考，為什麼蘋果是直直落下，而不是往旁邊掉、或是向上飛？這個疑問讓他發現了萬有引力和牛頓運動定律。


    牛頓的故事讓知善惡樹的神話再也不同了。在伊甸園裡，是由蛇來開場，引誘人類犯罪，而使神將憤怒降在他們身上。不管對蛇或是對神來說，亞當和夏娃都只是個玩物。但在伍爾索普莊園裡，人類是唯一的主角。雖然牛頓本人是虔誠的基督徒，花在研讀《聖經》的時間遠比研究物理定律要多，但他所促成的科學革命，卻讓上帝就此退場。自此之後，牛頓的繼任者開始寫下他們自己的〈創世記〉神話，不管是神或是蛇，都再也沒有露臉的機會。伍爾索普莊園裡發生的事，是基於單純的自然律（natural
    law），而想找出這些自然律，則完全是人類自發的行為。雖然故事的開頭是有顆蘋果掉到了牛頓的頭上，但蘋果可不是故意的。


    在伊甸園的神話裡，人類因為好奇、希望得到知識，而遭到懲罰，被上帝趕出天堂。但在伍爾索普莊園的神話裡，不但沒人懲罰牛頓，情況還正好相反。多虧他的好奇心，人類才能進一步瞭解宇宙、變得更加強大，並且往科技的天堂又近了一步。全球無數教師傳頌著牛頓的神話，鼓勵學生要有好奇心，暗示著只要我們得到足夠的知識，就能在地球上創造出天堂。


    事實上，就算在牛頓的神話裡，還是有神的角色：牛頓自己就是神。等到生物科技、奈米科技和其他科學的果實終於成熟，智人就會得到神的大能，兜了一圈，而再次回到能給人知識的知善惡樹下。


    遠古的狩獵採集者，只不過就是另一種動物。到了農民，以為自己是神所造萬物的頂峰。但再到了科學家，則是要讓人類都演化升級為神。


    # 我們有何獨特之處？


    農業革命促成了有神論的宗教，科學革命則是催生了人文主義宗教：以人取代了神。有神論者崇拜的是神（希臘文裡的 theos），人文主義者則是崇拜人。像是自由主義、共產主義和納粹主義這樣的人文主義，其奠基概念認為：智人擁有某些獨特而神聖的本質，這些本質是宇宙間所有意義和權力的來源。宇宙間發生的所有事，都會以「對智人的影響」做為好壞判斷的依據。


    有神論以神之名，做為傳統農業的理由；人文主義則是以人之名，做為現代工業化農業的藉口。工業化農業將人的需求、任性和願望視為神聖，至於其他因素則不值一哂。例如動物，既然沒有人性的高貴，工業化農業自然不會把牠們放在眼裡。甚至是神，既然現代科技已經讓人類擁有了超過遠古神祇的力量，自然也沒有祂們派上用場的地方。科技讓現代產業對待牛、豬和雞的方式，甚至比傳統農業社會的飼養方式，更為嚴苛。


    在古埃及、羅馬帝國、或古代中國，人類對於生物化學、遺傳學、動物學和流行病學的所知都很有限，於是操縱這一切的力量也很有限。在那些時候，豬、牛和雞可以自由在屋間奔跑，從垃圾堆或附近的樹林裡，找出各種可吃的寶藏。如果有哪個異想天開的農夫，想把幾千隻雞都關在一間擁擠的雞舍裡，大概就會爆發致命的流行病，不但殺死整個雞群，可能連許多村民也會遭殃。這時候，任何祭司、薩滿巫師或神祇，都無法阻擋。


    然而，一等到現代科學解開流行病、病原體和抗生素的祕密，工業化的雞舍、牛欄、豬圈也就成為可行。靠著疫苗、藥物、荷爾蒙、殺蟲劑、中央空調系統、自動餵食裝置，現在我們能把成千上萬隻的豬、牛、雞，塞進整齊畫一的狹小籠子裡，用前所未有的效率，生產豬肉、牛奶和雞蛋。


    近年來，隨著人們重新思考人與動物的關係，這樣的做法也開始招致愈來愈多的批評。忽然之間，我們對於所謂低等生物的命運有了前所未有的興趣；或許也是因為自己快要變成低等生物了？


    如果電腦程式取得了超乎人類的智慧、前所未有的能力，我們是不是該認為這些程式比人類更重要？舉例來說，未來超乎人類智慧的人工智慧，能不能利用人類、剝削人類，甚至為了它自身的需求和欲望，而殺死人類？


    如果你認為，就算電腦的智慧和力量都遠超於人，這種事情還是萬萬不可以發生。那麼究竟是什麼道理，讓人類可以利用乳牛、剝削蛋雞、屠殺豬隻？難道除了有更高的智慧、更大的能力之外，人類還有什麼獨特之處，讓我們與牛、雞、豬、黑猩猩和電腦程式有所不同？


    如果覺得確實有所不同，那麼這種獨特之處究竟從何而來？我們又怎麼能夠肯定，人工智慧永遠無法取得這種獨特之處？而如果覺得沒有不同，那麼等到電腦超越了人類的智慧和力量，又有什麼理由說人類的生命有特殊價值呢？


    究竟，人類最早是怎麼變得如此聰明、強大？非人類的實體又有多大可能將會超過我們？


    下一章將會討論智人的本質和能力，一方面進一步理解我們與其他動物的關係，另一方面也要看看人類可能的未來，以及人類與超人類可能有怎樣的關係。


    ![](img/319dca06e22893e942053da0432e9f19_117_0.png)


    # 第3章


    # 人類的獨特之處


    毫無疑問，智人是目前世界上最強大的物種。但智人也很喜歡認為自己的道德地位較為高尚，自己的生命比豬、大象或狼更有價值。然而要講道德地位，智人的高度可就沒那麼明顯了。難道，真的是拳頭大就贏？就只因為全體人類的力量大於全體豬隻的力量，就能說人命比豬命更珍貴？美國國力遠勝過阿富汗，難道美國人的人命就比阿富汗人更有價值？


    在目前的現實處境上，美國人的人命確實更有價值。一般美國人在教育、健康和安全方面能得到的金錢投資，確實遠超過一般的阿富汗人。殺死一名美國公民，引起的國際譴責聲浪也會遠大於殺死一名阿富汗公民。然而一般人會認為，這只不過是因為地緣政治上的權力不對等。雖然阿富汗的影響力遠不及美國，但在托拉博拉（Tora
    Bora）山間孩子的生命，大家還是會認為：和比佛利山孩子的生命一樣，神聖不可侵犯。


    然而，如果說人類兒童的生命比小豬的生命重要，我們卻希望這不光是生態上的權力不對等，更希望在某些重要的方面，人命的就是比較優越。我們智人喜歡告訴自己，人類一定有某些神奇的特質，不僅能讓我們有如此偉大的能力，也為我們這種特權地位，找到道德上的理由。那麼，究竟人類獨特之處何在？


    傳統的一神論會說，只有智人擁有永恆的靈魂。雖然身體會衰老、腐爛，但靈魂會踏上通往救贖或詛咒的旅程，不是在天堂享受永恆的幸福，就是在地獄承受永遠的痛苦。但豬和其他動物沒有靈魂，自然也就不會出演這場宇宙大戲，不過就是活個幾年，接著就死去、化為虛無。因此，我們與其擔心生命短暫的豬，不如多把心思花在人類永恆的靈魂上。


    這絕不是幼兒園裡逗小孩的童話，而是非常強大的神話，即使到了二十一世紀初，仍然不斷影響著數十億人類和動物的生命。就現有的法律、政治和經濟制度而言，相信人類有永恆的靈魂、但動物只有短暫的肉體，可說是這些制度的中心支柱。舉例來說，這能夠解釋為什麼人類能夠宰殺動物為食，甚至只是為樂，就恣意欺凌屠戮！


    但是最新的科學發現，卻完全與這個一神論的神話互相牴觸。科學實驗確實也證明了這個神話的一部分：正如一神論宗教所言，動物沒有靈魂。經過各種小心研究、仔細檢視，都未發現線索證明豬、鼠或獼猴擁有靈魂。但遺憾的是：同樣的實驗卻也影響了一神論神話更重要的第二項假設，也就是人類擁有靈魂。科學家已經讓智人做過千千萬萬種怪異的實驗，找遍了人心臟裡的每個角落、看遍了大腦裡的每一道縫隙，卻仍未發現什麼獨特之處。完全沒有任何科學證據，能夠證明人擁有靈魂、豬則沒有。


    如果只是這樣，或許還能說科學家該繼續找就是了。他們還沒找到靈魂，可能只是找得還不夠仔細？然而，生命科學之所以質疑靈魂這個概念，並不是因為缺乏證據，而是因為這個概念根本違反演化的基本原理。也正是因為這種矛盾，使得虔誠一神論信徒，對演化論恨之入骨。


    # 誰怕達爾文?


    2012年的蓋洛普（Gallup）調查顯示，美國人只有15%認為智人演化全靠天擇，並無神祇介入；32%認為，人類可能是經由持續幾百萬年的過程，才從早期生命形式演化成現在的模樣，但整件事正是上帝的精心安排；46%則認為，人正如《聖經》所言，是由上帝在大約一萬年前所創。就算大學讀了三年，也完全不會影響這些看法。同一項調查發現，大學畢業生中，46%相信《聖經》裡神造萬物的故事，只有14%認為人類演化沒有什麼神祇監督。就算是碩士和博士畢業生，還是有25%相信《聖經》，只有29%相信人類是單純由天擇所演化而成。1


    顯然，目前學校對於演化的教學成效已經夠差了，但還有宗教狂熱份子堅持根本不該教孩子演化論，或聲稱應該帶入其他觀點，像是智慧設計論，也就是認為：所有的生物都是由某種更高的智慧（也稱為「上帝」）所設計。狂熱份子說：「兩種都教，再讓孩子自己決定。」


    為什麼演化論引起這麼強烈的反彈，但一講到相對論、量子力學，卻似乎一片靜悄悄？為什麼講到物質、能量、空間和時間的理論時，不會有政客要求應該教「其他觀點」？畢竟第一眼看來，和愛因斯坦的相對論或海森堡（Werner
    Heisenberg）的量子力學相比，達爾文的概念實在沒什麼可怕的。演化論的基本原理就是「生殖成就最高（fittest）者生存」，這個想法再簡單明瞭不過，甚至可說有點單調。相較之下，相對論和量子力學認為人可以扭曲時空、無中生有、某隻貓可以同時既是死的也是活的，這簡直是在嘲弄我們的一般常識，卻沒有人站起來說要保護無辜的學童，不要接觸這些可笑的想法。這究竟為什麼？


    相對論不會讓什麼人生氣，是因為它並不牴觸什麼我們寶貴的信仰。空間和時間究竟是絕對或相對，大多數人壓根就不在乎。如果你說空間和時間可以彎曲，好啊，請自便。彎就彎吧，干我什麼事呢？但相較之下，達爾文卻會讓我們失去靈魂。如果真的去理解演化論，就會發現沒有靈魂這件事，而這個想法不只會驚嚇到虔誠的基督徒或穆斯林，還會嚇到許多一般人。雖然他們不見得有任何明確的宗教信仰，但仍希望每個人都具有一生不變的個人本質，甚至在死後也能保存完好。


    從字面來看，英文的individual（個體、個人）指的就是：無法（in-）再分割（divide）的東西。於是，說自己是個in-dividual，也就暗示著我是個完整的整體，而不是個別獨立部分的集合。有人就主張，這種不可分割的本質就算隨著時間過去，也能不增不減，保持原樣。我的身體和大腦會不斷變化，像是神經元會觸發（firing）、荷爾蒙會分泌、肌肉會收縮；但是我的性格、期望和人際關係，從來不會停滯不變，幾年或幾十年後很有可能完全不同；然而，在一切的最深處，我從出生到死亡都還是同一個人，而且我還希望這一點能夠超越死亡。


    不幸的是，演化論並不認為有什麼不可分割、不會改變、可能永恆的自我本質。根據演化論的看法，所有生物（從大象和櫟樹，到細胞和DNA分子）都是由更小、更簡單的單位所組成，會不斷連結和分離。大象和細胞之所以會不斷演變，正是因為不斷有著新的連結和分離。如果是無法分割或改變的東西，就不可能透過天擇而出現。


    以人眼為例，就是由許多更小的部分所組成的複雜系統，包含像是水晶體、角膜和視網膜。眼睛可不是橫空出世、一現身就備齊所有部分，而是經過幾百萬年一小步、一小步演化，才成了現在的樣子。與大約一百萬年前的直立人（Homo
    erectus）相較，智人和他們的眼睛還非常類似。與大約五百萬年前的南猿（Australopithecus）相較，相似的地方就少了一點。再與一億五千萬年前的史前哺乳動物Dryolestes相比，則已是天差地別了。與億萬年前住在地球上的單細胞生物相比，看來就是毫不相似。


    然而，就算是單細胞生物，其實也有微小的胞器，能讓這隻微生物辨別明暗，以便向光或背光移動。從這種最原始的感測器，演化成現在的人眼，整個過程曲折而漫長——但如果你也有幾億年的時間，當然就能一步一步走完。要能做到這件事，正是因為眼睛能夠分成許多不同的部分。只要每隔幾代、在某一個部分有了一點小小的變化（像是角膜曲度大了一點），經過幾百萬代，就可能演化出人眼來。如果眼睛就是一個完整的實體、無法再分出任何部分，就絕不可能透過天擇，演化成現在的樣子。


    正因如此，如果要說靈魂就是一種不可分割、不會改變、可能永恆的東西，演化論當然無法接受。天擇之所以能夠塑造人類的眼睛，正是因為眼睛可以再分成許多不同的部分。然而，靈魂卻不能再分出局部。如果要說智人的靈魂是從直立人的靈魂一步步演化而來，到底步驟是什麼？智人的靈魂有什麼部分，是比直立人的靈魂更發達的？事實是，若真有靈魂，也沒辦法再分出局部。


    可能有人會說，人類的靈魂就不是演化來的，而是在某一天突然出現的，一出現就完整無缺。只不過，這某一天究竟是哪一天？我們仔細檢視人類的演化歷程，卻怎麼找都找不出這一天。


    從古至今的所有人類，都是男性精子使女性卵子受精的結果。讓我們想像一下，第一個有靈魂的嬰兒會是怎樣。這個嬰兒可能很像爸爸媽媽，只不過小孩有靈魂，但爸媽沒有。確實，生物學絕對可以解釋像是小孩角膜曲度比爸媽大一點的情形，只要有某個基因出現一點點的突變，就有可能；然而要說爸媽一絲一毫的靈魂都沒有，小孩身上卻出現了永恆的靈魂，這可就不是生物學說得通的事了。難道只要一次突變（甚至要說多次突變也無妨），就足以讓某隻動物有了一種足以抵抗一切改變、甚至能夠超越死亡的本質？


    正因如此，靈魂這件事從演化論無法解釋。演化就是變化，而且無法產生永恆的實體。從演化角度來看，我們最接近人類本質的就是我們的DNA，但DNA承載的絕非永恆，而是突變！這讓很多人嚇壞了，寧可不信演化論，也不想放棄自己的靈魂。


    # 心靈是什麼？


    另一種用來證明人類比其他動物優越的說法，是說地球上所有動物中，只有智人擁有心靈。


    心靈（mind）和靈魂大有不同。心靈並不是什麼神祕而永恆的概念，也不是眼睛或大腦之類的器官，而是腦中主觀經驗的流動，例如痛苦、快樂、憤怒和愛。這些心理上的經驗，就是各種緊密相連的感覺、情感和思想，忽然閃現、立刻消失……其他經驗再接著倏然浮現與消散，於電光石火間來去。（我們若回想起這些經驗，常常會想把它們分成感覺、情感和思想之類，但事實上一切都是混合在一起的。）把這種種經驗集合起來，就構成了意識流（stream
    of consciousness）。心靈不像是永恆的靈魂，心靈可以分成許多部分，變動不休，而且沒有理由認為這會直到永恆。


    靈魂是個有人相信、有人不相信的故事。但意識流則相反，這是我們每分每秒都能直接觀察到的具體現實，再明確也不過，無法懷疑它的存在。甚至就算我們充滿懷疑，自問：「真的有主觀經驗這種事嗎？」我們也能百分百確定，自己就是正在經驗著懷疑。


    到底是哪些意識經驗構成了心流？主觀經驗有兩項基本特徵：感覺、欲望。之所以說機器人和電腦沒有意識，是因為雖然它們能力強大，卻沒有什麼感覺，也沒有什麼欲望。機器人可能有電量感測器，在電池快沒電時，向中央處理器發出訊號，讓機器人移向插座、自己插上插頭充電。但是在整個過程中，機器人不會有什麼感覺。相對的，快要耗盡能量的人，則會感覺飢餓，一心渴望能停止這種不愉快的感覺。正因為如此，我們才會說：人類是有意識的生物，而機器人則否；逼人工作到過度飢餓和疲憊而崩潰是一種罪，然而讓機器人工作到電池耗盡，卻沒有任何道德問題。


    那麼，動物呢？牠們有意識嗎？牠們有主觀經驗嗎？如果逼一匹馬工作，直到牠筋疲力竭而崩潰，有沒有道德問題？


    前面已經提過，生命科學認為：所有哺乳動物和鳥類、以及某些爬蟲類和魚類，都具有感覺和情感。但也有最新理論認為：感覺和情感都只是生化的資料處理演算法。既然機器人和電腦處理資料的時候，不會有任何主觀經驗，也許動物也是一樣？事實上，我們知道就算是人類，大腦也有許多感覺迴路和情感迴路，是在人類完全無意識的情況下處理資料的。所以，或許我們以為動物會有的感'
