  md: '如果用時光機把現代科學家送回古埃及，就算她用演化論、相對論和量子物理，戳破了埃及祭司的一切虛構，還是無法在當時擁有力量。當然，如果這位科學家可以運用知識製作出槍炮，就能在面對法老和鱷魚神索貝克時大占優勢。但為此，她必須開採鐵礦、建造熔鐵爐、製作火藥，也就需要許多辛勤工作的農民為她工作。你真的覺得，和農民大談E=mc²，就能讓他們對你五體投地嗎？如果你真這麼想，歡迎現在買張到阿富汗或敘利亞的機票，好好一展長才。


