    二十年前，日本遊客因為總是拿著相機照個不停，曾經受到全世界的嘲笑；但現在人人都是如此。如果你現在去印度看到一隻大象，你不會看著這隻大象而問問自己心中的感受，而是會趕緊掏出智慧型手機，趕快照張相、上傳臉書，再每隔兩分鐘就檢查一下，看看集到了多少個讚。在前幾個世代，寫日記只給自己看，是很常見的人文主義習慣；但現在，很多年輕人卻覺得完全沒道理。如果沒有其他人能讀到，寫了不都是白寫嗎？現代的新座右銘是：「如果你體驗到什麼，就記錄。如果你記錄了什麼，就上傳。如果你上傳了什麼，就分享！」


    我們在這本《人類大命運》裡不斷問道：究竟是什麼讓人類比其他動物優越？數據主義有一個全新而又簡潔的答案。


    就個體而言，人類的經驗並不比狼或大象的經驗來得優越。只要是資料數據，都無高下之別。然而，人類可以把自己的經驗吟成詩、寫成部落格、發表到網路上，使全球資料處理系統更為豐富。就是這樣，才讓人類的資料數據有了意義。狼做不到這件事，因此雖然狼的各種經驗可能一樣深刻複雜，卻毫無價值。難怪我們會如此忙著將自己的經驗，轉化為各種資料數據。這不是趕不趕流行的問題，而是生存的問題。我們必須向自己和系統證明自己仍然有價值，而且價值不在於單純擁有經驗，而在於將經驗轉化為自由流動的資料數據。


