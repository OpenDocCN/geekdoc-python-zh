  md: '這並不代表二十世紀的獨裁統治將會重演。就算是專制政權，似乎同樣無力應付科技發展的腳步，同樣無力應付資料流的數量和速度。在二十世紀，獨裁者對未來自有一套宏偉願景，例如不論是共產主義或法西斯主義，都希望徹底摧毀舊世界，再建起新世界取而代之。不論你對列寧、希特勒或毛澤東有何看法，都不可能說他們沒有願景。到了今天，理論上領導者的願景應該會更為宏偉，畢竟過去的共產黨和納粹，不過是有了蒸汽機和打字機，就想打造出新的社會，今天我們可還有生物科技和超級電腦任君使用呢！


    # 政治已不再有宏偉願景


    在科幻電影的劇情裡，總演著像希特勒一樣的壞政客，一心奪取各種新科技，要用來實踐各式極端政治理想。但回到二十一世紀早期，就算在俄羅斯、伊朗或北韓這些專制國家，實際的政客和好萊塢版本，卻根本是兩回事。


    那些人看起來，可沒什麼美麗新世界的願景。就算是金正恩或伊朗最高領導人哈米尼（Ayatollah Ali Khamenei）做過最狂的夢，仍然不過就是原子彈和彈道飛彈之類，完全還停留在二戰時代。普丁似乎也只是想重建舊的蘇聯集團，甚至是更早的沙皇帝國。與此同時，偏執的美國共和黨人，大罵歐巴馬是個無情的獨裁者，說他陰謀破壞美國社會的基礎；但過了八年總統任期，歐巴馬費盡心力也只是勉強推動了一場小小的健康照護改革，不論是創造新世界或是新人類，都完全不在他的待辦議題之列。


    正因為科技進步如此快速，不論國會或獨裁者，都被來不及處理的資料數據壓得喘不過氣，現今政治人物的眼界，要比一個世紀'
