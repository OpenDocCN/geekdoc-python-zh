  md: '援。谷歌風投的總投資金額高達二十億美元，其中36%將投入生技新創公司，也包括幾項深具雄心的壽命延長計畫。馬里斯用美式足球打比方，解釋這場與死亡的對決：「我們不只要挺進幾碼，而且要贏下這場比賽。」為什麼？馬里斯說：「因為活著總比死好啊。」28


    許多矽谷巨擘，都抱持這樣的大夢想。PayPal共同創辦人泰爾（Peter Thiel）最近就承認，他希望永遠活下去。他解釋道：「我認為，處理方式大概有三種：接受死亡、拒絕死亡、或是對抗死亡。我覺得社會上大多數人不是拒絕就是接受，而我寧願和它對抗。」很多人可能對此嗤之以鼻，以為這是不成熟的幻想。但泰爾可不是什麼可以小看的人物，他是矽谷頂尖的成功創業家，影響力驚人，光是私人財富估計就有二十二億美元。29我們已經可以感受風雨欲來之勢：人類不再平等，不死就在眼前。


    某些領域的進展飛快，例如基因工程、再生醫學和奈米科技，也讓預言愈來愈趨向樂觀。有專家認為，人類到了2200年就能打敗死亡，也有人認為是2100年。庫茲威爾和德格瑞甚至更為樂觀，他們認為到了2050年，只要身體健康，鈔票也夠多，都可以大約每十年騙過死神一次，藉此達到長生不死。他們所想的方式是：我們大約十年接受一次全面治療，除了醫治疾病，也讓衰老的組織再生，並讓手、眼、腦都得到升級。而在下次治療之前，醫師又會發明各種更新的藥、更高級的技術和工具。如果庫茲威爾和德格瑞講得沒錯，很可能已經有些像這樣的不死人，就走在你身邊的路上——尤其是你剛好走在華爾街或第五大道的時候。


    事實上，他們只是達到「長生」（a-mortal），而不是真正「不死」（immortal）。這些未來的人類並不像神絕對不死，他們仍然可能死於戰爭或意外，而且無法起死回生；只不過，他們也不像我們這些'
