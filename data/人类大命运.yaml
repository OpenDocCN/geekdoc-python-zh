    脆弱的生物圈裡，而隨著進步和成長的大舉啟動，也就衝擊到生態穩定。如果想讓全球每個人都過著像美國人一般的豪奢生活，我們得要多幾個地球才行，但我們就只有一個地球。如果進步和成長最後破壞了整個生態系，要付出代價的不會只是吸血蝙蝠、狐狸和兔子：智人也無法置身事外。生態崩潰將造成經濟崩盤、政治動盪、人類生活水準下降，還可能對人類文明的存在造成威脅。


    想防患未然，方法之一就是放慢進步和成長的步調。如果投資者今年想要6%的報酬率，或許過了十年、他們可以學會只要有3%就滿足，過了二十年、只要有1%就滿足，那樣等到三十年後，經濟就能停止成長，而我們對現況也心滿意足。


    然而，成長的信條絕對會堅決反對這種異端想法，反而認為我們應該加快腳步。如果我們的發現和發明，讓生態系失去穩定、危及人類，那就該趕快再發現和發明些什麼，來保護自己——如果臭氧層變薄，增加了皮膚癌的風險，就該發明更好的防晒油、更佳的癌症療法，這樣也能刺激新的防晒和癌症治療產業成長。如果這些新產業汙染了大氣和海洋，造成全球暖化、大規模生物滅絕，那麼我們應該趕快打造虛擬世界和高科技避難所，就算地球變得像地獄一樣又熱又乾、汙染嚴重，也無礙我們繼續享受一切。


