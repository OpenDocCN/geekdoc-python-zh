  md: '塔、或是建立帝國。顯然,他們的心靈能力與智人大不相同,也比智人少了許多天分。然而,尼安德塔人的大腦容量其實比智人更大,他們的神經元都派上了什麼用場?我們對此一無所知。很可能他們就擁有許多智人從未體驗過的心理狀態。


