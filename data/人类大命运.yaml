    人類大命運


    歡古典樂，有些人喜歡搖滾樂，還有些人喜歡非洲傳統歌謠。學音樂的學生應該盡可能什麼音樂都接觸，最後再到iTunes商店，輸入信用卡號，買下自己喜歡的音樂。聽起來美的，就是美；而且顧客永都都是對的。


    但再說到那匹狼，因為狼不是人類，牠的經驗價值也就遠低於人。正因此，狼命的價值遠不及人命，殺一匹狼來救一個人，再合理也不過。畢竟，狼又不懂美，當然也不會有信用卡。


    這種自由主義的概念，也體現在「航海家」（Voyager）太空探測船攜帶的黃金唱片上。1977年，美國人向外太空發射了「航海家一號」太空探測船。這艘探測船現在已經離開了太陽系，成為史上第一具進入星際空間的人造物體。在航海家一號上面，除了當時最先進的科學設備，美國航太總署（NASA）還放了一張黃金唱片，希望向任何好奇而前來查看的外星人，介紹地球。


    這張唱片上，記錄著關於地球及地球居民的各種科學與文化資訊、一些圖像和聲音、以及世界各地的幾十首音樂——做為地球世俗藝術成就的樣本。音樂樣本不按排序，蒐集了許多古典音樂，包括貝多芬第五號《命運交響曲》的第一樂章；當代流行音樂，包括查克·貝瑞的〈Johnny
    B. Goode〉；世界各地傳統音樂，包括剛果矮人族女孩唱的成年曲。雖然唱片裡也有犬類的嚎叫聲，但並未歸類於音樂樣本，而是降級到另一個區塊，與風聲、雨聲、浪聲放在一起。


    因此，我們傳給南門二（Alpha Centauri）恆星系的那些可能聽眾的訊息是：貝多芬、查克·貝瑞、矮人族儀式歌曲有同樣的價值，但狼嚎聲完全是另一個類別。


