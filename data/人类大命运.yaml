  - '[PAGE 124]


    覺和情感（像是飢餓、恐懼、愛、忠誠），也都只是無意識的演算法，而不是主觀經驗？²


    現代哲學之父笛卡兒（René Descartes）也支持這種理論。十七世紀的笛卡兒認為，只有人類才有感覺和渴望，其他動物都是沒有心靈的自動物（automata），和機器人或自動飲料機並沒什麼不同。所以，如果有個人踢狗，狗並不會體驗到什麼。牠會自動退縮、並開始狂吠，但這不過就是像一臺會自動泡咖啡的飲料機，並不會有什麼感覺、或是有什麼渴望。


    在笛卡兒那個時候，一般人都接受這種理論。十七世紀的醫師和學者會做活狗解剖，觀察內臟器官如何運作，但完全不幫狗上麻醉，也不會感到任何不安。在他們眼中，這實在沒什麼不對的，就像我們把自動飲料機打開，觀察一下齒輪和皮帶如何運作，哪有什麼問題？就算到了二十一世紀早期，仍然有許多人認為：動物並沒有意識，而且就算有意識，也是一種與人非常不同、等而下之的意識。


    # 為什麼股票交易所沒有意識？


    想知道動物究竟有沒有像人一樣的心靈意識，首先得先進一步理解心靈如何運作、又扮演怎樣的角色。這些問題非常難回答，但因為這也是後續幾個章節的重點，值得在此花上一點時間。


    如果不知道心靈是什麼，就不可能完全掌握像是人工智慧這種新科技的影響。所以，讓我們暫時放下關於動物心靈的問題，先談談目前科學對於心靈和意識的認識。我們會先將焦點擺在研究人類意識的例子（這樣比較容易理解），稍後再回到動物身上，看看人'
  - '[PAGE 125]


    類的情況是不是也能套用在這些長了毛或羽毛的表親上。


