  md: '的生命。大腦神經網路將由智慧軟體取代，這樣就能同時優游虛擬世界與真實世界，不受有機化學的限制。經過了四十億年徘徊在有機化合物的國度，生命終將打破藩籬，進入一片無垠的無機領域，形成我們在最瘋狂的夢中，都未曾設想的形狀。畢竟，不管以往我們的夢想再瘋狂，也還是不脫有機化學的限制。


