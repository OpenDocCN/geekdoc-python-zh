  md: '譜曲的神祕精神現象，反而是所有哺乳動物生存和繁衍的關鍵。這是什麼意思呢？請讓我們從究竟什麼是「演算法」（algorithm）開始解釋。這點非常重要，不僅因為這項關鍵概念將在以下的章節再三出現，也因為二十一世紀將是由演算法主導的世紀。現在，演算法已可說是這個世上最重要的概念。如果想瞭解我們的未來及我們的生活，就必須盡一切努力瞭解什麼是演算法、以及演算法和情感的關聯。


    演算法指的是一套很有系統的步驟，能用以進行計算、解決問題、作出決定。所以，演算法並不是單指某次計算，而是計算時採用的方法。舉例來說，如果想得到兩個數字的平均值，簡單的演算法會是：「第一步：將兩個數字相加。第二步：將總和除以2。」這時，如果輸入4和8，結果就是6；輸入117和231，結果就是174。


    食譜是個複雜一點的例子。像是蔬菜湯的演算法，大概會是這樣：


    +   一、在鍋中熱半杯油；

    二、將四顆洋蔥切成碎末；

    三、把洋蔥碎末炒至金黃色，再注入半鍋水；

    四、把三顆馬鈴薯切塊，加入鍋中；

    五、將一顆高麗菜切絲，加入鍋中。


    諸如之類。你可以試試看不斷重複這種演算法，每次用稍微不同的蔬菜，就會得到一鍋稍微不同的湯。然而，演算法本身並沒有改變。


    光有食譜，還煮不出湯來。還得有人讀這份食譜，並依規定的'
  merge: -1
  pgno: 98
- img_proc: true
  md: '步驟執行才行。但還有一種方法，是製造出內含這種演算法、而且可以自動照做的機器。接下來，只要為機器供電、加入水和蔬菜，機器就會自動把湯給煮出來。


    雖然現在似乎沒有太多煮湯的機器，但大家應該都看過自助飲料機。這種飲料機通常會有硬幣投入孔、放杯子的位置，以及幾行按鈕。第一行按鈕大概是選擇要咖啡、茶或是可可，第二行是選擇不加糖、一匙糖、兩匙糖，第三行則是選擇要加牛奶、豆漿、或是都不加。今天有位男士走向機器，投入硬幣，按下了「茶」、「一匙糖」和「牛奶」，機器就會依據一系列明確的步驟開始執行。先是把一個茶包丟入杯中、倒入沸水、再加上一匙糖和牛奶，叮的一聲！一杯西式好茶就這樣在眼前出現。這就是一種演算法。17


    過去幾十年間，生物學家已經有明確結論認為，像是那位男士按下按鈕、接著喝茶，也算是一套演算法。當然，這套演算法比自動飲料機要複雜得多，但仍然是一套演算法。人類這套演算法製造出來的不是茶，而是自己的副本——人類就像是製造自動販賣機的自動販賣機。


    控制自動飲料機的演算法，是透過機械齒輪和電路來運作。至於控制人類的演算法，則是透過感覺、情感和思想來運作。至於豬和雞、狒狒、水獺，用的也是同一種演算法。我們用以下的生存問題為例：有隻狒狒看到附近樹上掛著一串香蕉，但也看到旁邊埋伏著一隻獅子。狒狒該冒生命危險去拿香蕉嗎？


    這可以看做是計算機率的數學問題：一邊是不拿香蕉而餓死的機率，一邊是被獅子逮到的機率。要解開這個問題，狒狒有許多因素需要考慮。我離香蕉多遠？離獅子多遠？我能跑多快？獅子能跑多快？這隻獅子是醒著還是睡著？這隻獅子看起來很餓還是很飽？'
  merge: -1
  pgno: 99
- img_proc: true
  md: '那裡有幾隻香蕉？香蕉是大是小？是青的還是熟的？除了這些外在資訊，狒狒還得考慮自己身體的內在資訊。如果牠已經快餓死了，就值得不顧一切去搶香蕉，別再管什麼機率了。相反的，如果牠才剛吃飽，多吃只是嘴饞，那又何必冒生命危險？


    想要權衡所有這些變項和機率，得到最好的結果，狒狒需要的演算法會比控制自動飲料機的演算法，遠遠複雜得多，然而計算正確的獎勵也大得多：這隻狒狒的生命。如果是一隻膽小的狒狒（也就是牠的演算法會高估風險），就會餓死，而形成這種膽小演算法的基因，也隨之滅絕。如果是一隻莽撞的狒狒（也就是牠的演算法會低估風險），則會落入獅子的爪下，而形成這種魯莽演算法的基因，也傳不到下一代。這些演算法正是靠著天擇，才達到穩定的品質控管。只有能夠正確計算出機率的動物，才能夠留下後代。


    但這還是非常抽象。到底狒狒要怎麼計算機率？牠當然不會忽然從耳後抽出一支鉛筆、從褲子後面的口袋掏出筆記本，然後開始認真用紙筆計算奔跑速度和所需體力。相反的，狒狒的整個身體就是牠的計算機。我們所謂的感覺和情感，其實都各是一套演算法。


