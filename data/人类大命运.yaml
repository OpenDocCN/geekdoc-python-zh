  md: '條，可以總結為一個簡單的想法：「如果有個問題要解決，可能就需要有更多東西；為了有更多東西，就得生產更多才行。」


    現代政治和現代經濟篤信成長的必要，原因有三。首先，生產愈多、能消費的就愈多，愈能提升生活水準，號稱也就能享受更快樂的生活。第二，只要人類持續繁衍成長，光是為了維持現狀，經濟成長就已經是必要的了。例如，印度的人口年增率為1.2%。也就是說，除非印度經濟每年成長至少1.2%，否則失業率就會上升，薪資將會下降，平均生活水準也會下滑。第三，就算印度的人口停止成長，中產階級也對目前的生活水準感到滿意，但那些為數仍有數億的貧困印度人民，又該怎麼辦？


    經濟不成長，整塊經濟大餅也就這麼大，想多給窮人一點，就必須從富人那裡挖來一些。這必定會造成一些非常困難的選擇，也很可能導致諸多不滿、甚或暴力相向。如果想避開這些選擇、不滿或暴力，我們就需要一塊更大的餅。


    不論是宗教的基本教義派、第三世界的獨裁主義、又或只是婚姻觸礁，在「現代」的眼中，幾乎任何公共或私人的問題，都能用「更多東西」來解決。像巴基斯坦或埃及這樣的國家，只要能維持亮眼的經濟成長率，國民也就能享受得起私家車和冰箱之類的種種好處，走著俗世幸福的道路，而不會隨著那些基本教義派起舞。同樣的，像剛果或緬甸這樣的國家，如果能有經濟成長，就能產生繁榮的中產階級，做為自由民主的基石。至於夫妻失和這種問題，只要能買棟更大的房子（不用擠在一個狹小的房間）、買臺洗碗機（不用吵著該輪到誰洗碗）、每週兩次參加昂貴的婚姻治療，據稱也就能挽回婚姻，繼續廝守下去。'
