    隨著演算法將人類擠出就業市場，財富和權力可能會集中在擁有強大演算法的極少數精英手中，造成前所未有的社經及政治地位不平等。在今天，人數達到數百萬的計程車司機、公車司機和卡車司機擁有強大的經濟和政治影響力，每個人都在交通運輸市場占有一個小小的位置。如果集體利益受到威脅，他們可以團結起來，進行罷工、組織抵制，形成重要的投票族群。然而，一旦數百萬的人類司機都由單一演算法取代，這一切財富和權力都將被擁有演算法的公司壟斷，再由擁有公司的那極少數幾位億萬富翁放入口袋。


