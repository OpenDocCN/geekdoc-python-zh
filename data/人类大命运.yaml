    # 每個人心裡的中情局與國務院


    科學不僅破壞了自由人文主義對於自由意志的信念，也破壞了對個人主義的信念。自由主義認為每個人都有單一、不可分割的自我——individual（個人）這個英文字的意思，也就是in-dividual（不可分割的）。


    確實，人體是由大約三十七兆個細胞組成，⁹而且每天身體和心智都會經歷無數次的變化及原子分子的置換，但只要集中精神、努力接觸自己，一定就能在內心深處，找到單一、清楚且真實的聲音，這也就是真實的自己，而這正是宇宙一切意義和權威的源頭。對於自由主義來說，想要有意義，就必須有一個真正的自我，而且還只能有唯一的自我。否則要是有許多個自我，我在投票站、超市和婚姻市場上，該聽哪個的意見？


    但經過數十年研究後，生命科學的結論是：這種自由主義的故事完全就是神話。所謂唯一真正的自我，就和永恆的靈魂、耶誕老人和復活節兔子一樣虛假。如果我真的深深去探測自己，就會發現


