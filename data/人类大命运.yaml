    # 一神教以自我為中心


    各種宗教經典也是同樣的運作模式。各種宗教組織聲稱，自己的經典裡有著我們所有問題的答案，而且他們也會對法院、政府和企業施加壓力，要大家照著這本經典來行事。這時，如果有個聰明人讀到經文，再看看周遭的世界，會發現確實好像符合事實——「經文說，你必須向神繳納什一奉獻；而你看，大家真的都繳了。經文說，女不如男，不能擔任審判，甚至不能在法庭上作證；而你看，現在確實沒有女法官，法庭也確實不願接受女性的證詞。經文說，只要好好研讀神的話語，就能在生活中得到成功；而你看，現在所有那些好的工作，確實都是由這些熟讀經文的人擔任。」


    這樣一來，聰明人自然就會去研讀這本宗教經典。也因為他是個聰明人，很有可能就會成為這本經典的權威，甚至是成為法官。如果他當上了法官，一定不會允許婦女上法庭作證，如果要選繼任法官，顯然也會選個熟讀這本經典的人。如果有人提出異議說「這本書只是一疊紙！」而且還很認真的只把這本書當成一疊紙，這個異端份子的日子肯定不會好過。


    就算各種宗教經典根本是扭曲了民眾對於現實本質的理解，宗教經典的說書人卻還是能大權在握，時間長達數千年。舉例來說，《聖經》對歷史的看法從根本就有問題，卻仍然成功傳遍世界，幾百萬人深信不疑。《聖經》推銷的是一神論的史觀，聲稱整個世界是由某個唯一、全能的神所掌管，而且祂非常關心我、也關心我的


