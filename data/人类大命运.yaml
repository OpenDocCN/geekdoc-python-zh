    # 第5章


    # 一對冤家


    虛構故事是人類社會的基礎和支柱。隨著歷史不斷演進，關於神祇、國家和公司的故事愈見強大，開始主宰了客觀的現實。正因為相信著偉大的鱷神索貝克、天命、或是《聖經》，讓人能夠闢出法雍湖、建起長城、蓋出沙特爾大教堂（Chartres
    Cathedral）。但遺憾的是，盲目信從這些故事，也就意味人類的努力往往是用來榮耀某些虛構的實體，例如神和國家，而不是讓真正擁有感受的生命過得更美好。


    現在的情況又是如何？乍看之下，會覺得現代社會和古埃及或中世紀的中國大不相同。現代科學興起之後，是不是已經改變了人類遊戲的基本規則？有沒有可能，雖然傳統神話仍然重要，但現代社會制度已經逐漸偏向某些過去還不存在的客觀科學理論，例如演化論？


    我們當然可以說：科學理論也是一種新的神話，現代人相信科學，就像古埃及人相信鱷神索貝克。但這種比較禁不起推敲。索貝克只存在於信徒的想像之中。確實，信仰鱷神索貝克，鞏固了埃'
  - '[PAGE 204]


    及的社會制度，也讓古埃及人建起水壩、開出運河，得以防洪防旱。然而，信仰本身並不會提升或降低尼羅河的水位。相較之下，科學理論絕不只是某種讓人合作的方式。有一種說法是「天助自助者」，這等於是兜了個圈子來說：根本沒有上天，但是對上天的信仰能夠激勵我們自己來做某件事，做為一種助力。相較之下，以抗生素為例，就算人不自助，抗生素也能助人，這可是和上天相去甚遠——不管你相不相信抗生素，它就是有療效。


    因此，現代世界才會與前現代世界大不相同。埃及法老和中國皇帝經過幾千年的努力，仍然未能克服饑荒、瘟疫和戰爭的問題。而現代社會不過短短幾世紀，就已經大功告成了。這難道不是因為我們擁抱了客觀的科學知識、拋棄了互為主體的神話嗎？有沒有可能，這個過程在未來幾十年間加速進展？隨著科技讓我們能夠將人類升級、克服老化、找到幸福快樂的關鍵，難道不會讓人們不再那麼關心虛構的神祇、國家和公司，而一心專注於解譯物理和生物學的現實？


    雖有可能，但實際上事情要遠遠更為複雜。現代科學確實改變了遊戲的規則，但並不是「以事實代替神話」如此簡單。神話仍然主宰人類，科學只是讓神話更為強大。科學非但沒有摧毀互為主體的現實，反而是讓它比以往更能完全控制客觀現實和主觀現實。在電腦和生物工程的協助下，人類開始重塑現實以符合心中的幻想，虛構與現實的界線將會變得更模糊。


    索貝克的祭司幻想著有鱷神存在，法老則幻想能夠長生不死。但在現實中，所謂的鱷神只是一條非常普通的沼澤爬蟲類、穿著金色的衣服，而法老也和最貧窮的農民一樣，終將過世。雖然法老的遺體會用防腐的油膏和香水製作成木乃伊，但還是一樣死得徹徹底'
