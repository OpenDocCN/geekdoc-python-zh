  md: '就是因為他們不知道如何合作，建立一個高效的組織來維護自己的利益。22


    2011年的埃及革命，也出現同樣命運。1989年電視所扮演的角色，到了2011年由臉書和推特接手。在新媒體協助下，群眾得以協調整合，讓成千上萬的人潮，在對的時間淹沒街道和廣場，推翻穆巴拉克政權。然而，要把十萬人帶到解放廣場是一回事，但想要真正抓緊政治機器的操縱桿、在正確的房間握到正確的手、讓國家有效運作，又是另一回事。因此，穆巴拉克下臺的時候，示威者並無力填上那個空缺。埃及只有兩個組織擁有足以治國的組織能力：軍隊和穆斯林兄弟會。因此，這場革命的成果先由兄弟會竊據，之後再由軍隊劫持。


    比起過去的獨裁者、或是在開羅和布加勒斯特的示威者，不管是羅馬尼亞前共產黨人或是埃及的軍事將領，都算不上真的比較聰明、又或手指更為靈巧。他們的優勢只在於靈活合作。一方面，他們的合作效率高於群眾，二方面，比起頑固的齊奧塞斯庫和穆巴拉克，他們也展現了更大的靈活度。


    # 在暴力與色情之外


    如果說，智人之所以統治世界，是因為只有我們能夠大規模靈活合作，這顯然又破壞了我們認為人類比較神聖的信念。我們希望人類真的是特殊的，值得擁有各種特權。為了證明這一點，我們會指出人類的各種驚人成就：我們蓋了金字塔和長城；我們解開了原子和DNA的結構；我們還抵達了南極、登上了月亮。如果說這些成就都源於每個人都擁有的某種獨特本質（例如不朽的靈魂），那'
  merge: -1
  pgno: 157
- img_proc: true
  md: '要說人類生命有神聖之處，或許還說得過去。但因為這些勝利其實都是靠著大規模合作而來，就很難再說為什麼每個人類都值得我們如此敬重。


    整個蜂巢的能力，會遠比單一隻蝴蝶來得高，然而這並不會讓單隻的蜜蜂比單隻的蝴蝶更神聖。羅馬尼亞共產黨人成功主宰了沒有組織的羅馬尼亞大眾，難道我們該說共產黨人的生命比一般國民更神聖？人類所知的合作方式遠比黑猩猩更有效率，因此人類是將太空船射向月球，而黑猩猩只能在動物園對遊客扔石頭。但難道這就讓人類變得比較高級？


    也有這個可能，不過我們得先想想：到底為什麼人類可以互相配合得這麼好？為什麼只有人類能夠打造出這麼龐大而複雜的社會系統？對於像黑猩猩、狼和海豚這些社會性哺乳動物，社交合作大多必須以彼此認識為基礎。以黑猩猩為例，一定要等到互相熟識、建立起社會階層之後，才有可能一起獵食。因此，黑猩猩得花很多時間在社交互動、權力鬥爭。如果兩隻不認識的黑猩猩碰在一起，通常不但不能合作，反而會互相咆哮、扭打，或是盡速逃離。


    但是巴諾布猿（bonobo，與黑猩猩同為一屬）則有些不同，巴諾布猿常常是用性行為，來紓解壓力，建立社會連結。所以並不意外，同性的性行為也是稀鬆平常。如果兩群互不相識的巴諾布猿碰在一起，一開始會先展現恐懼和敵意，讓吼叫聲和尖叫聲不絕於叢林。但很快的，其中一群的雌性巴諾布猿會走出來，邀請陌生的巴諾布猿別打仗了，來做愛吧。通常另一方都會接受這項邀請，於是不到幾分鐘，原本可能的戰場就成了歡場，巴諾布猿用著幾乎所有你想得到的姿勢性交，甚至還包括倒吊在樹上。


    智人同樣很瞭解這些合作技巧，有時候是組成像黑猩猩那種權'
