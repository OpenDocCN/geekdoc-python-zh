    豬肉,上帝會懲罰我們,我們最後不會有好下場。這不是我說的,甚至也不是拉比說的。如果是拉比創造這個世界,或許他就會創造一個讓豬肉也符合猶太戒律的世界。可是創造這個世界的不是拉比,而是上帝。雖然我不知道為什麼,但上帝說了,我們不該吃豬肉。所以我們就該聽話。懂了嗎?」


    1943年,一個德國男孩去找他爸爸,那是一位資深蓋世太保,男孩問:「爸,為什麼我們要殺猶太人呢?」這位爸爸穿著他筆挺的制服和發亮的皮靴,鄭重解釋道:「弗烈茲啊,世界本來就是這樣啊。你還小,還不懂,如果我們允許猶太人活下去,他們就會造成人類退化、滅絕。這不是我說的,甚至也不是元首說的。如果是希特勒創造這個世界,或許他就會創造一個沒有天擇法則的世界,讓猶太人和雅利安人能夠和諧共處。可是創造這個世界的不是希特勒,他只是設法找出了自然律,然後告訴我們該怎樣遵照自然律來生活。如果不服從這些自然律,最後不會有好下場。懂了嗎?」


    2016年,一個英國男孩也跑去找他爸爸,那是一位自由民主黨的國會議員,男孩問:「爸,為什麼我們要管中東那些穆斯林的人權啊?」這位爸爸放下手上那杯茶,想了一下,回答道:「鄧肯啊,世界本來就是這樣啊。你還小,還不懂,但所有人、包括中東的穆斯林,其實本質都相同,都該享有一樣的自然權利(天賦人權)。這不是我說的,甚至也不是國會說的。如果是國會創造這個世界,或許在所有那些什麼量子物理以外,也會有個人權委員會,規定讓普世都有人權。可是創造這個世界的不是國會,國會只是想讓一切都合乎道理,我們必須尊重這件事,就算中東的穆斯林也該擁有自然權利,否則我們自己的權利很快也會遭到侵犯,最後不會有好下場。懂了嗎?」'
- md: '## 共產主義也是宗教


    自由主義者、共產主義者、或其他現代信仰的追隨者，並不喜歡自己相信的系統被稱為「宗教」，原因就在於他們總覺得宗教就是迷信、相信超自然的力量。如果你告訴共產主義者或自由主義者，說他們是宗教信徒，他們可能會覺得你在罵他們、說他們是盲目相信著白日夢。但事實上，說他們信仰的主義也是一種宗教，這只意味著他們也相信某些道德法則系統，認為這些法則雖然不是人類所發明，但人類仍然需要遵守。


    據我們所知，所有人類社會都有此類信仰。每個社會都會告訴成員，他們必須服從一些高於一般人的道德法則，而如果違反這些法則，就會導致災難。


    當然，不同的宗教就會有不同的故事細節、不同的誡命、以及不同的獎懲。像是在中世紀歐洲，天主教的教會就認為上帝不喜歡富人。耶穌曾說，駱駝穿過針的眼，比財主進神的國還容易。而為了讓富人也能進入神的國，教會鼓勵他們要多多奉獻，並且威脅說「否則就等著在地獄裡燃燒」。現代共產主義也不喜歡富人，但威脅的方式卻不是說「等著死後被地獄之火焚燒」，而是說現在就會產生階級衝突。共產主義所說的「歷史規律」，其實就像是基督教上帝的誡命，都代表著高於一般人的力量，無法透過人類意志加以改變。人類可以決定明天上午的足球賽不要管越位規則，因為是人類發明了那條規定，當然也就能夠任意改變。但至少就馬克思看來，歷史規律並非人力所能改變。不管資本家做什麼，只要他們繼續累積私人財富，就必然造成階級衝突，也就注定會被無產階級站起來推翻。


    如果你碰巧是個共產主義人士，可能會認為共產主義和基督教當然大不相同，因為共產主義是對的、而基督教義是錯的。資本主義制度本身就是帶有階級衝突，但是富人可不會在死後落入地獄、遭受永恆的折磨。不過，即使共產主義是對的，也不代表共產主義就不是一種宗教，反而證明共產主義就是個真金實銀的宗教。不論任何宗教的追隨者，都相信只有自己的宗教才是真實的。而或許，真有一種宗教是對的？


    ## 如果你遇見佛陀


    我們說宗教是一種工具，用來維護社會秩序、組織人類進行大規模合作，這種說法可能讓某些人感到惱怒，因為對他們來說，宗教最重要的，就是代表一條通往靈性的途徑。然而，一方面宗教和科學的差距比我們一般認為的更小，另一方面，宗教和靈性的差距卻比想像的更大。宗教就是一份契約，而靈性卻是一趟旅程。


    宗教對世界提出一套完整的描述，並且提供一份定義清晰的契約，載明各項預定目標。「上帝存在。祂告訴我們該遵守某些作為。如果你服從上帝，你就能進天國。如果你不服從祂，你就會在地獄燃燒。」正是因為這類契約寫得清清楚楚，才讓社會得以訂出各種共同的規範和價值觀，約束人類的行為。


    但靈性之旅就不是這麼一回事了。這通常都是以神祕的方式，要把人帶向未知的目的地。旅程的一開始，通常都是某些大哉問，例如：我是誰？生命的意義是什麼？什麼是善？在大多數人欣然接受由當權者提供的現成答案時，真正的靈性追求者可不會那麼容易滿足。他們會下定決心，追尋著某一個大哉問，不論要追到何方，也不僅僅是前往熟悉或願意前往的去處。


    因此，對大多數學者來說，做學術研究也是一份契約，而不是一趟靈性之旅，因為做學術研究也就是把我們帶往前人、政府和銀行所認同的預定目的罷了，這就像大學生說「我要讀個四年，通過所有考試，拿到大學畢業證書，找份薪水夠好的工作。」但如果你到了半路碰上某些大哉問，將你轉向某個預料之外、起初絲毫沒想過的目的地，學術研究也可能忽然變成一趟靈性之旅。舉例來說，某個學生可能一開始主修經濟學，想找份華爾街的賺錢工作；學著學著，卻不知怎的，最後進了印度教的修行所、或是到了辛巴威去幫助愛滋病毒帶原者，我們就可以說這是一趟靈性之旅了。


    為什麼說這樣的過程有「靈性」？這是來自古代二元論宗教的遺緒。二元論相信有兩個神，一善一惡，善神創造了純潔而永恆的靈魂，住在一個充滿靈性而幸福的世界；惡神（有時稱為撒旦）則創造了另一個由物質和物慾構成的世界。撒旦不知道怎樣才能讓自己創造的事物永續，因此在物質和物慾的世界裡，一切終將腐敗瓦解。而為了將祂所創出的瑕疵品賦予生命，撒旦就會誘惑來自純潔靈性世界的靈魂，再將靈魂關在物質構成的身體裡。這就成了人：一個美好而有靈性的靈魂，被困在邪惡的臭皮囊裡。由於靈魂的監獄（也就是身體）會衰老死亡，撒旦就必須不斷用各種肉體的歡愉來誘惑靈魂，其中最重要的就是食物、性和權力。等到這身臭皮囊終於回歸塵土、讓靈魂有機會逃回靈性世界，對肉體歡愉的渴望就會誘惑它再次回到另一具臭皮囊裡。於是，靈魂就這樣從一具臭皮囊轉移到另一具臭皮囊裡，虛耗光陰，追求食物、性和權力。


    二元論告誡人們要打破這些物質枷鎖，踏上回歸靈性世界的旅程——我們對靈性世界完全陌生，但那才是我們真正的家。在這趟旅程中，我們必須拒絕所有物質上的誘惑和契約。出於這種二元論的背景，只要是在旅程中質疑著各種俗世的習慣和契約、前往未知的目的地，我們都會稱為「靈性」之旅。


    這種旅程與宗教有根本的差異，因為宗教是要鞏固世俗秩序，但靈性之旅反而是要逃離世俗秩序。通常，靈性之旅的流浪者最重要的義務之一，就是要挑戰各大宗教的信仰和慣例。禪宗佛教就曾說「逢佛殺佛」，講的是在靈性的道路上，如果發現佛教已經落入制式、僵化、固定，就必須連這些一起擺脫。


    對宗教來說，靈性是個危險的威脅。宗教通常會努力避免信眾踏上靈性的追求之旅，而許多宗教系統所面對的挑戰，也不是來自那些追求食物、性和權力的普通人，而是來自那些追求靈性和真實、無法用陳腔爛調打發的人。正因如此，推動新教徒反抗天主教教會權威的，並非抱持享樂主義的無神論者，而是一位虔誠而苦修的修士：馬丁·路德（Martin
    Luther, 1483-1546）。路德對於生命有許多存在主義的疑惑，希望得到解答，而且他拒絕接受教會用各種儀禮、儀式和契約提出的答案。


    當時，教會向信眾提出一些非常誘人的契約交易。如果你犯了罪，擔心死後受到永恆的詛咒，該做的就只是打開錢包、買張贖罪券。十六世紀初，教會還雇用了專業的「贖罪券販子」，來去於歐洲各個城鎮村莊，定價販售贖罪券。想要一張進入天堂的簽證嗎？十枚金幣。想讓已過世的爺爺奶奶一起上天堂嗎？沒問題，但得要三十枚金幣。在販子當中，最著名的就是道明會的修士約翰尼斯·帖次勒（Johannes
    Tetzel），據傳有句名言：「銀錢叮噹落銀庫，靈魂立即出煉獄。」


    ![](img/319dca06e22893e942053da0432e9f19_212_0.png)


    25. 教皇販售贖罪券賺錢（圖片出處為新教徒發行的小冊）。


    ## 人類大命運


    馬丁·路德愈想愈覺得不對，也連帶質疑起提供這套交易契約的教會。救贖怎麼可能是付錢了事？教皇又怎麼可能有權寬恕人們的罪、打開天堂的大門？


    於是路德根據新教傳統，在1517年10月31日，帶著一份長長的文件、一把槌子和幾根釘子，走到威登堡（Wittenberg）諸聖堂的大門。文件總共列出九十五條論點，反對當代宗教作為，其中就包括反對販售贖罪券。路德把文件釘上教堂大門，點燃宗教改革，呼籲所有關心救贖的基督徒起身反抗教皇權威，找出其他前往天堂的道路。


    從歷史的觀點來看，靈性之旅總是悲劇一場，因為這是一條孤獨的道路，只適合個人、不適合整個社會。人類要合作，就不能只有大哉問，而需要堅定的答案。推倒某些荒謬的宗教制度，也往往在其他地方又促成了新的宗教制度。這種事情曾發生在二元論者身上，他們的靈性之旅最終也變成了宗教體制。這種事情也發生在馬丁·路德身上，他挑戰了天主教會的法則、制度和儀式後，卻發現自己也正在寫下新的法則、建立新的制度、發明新的儀式。甚至連佛陀和耶穌也未能倖免。在堅持追求真理的路上，他們顛覆了傳統印度教和猶太教的法則、儀式和制度。但到頭來，以他們之名建立的法則、儀式和制度，數量卻是史上最多，無人能出其右。


    ## 科學和宗教誓不兩立？


    現在我們已經更瞭解宗教的概念，可以回頭檢視宗教和科學之間的關係。對於這種關係，有兩種極端的觀點。第一種觀點認為科學和宗教誓不兩立，而現代史就是科學知識與宗教迷信的鬥爭史。


    隨著時間逐漸過去，科學的光明驅散了宗教的黑暗，世界愈來愈世俗、理性和繁榮。


    然而，雖然某些科學發現和科研成果肯定不利於宗教，兩者卻非必然對立。像是穆斯林教條認為，伊斯蘭教是由先知穆罕默德於七世紀在阿拉伯創立，而這點就有充分的科學證據可資證明。


    更重要的是，科學如果想要打造出可行的人類制度，必然需要宗教協助。雖然科學家能夠研究世界如何運作，但卻沒有科學方法能告訴我們，人類該做些什麼。科學告訴我們，人類沒有氧就無法生存；然而，我們是否能用窒息來處死罪犯？能夠回答這種問題的並非科學，唯有宗教。


    因此，科學家的實用研究仍有賴宗教見解的襄助。像是長江的三峽大壩，中國政府在1992年決定建造大壩時，物理學家可以計算大壩必須承受多少壓力，經濟學家可以預測大壩可能需要多少建造成本，而電機工程師可以預測大壩能發多少電。但政府必須考慮的不只這些。三峽大壩蓄水後，將淹沒陸地面積超過六百平方公里，其中包括許多城鎮村莊、數千處考古遺跡、以及獨特的風景和動物棲地。超過百萬人流離失所，數百種物種瀕臨滅絕。看起來，大壩是白鱀豚滅絕的直接原因。不論你個人對三峽大壩有何看法，顯然蓋不蓋大壩也會是倫理問題，而非純粹的科學問題。不論任何物理實驗、經濟模型或數學方程式，都無法確定究竟是發出幾兆瓦的電、賺進幾十億人民幣比較有價值，還是保住某座古塔或白鱀豚比較有價值。因此，中國無法單靠科學理論的基礎來運作，還是需要一些宗教或意識型態才行。


    有些人一下就跳到另一個極端，說科學和宗教本來就是兩個完全分開的國度。科學就去研究事實，宗教就去討論價值觀，兩者井水不犯河水，老死不必互相往來。宗教對科學事實不予置喙，科學對宗教信仰也該沉默是金。如果教宗相信「人命神聖，因此墮胎是罪」，生物學家對此既不能證明、也不該駁斥。私底下，每個生物學家都歡迎與教宗辯論；但做為科學家，生物學家卻不該加入戰局。


    這種論點可能聽來合理，但是對宗教仍有誤解。雖然科學確實只管事實，但宗教卻從非只管倫理判斷。宗教想發揮任何實際的引導作用，就得提出一些「事實」上的要求，這時候就可能和科學有所衝突。許多宗教教條最重要的部分，並不是關於倫理原則，反而是關於「事實」的主張聲明，像是「上帝確實存在」、「靈魂會因為犯下的罪而在死後受罰」、「《聖經》是由神所著，而非由人所著」、「教皇永遠是對的」。這些都是關於「事實」的主張聲明。許多最激烈的宗教辯論、或是科學和宗教之間的激烈衝突，都是源於這種關乎「事實」的主張聲明，而不是來自關於倫理的判斷。


    讓我們以墮胎為例。虔誠的基督徒常常反對墮胎，而許多自由主義者則擁護墮胎權。雙方主要的爭議點其實在於「事實」，而非倫理。不論基督徒或自由主義者，都同意人命神聖、謀殺是可憎的罪行。他們是對某些生物學事實有不同意見：究竟人命是受孕那一刻就開始？出生那一刻開始？還是在兩者之間的某一刻？


    有些文化甚至認為，就算到了出生那一刻，生命也還沒真正開始。像是非洲南部喀拉哈里沙漠的庫恩人（!Kung）和北極的因紐特人（Inuit），都認為人命是在嬰兒得到名字之後才開始。嬰兒出生時，家族會先等待一段時間，如果決定不要留下它（可能因為肢體畸形、或因為經濟困難），家族就會把它殺掉。這時只要還沒有舉行命名儀式，就不算是謀殺。


    受這些文化薰陶的人，可能也和自由主義人士或基督教的信徒


    ## 科學能辨真偽


    宗教的自我宣傳，往往只強調它們精美的價值觀。只不過，神卻往往藏在那些用小字印製的事實聲明之中。像是天主教，總宣揚自己是博愛和同情的宗教。這不是太好了嗎？誰能反對這些事呢？既然如此，為什麼現在不是全人類都是天主教徒？因為如果你真的去讀那些小字，就會發現天主教同時也要求你盲從某位「永遠不會犯錯」的教皇，就算他曾經號令信眾發動十字軍東征、把異教徒綁在樁上活活燒死，也不能違逆教皇的旨意。這些實際的指示，並不只是來自倫理判斷，而是來自倫理判斷與事實聲明的結合。


    讓我們從縹渺的哲學領域回歸歷史現實，便會觀察到宗教故事幾乎總是包括三個部分：


    - 第一、倫理判斷，例如「人命神聖」。

    - 第二、事實聲明，例如「人命是在受孕那一刻開始」。

    - 第三、實務指示：把倫理判斷與事實聲明合併，就會得到實務指導方針，像是「就算受孕才剛一天，你也不得墮胎」。


    對於宗教的倫理判斷，科學無法加以反駁或證實。但對於宗教的事實聲明，科學家就大有意見了。只要是關於事實的問題，例如「在受孕一週後，人類胎兒是否已有神經系統？有痛覺了嗎？」生物學家就遠比教士有資格回答。


    為了解釋得更清楚,讓我們深入研究一項真實的歷史案例。宗教自吹自擂的時候,對這個案子絕口不提,但這件事對社會和政治的影響卻無與倫比。


    在中世紀歐洲,教皇的政治權力無遠弗屆。不管在歐洲何處,只要發生衝突,教皇都會聲稱自己有裁決權。為了鞏固自己的權力主張,歷任教皇都曾一再提到〈君士坦丁御賜教產論〉(Donation
    of Constantine)。這個故事是這麼說的:羅馬皇帝君士坦丁在西元315年3月30日簽署一份諭令,授權教皇聖思維一世(St. Sylvester I)和後繼者,永遠控制羅馬帝國西部領土。


    歷任教皇將〈君士坦丁御賜教產論〉這份珍貴文件留傳下去,每當有雄心勃勃的君主、喜爭好辯的城市、或是桀驁不馴的農民起身反抗,教皇就會拿這份文件,做為強大的宣傳工具。


    中世紀歐洲民眾十分尊重流傳久遠的帝國法令,認為文件歷史愈長,就承載著愈多權力。他們也一心堅信,國王和帝王都是上帝的代表。其中,由於君士坦丁讓羅馬帝國從異教領土變成了基督教帝國,也就特別受到尊崇。如果現在市議會想做的事,與偉大的君士坦丁本人所下的諭令有所衝突,對中世紀歐洲人來說,顯然就該服從古代的文件。於是,每當教皇碰上政治抗爭,他總是高舉〈君士坦丁御賜教產論〉,要求對方服從。


    倒也不是每次都靈。只不過,〈君士坦丁御賜教產論〉仍然是教皇的宣傳利器和中世紀政治秩序的重要基石。


    如果仔細研究〈君士坦丁御賜教產論〉,也會發現這個故事仍是由前述的三個部分組成:


    | 倫理判斷 | 事實聲明 | 實務指示 |

    | :--- | :--- | :--- |

    | 人民尊重古代帝王諭令的程度，應該要高於尊重當今民意 | 君士坦丁大帝在西元315年3月30日，將歐洲統治權賜予教皇 | 西元1315年的歐洲人，應該要服從教皇的諭令
    |


    古代帝王諭令的倫理權威，絕對不是什麼理所當然的事。大多數的二十一世紀歐洲人都會認為：現代公民的民意，當然要比那些早已死透的大帝所下的諭令，來得重要。但這種事情沒辦法用任何實驗或方程式來確認，因此科學根本無法加入這場倫理辯論。就算有位現代的科學家時光倒轉七百年、回到中世紀，她也無法向當時的歐洲人證明，為何不該用古代帝王諭令來解決當代的政治爭端。


    然而〈君士坦丁御賜教產論〉的故事基礎並不只有倫理判斷，裡面還有些非常具體的事實聲明，而這就是科學非常有資格來證明或推翻的了。


    1441年，天主教神父兼語言學先驅的瓦拉（Lorenzo Valla）發表了一項科學研究，證明〈君士坦丁御賜教產論〉實為偽造。瓦拉分析了這份文件的風格、文法、以及所用的詞彙及片語，證明有些詞彙在西元四世紀的拉丁文裡根本還沒出現，很有可能是君士坦丁大帝死後約四百年，才偽造出來的。此外，文件所注記的日期為「3月30日，君士坦丁第四次擔任執政官，加利卡努斯（Gallicanus）首次擔任執政官。」


    ## 人類大命運


    在羅馬帝國，每年會選出兩位執政官，文件以執政官的任期做為年代標記，也是慣例。君士坦丁第四次擔任執政官確實是在西元315年，但凸槌的是，加利卡努斯卻要到西元317年，才首次擔任執政官。如果這份這麼了不起的文件確實是在君士坦丁的時代寫就，絕不可能會有如此離譜誇張的錯誤。這就等於美國開國元勛傑佛遜等人，把〈美國獨立宣言〉的日期寫成「1776年7月34日」一樣不可思議。


    今天所有的歷史學家都同意，〈君士坦丁御賜教產諭〉是在大約八世紀的時候，在教廷中偽造而成。雖然瓦拉從未質疑這份古代帝王諭令的倫理權威，但他的科學分析確實影響了這份諭令的實務指示——也就是歐洲人應該要服從教皇的諭令。


    ## 《聖經》是由誰在何時寫的？


    2013年12月20日，烏干達國會通過《反同性戀法》，認定同性戀活動屬於刑事犯罪，某些犯行可能重判到無期徒刑。


    整件事情得到基督教福音教派的推動和支持，認為上帝禁止同性戀行為。他們引用〈利未記〉第18章第22節「不可與男人苟合，像與女人一樣，這本是可憎惡的」和〈利未記〉第20章第13節「人若與男人苟合，像與女人一樣，他們二人行了可憎的事，總要把他們治死，罪要歸到他們身上」，做為舉證。


    在過去這幾世紀裡，正是因為同一則宗教故事，造成全世界有數百萬人受苦受難。這個故事的三個成分，可以簡單整理如下：


    | 倫理判斷 | 事實聲明 | 實務指示 |

    | :--- | :--- | :--- |

    | 人類應當服從上帝的命令 | 大約三千年前，上帝命令人類不得有同性戀活動 | 人類不得有同性戀活動 |


    這個故事是真的嗎？關於「人類該服從上帝」這個倫理判斷，科學家無從置喙。就個人來說，誰都可以有自己的想法。你可能認為人權比神的權威更重要，所以如果上帝命令我們侵犯人權，我們就不該聽祂的話。然而，沒有任何科學實驗，能夠判斷這個問題孰是孰非。


    相較之下，對於這裡的事實聲明，也就是說在三千年前，宇宙的創造者命令智人不得從事男男行為，科學就有許多意見了。畢竟我們怎麼知道這個聲明是真的？


    檢視相關文獻，會發現雖然這項聲明曾一再出現在幾百萬筆的書籍、文章和網站裡，但一切都指向唯一一個源頭：《聖經》。這樣一來，科學家就會問，究竟《聖經》是由誰、在什麼時候寫的呢？請注意，這是一個事實問題，而非價值問題。虔誠的猶太人和基督徒聲稱，至少〈利未記〉是上帝在西奈山吩咐摩西的故事，而且從那一刻開始，從未有一字增減。科學家又會繼續追問：「但我們怎麼能確定？」畢竟，就連教皇都曾經說〈君士坦丁御賜教產諭〉是君士坦丁自己在第四世紀寫的，但事實上卻是在四百年後，由教皇自己的手下偽造的。


    我們現在已經有大批科學方法，能夠找出是誰在何時寫成《聖經》。相關的科學研究已經進行超過一個世紀了，如果對這些發現有興趣，已有許多專著可供參考。我把結論簡單說來：多數經過同儕審查的科學研究都一致認為，《聖經》是許多不同文本的集合，而這些文本則是由許多不同的人類作家，在他們聲稱的事件過了幾百年之後才寫成的，要等到《聖經》時代過了許久，這些文本才終於集結成一本宗教經典。


    舉例來說，雖然大衛王的時代應該是在西元前1000年左右，但是一般認定：〈申命記〉是在大約西元前620年，於猶大王約西亞（King Josiah）的宮廷所寫成，做為加強約西亞權威的宣傳活動。〈利未記〉的成書年代甚至還要更晚，絕不早於西元前500年。


    至於要說古代的猶太人很小心的保存了《聖經》文本、絕不增刪任何一字，科學家也指出了破綻：《聖經》時代的猶太教，根本不是以經文為基礎的宗教。相反的，當時的猶太教正如許多中東的鄰近宗教，是典型的鐵器時代異教，既沒有猶太會堂、猶太初等學校（yeshiva）、拉比，甚至連猶太經典都沒有。當時擁有的是繁複的聖殿儀式，多半就是將動物獻祭給一位善妒的天神，希望祂能保佑人民、賜下每季的雨水和戰爭的勝利。此時的宗教精英是一群祭司家族，只談出身，不論智力。祭司多半是文盲，忙著處理聖殿儀式，無暇書寫或研讀任何經文。


    在第二聖殿（Second Temple）時期，另一批對立的宗教精英逐漸成形。部分受到波斯和希臘的影響，撰寫和詮釋文本的猶太學者地位愈來愈高，最後終於成為我們所知的「拉比」，而他們編纂的文本也成了《聖經》。至於拉比能享有何種權威，則是出於個人的智力，而非出身。這群新的文人精英和舊有的祭司家族之間，衝'
  mdcn: '## 共產主義也是宗教


    自由主義者、共產主義者、或其他現代信仰的追隨者，並不喜歡自己相信的系統被稱為「宗教」，原因就在於他們總覺得宗教就是迷信、相信超自然的力量。如果你告訴共產主義者或自由主義者，說他們是宗教信徒，他們可能會覺得你在罵他們、說他們是盲目相信著白日夢。但事實上，說他們信仰的主義也是一種宗教，這只意味著他們也相信某些道德法則系統，認為這些法則雖然不是人類所發明，但人類仍然需要遵守。


    據我們所知，所有人類社會都有此類信仰。每個社會都會告訴成員，他們必須服從一些高於一般人的道德法則，而如果違反這些法則，就會導致災難。


    當然，不同的宗教就會有不同的故事細節、不同的誡命、以及不同的獎懲。像是在中世紀歐洲，天主教的教會就認為上帝不喜歡富人。耶穌曾說，駱駝穿過針的眼，比財主進神的國還容易。而為了讓富人也能進入神的國，教會鼓勵他們要多多奉獻，並且威脅說「否則就等著在地獄裡燃燒」。現代共產主義也不喜歡富人，但威脅的方式卻不是說「等著死後被地獄之火焚燒」，而是說現在就會產生階級衝突。共產主義所說的「歷史規律」，其實就像是基督教上帝的誡命，都代表著高於一般人的力量，無法透過人類意志加以改變。人類可以決定明天上午的足球賽不要管越位規則，因為是人類發明了那條規定，當然也就能夠任意改變。但至少就馬克思看來，歷史規律並非人力所能改變。不管資本家做什麼，只要他們繼續累積私人財富，就必然造成階級衝突，也就注定會被無產階級站起來推翻。


    如果你碰巧是個共產主義人士，可能會認為共產主義和基督教當然大不相同，因為共產主義是對的、而基督教義是錯的。資本主義制度本身就是帶有階級衝突，但是富人可不會在死後落入地獄、遭受永恆的折磨。不過，即使共產主義是對的，也不代表共產主義就不是一種宗教，反而證明共產主義就是個真金實銀的宗教。不論任何宗教的追隨者，都相信只有自己的宗教才是真實的。而或許，真有一種宗教是對的？


    ## 如果你遇見佛陀


    我們說宗教是一種工具，用來維護社會秩序、組織人類進行大規模合作，這種說法可能讓某些人感到惱怒，因為對他們來說，宗教最重要的，就是代表一條通往靈性的途徑。然而，一方面宗教和科學的差距比我們一般認為的更小，另一方面，宗教和靈性的差距卻比想像的更大。宗教就是一份契約，而靈性卻是一趟旅程。


    宗教對世界提出一套完整的描述，並且提供一份定義清晰的契約，載明各項預定目標。「上帝存在。祂告訴我們該遵守某些作為。如果你服從上帝，你就能進天國。如果你不服從祂，你就會在地獄燃燒。」正是因為這類契約寫得清清楚楚，才讓社會得以訂出各種共同的規範和價值觀，約束人類的行為。


    但靈性之旅就不是這麼一回事了。這通常都是以神祕的方式，要把人帶向未知的目的地。旅程的一開始，通常都是某些大哉問，例如：我是誰？生命的意義是什麼？什麼是善？在大多數人欣然接受由當權者提供的現成答案時，真正的靈性追求者可不會那麼容易滿足。他們會下定決心，追尋著某一個大哉問，不論要追到何方，也不僅僅是前往熟悉或願意前往的去處。


    因此，對大多數學者來說，做學術研究也是一份契約，而不是一趟靈性之旅，因為做學術研究也就是把我們帶往前人、政府和銀行所認同的預定目的罷了，這就像大學生說「我要讀個四年，通過所有考試，拿到大學畢業證書，找份薪水夠好的工作。」但如果你到了半路碰上某些大哉問，將你轉向某個預料之外、起初絲毫沒想過的目的地，學術研究也可能忽然變成一趟靈性之旅。舉例來說，某個學生可能一開始主修經濟學，想找份華爾街的賺錢工作；學著學著，卻不知怎的，最後進了印度教的修行所、或是到了辛巴威去幫助愛滋病毒帶原者，我們就可以說這是一趟靈性之旅了。


    為什麼說這樣的過程有「靈性」？這是來自古代二元論宗教的遺緒。二元論相信有兩個神，一善一惡，善神創造了純潔而永恆的靈魂，住在一個充滿靈性而幸福的世界；惡神（有時稱為撒旦）則創造了另一個由物質和物慾構成的世界。撒旦不知道怎樣才能讓自己創造的事物永續，因此在物質和物慾的世界裡，一切終將腐敗瓦解。而為了將祂所創出的瑕疵品賦予生命，撒旦就會誘惑來自純潔靈性世界的靈魂，再將靈魂關在物質構成的身體裡。這就成了人：一個美好而有靈性的靈魂，被困在邪惡的臭皮囊裡。由於靈魂的監獄（也就是身體）會衰老死亡，撒旦就必須不斷用各種肉體的歡愉來誘惑靈魂，其中最重要的就是食物、性和權力。等到這身臭皮囊終於回歸塵土、讓靈魂有機會逃回靈性世界，對肉體歡愉的渴望就會誘惑它再次回到另一具臭皮囊裡。於是，靈魂就這樣從一具臭皮囊轉移到另一具臭皮囊裡，虛耗光陰，追求食物、性和權力。


    二元論告誡人們要打破這些物質枷鎖，踏上回歸靈性世界的旅程——我們對靈性世界完全陌生，但那才是我們真正的家。在這趟旅程中，我們必須拒絕所有物質上的誘惑和契約。出於這種二元論的背景，只要是在旅程中質疑著各種俗世的習慣和契約、前往未知的目的地，我們都會稱為「靈性」之旅。


    這種旅程與宗教有根本的差異，因為宗教是要鞏固世俗秩序，但靈性之旅反而是要逃離世俗秩序。通常，靈性之旅的流浪者最重要的義務之一，就是要挑戰各大宗教的信仰和慣例。禪宗佛教就曾說「逢佛殺佛」，講的是在靈性的道路上，如果發現佛教已經落入制式、僵化、固定，就必須連這些一起擺脫。


    對宗教來說，靈性是個危險的威脅。宗教通常會努力避免信眾踏上靈性的追求之旅，而許多宗教系統所面對的挑戰，也不是來自那些追求食物、性和權力的普通人，而是來自那些追求靈性和真實、無法用陳腔爛調打發的人。正因如此，推動新教徒反抗天主教教會權威的，並非抱持享樂主義的無神論者，而是一位虔誠而苦修的修士：馬丁·路德（Martin
    Luther, 1483-1546）。路德對於生命有許多存在主義的疑惑，希望得到解答，而且他拒絕接受教會用各種儀禮、儀式和契約提出的答案。


    當時，教會向信眾提出一些非常誘人的契約交易。如果你犯了罪，擔心死後受到永恆的詛咒，該做的就只是打開錢包、買張贖罪券。十六世紀初，教會還雇用了專業的「贖罪券販子」，來去於歐洲各個城鎮村莊，定價販售贖罪券。想要一張進入天堂的簽證嗎？十枚金幣。想讓已過世的爺爺奶奶一起上天堂嗎？沒問題，但得要三十枚金幣。在販子當中，最著名的就是道明會的修士約翰尼斯·帖次勒（Johannes
    Tetzel），據傳有句名言：「銀錢叮噹落銀庫，靈魂立即出煉獄。」


    ![](img/319dca06e22893e942053da0432e9f19_212_0.png)


    25. 教皇販售贖罪券賺錢（圖片出處為新教徒發行的小冊）。


    ## 人類大命運


    馬丁·路德愈想愈覺得不對，也連帶質疑起提供這套交易契約的教會。救贖怎麼可能是付錢了事？教皇又怎麼可能有權寬恕人們的罪、打開天堂的大門？


    於是路德根據新教傳統，在1517年10月31日，帶著一份長長的文件、一把槌子和幾根釘子，走到威登堡（Wittenberg）諸聖堂的大門。文件總共列出九十五條論點，反對當代宗教作為，其中就包括反對販售贖罪券。路德把文件釘上教堂大門，點燃宗教改革，呼籲所有關心救贖的基督徒起身反抗教皇權威，找出其他前往天堂的道路。


    從歷史的觀點來看，靈性之旅總是悲劇一場，因為這是一條孤獨的道路，只適合個人、不適合整個社會。人類要合作，就不能只有大哉問，而需要堅定的答案。推倒某些荒謬的宗教制度，也往往在其他地方又促成了新的宗教制度。這種事情曾發生在二元論者身上，他們的靈性之旅最終也變成了宗教體制。這種事情也發生在馬丁·路德身上，他挑戰了天主教會的法則、制度和儀式後，卻發現自己也正在寫下新的法則、建立新的制度、發明新的儀式。甚至連佛陀和耶穌也未能倖免。在堅持追求真理的路上，他們顛覆了傳統印度教和猶太教的法則、儀式和制度。但到頭來，以他們之名建立的法則、儀式和制度，數量卻是史上最多，無人能出其右。


    ## 科學和宗教誓不兩立？


    現在我們已經更瞭解宗教的概念，可以回頭檢視宗教和科學之間的關係。對於這種關係，有兩種極端的觀點。第一種觀點認為科學和宗教誓不兩立，而現代史就是科學知識與宗教迷信的鬥爭史。


    隨著時間逐漸過去，科學的光明驅散了宗教的黑暗，世界愈來愈世俗、理性和繁榮。


    然而，雖然某些科學發現和科研成果肯定不利於宗教，兩者卻非必然對立。像是穆斯林教條認為，伊斯蘭教是由先知穆罕默德於七世紀在阿拉伯創立，而這點就有充分的科學證據可資證明。


    更重要的是，科學如果想要打造出可行的人類制度，必然需要宗教協助。雖然科學家能夠研究世界如何運作，但卻沒有科學方法能告訴我們，人類該做些什麼。科學告訴我們，人類沒有氧就無法生存；然而，我們是否能用窒息來處死罪犯？能夠回答這種問題的並非科學，唯有宗教。


    因此，科學家的實用研究仍有賴宗教見解的襄助。像是長江的三峽大壩，中國政府在1992年決定建造大壩時，物理學家可以計算大壩必須承受多少壓力，經濟學家可以預測大壩可能需要多少建造成本，而電機工程師可以預測大壩能發多少電。但政府必須考慮的不只這些。三峽大壩蓄水後，將淹沒陸地面積超過六百平方公里，其中包括許多城鎮村莊、數千處考古遺跡、以及獨特的風景和動物棲地。超過百萬人流離失所，數百種物種瀕臨滅絕。看起來，大壩是白鱀豚滅絕的直接原因。不論你個人對三峽大壩有何看法，顯然蓋不蓋大壩也會是倫理問題，而非純粹的科學問題。不論任何物理實驗、經濟模型或數學方程式，都無法確定究竟是發出幾兆瓦的電、賺進幾十億人民幣比較有價值，還是保住某座古塔或白鱀豚比較有價值。因此，中國無法單靠科學理論的基礎來運作，還是需要一些宗教或意識型態才行。


    有些人一下就跳到另一個極端，說科學和宗教本來就是兩個完全分開的國度。科學就去研究事實，宗教就去討論價值觀，兩者井水不犯河水，老死不必互相往來。宗教對科學事實不予置喙，科學對宗教信仰也該沉默是金。如果教宗相信「人命神聖，因此墮胎是罪」，生物學家對此既不能證明、也不該駁斥。私底下，每個生物學家都歡迎與教宗辯論；但做為科學家，生物學家卻不該加入戰局。


    這種論點可能聽來合理，但是對宗教仍有誤解。雖然科學確實只管事實，但宗教卻從非只管倫理判斷。宗教想發揮任何實際的引導作用，就得提出一些「事實」上的要求，這時候就可能和科學有所衝突。許多宗教教條最重要的部分，並不是關於倫理原則，反而是關於「事實」的主張聲明，像是「上帝確實存在」、「靈魂會因為犯下的罪而在死後受罰」、「《聖經》是由神所著，而非由人所著」、「教皇永遠是對的」。這些都是關於「事實」的主張聲明。許多最激烈的宗教辯論、或是科學和宗教之間的激烈衝突，都是源於這種關乎「事實」的主張聲明，而不是來自關於倫理的判斷。


    讓我們以墮胎為例。虔誠的基督徒常常反對墮胎，而許多自由主義者則擁護墮胎權。雙方主要的爭議點其實在於「事實」，而非倫理。不論基督徒或自由主義者，都同意人命神聖、謀殺是可憎的罪行。他們是對某些生物學事實有不同意見：究竟人命是受孕那一刻就開始？出生那一刻開始？還是在兩者之間的某一刻？


    有些文化甚至認為，就算到了出生那一刻，生命也還沒真正開始。像是非洲南部喀拉哈里沙漠的庫恩人（!Kung）和北極的因紐特人（Inuit），都認為人命是在嬰兒得到名字之後才開始。嬰兒出生時，家族會先等待一段時間，如果決定不要留下它（可能因為肢體畸形、或因為經濟困難），家族就會把它殺掉。這時只要還沒有舉行命名儀式，就不算是謀殺。


    受這些文化薰陶的人，可能也和自由主義人士或基督教的信徒


    ## 科學能辨真偽


    宗教的自我宣傳，往往只強調它們精美的價值觀。只不過，神卻往往藏在那些用小字印製的事實聲明之中。像是天主教，總宣揚自己是博愛和同情的宗教。這不是太好了嗎？誰能反對這些事呢？既然如此，為什麼現在不是全人類都是天主教徒？因為如果你真的去讀那些小字，就會發現天主教同時也要求你盲從某位「永遠不會犯錯」的教皇，就算他曾經號令信眾發動十字軍東征、把異教徒綁在樁上活活燒死，也不能違逆教皇的旨意。這些實際的指示，並不只是來自倫理判斷，而是來自倫理判斷與事實聲明的結合。


    讓我們從縹渺的哲學領域回歸歷史現實，便會觀察到宗教故事幾乎總是包括三個部分：


    - 第一、倫理判斷，例如「人命神聖」。

    - 第二、事實聲明，例如「人命是在受孕那一刻開始」。

    - 第三、實務指示：把倫理判斷與事實聲明合併，就會得到實務指導方針，像是「就算受孕才剛一天，你也不得墮胎」。


    對於宗教的倫理判斷，科學無法加以反駁或證實。但對於宗教的事實聲明，科學家就大有意見了。只要是關於事實的問題，例如「在受孕一週後，人類胎兒是否已有神經系統？有痛覺了嗎？」生物學家就遠比教士有資格回答。


    為了解釋得更清楚,讓我們深入研究一項真實的歷史案例。宗教自吹自擂的時候,對這個案子絕口不提,但這件事對社會和政治的影響卻無與倫比。


    在中世紀歐洲,教皇的政治權力無遠弗屆。不管在歐洲何處,只要發生衝突,教皇都會聲稱自己有裁決權。為了鞏固自己的權力主張,歷任教皇都曾一再提到〈君士坦丁御賜教產論〉(Donation
    of Constantine)。這個故事是這麼說的:羅馬皇帝君士坦丁在西元315年3月30日簽署一份諭令,授權教皇聖思維一世(St. Sylvester I)和後繼者,永遠控制羅馬帝國西部領土。


    歷任教皇將〈君士坦丁御賜教產論〉這份珍貴文件留傳下去,每當有雄心勃勃的君主、喜爭好辯的城市、或是桀驁不馴的農民起身反抗,教皇就會拿這份文件,做為強大的宣傳工具。


    中世紀歐洲民眾十分尊重流傳久遠的帝國法令,認為文件歷史愈長,就承載著愈多權力。他們也一心堅信,國王和帝王都是上帝的代表。其中,由於君士坦丁讓羅馬帝國從異教領土變成了基督教帝國,也就特別受到尊崇。如果現在市議會想做的事,與偉大的君士坦丁本人所下的諭令有所衝突,對中世紀歐洲人來說,顯然就該服從古代的文件。於是,每當教皇碰上政治抗爭,他總是高舉〈君士坦丁御賜教產論〉,要求對方服從。


    倒也不是每次都靈。只不過,〈君士坦丁御賜教產論〉仍然是教皇的宣傳利器和中世紀政治秩序的重要基石。


    如果仔細研究〈君士坦丁御賜教產論〉,也會發現這個故事仍是由前述的三個部分組成:


    | 倫理判斷 | 事實聲明 | 實務指示 |

    | :--- | :--- | :--- |

    | 人民尊重古代帝王諭令的程度，應該要高於尊重當今民意 | 君士坦丁大帝在西元315年3月30日，將歐洲統治權賜予教皇 | 西元1315年的歐洲人，應該要服從教皇的諭令
    |


    古代帝王諭令的倫理權威，絕對不是什麼理所當然的事。大多數的二十一世紀歐洲人都會認為：現代公民的民意，當然要比那些早已死透的大帝所下的諭令，來得重要。但這種事情沒辦法用任何實驗或方程式來確認，因此科學根本無法加入這場倫理辯論。就算有位現代的科學家時光倒轉七百年、回到中世紀，她也無法向當時的歐洲人證明，為何不該用古代帝王諭令來解決當代的政治爭端。


    然而〈君士坦丁御賜教產論〉的故事基礎並不只有倫理判斷，裡面還有些非常具體的事實聲明，而這就是科學非常有資格來證明或推翻的了。


    1441年，天主教神父兼語言學先驅的瓦拉（Lorenzo Valla）發表了一項科學研究，證明〈君士坦丁御賜教產論〉實為偽造。瓦拉分析了這份文件的風格、文法、以及所用的詞彙及片語，證明有些詞彙在西元四世紀的拉丁文裡根本還沒出現，很有可能是君士坦丁大帝死後約四百年，才偽造出來的。此外，文件所注記的日期為「3月30日，君士坦丁第四次擔任執政官，加利卡努斯（Gallicanus）首次擔任執政官。」


    ## 人類大命運


    在羅馬帝國，每年會選出兩位執政官，文件以執政官的任期做為年代標記，也是慣例。君士坦丁第四次擔任執政官確實是在西元315年，但凸槌的是，加利卡努斯卻要到西元317年，才首次擔任執政官。如果這份這麼了不起的文件確實是在君士坦丁的時代寫就，絕不可能會有如此離譜誇張的錯誤。這就等於美國開國元勛傑佛遜等人，把〈美國獨立宣言〉的日期寫成「1776年7月34日」一樣不可思議。


    今天所有的歷史學家都同意，〈君士坦丁御賜教產諭〉是在大約八世紀的時候，在教廷中偽造而成。雖然瓦拉從未質疑這份古代帝王諭令的倫理權威，但他的科學分析確實影響了這份諭令的實務指示——也就是歐洲人應該要服從教皇的諭令。


    ## 《聖經》是由誰在何時寫的？


    2013年12月20日，烏干達國會通過《反同性戀法》，認定同性戀活動屬於刑事犯罪，某些犯行可能重判到無期徒刑。


    整件事情得到基督教福音教派的推動和支持，認為上帝禁止同性戀行為。他們引用〈利未記〉第18章第22節「不可與男人苟合，像與女人一樣，這本是可憎惡的」和〈利未記〉第20章第13節「人若與男人苟合，像與女人一樣，他們二人行了可憎的事，總要把他們治死，罪要歸到他們身上」，做為舉證。


    在過去這幾世紀裡，正是因為同一則宗教故事，造成全世界有數百萬人受苦受難。這個故事的三個成分，可以簡單整理如下：


    | 倫理判斷 | 事實聲明 | 實務指示 |

    | :--- | :--- | :--- |

    | 人類應當服從上帝的命令 | 大約三千年前，上帝命令人類不得有同性戀活動 | 人類不得有同性戀活動 |


    這個故事是真的嗎？關於「人類該服從上帝」這個倫理判斷，科學家無從置喙。就個人來說，誰都可以有自己的想法。你可能認為人權比神的權威更重要，所以如果上帝命令我們侵犯人權，我們就不該聽祂的話。然而，沒有任何科學實驗，能夠判斷這個問題孰是孰非。


    相較之下，對於這裡的事實聲明，也就是說在三千年前，宇宙的創造者命令智人不得從事男男行為，科學就有許多意見了。畢竟我們怎麼知道這個聲明是真的？


    檢視相關文獻，會發現雖然這項聲明曾一再出現在幾百萬筆的書籍、文章和網站裡，但一切都指向唯一一個源頭：《聖經》。這樣一來，科學家就會問，究竟《聖經》是由誰、在什麼時候寫的呢？請注意，這是一個事實問題，而非價值問題。虔誠的猶太人和基督徒聲稱，至少〈利未記〉是上帝在西奈山吩咐摩西的故事，而且從那一刻開始，從未有一字增減。科學家又會繼續追問：「但我們怎麼能確定？」畢竟，就連教皇都曾經說〈君士坦丁御賜教產諭〉是君士坦丁自己在第四世紀寫的，但事實上卻是在四百年後，由教皇自己的手下偽造的。


    我們現在已經有大批科學方法，能夠找出是誰在何時寫成《聖經》。相關的科學研究已經進行超過一個世紀了，如果對這些發現有興趣，已有許多專著可供參考。我把結論簡單說來：多數經過同儕審查的科學研究都一致認為，《聖經》是許多不同文本的集合，而這些文本則是由許多不同的人類作家，在他們聲稱的事件過了幾百年之後才寫成的，要等到《聖經》時代過了許久，這些文本才終於集結成一本宗教經典。


    舉例來說，雖然大衛王的時代應該是在西元前1000年左右，但是一般認定：〈申命記〉是在大約西元前620年，於猶大王約西亞（King Josiah）的宮廷所寫成，做為加強約西亞權威的宣傳活動。〈利未記〉的成書年代甚至還要更晚，絕不早於西元前500年。


    至於要說古代的猶太人很小心的保存了《聖經》文本、絕不增刪任何一字，科學家也指出了破綻：《聖經》時代的猶太教，根本不是以經文為基礎的宗教。相反的，當時的猶太教正如許多中東的鄰近宗教，是典型的鐵器時代異教，既沒有猶太會堂、猶太初等學校（yeshiva）、拉比，甚至連猶太經典都沒有。當時擁有的是繁複的聖殿儀式，多半就是將動物獻祭給一位善妒的天神，希望祂能保佑人民、賜下每季的雨水和戰爭的勝利。此時的宗教精英是一群祭司家族，只談出身，不論智力。祭司多半是文盲，忙著處理聖殿儀式，無暇書寫或研讀任何經文。


    在第二聖殿（Second Temple）時期，另一批對立的宗教精英逐漸成形。部分受到波斯和希臘的影響，撰寫和詮釋文本的猶太學者地位愈來愈高，最後終於成為我們所知的「拉比」，而他們編纂的文本也成了《聖經》。至於拉比能享有何種權威，則是出於個人的智力，而非出身。這群新的文人精英和舊有的祭司家族之間，衝'
