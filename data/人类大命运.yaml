    究竟人是怎麼死的？在中世紀的童話故事裡，死神披著黑色連帽斗篷，手上還握著一把大鐮刀。一個人活得好好的，腦子裡還在擔心這擔心那、四處奔波，這時突然死神就出現在他面前，瘦骨嶙峋的手指敲敲他的肩膀，告訴他：「來吧。」這個人懇求：「不！拜託！再給我一年、一個月，不然一天就好！」但披著連帽斗篷的死神，聲音嘶啞的說道：「沒這回事！就是現在了！」這似乎就是我們死的方式。


