  - '[PAGE 111]


    人類大命運


    易，某種宇宙間的大能，給了人類控制其他動物的權力，條件是人類要對神祇、對自然、以及對動物本身履行某些義務。而人們在農耕生活裡，每天都會感覺宇宙間確實有一股力量存在，也就更容易接受這種說法。


    狩獵採集者並不覺得自己比其他生物高級，原因就在於他們很少意識到自己會對生態系造成影響。當時典型的部落大概只有幾十人，部落周遭卻有幾千隻以上的野生動物，部落能否存活，有賴於理解和尊重這些動物的欲望。負責找食物的人得要不斷問自己，野鹿會想做什麼？獅子又會想要什麼？否則他們就捕不到鹿、也逃不過獅子。


    但農民卻與此相反，他們所居住的是一個由人類的夢想及想法所控制和塑造的世界。雖然人類仍然逃不了強大恐怖的天災（例如颱風和地震），但已經不再那麼需要理解其他動物的想法了。農場上的小夥子很早就懂得怎麼騎馬、給牛套上犁、鞭打倔強的驢子，以及把羊趕去吃草。每天這樣過日子，很容易就會認為，這一定是某種自然秩序、或是上天的旨意。


    於是，農業革命既是經濟上的革命，也成了宗教上的革命。新的經濟關係興起，新的宗教信念也同時產生，而替殘酷剝削利用動物的行為，找到了藉口。每次只要哪個碩果僅存的狩獵採集部落，也開始走向農耕，我們就會再次見證這種古老的過程。近年來，印度南部的納雅卡人已經開始出現一些農耕行為，像是養牛、養雞、種茶。毫不意外，他們也開始對動物有了新的態度，而且對於家畜及農作物的態度，明顯與野生生物有所不同。


    在納雅卡人的語言中，具有獨特個性的生物稱為「mansan」。例如人類學家那瓦問他們的時候，納雅卡人會說：所有的大象都屬


    108'
  - '[PAGE 112]


    於 mansan，「我們住在森林裡，他們也住在森林裡。我們和他們都是 mansan⋯⋯還有熊、鹿、老虎也都是。都是森林裡的動物。」那乳牛呢？「乳牛不一樣。到哪裡你都得帶牠們走。」那雞呢？「牠們什麼都不是。牠們不是
    mansan。」那森林裡的樹呢？「算是，他們已經活了這麼久了。」那茶樹呢？「喔，那是我種的，我把茶葉賣掉，才能從店裡頭買我要的東西。它們不算是 mansan。」^{31}


    像這樣，就把動物從有情感、值得尊重的生命，降格成為不過是人類的資產。這種過程很少僅止於牛和雞，大多數農業社會也開始把不同等級的人，視為只是一種資產。像在古埃及、《聖經》時代的以色列和古代中國，都曾將人類當作奴隸，恣意虐待，僅因細故，便將之處決。正如農民不會去問牛和雞對於農場營運的意見，當時的一國之主，也絕不會想到要問問農民，該怎樣治理國家。此外，每當某些族群、團體或宗教社群起了衝突，常常就是互相指責「不配當人」。像這樣先將「他者」稱之以野獸，之後也才能待之以野獸。於是，農場也就成了新社會的原型——有著目空一切的農場主人、比較低等而可以剝削利用的其他動物、值得消滅的外部野獸；以及在一切之上有位偉大的神，對這一切安排給予祝福。


    # 科學革命造就了神人


    現代科學和工業的崛起，也帶來人與動物關係的第二波革命。在農業革命時，人類已經刪去了動植物的臺詞，讓泛靈論的這齣大戲只剩下人類與神之間的對話。到了科學革命，連神祇的臺詞也就此刪去。現在，整個世界已經成了獨角戲。人類獨自站在空盪盪的舞臺中間自言自語，不用和任何其他角色談判妥協，不但得到無比'
  - '[PAGE 113]


    的權力，而且不用負擔任何義務。破解了物理、化學和生物無聲的定律之後，現在人類在這些領域硬是為所欲為。


    遠古的獵人到草原上狩獵，會要求野牛的協助，而野牛也向獵人要求一些東西。遠古的農民希望乳牛產出更多奶，會祈求神祇的協助，而神祇也會向農民開出祂的條件。但是在雀巢（Nestlé）的研發部門裡，穿著白色實驗衣的研發人員想提升乳牛的產乳量，他們會去研究遺傳學和基因，而基因不會向他們要求任何回報。


    只不過，正如獵人和農民各有自己的神話，研發人員其實也有一套他們相信的神話。他們最有名的神話，根本就是無恥的抄襲了知善惡樹和伊甸園的傳說，只是把地點搬到英格蘭林肯郡的伍爾索普莊園。根據這個神話，有個叫牛頓的人，坐在一棵蘋果樹下，而一顆熟蘋果就這麼掉在他頭上。於是牛頓開始思考，為什麼蘋果是直直落下，而不是往旁邊掉、或是向上飛？這個疑問讓他發現了萬有引力和牛頓運動定律。


    牛頓的故事讓知善惡樹的神話再也不同了。在伊甸園裡，是由蛇來開場，引誘人類犯罪，而使神將憤怒降在他們身上。不管對蛇或是對神來說，亞當和夏娃都只是個玩物。但在伍爾索普莊園裡，人類是唯一的主角。雖然牛頓本人是虔誠的基督徒，花在研讀《聖經》的時間遠比研究物理定律要多，但他所促成的科學革命，卻讓上帝就此退場。自此之後，牛頓的繼任者開始寫下他們自己的〈創世記〉神話，不管是神或是蛇，都再也沒有露臉的機會。伍爾索普莊園裡發生的事，是基於單純的自然律（natural
    law），而想找出這些自然律，則完全是人類自發的行為。雖然故事的開頭是有顆蘋果掉到了牛頓的頭上，但蘋果可不是故意的。


    在伊甸園的神話裡，人類因為好奇、希望得到知識，而遭到懲'
  - '[PAGE 114]


    罰，被上帝趕出天堂。但在伍爾索普莊園的神話裡，不但沒人懲罰牛頓，情況還正好相反。多虧他的好奇心，人類才能進一步瞭解宇宙、變得更加強大，並且往科技的天堂又近了一步。全球無數教師傳頌著牛頓的神話，鼓勵學生要有好奇心，暗示著只要我們得到足夠的知識，就能在地球上創造出天堂。


    事實上，就算在牛頓的神話裡，還是有神的角色：牛頓自己就是神。等到生物科技、奈米科技和其他科學的果實終於成熟，智人就會得到神的大能，兜了一圈，而再次回到能給人知識的知善惡樹下。


    遠古的狩獵採集者，只不過就是另一種動物。到了農民，以為自己是神所造萬物的頂峰。但再到了科學家，則是要讓人類都演化升級為神。


    # 我們有何獨特之處？


    農業革命促成了有神論的宗教，科學革命則是催生了人文主義宗教：以人取代了神。有神論者崇拜的是神（希臘文裡的 theos），人文主義者則是崇拜人。像是自由主義、共產主義和納粹主義這樣的人文主義，其奠基概念認為：智人擁有某些獨特而神聖的本質，這些本質是宇宙間所有意義和權力的來源。宇宙間發生的所有事，都會以「對智人的影響」做為好壞判斷的依據。


