    援。谷歌風投的總投資金額高達二十億美元，其中36%將投入生技新創公司，也包括幾項深具雄心的壽命延長計畫。馬里斯用美式足球打比方，解釋這場與死亡的對決：「我們不只要挺進幾碼，而且要贏下這場比賽。」為什麼？馬里斯說：「因為活著總比死好啊。」28


