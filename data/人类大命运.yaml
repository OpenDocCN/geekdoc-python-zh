    和捷克斯洛伐克。齊奧塞斯庫自1965年以來，一直統治羅馬尼亞，就算羅馬尼亞的蒂米什瓦拉市，已經在12月17日出現抗暴運動，齊奧塞斯庫仍然相信，自己能擋下這波海嘯般的浪潮。而他的反制措施之一，就是在布加勒斯特安排大規模集會，希望向羅馬尼亞人和世界各國證明，大多數民眾仍然敬愛他、或至少是害怕他。當時已經吱嘎作響的黨機器，奮力動員了八萬人，塞滿市中心廣場，並號令羅馬尼亞全國民眾，放下手邊工作，聆聽廣播或收看電視。


    在一片看似熱情的群眾歡呼聲中，齊奧塞斯庫登上陽臺，俯瞰廣場，他在先前幾十年間，這動作已經做了不下數十次。在妻子艾蓮娜、黨領導和大批保鏢陪同下，齊奧塞斯庫開始了註冊商標一般的沉悶演講。在那八分鐘內，他讚揚羅馬尼亞社會主義的輝煌，並在群眾機械式鼓掌的掌聲中，顯得志得意滿。


