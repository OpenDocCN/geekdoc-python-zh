    整個蜂巢的能力，會遠比單一隻蝴蝶來得高，然而這並不會讓單隻的蜜蜂比單隻的蝴蝶更神聖。羅馬尼亞共產黨人成功主宰了沒有組織的羅馬尼亞大眾，難道我們該說共產黨人的生命比一般國民更神聖？人類所知的合作方式遠比黑猩猩更有效率，因此人類是將太空船射向月球，而黑猩猩只能在動物園對遊客扔石頭。但難道這就讓人類變得比較高級？


    也有這個可能，不過我們得先想想：到底為什麼人類可以互相配合得這麼好？為什麼只有人類能夠打造出這麼龐大而複雜的社會系統？對於像黑猩猩、狼和海豚這些社會性哺乳動物，社交合作大多必須以彼此認識為基礎。以黑猩猩為例，一定要等到互相熟識、建立起社會階層之後，才有可能一起獵食。因此，黑猩猩得花很多時間在社交互動、權力鬥爭。如果兩隻不認識的黑猩猩碰在一起，通常不但不能合作，反而會互相咆哮、扭打，或是盡速逃離。


    但是巴諾布猿（bonobo，與黑猩猩同為一屬）則有些不同，巴諾布猿常常是用性行為，來紓解壓力，建立社會連結。所以並不意外，同性的性行為也是稀鬆平常。如果兩群互不相識的巴諾布猿碰在一起，一開始會先展現恐懼和敵意，讓吼叫聲和尖叫聲不絕於叢林。但很快的，其中一群的雌性巴諾布猿會走出來，邀請陌生的巴諾布猿別打仗了，來做愛吧。通常另一方都會接受這項邀請，於是不到幾分鐘，原本可能的戰場就成了歡場，巴諾布猿用著幾乎所有你想得到的姿勢性交，甚至還包括倒吊在樹上。


    智人同樣很瞭解這些合作技巧，有時候是組成像黑猩猩那種權'
  - '[PAGE 159]


    力階級，有時候也像巴諾布猿用性愛鞏固社會連結。但不管講的是打鬥或交配，光靠彼此相識，並無法成為大規模合作的基礎。想解決希臘債務危機，辦法絕不可能是邀請希臘政治家和德國銀行家來大打一架、或是雲雨一場。研究指出，不論是友好或敵對的關係，智人能夠真正熟識的對象不超過一百五十人。^{23}不管人類是靠什麼打造出大規模合作網路，總之絕不只是彼此熟識而已。


    對於想靠實驗來破解人類社會祕密的心理學家、社會學家、經濟學家，這實在是壞消息。由於組織和經費因素，絕大多數的實驗對象都只是個人或小群體。然而，想用小群體的行為來推斷大眾社會的動態，風險實在很高。有一億人口的國家，運作方式從根本上就和一百人的小部落，大不相同。


    # 最後通牒賽局


    讓我們用行為經濟學上最著名的「最後通牒賽局」（ultimatum game，又稱為承讓賽局）實驗為例。這項實驗通常有兩名參與者，其中一人會得到100美元，可以自由分配給自己和另一位參與者。他可能會全留、分成兩半、或是把大多數給對方。另一位參與者只有兩個選項：接受、或拒絕。如果他拒絕對方的分法，兩人都得兩手空空回家。


    古典經濟學理論主張，人類是理性的計算機器。所以他們認為大多數人會自己留99美元，只給對方1美元；而且他們也認為另一位參與者會接受這樣的分法。畢竟如果有人問你要不要1美元，理性的回答自然就是接受。另一位參與者拿到99美元，又有什麼關係呢？'
  - '[PAGE 160]


    古典經濟學家可能一輩子都待在實驗室和講堂，從沒冒險進入真實的世界。大多數參與最後通牒賽局的人，只要拿的錢太少，就會拒絕，理由就是「不公平」。他們寧願不拿這1美元，也不想看起來像個傻蛋。也因為這就是現實世界的運作方式，所以很少人會向對方提出極低的數字。大多數人就是直接平分，或是讓自己占點小好處，像是給對方30美元或40美元。


    最後通牒賽局影響深遠，不僅戳破古典經濟學理論，也建立起近幾十年最重要的一項經濟學發現：智人的行事並不是依照冷冰冰的數學邏輯，而是根據有溫度的社交邏輯。


    我們是由情感所控制。正如先前所見，這些情感實際上都是很複雜的演算法，反映出遠古狩獵採集部落的社會機制。如果在三萬年前，我幫你抓了一隻野雞，但你卻只分我一支雞翅，我可不會對自己說：「還有一支雞翅，總比什麼都沒有好。」而是演化演算法快速運轉，讓腎上腺素和睪固酮流向全身，血液沸騰，然後向地上重重一跺腳，發出怒吼。短期來說，我可能得餓肚子回來，甚至還會挨上一兩拳。但長期來說這是有好處的，因為你以後別想再坑我。我們會拒絕不公平的方案，是因為如果在石器時代，溫和接受一切要求，就只能等死。


    觀察現代仍存的狩獵採集部落，結果同樣支持這種觀點。大多數部落都很重視公平，如果獵人獵到一頭肥鹿回來，每個人都會得到一份。黑猩猩也是如此。如果有一隻黑猩猩殺了一頭小豬，同一群的其他黑猩猩會聚在一旁伸出手來，而且通常也都會拿到一份。


    最近，靈長類動物學家德瓦爾（Frans de Waal）在一項實驗中，將兩隻捲尾猴關在相鄰的籠子裡，兩隻都能看到對方的一切動作。德瓦爾的研究團隊在每個籠子都放了一些小石頭，訓練這些猴子把'
  - '[PAGE 161]


    石頭交給研究人員。每次猴子拿一個石頭給他們，就會得到食物，一開始的獎勵是一片黃瓜。兩隻猴子都高高興興的把黃瓜吃了。幾回合後，德瓦爾進到實驗的下一個階段。這一次，第一隻猴子交出石頭，得到的是一顆葡萄。葡萄可比黃瓜美味多了。但第二隻猴子交出石頭的時候，拿到的卻仍然是一片黃瓜。這隻猴子之前拿到黃瓜還很高興，但現在卻火冒三丈。牠拿到黃瓜之後，先是難以置信的看了一會兒，接著就怒氣沖沖，把黃瓜丟向研究人員，並開始跳來跳去、大聲尖叫。牠可不是什麼好惹的角色！24


    從這個令人發噱的實驗（可以上 YouTube 觀看）和最後通牒賽局，讓很多人以為：靈長類動物就是天生有道德觀，而平等是個普遍而永恆的價值。人類天生就是平等主義者，而不平等的社會必會招致怨恨和不滿，絕不可能運作順暢。


    # 社會從來不平等


    真是這樣嗎？這些理論應用在黑猩猩、捲尾猴和小型狩獵採集部落或許很合用；或是在實驗室裡對一小群人做測試，也不會有什麼問題。然而，一旦觀察大批群眾的行為，就會看到一個全然不同的現實。大多數的人類王國和帝國都極度不平等，但其中的穩定性和效率卻好得不得了。


    在古埃及，法老王可以躺在舒適的墊子上，住的是涼爽而豪華的宮殿，穿的是黃金的涼鞋和鑲滿寶石的外衣，由美麗的女僕剝好甜滋滋的葡萄放進他嘴裡。透過敞開的窗戶，他可以看到農民在田裡工作，穿的是骯髒的破衣，頭上頂著無情的太陽，回家能有一根黃瓜吃，就已經是天大的幸福。然而，農民很少起身反抗。'
  - '[PAGE 162]


    1740年，普魯士國王腓特烈二世入侵西里西亞（Silesia），發動一系列讓他贏得「腓特烈大帝」稱號的血腥戰爭，讓普魯士成為一大強權；卻也導致數百萬人死亡、殘廢、一無所有。他麾下的兵士多半是倒楣的新兵，得承受鐵的紀律和嚴苛的演練。可以想見，這些士兵對他們的最高指揮官並沒多大的好感。腓特烈有一次看著部隊集合、準備出擊，就和一位將軍說到，他最驚訝的是「我們站在這裡，面對這六萬大軍，卻安全無虞；他們都是我們的敵人，每個人都比我們武裝完整、身強體壯，但他們一見我們就發抖，我們卻對他們毫無所懼。」25


    腓特烈確實是可以安全無虞的看著這群人。在接下來幾年，雖然戰事辛勞，但這六萬武裝大軍從未反叛，很多人還為他獻上非凡的勇氣、冒著生命危險，甚至獻出寶貴的生命。


    這些埃及農民和普魯士士兵的反應，為什麼和最後通牒賽局、或捲尾猴實驗的情況這麼不同？原因就在於：大批群眾的行為，就是和小型團體的情況有所不同。如果今天的最後通牒賽局實驗是有甲乙兩方各一百萬人，要分1,000億美元，科學家究竟會觀察到怎樣的情況？


    這裡面的動態很有可能十分奇特而迷人。舉例來說，因為一百萬人不可能直接做出共同的決定，因此可能兩方各出現一位統治精英。這時，如果甲方領導人說要給乙方領導人100億美元，而自己留下900億美元，情況會如何？乙方領導人有可能會接受這種不公平的報價，接著把這100億美元大部分直接轉到自己的瑞士銀行帳戶，同時用各種賞罰手段，避免底下的人叛亂。領導人可能威脅和嚴懲異議份子，並且告訴那些溫和有耐心的人，他們死後可以在來世得到永恆的獎勵。這正是古埃及和十八世紀普魯士的情況，而且'
  - '[PAGE 163]


    至今在全球許多國家依舊如此。


    這樣的威脅和承諾,通常都能成功創造穩定的階級制度和群眾合作網路,但前提是民眾相信自己是順應著自然不可避免的法則、或是神祇神聖的命令,而不只是聽命於另一個人。所有的大規模人類合作,到頭來都是奠基於我們想像的秩序。這一套又一套的規矩雖然只存在於我們的想像之中,我們卻會認為這就像重力一樣真實而不可侵犯。


    「向天神獻上十頭牛,就會下雨;孝順父母,就會上天堂;如果不相信我說的話,你就會下地獄。」只要智人住在相信同樣一套故事的地方,就會遵守一樣的規矩,於是不僅很容易預測陌生人會有什麼行為,也很方便組織大規模合作的網路。智人也常常用可見的標記(例如頭巾、鬍子或西裝)來代表「你能相信我,我跟你信仰的故事是一樣的」。但我們那些黑猩猩堂兄弟,並無法創造和流傳這樣的故事,也因此無法大規模合作。


    # 意義的網


    人之所以很難理解「想像的秩序」這種概念,是因為覺得現實只分兩類:客觀現實和主觀現實。所謂客觀現實,就是事物的存在與我們的信念和感受無關。例如重力就是一項客觀現實,早在牛頓之前便已存在,而且不論信不信它,都同樣會受到重力影響。


    但主觀現實則相反,事物的存在與否,是取決於個人的信念和感受。例如,假設我覺得頭一陣劇痛,去看醫生。雖然醫師對頭部做了徹底檢查,卻沒查到什麼問題。於是她又要我去做血液檢查、尿液檢查、DNA檢測、X光、心電圖、fMRI,什麼都做了。等到'
- md: '檢查結果出爐，她說我完全健康，可以回家了。可是我仍然覺得頭痛得不得了。雖然所有客觀測試都找不出我有什麼問題，儘管除了我以外沒人感覺痛苦，但對我來說，這種痛苦是百分之百真實。


    多數人以為，現實只有客觀和主觀兩種，並沒有第三種可能。於是，只要他們說服自己某件事並非出於自己的主觀感受，就貿然認為這件事必然屬於客觀。如果有那麼多人相信上帝，如果錢確實能讓世界運轉，如果民族主義會促成戰爭、也會建立帝國……那麼這些事物或概念一定不只是我個人主觀的信念。也就是說，上帝、金錢和國家，一定是客觀的現實囉？


    然而，現實還有第三個層次：互為主體的（intersubjective）。這種互為主體的現實，並不是因為個人的信念或感受而存在，而是靠著許多人的溝通互動而存在。歷史上有許多最重要的驅動因素，都具有互為主體的概念。像是金錢，並沒有客觀的價值。1元的美鈔不能吃、不能喝，也沒法拿來穿。但只要有幾十億人都相信它的價值，你就可以拿它來買東西吃、買飲料喝、買衣服穿。如果有位麵包師傅忽然不再相信美鈔了，不願意讓我用這張綠色紙，換他的麵包，也沒什麼關係。只要再走幾條街，又有另一家超市可買。然而如果超市的收銀員、市場的小販、購物商場的銷售員，都一律拒絕接受這張紙，美鈔就會失去它的價值。當然，這些綠色紙張還是存在，但它們已經再無用處。


    這種事情其實不時會發生。1985年11月3日，緬甸政府毫無預警的宣布50緬元和100緬元的紙鈔不再是法定貨幣。民眾根本沒有兌換紙鈔的機會，一輩子的積蓄瞬間成了幾堆毫無價值的廢紙。為了取代失效的貨幣，政府發行了新的75緬元紙鈔，號稱是要紀念緬甸獨裁者奈溫將軍（General
    Ne Win）的七十五歲生日。1986年8月又發行了15緬元和35緬元的紙鈔。據傳，這位獨裁者深信命理，相信15和35是幸運數字。但對國民來說，可就一點也不幸運了。到了1987年9月5日，緬甸政府又突然下令，所有35緬元和75緬元的紙鈔同樣不再是法定貨幣。


    會像這樣因為人類不再相信而一夕蒸發的，並不只有金錢的價值。同樣的事情也可能發生在法律、神祇，甚至整個帝國上。這一秒它們還在忙著塑造世界，下一秒卻忽然不復存在。天神宙斯和天后赫拉，曾經是地中海一帶的重要力量，但現在不再有人相信，也就令祂們失去所有力量。蘇聯曾經一度能夠摧毀全人類，但也是在一支筆的力量下便煙消雲散——1991年12月8日，在維斯庫里（Viskuli）附近的一幢鄉間大宅，俄羅斯、烏克蘭和白俄羅斯的領導人簽署了〈白拉維沙協定〉（Belavezha
    Accords），其中聲明：「吾等白俄羅斯共和國、俄羅斯聯邦暨烏克蘭，做為1922年蘇聯成立條約之簽署創始國，茲此聲明終止蘇聯做為國際法之主體及地緣政治之現實。」26就這樣，蘇聯從此消失。


    要說金錢是個互為主體的現實，相對還比較容易接受。大多數人也很願意承認：那些古希臘神明、邪惡的帝國和異國文化價值觀都只是一種想像。但如果說的是自己的神、自己的國家、自己的價值觀，由於正是這些概念給了我們生命的意義，要承認這些概念也都是虛構的，就沒那麼容易了。我們希望自己的生命有客觀意義，希望自己的種種犧牲不只是為了腦子裡的各種空想。但事實上，大多數人生活的意義，都只存在於彼此述說的故事之中。


    在大家一起編織出共同故事網的那一刻，意義就產生了。對我來說，譬如在教堂結婚、在齋戒月禁食、或在選舉日投票，這些動作為什麼有意義？原因就在於我的父母也認為這有意義，還有我的兄弟姊妹、鄰居朋友、附近城市的居民、甚至是遙遠異國的民眾，都認為這有意義。為什麼這些人都認為這有意義？因為他們的朋友和鄰居也有同樣的看法。


    人類會以一種不斷自我循環的方式，持續增強彼此的信念。每一次的互相確認，都會讓這張「意義的網」收得更緊，直到你別無選擇，只能相信大家都相信的事。


    只不過，經過幾十年、幾世紀，意義的網也可能忽然拆散，而由一張新的網取而代之。讀歷史正是看著這些網的編織和拆散，並讓人意識到，對這個世代的人來說最重要的事情，很有可能對他們的後代變得毫無意義。


