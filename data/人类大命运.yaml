    隨著全球資料處理系統變得全知全能，「連結到這個系統」也就成了所有意義的來源。人類之所以想要融入這個資料流，是因為只要成為資料流的一部分，你就會隸屬於一個比自己更偉大的計畫。傳統宗教向你保證，你說的每個字、你的每個舉止，都是某個偉大宇宙計畫的一部分，上帝一直看顧你，也在意你的所有想法與所有感受。


    至於現在的數據宗教則說，你說的每個字、你的每個舉止，都是偉大資料流的一部分，演算法一直看顧你，也在意你的所有想法與所有感受。大多數人都對此非常滿意。對於真正的信徒來說，要他們脫離資料流，就等於是要冒著失去生命意義的風險。如果你有了某種感受，卻沒有別人知道它、也並未對全球資訊交換有任何貢獻，人生又有什麼意義呢？


    人文主義認為：所有的經驗體驗是發生在我們心中，我們要從自己的心裡找出一切事物的意義，進而為宇宙賦予意義。數據主義則認為：經驗不分享就沒有價值，而且我們並不需要（甚至是不可能）從自己心裡找到意義。我們該做的，就是要記錄自己的經驗，


