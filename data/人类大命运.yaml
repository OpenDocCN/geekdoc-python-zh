  md: '# # 第1章


    ## 人類的三大新議題


    第三個千禧年開始之際，人類醒來，伸展手腳、揉了揉眼睛，

    腦子裡依稀記得某些可怕的噩夢。「好像有什麼鐵絲網啊、巨大的

    蘑菇雲之類的。但管它的呢，只是個噩夢吧。」人類走進浴室，洗

    洗臉，看看鏡子裡臉上的皺紋，沖了一杯咖啡，打開了行事曆，

    「來瞧瞧今天有什麼重要的事吧。」


    幾千年來，這個問題的答案並沒有什麼改變，不管是二十世紀

    的中國人、中世紀的印度人、或是古代的埃及人，都面臨著同樣的

    三大問題：饑荒、瘟疫、戰爭。這三大問題永遠都是人們的心頭大

    患。一代又一代，人類向所有神明、天使和聖人祈禱膜拜，也發明

    無數工具、制度和社會；但是仍然不斷有數百萬人死於飢餓、流行

    病和暴力。許多思想家和先知於是認為：饑荒、瘟疫和戰爭一定是

    上帝整個宇宙計畫的一部分、又或是出自人類天生的不完美，除非

    走到時間盡頭，否則永遠不可能擺脫。


    但在第三個千禧年開始之際，人類開始意識到一件驚人的事。

    雖然多數人很少想到這件事，但是在過去幾十年間，我們竟然已經


    ![](bbox=[[0, 0], [340, 271]])'
  merge: -1
  pgno: 9
- img_proc: true
  md: '成功遏制了饑荒、瘟疫和戰爭！當然這些問題還算不上完全解決，但已經從過去「不可理解、無法控制的自然力量」轉化為「可應付的挑戰」了。我們不再需要祈求某位神祇或聖人來解救人類，而已經相當瞭解，該怎樣做就能預防饑荒、瘟疫和戰爭，而且通常都能成功。


    確實，還是有些時候事與願違，但面對這些失敗，人類不再只是聳聳肩，說「沒辦法，世界就是這樣不完美」或是「這是上帝的旨意」。現在如果再有饑荒、瘟疫和戰爭爆發，而不受人類控制，我們會覺得一定是有某個人出了問題，該成立調查委員會來研究研究，而且對自己許下承諾，下次一定要做得更好。


    這套辦法還真行得通。饑荒、瘟疫和戰爭發生的次數及頻率都確實在下降。這是史上首見，因營養過剩而死亡的人數超越營養不良；因年老而死亡的人數超越傳染病死亡；自殺身亡的人數甚至超越被士兵、恐怖份子和犯罪份子殺害人數的總和。到了二十一世紀早期，平均來說，人類死於乾旱、伊波拉病毒或基地組織恐怖攻擊的可能性，還不及死於暴飲暴食麥當勞。


    因此，雖然各國總統、閣揆和軍事將領的每日待辦議題仍然滿是經濟危機和軍事衝突，但就整個人類歷史的宏觀觀點來說，人類已經可以看向別處，開始尋找其他新議題了。如果我們確實已經讓饑荒、瘟疫和戰爭得到控制，什麼將取而代之、成為人類最重要的新議題？就像消防員忽然聽說再不會有火災了，人類到了二十一世紀，得自問一個前所未有的問題：我們接下來要做什麼？整個世界已經如此健康、繁榮又和諧，我們該把注意力和創造力投到什麼事情上？而因為生物科技及資訊科技為人類帶來強大的新力量，這個問題也變得加倍迫切。手上有了這些力量，究竟該如何運用？'
  merge: -1
  pgno: 10
- img_proc: true
  md: '![](img/319dca06e22893e942053da0432e9f19_11_0.png)


    要回答這個問題之前，我們對於饑荒、瘟疫和戰爭還得多談幾句。很多人可能會認為，說這些問題已經得到控制，是非常離譜、天真、或是麻木不仁的說法。不是還有幾十億人每天只有不到兩美元過日子嗎？非洲不是還在和愛滋病對抗？敘利亞和伊拉克不也正有戰爭肆虐嗎？


    要回答這些問題，我們得先更仔細看看二十一世紀初的世界；至於探索未來幾十年的新議題，且待後續再談。


    # 生物貧窮線


    首先談談饑荒，這在幾千年來一直是人類最大的敵人。甚至在不久前，大多數人仍然只活在生物貧窮線的邊緣，再低一點就會落入營養不良和飢餓狀態。只要發生小失誤、或單純有點運氣不好，很有可能就等於把整個家庭或村莊判了死刑。如果一場大雨毀了你的麥田、或是強盜搶走了你養的羊群，你和親人可能就會餓死。如果是集體的愚蠢行徑或不幸，則會導致大規模的饑荒。在古埃及或中世紀印度，如果碰到嚴重乾旱（這並不少見），常常一下子總人口就會有5%或10%撒手人寰。遇上乾旱，就會出現糧食短缺；救援運輸又太過遲緩、成本也太高，無法進口足夠的食物；而且政府也太過疲弱，無力挽救局面。


    隨便翻開哪本歷史書，幾乎都會讀到饑荒的慘況，讀到人在飢餓之下的瘋狂行徑。1694年4月，博韋（Beauvais）一地的法國官員描述了當地饑荒、糧價飆漲的影響，他說自己的轄地處處都是「無數可憐的靈魂，飢弱無力，匱乏而亡；沒有工作，也就沒有錢買麵包果腹。為求苟延殘喘、稍解飢餓，這些可憐人以不潔之物為食，'
  merge: -1
  pgno: 11
- img_proc: true
  md: '如死貓、或是已剝皮而投入糞堆的死馬。還有人吃的則是宰殺牛隻流出的血，以及廚子扔到街上的內臟。其他可憐人則吃蕁麻、雜草、樹根、藥草，全部在水裡煮成一鍋。」¹


    法國各地都出現了類似的景象。由於前兩年氣候不佳，整個王國嚴重歉收，到了1694年春天，糧倉已經完全見底。有錢人設法囤積糧食，以天價出售，而窮人則是大批餓死。從1692年到1694年間，法國約有二百八十萬人餓死，大約占總人口15%；與此同時，太陽王路易十四仍在凡爾賽宮，與眾家妃妾歌舞昇平。隔年（1695年），饑荒襲擊愛沙尼亞，人口損失達五分之一。1696年，則是在芬蘭肆虐，餓死了四分之一到三分之一的人口。從1695年到1698年間，蘇格蘭也遭受嚴重饑荒，部分地區餓死高達五分之一的居民。²


    多數讀者可能都知道，少吃一頓午餐是什麼感覺——可能是為了宗教因素而在幾個節日禁食，也可能是連續幾天只喝蔬果昔，號稱有某種神奇的功效。然而如果是連續多日，粒米未進，而且連下一口食物在哪都不知道，又是什麼感覺？今天，大多數人從未經歷這種痛苦煎熬，但很遺憾，我們的祖先對此再清楚不過。在他們向神祇高呼「拯救我們脫離饑荒！」的時候，心裡正是那種感覺。


    過去幾百年間，科技、經濟和政治進步，張開了日益強健的安全網，將人類與生物貧窮線隔開。雖然時不時仍有大規模饑荒，但只能算是特例，而且幾乎都是因為政治因素、而非自然災害所致。世界上已經不再有自然造成的饑荒，只有政治造成的饑荒。如果現在還有人在敘利亞、蘇丹和索馬利亞餓死，罪魁禍首其實是那些政客。


    在全球大部分地區，現在就算沒了工作、丟了全部家當，也不太可能活活餓死。私人保險、政府機構和國際非政府組織，可能無'
  merge: -1
  pgno: 12
- img_proc: true
  md: '法讓他脫離貧困，但至少能提供足夠的熱量，讓他生存下去。全球貿易網路甚至還能將乾旱和洪災轉為商機，也能又快又便宜的克服糧食短缺危機。就算整個國家遭到戰爭、地震或海嘯摧殘，國際間的緊急援助，通常還是能成功避免大範圍的饑荒肆虐。雖然每天仍有幾億人陷於飢餓，但在大多數國家，已經很少有人真正餓死。


    貧困確實會帶來許多其他健康問題，營養不良也會縮短預期壽命，即使地球上最富有的國家，也不免有這個難題。例如就算在法國，仍有六百萬人（約占總人口10%）陷於營養不安全（nutritional
    insecurity）的狀態，一早醒來不知道中午能否有東西吃，常常得帶著飢餓入眠；而且就算吃到東西，營養也非常不均衡、不健康：往往有大量的澱粉、糖和鹽，卻沒有足夠的蛋白質和維生素。³然而，營養不安全仍然算不上饑荒，二十一世紀的法國也已不是1694年的法國。就算在博韋或是巴黎最糟糕的貧民窟，現在也不會發生幾週沒得吃而餓死人的情形。


