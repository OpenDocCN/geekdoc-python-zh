  md: '隨著意義和權威的源頭，從天上轉移到人類的內心感受，整個宇宙的本質也隨之改變。對於外在世界，原本的印象是充滿著各種神祇、繆斯、精靈、食屍鬼，但現在就是一片空無的空間。對於內心世界，原本的印象只是包涵各種原始激情的一塊飛地，但現在忽然變得如此具有深度、廣度，難以度量。對於天使和魔鬼的概念，也已經從漫遊在森林和沙漠間的實體，轉換為人類心靈中的內部力量。天堂和地獄也不再是雲層之上和火山之下的實際地點，而認為是人類內在的精神狀態。只要你心中燃起憤怒和仇恨的火焰，便是正在經歷地獄的苦痛；只要你原諒敵人、懺悔錯誤、與窮人分享財富，就是享有天堂的幸福。


    尼采所謂的「上帝已死」，指的就是這個意思。至少在西方，上帝已經成了一個抽象概念，有人接受、有人不接受，但幾乎不會造成任何差別。在中世紀，如果沒有上帝，我就沒有了政治、道德和美學的權威來源，無法判斷正誤、好壞、美醜。這還得了？相較之下，今天要說自己不信上帝，卻是再容易不過，因為這並不會讓我付出任何代價。就算我完全是個無神論者，仍然能夠從內在的經驗得到非常豐富的政治、道德和美學價值觀。


    如果我相信上帝，那是因為我選擇相信。如果內心叫我要信上帝，我就信。我相信神，是因為自己感覺到了神的存在，我的心告訴我，祂就在那裡。但如果我不再感覺到神的存在，如果我的心突然告訴我世上沒有神，我也就不再相信神了。


    不管是哪一種，權威的本源都在於我自己的感覺。所以，就算有人說自己信上帝，其實他更信的，是自己內心的聲音。'
