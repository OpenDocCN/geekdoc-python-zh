  md: '# 科學能辨真偽


    宗教的自我宣傳，往往只強調它們精美的價值觀。只不過，神卻往往藏在那些用小字印製的事實聲明之中。像是天主教，總宣揚自己是博愛和同情的宗教。這不是太好了嗎？誰能反對這些事呢？既然如此，為什麼現在不是全人類都是天主教徒？因為如果你真的去讀那些小字，就會發現天主教同時也要求你盲從某位「永遠不會犯錯」的教皇，就算他曾經號令信眾發動十字軍東征、把異教徒綁在樁上活活燒死，也不能違逆教皇的旨意。這些實際的指示，並不只是來自倫理判斷，而是來自倫理判斷與事實聲明的結合。


    讓我們從縹渺的哲學領域回歸歷史現實，便會觀察到宗教故事幾乎總是包括三個部分：


    +   第一、倫理判斷，例如「人命神聖」。第二、事實聲明，例如「人命是在受孕那一刻開始」。第三、實務指示：把倫理判斷與事實聲明合併，就會得到實務指導方針，像是「就算受孕才剛一天，你也不得墮胎」。


