  md: '# 人類的三大新議題


    人類的生命，絕不允許我們輕易接受人類死亡。只要人是因為某種原因而死，我們就會努力克服這種原因。


    對於這項挑戰，科學界和資本經濟絕對是樂於承擔。只要讓他們得到新發現、奪得新商機，大多數的科學家和銀行家並不在乎要做的是什麼事情。而又有誰能想到，比戰勝死亡更令人興奮的科學議題，或是比永保青春更有前景的市場？如果你已年過四十，請閉上眼睛一分鐘，回想自己當初二十五歲的身體，不只是外表，更是當時那種感覺。如果能讓你回到當時的生理狀態，你會願意付出多少價錢？當然，有些人會對此不屑一顧，但願意不惜一切的顧客，也必然不在少數，已足以構成一個幾乎無限大的市場。


    如果光這些還不夠，單就對死亡的恐懼這一點，就已經深植在多數人心中，足以推動向死亡宣戰。只要人們認為死亡無可避免，就會從小訓練自己，壓抑想要永生不死的欲望，又或是駕馭這種欲望，運用到其他目標。正是因為人們渴求永生不死，才能譜出「不朽」的交響曲、在戰爭中奮力爭取「永恆的榮耀」，甚至願意犧牲生命，希望自己的靈魂能「在天堂享受永遠的幸福」。不論是藝術的創造、政治的投入或宗教的虔誠，很大部分其實正是由「對死亡的恐懼」所推動。


