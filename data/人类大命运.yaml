    的感覺。就算踢進了世界盃決賽的制勝球，也無法保證一生幸福，甚至是到了頂點之後就只能下坡。同樣的，如果去年我意外升遷，很有可能雖然現在我還是在這個位子上，但當初聽到消息的愉悅感早已經在幾個小時後就煙消雲散。如果想再感受那些美妙的感覺，就得再升遷一次。萬一滿懷期望、卻沒能再升遷，感受到的痛苦和憤怒，可能還遠比當初乾脆一直當個小卒來得高。


    # 興奮感總是太短暫


    這些都是演化的錯。無數代以來，我們的生化系統不斷適應，為的是增加生存和繁衍的機會，而不是快樂幸福的机会。只要是有利於生存和繁衍的行為，就會得到生化系統用愉悅的感覺來回饋。但這不過是一時的行銷花招罷了。我們努力取得食物、追求伴侶，就是想避免飢渴帶來的不愉悅感覺，並且滿足進食的愉悅、性愛的高潮。但無論進食或性愛，這種愉悅都無法長時間維持，想要再次感受，就只能去尋找更多的食物和伴侶。


    如果哪天出現一種罕見突變，讓某隻松鼠只要吃了一顆堅果，就能一輩子感覺無上的快樂，情況會怎樣？技術而言，只要從松鼠的大腦下手，確實能夠做到。而且誰知道呢，或許幾百萬年前就出現過這樣幸運的松鼠，但牠過的就會是極其快樂、但也極其短暫的一生，讓這種罕見的基因突變迅速畫下句點。原因就在於，覺得快樂的松鼠再也不會努力去找更多堅果，更不用說是求偶交配了。至於和牠競爭的其他松鼠，吃了堅果才過五分鐘，就又覺得餓，反而有更好的機會能夠生存，並把自己的基因傳給下一代。正是基於完全相同的原因，人類蒐集堅果（高薪的工作、大房子、好看的另'
  - '[PAGE 48]


    一半）也很少能帶來長期的滿足。


    可能有人會說，情況也沒那麼糟啦，因為讓我們快樂的不是那些結果，而是追求目標的過程。攀登聖母峰的過程，會比站在山頂更令人滿足；挑逗和前戲，要比最後的性高潮更為精采；進行開創性的實驗，也比最後獲得讚美和獎項更有趣味。然而，這並未改變事情的全貌，只是說明演化會用各種不同種類的愉悅，來控制我們罷了。有時候，演化是用愉悅或安寧的感覺，引誘我們行動；也有時候，是用得意或興奮的感覺，刺激我們向前。


    動物如果在尋找某種增加生存和繁衍機會的東西（例如食物、夥伴、或社會地位），大腦就會產生警覺和興奮的感覺，而因為這種感覺如此美妙，就能促使動物更加努力。在一項著名的實驗中，科學家把電極連接到幾隻大鼠（rat）的腦子，大鼠只要踩下踏板，就能創造出興奮的感覺。接著，他們讓大鼠有美味的食物和踩踏板這兩個選擇，結果大鼠寧願選擇踏板（很像是小孩寧願打電動，也不想下樓吃飯）。這幾隻大鼠一次又一次踩著踏板，直到因為飢餓和疲憊而倒地不起。37


    人類很可能也是這樣，喜歡比賽過程的興奮，大於最後成功的桂冠。然而，真正讓比賽如此吸引人的，就是那些令人開心的感覺了。像是爬山、打電動或去盲目約會，這些活動的過程絕不可能完全只有壓力、絕望或無聊這些令人不快的感覺，否則斷無可能有人參加。38


    可惜的是，比賽那種興奮感，就像勝利時的幸福感一樣，轉瞬即逝。風流男人享受一夜情的刺激，商人享受咬著指甲看道瓊指數上上下下，電玩玩家享受在電腦螢幕殺怪；對他們來說，再去回味昨日的冒險，並不足以讓他們感到滿足。就像大鼠必須一次又一次'
  - '[PAGE 49]


    踩下踏板，不管是風流男子、商界巨擘或電玩玩家，一樣是每天都需要有新的刺激。雪上加霜的是，這裡的期望一樣會因現有條件而適應，昨天覺得刺激的挑戰，今天太快就化為沉悶。又或許，幸福快樂的關鍵既不是比賽、也不是金牌，而是要能調合出興奮與安寧這兩種元素的正確劑量組合；但我們大多數人，往往不斷在緊張與舒坦這兩端來回跳動，到了哪端就開始對那端感到不滿。


    # 操縱生化反應可獲得快樂嗎？


    如果科學說得不錯，幸福快樂是由生化系統所掌握，那麼唯一能確保長久心滿意足的方法，就是去操縱這個系統。別再管經濟成長、社會改革或政治革命了；為了提高全球幸福快樂的程度，該操縱的是人類的生物化學。


    過去幾十年間，人們確實已經開始這麼努力了。五十年前，精神藥物背負著嚴重的汙名，如今這種汙名已然打破。不論這是好是壞，現在有愈來愈高比例的人口，定期服用精神藥物，確實有些是為了治癒使人衰弱的心理疾病，但也有些只是要面對日常生活的沮喪和偶爾襲來的憂鬱。


    舉例來說，已經有愈來愈多學童開始服用利他能（Ritalin）之類的興奮劑。2011年，美國因為注意力不足過動症（attention deficit hyperactivity
    disorder, ADHD）而服用藥物的兒童人數，就有三百五十萬人。英國的這個數字，則從1997年的九萬二千人，上升到2012年的七十八萬六千人。39 這些藥物的原本目的，是要治療注意力障礙，但今天就連某些完全健康的孩子，也開始服藥，希望能夠提高成績，迎合老師和家長愈來愈高的期望。40'
  - '[PAGE 50]


    # 第1章 人類的三大新議題


    很多人相當反對這種發展，認為問題不是出在孩子，而是出在教育體系。如果學童出現注意力障礙、壓力過高、成績不佳，或許我們該怪的是學校教法過時、教室過度擁擠、生活節奏已經快到不自然。或許該改變的不是孩子，而是學校？各種相關論點的歷時演變，十分耐人尋味。幾千年來，教育方法的相关爭論未曾停息，無論是在中國古代或是英國的維多利亞時代，人人都各有一套理論，而且都對所有其他理論嗤之以鼻。但在先前，至少大家還有一點達成共識：想改善教育，該從學校下手。然而現在，大概是歷史上首次，至少有一些人已經認為，更有效率的做法是從學生的生化狀態下手。41


