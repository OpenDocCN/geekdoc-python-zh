    在雞毛蒜皮的小事；但到了戰時，一切換成了野蠻，但至少更誠實了、也更直接。換個方法來看：和平的時候，每個人過的只是自己的小生命，做些瑣碎小事，擔心的是自己舒不舒服、錢夠不夠用這種事，一切只是為自己活著。這種生活也太噁心了吧！但在戰時，就算你確實被殺（而且人本來就只能多活幾年，難免一死），卻能確切知道，自己的死，是為了幫助自己的國家。事實上，你是完成了一個理想，而在我看來，這在一般的日常生活裡很少能夠做到。因為日常生活的基礎是商業化和自私；如果你也想「有點成就」，就不可能當不沾鍋。


