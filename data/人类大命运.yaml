    # 用進廢退 ❖


    我們的其他感官、或是更底層能夠注意到感官感受的能力，也同樣經歷了這種過程。


    遠古的採集者總是保持警覺。在森林裡找蘑菇的時候，他們會仔細聞著風的氣味、專心觀察地面。找到一個蘑菇之後，他們會用全心全意來吃這個蘑菇，感受最細微的味道差異，分辨這個蘑菇究竟是適合食用、或是有毒。到了今天的富裕社會，人類多半不需要如此敏銳。超市裡就有上千種食物可供選擇，食品安全都有衛生單位監督。但不管你選的是義大利披薩、還是泰國泡麵，接下來，都可能是坐在電視機前面狼吞虎嚥，幾乎不管這食物有何風味！（正因如此，食品製造商才要不斷推出刺激的新口味，希望能夠動搖一下我們的無動於衷。）


    同樣的，由於有良好的交通運輸，就算是住在城市另一邊的朋友，仍然很容易見到面。但就算真的碰到面，我們卻也不見得真的把心思都放在對方身上，總是在看手機有沒有新訊息、臉書有沒有新動態，覺得一定有什麼更有趣的事發生在別的地方。現代人類已經患上「錯失恐懼症」（Fear
    Of Missing Out, FOMO），總在擔心自己錯過了什麼；雖然手中的選擇比以往任何時候都多，但選了之後又很難付出全心全意。⁷


