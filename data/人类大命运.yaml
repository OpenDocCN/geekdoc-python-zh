    於是在過去的七萬年間，人類就是先擴散，再分成不同群體，最後再次合併。但合併並不代表一切回到原點。過去的多元族群融入今天的地球村時，各自都帶著思想、工具和行為上的獨特傳承，呈現一路走來的蒐集與發展。在我們現代的食品櫃裡，就有中東的小麥、南美洲安地斯地區的馬鈴薯、新幾內亞的糖，以及衣索比亞的咖啡。同樣的，我們的語言、宗教、音樂和政治，也充滿著來自地球各地的傳世寶藏。⁵


