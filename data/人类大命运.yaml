    # 資本主義的巨輪不會停轉


    資本主義深信「成長」這項最高價值,可說第一條誡命就是:將利潤投入有助於「增加成長」的事。在人類史上,王公貴族多半是把利潤虛擲在華麗的狂歡饗宴、豪奢的樓臺宮宇,以及不必要的戰爭衝突。又或是把金幣放入鐵箱,密封起來,深埋地底。今天,虔誠的資本主義信徒會用利潤來雇用新員工、擴大工廠規模,或是開發新產品。


    就算自己不懂這些事,他們也會把錢交給某些懂的人,像是銀行家、或是創投業者,再由這些人把錢借給各種需要錢的產業。拿了貸款,農民種新的麥田、營建承包商蓋新的房屋、能源公司探索新的油田、軍火業者開發新的武器。這一切活動得到的利潤,就讓這些產業能夠償還貸款,而且是連本帶利。於是,我們現在不但有了更多的小麥、房子、石油和武器,而且銀行和基金裡還有更多的錢,能夠繼續借出去。這是個永不停轉的巨輪,至少資本主義是這麼認為的。絕不會有某個時刻,資本主義忽然說:「好囉,成長夠了,我們輕鬆點吧。」


