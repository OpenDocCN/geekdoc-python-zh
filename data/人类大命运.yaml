    # 心靈之間的鴻溝


    在地球村出現之前，地球就像是由各個孤立的人類文化組成的星系，當年環境促成的心理狀態，如今可能都已不復存在。社會經濟現實及日常生活一旦不同，培養出的意識狀態也就不同。不論是石器時代的長毛象獵人、新石器時代的農民、鎌倉時期的武士，誰又能確知他們的心靈狀態？此外，許多前現代文化都認為，有某種更高階的意識狀態，可透過冥想、藥物或儀式而進入。薩滿巫師、僧侶或修士都很有系統的探索心靈這片神祕境地，並帶回種種激動人心的故事，訴說著我們聞所未聞的意識狀態，像是無上的寧靜、極端的敏銳、無與倫比的感性，還講著心靈如何延展至無邊無際、遁入一片虛空。


    人文主義革命之後，現代西方文化不再相信這種形而上的心理狀態、也沒興趣瞭解，反而是刻意把一般人的俗世體驗給神聖化。因此，現代西方文化有一項特殊之處：並沒有某一群人形成某個特殊階級，想追求超脫俗世的心理狀態。有人想做這件事，就會被認定是嗑藥、精神病、或是詐騙集團。所以，雖然我們十分瞭解哈佛心理系學生的心理狀態，但對於美洲原住民的薩滿巫師、佛教的僧侶、或是蘇菲神祕教派的心理狀態，反而所知非常有限。


    而且這還只是智人的心靈而已。五萬年前，地球上除了智人，還有尼安德塔人這個近親。尼安德塔人沒能發射太空船、蓋出金字'
