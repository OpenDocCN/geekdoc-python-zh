    ## 愛滋不再滋長


    在過去幾十年間，或許愛滋病的應對，可說是最大的一場醫療失靈。但就算是這場悲劇，現在看來，仍可說是進步的象徵。


    自從1980年代初，愛滋疫情首次大爆發，已有超過三千萬人因而喪生，另外還有幾千萬人深受身心煎熬。愛滋病這種新傳染病特別狡猾，很難摸清頭緒、對症下藥。如果感染天花，病人幾天之內就會喪命，但HIV（人類免疫不全症病毒）陽性的病人，卻可能有長達數週、甚至數月的空窗期，表面看來健健康康，卻可能在不知情的狀況下，繼續感染他人。


    此外，HIV本身並不會致人於死，而是會破壞免疫系統，進而使病人遭受其他疾病的威脅。真正殺死愛滋病人的，其實是這些繼發疾病。因此，在愛滋病開始蔓延的時候，大家很難弄清楚究竟是怎麼回事。像是在1981年，紐約一家醫院收到兩名愛滋病人，一名死於肺炎，另一名則死於癌症，當時完全看不出來這兩位其實都是HIV的受害者，感染的時間可能只有幾個月，也可能長達數年。


    儘管面對這種種困難，但在醫學界意識到這種神祕的新傳染病之後，只花了短短兩年，就抓出這種病毒，瞭解其傳播方式，並提出有效抑制疫情的方法。再過十年，新推出的藥物就已經讓感染愛滋病從必死無疑，轉成一種慢性病（至少對那些夠有錢、能夠負擔治療費用的人來說）。


    想想看，如果愛滋病的爆發不是在1981年，而是在1581年，情況將會如何？當時很有可能完全找不出疫情的源頭，不知道愛滋病是如何傳染，也不知道應該如何抑制，更不用說如何治癒了。在這種情況下，愛滋病致死的人口比例，很有可能遠高於現在，而與黑死病相當，甚至有過之而無不及。


    雖然愛滋病對人類造成慘重的影響，另外像瘧疾這種歷史已久的流行病也每年取走數百萬人命，但現在看來，流行病對人類健康的威脅，已經遠遠小於先前幾千年來的情況了。現在，絕大多數人是死於非傳染性疾病，像是癌症、心臟病，或根本就是自然老死。（癌症和心臟病當然不是什麼新疾病，自古以來一直都存在，只是古人平均壽命較短，還來不及死於這兩種疾病罷了。）


    很多人擔心這只是暫時的勝利，害怕黑死病一定有哪個近親正躲在黑暗的角落，蠢蠢欲動。沒人能保證絕不會再有一場瘟疫席捲世界，但我們有很好的理由相信：在醫師與細菌的軍備競賽中，醫師是跑在前面的一方。會出現新的傳染病，主因是病原體基因組發生突變，使病原體能夠從動物跳到人類，能夠打敗人體免疫系統，或是對抗生素之類的藥物產生抗藥性。現今由於人類對環境的劇烈影響，這種突變的發生和傳播都可能比以往更快。然而，在對抗醫學的時候，病原體唯一的靠山只有盲目的運氣。


    醫師則不然，他們靠的絕不只是運氣。雖然科學也有許多運氣成分，但醫師可不是隨隨便便把不同的化學物質扔進試管，希望哪天湊巧製造出新藥來。他們是每年累積更多更好的知識，並用來設計出更有效的藥物及療法。因此，雖然我們可以預見在2050年必然會有更多具抗藥性的細菌，但到時候的醫學，也很有可能比今天更能解決這些問題。


    2015年，醫師宣布發現一種全新的抗生素 Teixobactin，目前細菌對它尚無抗藥性。已有一些學者認為，在與高抗藥性細菌的這場仗上，Teixobactin
    很有可能扮演扭轉乾坤的角色。科學家也正在研發革命性、與過去完全不同的新療法，譬如有些實驗室已經開始研發奈米機器人，希望有朝一日能讓它們在人類的血液中巡航，找出及殺死病原體和癌細胞。細菌這種微生物，可能已經累積了三十億年對抗生物的經驗，但說到要應付奈米機械敵人，可就完全是新手上路，因此細菌要演化出有效的防衛機制，將會加倍困難。


    雖然我們不敢保證，絕不會爆發新一波伊波拉或未知流感病毒的疫情，橫掃全球造成數百萬人身亡，但至少我們不會認為這是不可避免的天然災害。我們反而會認為：這是不可原諒的人為疏失，要求有人為此負起責任。


    例如2014年夏末，有幾個星期情勢看來相當不妙，似乎伊波拉病毒已經占了上風，當時也就倉促成立了調查委員會。初步報告於2014年10月18日公布，批評世界衛生組織對疫情爆發的反應不合格，並認為這次的疫情要怪罪世界衛生組織非洲辦事處貪汙腐敗、效率低落。進一步的批評還拉高層級，批評整體國際社會的反應太慢、力道不足。這種批評背後的假設，正是認為人類的知識和工具已經足以防治傳染病，如果疫情仍然失控，原因便是人類的無能，而不是什麼神的憤怒。


    愛滋病也是類似的例子，雖然醫師早在多年前便已瞭解愛滋病的機制，但在非洲撒哈拉沙漠以南地區，愛滋病仍持續感染並奪走數百萬人的性命。現在我們也會把它看成是人為疏失，而不是什麼命運太過殘酷。


    所以，在這場與自然災害（例如愛滋病和伊波拉病毒）的爭鬥之中，看來人類是占了上風。但如果是人性自己帶來的危險呢？


    生物科技讓我們能夠打敗細菌和病毒，但同時也讓人類自己陷入前所未有的威脅。同樣的工具，在醫師手上能夠快速找出及治療新疾病，但在軍隊和恐怖份子的手上，就可能變成更可怕的疾病、足以毀滅世界的病原體。因此我們或許可以說，流行病在未來要危及全體人類，只有一種可能，就是人類自己為了某些殘忍的意識型態，刻意製造出流行病來。


    人類面對流行病束手無策的時代，很有可能已經成為過去了。但有些人可能反而有點懷念吧？


    ## 打破弱肉強食的叢林法則


    第三個好消息是戰爭也正在消失。在整個歷史上，大多數人都以為有戰爭是必然，和平只是暫時狀態。國際關係也是由叢林法則掌控，就算兩個政體看來和平共處，戰爭也始終會是一個選項。舉例來說，雖然德國和法國在1913年處於和平狀態，但大家都知道他們可能在1914年掀起戰火。每當政客、將領、商人和一般大眾籌劃未來的時候，總會想到戰爭這項因素。從石器時代到蒸氣時代，從北極到撒哈拉大沙漠，地球上每個人都知道，鄰國隨時可能前來侵犯領土，擊垮軍隊、屠殺人民，占領土地。


    直到二十世紀下半葉，這種叢林法則才終於遭到打破（或說取消）。大多數地區，戰爭已經比以往更為罕見。在遠古農業社會，人類暴力占了死亡總數的15%，而在二十世紀，暴力事件只占死亡總數5%，到了二十一世紀初，更是只占全球死亡總數約1%。例如2012年，全球約有五千六百萬人死亡，其中六十二萬人死於人類暴力（戰爭致死十二萬人、犯罪致死五十萬人）。相較之下，自殺的人數有八十萬，死於糖尿病的更有一百五十萬人。現在，糖可比火藥更致命呢！


    更重要的是，已經有愈來愈多人覺得不可能發生戰爭了。這是史上首次，當政府、企業和個人籌劃不遠的將來，多半不會考慮到戰爭的可能性。核武發明之後，超級大國之間如果還想掀起戰端，無異於集體自殺的瘋狂舉動，於是逼著全球最強大的幾個國家，得找出和平的替代方案，來解決衝突。同時，全球經濟的導向也已經從物料走向知識。過去主要的財富來源是物質資產，例如金礦、麥田、油井，而現在的主要財富來源則是知識。發動戰爭雖然能搶下油田，卻無法霸占知識。因此，隨著知識成為最重要的經濟資源，戰爭能帶來的獲利便下降；可能發生戰爭的地方，愈來愈局限在世界的特定區域（像是中東和中非），這些地方仍然維持老式的物料導向經濟。


    盧安達在1998年入侵鄰國剛果，奪占該國豐富的鈮鉭鐵礦；這件事之所以不令人意外，是因為這種礦產是手機和筆記型電腦不可或缺的重要原料，而剛果鈮鉭鐵礦的蘊藏量足足占了全球的80%。盧安達靠著掠奪來的鈮鉭鐵礦，每年能賺到二億四千萬美元，對於貧困的盧安達來說，可是一大筆收入。


    相較之下，如果中國入侵加州奪下矽谷，卻是毫無道理。因為就算中國獲勝，矽谷也沒有矽礦可劫。中國真正能夠賺到幾十億美元的方式，反而是和蘋果及微軟等高科技龍頭合作，購買軟體，製造硬體產品。盧安達耗費蠻力從剛果搶來鈮鉭鐵礦的全年所得，還不如中國不流血、靠商業在一天賺得多。


    於是，目前「和平」這個詞已經有了新意義。過去幾代人想到和平，只是「暫時沒有戰爭」；而現在想到和平，是指「難以想像會有戰爭」。1913年的人說「法德兩國和平」，意思是法德兩國此刻並無戰事，但明年誰知道呢；但我們現在說「法德兩國和平」，意思是在任何可能預見的情況下，這兩國實在不可能爆發戰爭。這種意義的和平，現在不僅存在法德兩國之間，也存在全球大多數（但不是全部）國家之間。不管是德國和波蘭、印尼和菲律賓、或是巴西和烏拉圭之間，都沒有什麼局面可能在明年爆發全面戰爭。


    這種「新和平」並不只是嬉皮式的一廂情願；就算是渴求權力的政體、貪婪無度的企業，也希望新和平能持續下去。賓士汽車公司規劃東歐的銷售策略時，絕不會把德國攻占波蘭當作可能性。企業想從菲律賓引進廉價勞力時，也不會擔心印尼明年可能揮軍菲律賓。巴西政府要討論明年預算時，我們很難想像，巴西國防部長會忽然站起來，拍桌大喊：「等等！如果我們要攻打烏拉圭呢？大家怎麼都沒想到這件事？我們應該要編列五十億美元的戰爭預算。」當然，還是有幾個尚未實現新和平的地區，這些地方的國防部長還是會講出這樣的話。這種事情我知道得太清楚了，因為我就住在其中一個這種地方。但這些就是例外罷了。


    當然，我們無法保證新和平無限延續。正如最初是核武促成新和平，未來的科技發展也可能掀起新戰爭。特別是網路戰的出現，讓小國或非政府個體也有能力痛擊超級大國，讓世界陷入動盪。美國在2003年攻打伊拉克，巴格達和摩蘇爾慘遭戰火蹂躪，卻沒有任何一枚炸彈落到洛杉磯或芝加哥。但在未來，北韓或伊朗等國家就有可能用邏輯炸彈（logic
    bomb）讓加州大斷電、德州煉油廠爆炸、密西根州火車相撞。（邏輯炸彈就是惡意程式碼，能夠在平時就透過網路，植入對方的電腦，並從遠端操控。不管是美國或其他國家，控制重要基礎設施的網路，很有可能都已遭到許多此類惡意程式碼入侵。）


    然而，我們不該把能力與動機混為一談。網路戰確實帶來了新的毀滅手段，卻不代表增加了新的使用動機。過去七十年間，人類


    ## 恐怖主義就是一種表演


    那麼，恐怖主義又該怎麼說？就算各個中央政府和強權都學會了克制，但恐怖份子對於使用新的毀滅性武器，可不見得會思慮再三。這當然是個令人擔憂的可能。然而，恐怖主義只是得不到真正權力的人，所採取的軟弱策略。至少在過去，恐怖主義的手段是要散播恐懼，而不是造成嚴重的實質損害。恐怖份子通常無力擊敗軍隊、占領國家，或破壞整座城市。肥胖及相關疾病在2010年造成約三百萬人死亡；相較之下，恐怖份子在全球造成的死亡人數是7,697人，多數位於發展中國家。對於一般美國人或歐洲人來說，可口可樂造成的生命威脅，可能還遠比基地組織來得大。


    這樣說來，恐怖份子究竟是怎麼占據了頭條新聞、改變整個世界政治局勢？答案就是讓敵人反應過度。就本質而言，恐怖主義就是一種表演。恐怖份子安排一場令人驚恐的暴力秀，抓住我們的想像，讓我們以為自己即將再次陷入中世紀那種混亂當中。於是，各國政府常常覺得需要對這類恐怖秀做出回應，便刻意上演一場安全大戲，甚至藉機迫害某地區、或入侵其他國家，以顯國力浩蕩。在大多時候，這種對恐怖主義的過度反應，反而比恐怖主義本身造成更大的安全威脅。


    恐怖份子就像是一隻想要大鬧瓷器店的蒼蠅。蒼蠅如此弱小，自己甚至連一只茶杯也動不了，於是便找來一頭牛，鑽到牠耳裡嗡嗡作響，讓牛因為恐懼和憤怒而發狂，破壞整家瓷器店。


    這正是過去十年間在中東發生的事。伊斯蘭基本教義派如果光靠自己，絕不可能推翻前伊拉克總統海珊（Saddam Hussein）。於是他們用911恐怖攻擊，激怒美國，讓美國破壞了中東這家瓷器店。現在，基本教義派已在一片廢墟中，蓬勃發展。恐怖份子如果光靠自己，根本沒有能力把我們拖回中世紀，重現叢林法則。他們只能試著激怒我們，而最後的結果就要看我們如何回應。如果叢林法則真的再現，我們其實必須負起最大的責任。


    4. 莫斯科紅場閱兵的彈道飛彈。永遠拿來展示，但從未在實戰中發射。


    ## 歷史不會容許真空


    在接下來幾十年間，可能饑荒、瘟疫和戰爭仍然會奪走數百萬人的性命。但這已經不再是無可避免的悲劇，人類對此也不再像以前一樣無助，而感到無法理解、無法控制。這一切已經成為有可能處理的挑戰了。


    我並不是要將全球仍有的苦難視為無物。目前仍有數億人陷於貧困；每年瘧疾、愛滋病和肺結核仍帶走數百萬生靈；敘利亞、剛果和阿富汗的暴力情境也仍在惡性循環。這裡並不是要聲稱世上已經沒有饑荒、瘟疫和戰爭，人類再也不用擔心這些問題了。其實我的態度正好相反。


    縱觀歷史，是因為人類總認為這些問題無法解決，於是根本不去嘗試解決，只是向神祈求奇蹟，自己卻從未認真努力消滅饑荒、瘟疫和戰爭。有些人說，2016年的世界還是像在1916年一樣，又餓、又病、又暴力，這等於是延續著古老的失敗主義觀點，好像說人類在二十世紀投入的巨大心力一無所獲，種種醫學研究、經濟改革與和平倡議，也全然徒勞。但若真是如此，又何必再投入時間資源來進行更多醫學研究、創新經濟改革，又或提出新的和平倡議？


    認可人類過去的努力，等於是傳達出希望和責任的訊息，鼓勵我們在未來更加努力。有鑑於人類在二十世紀的成就，如果以後的人類仍然苦於饑荒、瘟疫和戰爭，已經不能再怪在自然或上帝的頭上了。我們已有能力把事情做得更好，並減少未來受苦的發生率。


    然而人類的成就還帶著另一條訊息而來：歷史不會容許真空。如果饑荒、瘟疫和戰爭的發生率不斷減少，必然要有些其他什麼，成為人類的新議題。我們對此必須戒慎深思，否則可能只是在舊戰場上全面獲勝，卻在新戰線上措手不及。到了二十一世紀，會是哪些新議題取代饑荒、瘟疫和戰爭？


    其中一項中心議題，會是要保護人類和地球整體，不被人類自己的力量所害。我們之所以能成功控制饑荒、瘟疫和戰爭，很大的原因在於驚人的經濟成長帶來豐富的食物、醫藥、能源和原物料。然而同樣也是因為經濟成長，已經讓地球的生態平衡在許多方面失衡了，而我們現在才剛開始有所意會。人類對於這項危機承認得很晚，而且至今的努力也不足。雖然總有人談著汙染、全球暖化、氣候變遷，但多數國家迄今仍未試圖改善，仍未做出任何認真的經濟或政治犧牲。每當要在經濟成長和生態穩定二擇一的時候，政客、企業和選民幾乎總是選擇了成長。如果我們真想離災遠禍，就得在二十一世紀做出更好的選擇。


    人類還會想追求什麼？我們會不會覺得只要能避免饑荒、瘟疫和戰爭，又能維持生態平衡，就已經心滿意足？這可能確實是最明智的選擇，但是「智人」（Homo sapiens）不太可能就這麼照辦。畢竟智人很少真正知足。每次達到成就，智人的大腦最常見的反应並非滿足，而是想要得到更多。智人總是追求著更好、更大、更美味，而等到智人擁有龐大的新能力，饑荒、瘟疫和戰爭的威脅也終於解除，我們接著要做什麼？到時候，科學家、投資人、銀行家和總統整天要幹嘛？難道是寫寫詩？


    成功是野心之母，而我們最近的成就，也推動人類設下更大膽的目標。我們已經達到前所未有的繁榮、健康與和諧，而由人類的過往紀錄與現有價值觀看來，接下來的目標很可能是長生不死、幸福快樂，以及化身為神。在減少了饑荒、瘟疫和戰爭之後，我們現在希望能夠克服年老，甚至是戰勝死亡。在拯救人民脫離各種不幸之後，我們現在希望他們能夠幸福快樂。而在提升人性、超越掙扎求生的獸性之後，我們現在希望把人類升級為神，讓「智人」化身成為「神人」（Homo
    deus）。


    ## 新議題之一：當「死亡」將走向末日


    在二十一世紀，人類很有可能真的會趨近長生不死的目標。對抗了饑荒和瘟疫之後，對抗老死不過是這場戰役的延續，更體現了當代文化最看重的價值：人的生命。不停有人提醒我們，人命是宇宙最珍貴的事物。不論是學校裡的老師、國會殿堂上的政客、法庭裡外的律師、甚至是舞臺上的演員，都是如此異口同聲。聯合國在第二次世界大戰之後，通過〈世界人權宣言〉（Universal
    Declaration of Human Rights），這或許是我們最接近全球憲法的一份文件，裡面就明確指出「有權享有生命」是人類最基本的價值。由於死亡明顯違反這項權利，便成了危害人類的罪行，而我們該對此全面開戰。


    縱觀歷史，宗教和意識型態所神化的，並不是生命本身，而是某些超脫俗世的對象，因此對死亡的態度十分開放。事實上，甚至還有些宗教和意識型態是歡迎死亡的。就基督教、伊斯蘭教和印度教看來，因為存在的意義要看死後的命運而定，也就認為死亡是世上很重要而積極的一部分。人類會死，是因為神的旨意，而且死亡的那一刻是很神聖的、形而上的經驗，充滿各種意義。人要吐出最後一口氣之際，就應該趕快找來牧師、拉比（rabbi）、或薩滿巫師（shaman），把生命的帳戶結清，擁抱一個人在宇宙中的真正角色。想像一下，如果沒了死亡，世界就會變成沒有天堂、沒有地獄、也沒有輪迴，那基督教、伊斯蘭教或印度教該如何自處？


    對於生命和死亡，現代科學和文化的觀點與宗教完全不同，並不認為死亡是某種形而上的神祕謎團，也當然不認為死亡是生命意義的來源。相反的，對現代人來說，死亡是一個我們能夠解決、也應該解決的技術問題。


    究竟人是怎麼死的？在中世紀的童話故事裡，死神披著黑色連帽斗篷，手上還握著一把大鐮刀。一個人活得好好的，腦子裡還在擔心這擔心那、四處奔波，這時突然死神就出現在他面前，瘦骨嶙峋的手指敲敲他的肩膀，告訴他：「來吧。」這個人懇求：「不！拜託！再給我一年、一個月，不然一天就好！」但披著連帽斗篷的死神，聲音嘶啞的說道：「沒這回事！就是現在了！」這似乎就是我們死的方式。


    5. 中世紀藝術將死亡擬人化為死神。'
