  md: '人類大命運


    有那些水壩、水庫、金字塔,一定是來自外太空的外星人所建。如果一個文化連輪子和鐵器都沒有,怎麼可能完成這樣的奇蹟?


    但真相與這種說法大不相同。埃及之所以能闢出法雍湖、建起金字塔,原因不是外星人的幫助,而是傑出的組織技能。靠著幾千位識字的官僚,法老招募了成千上萬的勞工,也取得了足以供應這些勞工多年勞動的食物。如果能有幾萬名勞工合作數十年,就算只是用石器,當然也足以闢出人工湖、建起金字塔。


    可以想見,法老自己幾乎是連手指都不用動。法老不用自己收稅,不用自己畫藍圖,自然也不用自己去拿鏟子。但那些埃及人相信,唯有向活神法老和祂的守護神索貝克祈禱,才能讓尼羅河谷倖免於毀滅性的洪水和乾旱。他們也沒錯。雖然法老和索貝克都只是想像的實體,並無法提高或降低尼羅河的水位,但如果有幾百萬人都相信法老和索貝克,於是合作建起水壩、挖出運河,發生洪水和乾旱的機率就能大幅降低。如果與蘇美的神祇相比(更不用說是石器時代的神靈),古埃及的神祇已經是真正力量強大的實體,能夠建起城市、招募軍隊,還控制了數百萬人、牛和鱷魚的生命。


    這裡說想像的實體能夠建造或是控制事物,乍聽可能很奇怪。但我們現在卻很習慣說:美國製造了第一顆核彈、中國建造了三峽大壩,或是谷歌正在打造自動駕駛車。所以,為什麼不能說是法老建了一座水庫、索貝克挖了一條運河?


