    讓我們回到現實，現在還遠遠無法肯定，庫茲威爾和德格瑞的預言究竟能否在2050年或2100年成真。就我自己看來，在二十一世紀想永保青春，為時過早，現在就抱太大期望，大概只會迎來很大的失望。知道自己終將一死並不好過，但如果是一心以為長生不死、卻夢想破滅，可能更難接受。


