    古代帝王諭令的倫理權威，絕對不是什麼理所當然的事。大多數的二十一世紀歐洲人都會認為：現代公民的民意，當然要比那些早已死透的大帝所下的諭令，來得重要。但這種事情沒辦法用任何實驗或方程式來確認，因此科學根本無法加入這場倫理辯論。就算有位現代的科學家時光倒轉七百年、回到中世紀，她也無法向當時的歐洲人證明，為何不該用古代帝王諭令來解決當代的政治爭端。


    然而〈君士坦丁御賜教產論〉的故事基礎並不只有倫理判斷，裡面還有些非常具體的事實聲明，而這就是科學非常有資格來證明或推翻的了。


    1441年，天主教神父兼語言學先驅的瓦拉（Lorenzo Valla）發表了一項科學研究，證明〈君士坦丁御賜教產論〉實為偽造。瓦拉分析了這份文件的風格、文法、以及所用的詞彙及片語，證明有些詞彙在西元四世紀的拉丁文裡根本還沒出現，很有可能是君士坦丁大帝死後約四百年，才偽造出來的。此外，文件所注記的日期為「3月30日，君士坦丁第四次擔任執政官，加利卡努斯（Gallicanus）首次擔任執政官。」'
