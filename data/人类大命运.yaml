  md: '但相對的，如果是士兵在戰爭中受傷，他確實會感覺痛苦。飢餓的農民沒有食物可吃，會感覺痛苦。母牛被迫與新生小牛分離，會感覺痛苦。這些實體，則屬於真實。


    當然，我們有可能因為自己相信了虛構故事，而感到痛苦。例如，相信各種民族傳說和宗教神話，可能導致戰爭，而讓數百萬人失去家園、失去肢體，甚至失去生命。戰爭的起源是虛構，但痛苦則是百分之百真實。正因如此，我們才應該努力區分是虛構、或是真實。


    # 回歸故事的本質


    虛構故事本身並沒有錯，而且有其必要。如果沒有金錢、國家或公司這些人人共同接受的故事，就不可能有複雜的人類社會能夠正常運作。要先讓大家都相信了同樣的虛構規則，我們才可能一起踢一場足球；也要讓大家都相信了一些類似的虛構故事，才能讓市場或法庭真正發揮作用。


    然而，這些故事只是工具，不該成為目標、甚至標準。一旦我們忘了這些都只是虛構，就會開始與現實漸行漸遠。於是，可能只是為了「替公司賺很多錢」、或是「保護國家利益」，就讓我們掀起無邊戰火。公司、金錢和國家，都只存在於我們的想像之中。是人類發明了這些概念，好讓它們為人類服務；但為什麼最後反而是人類要為這些概念服務，甚至犧牲性命？


    在二十一世紀，我們還會創造出比以往更強大的虛構概念、更極權的宗教。在生物科技和電腦演算法的協助下，這些宗教不但會控制我們每分每秒的存在，甚至將能夠形塑我們的身體、大腦和心'
