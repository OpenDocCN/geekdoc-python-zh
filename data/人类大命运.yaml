  md: '來,母豬狹欄已經在歐盟和美國一些州遭到禁用,但在其他國家仍然盛行,幾千萬隻懷孕的母豬幾乎一輩子都住在這樣的狹欄裡。


    母豬一切生存和繁衍的需要,都由畜牧場的人提供,包括足夠的食物、抵抗疾病的疫苗、遮風蔽雨的保護,另外還有人工授精。客觀來看,母豬再也不需要去探索周遭、與其他豬社交、與小豬有任何情感連結,甚至連走路都沒有必要。但從主觀而言,母豬仍然會對這些事情感受到極強烈的欲望,未能滿足則痛苦萬分。關在狹欄裡的母豬,通常都會有嚴重的挫折和絕望症狀交替出現。15


    這是演化心理學基本的一課:幾千世代以前所培養出的需求,就算已經不再是今日生存和繁衍所需,仍然會繼續留存在主觀感受之中。可悲的是,農業革命讓人類有了確保家畜生存繁衍的能力,卻忽視了家畜的主觀需求。


    # 生物也是演算法


    但我們怎麼能確定,動物(以豬為例)也有各種主觀的需求、感覺和情感?我們會不會只是一心把動物賦予人性,也就是把人類的特質賦予到非人類的對象上,像是小孩覺得玩偶能感受到人類的愛和憤怒?


    事實上,要說豬也有情感,並不是賦予牠們「人性」,而是賦予「哺乳動物性」。因為情感不是人類獨有的特質,而是所有哺乳動物(同時還包括所有鳥類、可能某些爬蟲類、甚至魚類)共有的特質。所有哺乳動物都演化出情感能力和需求,而光是從豬屬於哺乳動物這一點,就能肯定推斷牠們也有情感。16


    生命科學家近幾十年間已經證實,情感並不是只能用來寫詩、'
