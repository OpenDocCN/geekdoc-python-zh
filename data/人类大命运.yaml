    # 第6章


    # 與「現代」的契約


    「現代」就是一份交易契約，所有人都在出生的那天簽了契約，從此規範了我們的生活，直到死亡為止。很少有人能夠撤銷或超越這份契約，這份契約形塑了我們吃什麼、做什麼、夢想什麼，也決定了我們定居在哪裡、要愛什麼人，甚至是如何死去。


    乍看之下，這份契約非常複雜，因此很少有人會去瞭解自己究竟簽了什麼。這就像是下載某個軟體後，有一份使用同意書，裡面有幾十頁的法律語言；於是你瞄了一眼，立刻向下滾到最後一頁，勾了「我同意」，接著完全忘了這件事。但事實上，這份契約簡單到不可思議。只要一句話就能總結：人類同意放棄意義、換取力量。


    在現代之前，多數文化都相信人類是某個偉大宇宙計畫的一部分。這個計畫的設計者是某些萬能的神、又或是永恆的自然律，人類無法改變。是這個宇宙計畫讓人的生命有了意義，但同時也限制了人的力量。人類就像是舞臺上的演員，腳本讓他們所講的每個字、所掉的每滴眼淚、所做的每個手勢，都有了意義；但同時也對他們的表演設下嚴格限制。哈姆雷特不能在第一幕就殺了克勞迪亞'
  - '[PAGE 228]


    斯（Claudius），也不可能忽然離開丹麥，跑去印度打坐冥想。莎士比亞不可能允許這種事發生。同樣的，人類也不可能永生不死、不可能免於一切疾病、不可能一切恣意妄為，這些事情就是不在腳本中。


    前現代的人放棄了力量，而相信自己的生命換得了意義。對當時的人來說，是否在戰場上英勇戰鬥、是否擁護嫡傳的國王、是否在早餐吃了禁忌的食物、甚至是否和隔壁鄰居有了姦情，都承擔著重要的意義。當然，這會帶來一些不便，但卻能讓人心裡覺得受到保護。如果發生什麼可怕的事，譬如戰爭、瘟疫或乾旱，大家還是能安慰自己說，「我們都是在一齣偉大的宇宙戲劇裡，扮演著自己的角色，這一切都是神或自然律的旨意。雖然我們不知道腳本，但可以放心，一切都有目的。就算是這場可怕的戰爭、瘟疫或乾旱，也都是在某個更偉大的計畫裡的場景。而且，我們知道這位劇作家值得信賴，故事最後一定有個美好而有意義的結局。因此就算發生了戰爭、瘟疫或乾旱，也都是為了最後的美好結局；就算現在看不到美好結局，來世總會等到的。」


    現代文化則不再相信有這種偉大的宇宙計畫存在。我們並不是活在一齣比日常生活更高位階的戲劇之中，生活沒有劇本、沒有劇作家、沒有導演、沒有製片；而且，也沒有意義！就我們目前最進步的科學所知，整個宇宙就是個「盲目而沒有目的」的過程，充滿各種雜音和憤怒，但毫無意義。我們只是在一顆行星上，占據著再小不過的一點，存在了一段再短不過的時間，如馬克白所說的那個可悲演員，在臺上得意或失意了一會，就再也悄無聲息。


    既然沒有劇本，人類也不是在什麼偉大戲劇中扮演什麼角色，雖然人類還是可能面臨各種可怕的事，但並不會有什麼神祇來拯救'
  - '[PAGE 229]


    人類大命運


    我們，或是讓這一切痛苦有意義。整件事不會有個快樂的結局，也不會有什麼悲慘的結局，其實根本就不會有結局。事情就是一直發生，一件接著一件串接下去。


    現代世界並不相信目的，只相信原因。如果要幫「現代」訂個座右銘，應該就會是「衰事總是會降臨」。


    但另一方面，如果說衰事就是會降臨，那也並非因為有什麼劇本或目的；因此之故，人類也不用自限於任何預定的角色，只要能找對方法，我們就能為所欲為。除了自己的無知之外，沒有什麼能限制我們。瘟疫和乾旱的背後沒有什麼宇宙計畫，我們能夠消滅它們。戰爭並不是通往美好未來的必要之惡，我們能夠帶來和平。我們死後並沒有天堂等著我們，但我們能夠在地球上就創造天堂，永遠活在天堂裡。一切只要克服一些技術困難，就行了。


    投入更多研究資金，就能促成科學突破，加速科技進展。新科技會促進經濟成長，而經濟成長又能投入更多研究資金。時間每再過個十年，我們就能享受更豐足的食物、更快速的交通工具、更有效的藥物。總有一天，我們會累積夠多的知識、夠先進的科技，終於能夠發明各種萬靈丹，讓人青春永駐、快樂幸福，而且這一切將不會有什麼神祇前來阻擋。


    於是，這份現代契約向人類提出巨大的誘惑，但也伴隨著巨大的威脅。「無所不能」似乎是伸手可得，但在我們腳下卻也有著完全虛無的深淵，隨時可讓我們跌落。就實務而言，現代生活就是在一個沒有意義的宇宙裡，不斷追求更多力量。現代文化的力量是史上最強，而且還在不停研究、發明、發現、成長。但同時，現代文化也比史上任何文化，更感受到存在性焦慮（existential
    angst）。


    本章討論現代對力量的追求，下一章則會檢視人類如何利用這


    226'
  - '[PAGE 230]


    種不斷成長的力量，試圖以某種方式，將意義重新帶回這個無限空虛的宇宙。沒錯，我們現代人曾經承諾要放棄意義，以換取力量；但也沒人押著我們，逼我們非得實現承諾。我們認為自己夠聰明，能夠盡享這份現代契約的好處，而無須付出代價。


    # 從前，經濟停滯是常態


    科學進步與經濟成長攜手共進，更進一步推動了現代對力量的追求。整部人類歷史上，科學多半是以蝸速進展，經濟更是遭到深度冰封。雖然人口的緩步成長確實使生產隨之成長，而每次科學偶有發現，也有可能帶動平均每人的經濟成長，但拉大鏡頭來看，整個過程是極度緩慢的。


    如果在西元1000年，是100個村民生產了100噸小麥，到了西元1100年，可能是105個村民生產了107噸小麥，這種成長可說是有名無實，既不改變生活節奏、也不影響社會政治秩序。今天所有的人熱切追求成長，但在前現代時期，人民對此卻是毫不在意。不論王公貴族、牧師神父或農民大眾，都認為人類生產大致就是維持穩定，某人想得到更多，就只能從別人那兒偷；也認為到了孫輩的生活水準，大概也不會有何躍進。


    這種停滯現象，有一大部分原因在於很難為新計畫籌措資金。沒有足夠的資金，就很難排乾沼澤、建築橋梁、開闢港口，更別提要培育新的小麥品種、發現新的能源、或是開拓新的貿易路線。當時資金稀缺，是因為沒有什麼信用（credit）的概念；之所以沒有什麼信用，是因為人類不相信成長；而之所以不相信成長，正是因為經濟停滯不前。於是，停滯就成了個惡性循環。'
  - '[PAGE 231]


    假設你是住在一座每年都會爆發痢疾的中世紀城鎮。你下定決心，一定要找到解方。於是，你需要資金成立一間工作坊，購買藥草和各種罕見的化學品，付助手薪水，還得前往遠地拜訪名醫。另外，在你全心投入研究時，還得養活自己和家人。但你自己沒什麼錢。你想去找當地的磨坊主、麵包師傅和鐵匠，拜託他們在這幾年間供應你的需求；你也向他們保證，等到你找出解方、財源滾滾，就會還債。


    很遺憾，磨坊主、麵包師傅和鐵匠不太可能同意。他們今天就得養活家人，而且對你能找到什麼靈丹妙藥，並沒有信心。他們可不是什麼三歲小孩，但從小到大，哪聽過有人能為可怕的疾病找出新藥物？想拿到食物和各種生活必需品，就得付現。但你都還沒找到這種良藥，所有時間又都投入研究，怎麼可能有錢？你只好心不甘情不願，再回田裡去耕作。於是痢疾依舊每年給城鎮帶來苦難，沒人嘗試找出新療法，也沒有任何一枚金幣換了手。就是這樣，經濟沒了活力，科學停滯不前。


    # 銀行家與吸血蝙蝠有何不同？


    一直要到了現代，因為人們開始相信未來，促成了信貸這項奇蹟，才終於打破這個惡性循環。信貸正是信任在經濟上的表現。如今，如果我想開發新藥、但手上資金不足，我可以去向銀行貸款，或是找上私人投資或創投基金。2014年夏天，伊波拉病毒在西非爆發疫情，你猜猜那些忙著開發抗伊波拉藥物和疫苗的製藥公司，股票表現如何？股價簡直是一飛衝天。德克米拉（Tekmira）製藥公司的股價上漲五成，百歐克斯（BioCryst）更大漲九成！'
  - '[PAGE 232]


    在中世紀，每當爆發瘟疫，人們只能淚眼望天，祈求上帝原諒他們的罪過。而現在，如果民眾聽說又有了什麼致命的新流行病，則是立刻拿起手機，趕快打給股票經紀商。對於證券交易所來說，流行病也是商機。


    如果有夠多人創業成功，民眾對未來的信任也就會增加。信用擴張，利率下降，企業家更容易募資，於是經濟成長。因此，民眾對未來更加信任，經濟繼續成長，科學也隨之進步。


    這件事說來容易。如果真那麼簡單，又為什麼得等到現代，經濟成長才終於啟動？幾千年來，人類之所以不相信未來會成長，不是因為前人太過愚魯，而是因為這根本違反直覺、違反演化經驗、違反世界運作的方式。自然系統多半是呈現平衡狀態，而且生存之爭又多半是零和賽局，有一方蓬勃成長，就必有另一方付出代價。


    舉例來說，在某個山谷裡，每年長出的草量都差不多。這些青草能夠養活大約一萬隻兔子，而這些兔子裡動作慢、腦袋笨或運氣差的，又差不多能養活一百隻狐狸。如果某隻狐狸特別聰明努力，吃掉的兔子比較多，就有其他狐狸可能餓死。而如果所有狐狸都忽然比以前更會抓兔子，兔群數量將會大減，但隔年就會有更多狐狸餓死。就算這個「兔子市場」偶有波動，但長遠來看，狐狸絕不會期望每年都能成長3%的獵兔量。


    當然，真正的生態系更為複雜，並非所有生存之爭都是零和賽局。許多動物能合作愉快，甚至有些還有貸款機制。自然界最著名的例子就是吸血蝙蝠。這些蝙蝠成千上萬住在洞穴裡，每天晚上飛出來找尋獵物。只要發現有鳥類睡著、或是哺乳動物心不在焉，牠們就會在獵物的皮膚上切出一個小口，吸血為食。然而，不是每隻吸血蝙蝠每天晚上都能找到受害者。為了應付這種生命裡的不確'
  - '[PAGE 233]


    定性，吸血蝙蝠就會彼此「貸血」。沒找到獵物的吸血蝙蝠回家之後，會去找上那些運氣比較好的朋友，分一些牠們偷來的血。這些蝙蝠對於自己曾把血借給誰，記得一清二楚，所以如果哪天自己餓著肚子回家，就會去找那隻欠債的蝙蝠，討點血回來。


    不過，蝙蝠不像銀行家，牠們從不收利息。如果A蝙蝠曾讓B蝙蝠吸過 10 cc 的血，B蝙蝠還的就是 10 cc。而且蝙蝠之所以貸血，並不是為了創立什麼新的蝙蝠業務、或是促進吸血市場成長。由於所吸取的血液是由其他動物產生，蝙蝠並無法增加產量。雖然血液市場也有波動，但蝙蝠並不會假設2017年的血量會比2016年成長3%、而且到了2018年還會再漲3%。因此，蝙蝠也不相信會有成長這回事。¹


    幾百萬年以來，人類的生活條件也和吸血蝙蝠、狐狸和兔子相去不遠。於是，人類也很難相信成長的概念。


    # 奇蹟般的大餅


    由於演化的壓力，讓人類習慣把世界看作一大塊靜態的大餅。如果有人拿走的那一小塊比較大，一定有另一個人拿到的比較小。雖然可能有某個家族或城市似乎蓬勃成長，但人類整體明天的生產量並不會超過今天。因此，像是基督教和伊斯蘭教等傳統宗教，都是希望運用現有的資源來解決人類的問題，可能是將這塊大餅重新分配，又或是承諾給一塊空中的大餅。


    相反的，「現代」則堅信：經濟成長不僅可能，還是絕對必要的！雖然祈禱、行善和冥想能帶來心靈的安慰和啟發，但想解決饑荒、瘟疫和戰爭等問題，唯一的方法就是成長。「現代」的基本教'
  - '[PAGE 234]


    條，可以總結為一個簡單的想法：「如果有個問題要解決，可能就需要有更多東西；為了有更多東西，就得生產更多才行。」


    現代政治和現代經濟篤信成長的必要，原因有三。首先，生產愈多、能消費的就愈多，愈能提升生活水準，號稱也就能享受更快樂的生活。第二，只要人類持續繁衍成長，光是為了維持現狀，經濟成長就已經是必要的了。例如，印度的人口年增率為1.2%。也就是說，除非印度經濟每年成長至少1.2%，否則失業率就會上升，薪資將會下降，平均生活水準也會下滑。第三，就算印度的人口停止成長，中產階級也對目前的生活水準感到滿意，但那些為數仍有數億的貧困印度人民，又該怎麼辦？


    經濟不成長，整塊經濟大餅也就這麼大，想多給窮人一點，就必須從富人那裡挖來一些。這必定會造成一些非常困難的選擇，也很可能導致諸多不滿、甚或暴力相向。如果想避開這些選擇、不滿或暴力，我們就需要一塊更大的餅。


    不論是宗教的基本教義派、第三世界的獨裁主義、又或只是婚姻觸礁，在「現代」的眼中，幾乎任何公共或私人的問題，都能用「更多東西」來解決。像巴基斯坦或埃及這樣的國家，只要能維持亮眼的經濟成長率，國民也就能享受得起私家車和冰箱之類的種種好處，走著俗世幸福的道路，而不會隨著那些基本教義派起舞。同樣的，像剛果或緬甸這樣的國家，如果能有經濟成長，就能產生繁榮的中產階級，做為自由民主的基石。至於夫妻失和這種問題，只要能買棟更大的房子（不用擠在一個狹小的房間）、買臺洗碗機（不用吵著該輪到誰洗碗）、每週兩次參加昂貴的婚姻治療，據稱也就能挽回婚姻，繼續廝守下去。'
  - '[PAGE 235]


    # 成長掛帥


    於是，經濟成長就成了幾乎所有現代宗教、意識型態和運動的共通重點。例如蘇聯妄自尊大的五年計畫，對成長的迷戀絲毫不下於美洲最殘酷的剝削資本家。也正如基督徒和穆斯林都相信天堂、只是對於路徑有所異議，冷戰時期的資本主義者和共產主義者，也都相信能夠透過經濟成長在地球上創造天堂，只是對於該用什麼方法有所異議。


    今天，不論是印度教復興主義者、虔誠的穆斯林、日本民族主義者或中國共產黨員，雖然可能各自宣稱，自己有非常不同的價值觀和目標，但都同樣相信，實現這些目標的關鍵就在於經濟成長。例如，虔誠的印度教徒莫迪（Narendra
    Modi）之所以能在2014年當選印度總理，主因正是他成功促進了家鄉古吉拉特邦（Gujarat）的經濟成長，許多選民認為只有莫迪，才能讓印度低迷的經濟起死回生。類似的觀點也讓伊斯蘭教徒艾爾多安（Recep
    Tayyip Erdoğan）自2003年起，在土耳其掌權至今。他所屬的政黨名為「正義與發展黨」（JDP），正強調對經濟發展的承諾，而艾爾多安政府也確實在超過十年間，維持著令人佩服的經濟成長率。


    至於日本首相、民族主義者安倍晉三，自2012年上臺，承諾將挽救日本沉寂二十年的經濟困局，其措施大膽而不尋常，有「安倍經濟學」（Abenomics）之稱。與此同時，鄰國中國的共產黨，雖然嘴上仍推崇馬列思想，但實際作為卻是依循鄧小平的名言：「發展才是硬道理」以及「不管白貓黑貓，能抓到老鼠就是好貓」。用一般話來說，也就是：不擇手段，推動經濟成長，哪管馬克思和列寧高不高興。'
- md: "## 人類大命運\n\n  至於新加坡這個徹底務實的城市國家，更是進一步貫徹這種思維，讓部長的薪資與國家GDP掛鉤。新加坡經濟若成長，政府部長就能加薪，彷彿這正是行政工作唯一的重點。\n\
    \n  我們可能覺得，對成長著迷再自然不過，但這只是因為我們生活在現代世界。過去可不是這樣的。不論是印度的大君、鄂圖曼的蘇丹、鎌倉的幕府、或是漢朝的皇帝，都很少會把自己的政治命運賭在經濟成長上，但莫迪、艾爾多安、安倍晉三和中國國家主席習近平，卻都這麼做了，可見「經濟成長」這回事是如何在全球各地成功取得了近乎宗教的地位。確實，把「相信經濟成長」稱為宗教並不會與事實出入太遠，因為這種信念號稱能解決許多、甚至是絕大多數的倫理難題。由於經濟成長據稱是一切美好事物的源頭，於是能鼓勵大家放下各種倫理的異見，共同採取任何能夠最大化長期成功的措施。因此，雖然莫迪所領導的印度有成千上萬的教派、黨派、運動和大師，而且終極目標可能各有不同，但卻都得通過同樣的經濟成長瓶頸，所以何不把大家集合在一起呢？\n\
    \n  於是乎，「更多東西」這項信條等於是在呼籲個人、公司和政府，不要在意任何可能阻礙經濟成長的事物，像是維持社會平等、確保生態和諧、或是孝順父母。在蘇聯，領導階層認為成長最快的方式就是國家控制的共產主義，所以任何妨礙集體化的事物，都會遭到掃除，包括幾百萬的富農（kulak）、言論自由、以及鹹海。現在普遍認為，某些版本的自由市場資本主義，更能確保長期成長；於是，我們保護了貪婪的大亨、富有的農民及言論自由，至於會妨礙自由市場資本主義的事物，則遭到摧殘，像是生態棲地、社會結構和傳統價值觀。\n\
    \n  舉個例子：某位任職高科技新創公司的軟體工程師，時薪一百美元。某天，她的父親不幸中風，需要有人協助買東西、做飯、甚至是洗澡。她可以讓父親搬過來和自己住，她一早去上班，晚上再早點回來，親自照顧父親。如此一來，不管是她的收入、或是新創公司的生產力，都會受到影響，但父親卻能享有女兒充滿愛和尊重的照顧。\n\
    \n  或者，這位工程師也能請一位墨西哥看護，時薪十二美元，和父親住在一起，照顧父親的所有需求。這樣一來，工程師、她任職的新創公司、甚至是這位看護和墨西哥的經濟，都將受益。\n\
    \n  這位工程師該怎麼選擇？\n\n  自由市場資本主義的答案非常明確。如果經濟成長要我們放下家人間的情感，鼓勵大家和父母分住，再從世界另一邊聘用看護，又有何不可？然而，這是個倫理判斷的問題，而不是事實聲明的問題。如果有人專心做軟體工程、有人專心照顧老人，我們無疑能製造出更多軟體，也能讓老人受到更多專業照護。然而，經濟成長真的比家人間的情感更重要嗎？一旦用自由市場資本主義的邏輯做出這樣的倫理判斷之後，自由市場資本主義也就從科學，跨界來到了宗教。\n\
    \n  多數資本家可能並不喜歡「宗教」這個標籤，但如果是宗教走向資本主義，宗教家倒是能抬頭挺胸。資本主義所應許的，並不像其他宗教那種空中的大餅，而是飄降在這個俗世上的奇蹟，而且有時還真能實現。許多讓人最後克服饑荒和瘟疫的信貸，都是出自對資本主義成長動能的強大信念。甚至，說到減少人類的暴力、增加寬容與合作，也得給資本主義一些掌聲。\n\
    \n  下一章將會提到，雖然還有其他因素，但資本主義讓人不再將經濟視為零和賽局（認為你獲利就是我損失），而是一種雙贏局面。\n\n## 資本主義的巨輪不會停轉\n\
    \n  資本主義深信「成長」這項最高價值，可說第一條誡命就是：將利潤投入有助於「增加成長」的事。在人類史上，王公貴族多半是把利潤虛擲在華麗的狂歡饗宴、豪奢的樓臺宮宇，以及不必要的戰爭衝突。又或是把金幣放入鐵箱，密封起來，深埋地底。今天，虔誠的資本主義信徒會用利潤來雇用新員工、擴大工廠規模，或是開發新產品。\n\
    \n  就算自己不懂這些事，他們也會把錢交給某些懂的人，像是銀行家、或是創投業者，再由這些人把錢借給各種需要錢的產業。拿了貸款，農民種新的麥田、營建承包商蓋新的房屋、能源公司探索新的油田、軍火業者開發新的武器。這一切活動得到的利潤，就讓這些產業能夠償還貸款，而且是連本帶利。於是，我們現在不但有了更多的小麥、房子、石油和武器，而且銀行和基金裡還有更多的錢，能夠繼續借出去。這是個永不停轉的巨輪，至少資本主義是這麼認為的。絕不會有某個時刻，資本主義忽然說：「好囉，成長夠了，我們輕鬆點吧。」\n\
    \n  如果想知道為什麼資本主義的巨輪絕不會停止，你可以花一個小時，與一個手上有十萬美元、想知道該怎麼辦最好的朋友談談。他會向你抱怨：「銀行利率這麼低，活存年利率才0.5%，我才不想把錢放在存款帳戶裡。如果丟到公債，大概可以賺2%。我有個表哥，去年在西雅圖買了一層公寓，現在漲了\
    \ 20% ！或許我也該去搞搞房地產；可是大家都在說房地產也要泡沫化了。那你覺得股市怎樣？我也有朋友說，現在最好是買新興市場的 ETF，像是巴西或中國。」在他中間喘口氣的時候，你可以問他：「為什麼你有了十萬美元，還不滿足呢？」他的解釋就能讓你知道，為什麼資本主義永不停息，絕對比我說得更清楚。\n\
    \n  透過各種無所不在的資本主義遊戲，這種概念甚至已經深深根植於兒童和青少年的心裡。像是西洋棋這種前現代的遊戲，假設的就是一種停滯的經濟。你在開局的時候有\
    \ 16 枚棋，而等到遊戲結束，也絕不可能多出任何 1 枚。雖然有些極少數情況，能讓你把兵變成王后，但就是不會有多出來的新棋子，也不可能把騎士升級成坦克。所以，西洋棋玩家永遠不用考慮投資這回事。相較之下，許多現代桌遊或電腦遊戲，都把投資成長當作重點。\n\
    \n  其中特別有趣的，是模仿文明的戰略遊戲，像是「當個創世神」(Minecraft)、「卡坦島」(The Settlers of Catan)，或是「文明帝國」(Sid\
    \ Meier's Civilization)。這些遊戲可能是設定在中世紀、石器時代、或某些想像的童話王國，但原則永遠相同，而且一定是出於資本主義。玩家的目標就是要建立一座城市、一個王國、或者是一整個文明。一開始可能只有一些很簡陋的基礎，可能是個村莊和附近的田野。你手上的資產能提供最早的一批小麥、木材、鐵或黃金，而你必須好好投資這筆財產：有些購買沒有生產力、但仍然必要的東西，像是士兵；也有些購買能用於生產的資產，像是更多村莊、田野和礦藏。這裡要致勝的策略，通常就是把能用於生產的資產盡可能最大化，至於沒有生產力但仍然必要的資產，則是勉強可維持就好。只要能蓋出更多村莊，就代表下一輪你能有更多收入，於於但可以購買更多士兵（只在有必要的時候），還能繼續擴大對生產的投資。很快的，村莊就能升級成城鎮；然後，能蓋出大學、港口和工廠；接著，能夠探索海洋；最終建立文明，贏得遊戲。\n\
    \n## 科學讓人類發現自己的無知\n\n  然而，經濟真能永遠維持成長嗎？會不會有一天耗盡資源，終歸停止？為了確保永遠成長，我們必須找到永不枯竭的資源。\n\
    \n  解決方法之一，就是探索、征服新的土地。幾個世紀以來，不論是歐洲經濟成長、或是資本主義制度擴張，確實都有賴於帝國在海外的征服行動。不過，地球上的島嶼和大陸就只有這麼多。雖然某些企業家確實也打算探索征服新的行星、甚至是星系，但與此同時，現代經濟還是得找到更好的擴張方式。\n\
    \n  這時，是科學為現代提供了這個答案。在前面的例子裡，狐狸經濟之所以不能成長，是因為狐狸不知道如何讓兔子生得更多。兔子經濟之所以停滯，是因為兔子不知道如何讓草長得更快。然而，人類經濟之所以能夠成長，是因為人類可以找出新的原料、新的能源。\n\
    \n  傳統把世界看成一塊固定大小的餅，隱藏的假設是世界上只有兩種資源：原物料和能源。事實上，資源有三種：原物料、能源，還有知識。原物料和能源取之有盡：用得愈多，就剩下愈少。相反的，知識卻是不斷成長：用得愈多，反而擁有愈多，而且隨著知識不斷增長，還能帶來更多原物料和能源。\n\
    \n  如果我投資一億美元探勘石油，而且在阿拉斯加成功找到一片油田，我手上會有更多石油，但我的孫子能擁有的石油就少了。較之下，如果我投資一億美元研究太陽能，而且成功找到更有效利用太陽能的新方法，我和我的孫子都能擁有更多能源。\n\
    \n  幾千年來，人類之所以無法用科學來推動成長，是因為大家誤以為各種宗教經典和古老傳統裡，已經提供了世界所有重要知識。如果石油公司相信已經找出了全球所有的油田，就不可能再浪費時間和金錢來探勘。同樣的，如果人類文化覺得已經知道了所有該知道的事，就不會費心尋找新的知識。而在現代之前，這正是大多數人類文明所持的立場。\n\
    \n  然而，科學革命打破了人類這種天真的信念。科學最大的發現正是讓人類發現自己的無知。人類發現自己對這個世界，所知竟如此之少，就突然有了很好的理由，要去追求新知，於是開啟了用科學推動進步的道路。\n\
    \n  一代接著一代，科學讓我們找到了新的能源、新的原物料、更好的機械技術、新的生產方法。到了此時此刻，人類手中的能源和原物料已遠超以往，整體產能一飛衝天。蒸汽機、內燃機和電腦等種種發明，打造出過去從來沒有的全新產業。\n\
    \n  展望二十年後的情形，我們可以信心滿滿，預期在2036年的生產和消費，都會遠超今日。我們相信奈米科技、基因工程和人工智慧，能夠再次為「生產」重新定義，在我們這個不斷擴大的超市裡開出新的商品區。\n\
    \n## 方舟症候群\n\n  因此，資源短缺的問題看來很有機會克服，但現代經濟真正的敵人是生態崩潰。不論是科學進步或經濟成長，都發生在地球這個脆弱的生物圈裡，而隨著進步和成長的大舉啟動，也就衝擊到生態穩定。如果想讓全球每個人都過著像美國人一般的豪奢生活，我們得要多幾個地球才行，但我們就只有一個地球。如果進步和成長最後破壞了整個生態系，要付出代價的不會只是吸血蝙蝠、狐狸和兔子：智人也無法置身事外。生態崩潰將造成經濟崩盤、政治動盪、人類生活水準下降，還可能對人類文明的存在造成威脅。\n\
    \n  想防患未然，方法之一就是放慢進步和成長的步調。如果投資者今年想要6%的報酬率，或許過了十年、他們可以學會只要有3%就滿足，過了二十年、只要有1%就滿足，那樣等到三十年後，經濟就能停止成長，而我們對現況也心滿意足。\n\
    \n  然而，成長的信條絕對會堅決反對這種異端想法，反而認為我們應該加快腳步。如果我們的發現和發明，讓生態系失去穩定、危及人類，那就該趕快再發現和發明些什麼，來保護自己——如果臭氧層變薄，增加了皮膚癌的風險，就該發明更好的防晒油、更佳的癌症療法，這樣也能刺激新的防晒和癌症治療產業成長。如果這些新產業汙染了大氣和海洋，造成全球暖化、大規模生物滅絕，那麼我們應該趕快打造虛擬世界和高科技避難所，就算地球變得像地獄一樣又熱又乾、汙染嚴重，也無礙我們繼續享受一切。\n\
    \n  北京的汙染狀況已經極度惡劣了，民眾必須避免戶外活動，而有錢人則會花上幾千美元，裝設室內空氣清淨系統。至於超級有錢人，甚至連院子都會蓋上保護設施。2013年，供外國外交官及中國高層子女入學的北京國際學校，甚至更進一步，斥資五百萬美元，在六個網球場及運動場地蓋起了巨大的圓頂帳篷。其他學校紛紛跟進，中國空氣清淨市場發展蓬勃。至於多數北京居民，當然自家不可能負擔如此的奢侈品，也無法把孩子送到國際學校。\n\
    \n  人類發現自己陷入了雙重的競賽。一方面，我們認為必須加快科學進步和經濟成長的腳步。十億中國人和十億印度人都希望過著像中產階級美國人一樣的生活——如果美國人都還是開著休旅車、逛著購物中心，中國人和印度人實在看不出，有什麼理由不去全力追求美式生活夢想。另一方面，我們又必須至少在生態世界末日來臨前懸崖勒馬。每一年，要處理這種雙重競賽的挑戰，都愈來愈艱巨，因為只要德里貧民窟的居民更接近美國夢一步，都是把地球更推近末日的邊緣。\n\
    \n  好消息是：人類已經享受了幾百年的經濟成長，卻一直沒成為生態崩潰的受害者。其他許多物種沒能撐過這個過程；人類也曾面臨一些經濟危機和生態災難，但總能化險為夷。\n\
    \n  但是，沒有任何自然律能夠保證未來繼續一帆風順。究竟科學能否永遠拯救經濟免於冰封、地球免於沸騰，實在沒人說得準。而且，由於腳步不斷加快，能夠犯錯的空間也不斷縮小。以前可能只要一個世紀發明出一項神奇的產品，便已足夠，但現在可能每兩年就得出現一項奇蹟。\n\
    \n  我們也該思考，生態末日對於不同的人類階級，又有什麼樣的不同後果。歷史從無正義。每當災難發生，就算這場悲劇根本是由富人所引起，但窮人受到的苦難幾乎總是遠遠高於富人。在乾旱的非洲國家，全球暖化已經開始影響窮人的生活，這些人受影響的程度遠比富裕的西方人來得高。矛盾的是，科學的力量愈大，反而可能愈危險；原因就在於這讓富人自鳴得意。\n\
    \n  以溫室氣體的排放為例。大多數學者和愈來愈多的政治家，已經開始體認到全球暖化的現實和危險程度，但也僅止於體認，而未有任何實際作為，未能真正改變我們的行事做法。對於全球暖化，我們談得很多，但到了實際作為，人類卻不願為了制止這場災難，而真正在經濟、社會或政治上有所犧牲。2000\
    \ 年到 2010 年間，溫室氣體排放量非但完全沒有減少，反而還以每年 2.2% 的速度成長；過去在 1970 年到 2000 年間，年成長率僅為 1.3%。\n\
    \n  1997 年協議減排溫室氣體的《京都議定書》，目標只是減緩、而非阻止全球暖化，但美國這個全球第一大污染者卻拒絕簽署，也全未嘗試大幅減少溫室氣體排放，惟恐有礙經濟成長。\n\
    \n  迄今，不管是所有關於全球暖化的言論，或是所有的研討會、高峰會和協議，都未能抑制全球溫室氣體排放。仔細觀察這張圖表，就會發現只有在經濟危機和經濟停滯期間，排放量才會減少。因此，溫室氣體排放之所以在\
    \ 2008 年至 2009 年間出現小幅下滑，並不是因為簽署了〈哥本哈根協議〉(Copenhagen Accord)，而是因為全球金融危機。唯一能確保阻止全球暖化的方式，就是停止經濟成長，但任何政府都不會願意。\n\
    \n  2015年12月，〈巴黎協定〉（Paris Agreement）訂出了較遠大的目標：在2100年以前，追求全球平均溫度升幅要低於1.5°C（以工業革命前的全球平均氣溫為準）。然而，有許多為了達成這項目標所必要的痛苦措施，卻都被輕描淡寫的延遲到2030年、甚至是二十一世紀的下半葉，其實也就是把燙手山芋丟給下一代。目前的主政者一派貌似環保，只想收割立即的政治利益，卻把減少排放（也就會減緩成長）的重大政治代價，留給未來的主政者。（本書寫作之時，即2016年1月，美國和其他最大汙染國是否會簽署〈巴黎協定〉及認真執行，看來仍在未定之數。）\n\
    \n  有太多的政客和選民認為，只要經濟繼續成長，科學家和工程師永遠都能拯救我們免於面對末日。談到氣候變遷的問題，「成長」的真正信徒還不只是希望奇蹟發生，而是認為奇蹟的出現是理所當然。\n\
    \n  把未來人類的希望，放在「假設未來的科學家能有些現今不可知、卻能拯救地球的發現」上，這種想法真的理性嗎？目前讓整個世界運作的多數總統、部長和執行長，都是非常理性的人。但是為什麼他們願意下這樣的賭注？或許是因為，他們覺得賭的不會是自己個人的未來。就算情況極度惡化，科學再也無法阻擋洪水襲來，工程師仍然能夠為上層階級，打造出一艘高科技的挪亞方舟，至於其他幾十億人，就隨波而去吧。\n\
    \n  這種對於高科技方舟的信念，正是對人類未來及整個生態系的最大威脅之一。如果有人一心相信自己死後能上天堂，就不該把核武交到這種人手中；出於同樣理由，要決定全球生態議題時，也不該交給相信這種高科技方舟的人。\n\
    \n  窮人又是怎麼回事？他們為什麼不抗議？畢竟萬一洪水真的來臨，將是窮人擔起所有代價。然而，如果經濟停滯，窮人也是首當其衝。在資本主義世界裡，窮人的生活唯有在經濟成長時，才可能有所改善。因此，如果得要放慢當下的經濟成長，以求減少未來的生態威脅，並不太可能得到他們的支持。保護環境是個好主意，但如果有人連房租都交不出來，對於沒錢的恐懼，就會遠遠高過對冰帽融化的擔心。\n\
    \n## 毫無意義的競賽追逐\n\n  就算人類動作夠快，能夠同時應付經濟和生態崩潰的危機，光是這場競賽本身，也是大有問題。對個人而言，這造成極高的緊張和壓力。經濟成長和科學進步已經為時數個世紀，我們會以為，至少在那些最先進的國家，應該能夠享有平靜、平和的生活。如果前人知道我們現在擁有什麼工具，一定會以為我們的生活如在天堂、無憂無慮。但事實卻絕非如此。雖然人類達成諸多成就，卻一直有股壓力，逼著我們繼續生產、繼續努力。\n\
    \n  我們怪自己、怪老闆、怪貸款、怪政府、怪學校，但罪魁禍首其實不是他們，而是這份「現代」的契約，我們都在出生的那一天就已然簽字畫押。在前現代的世界裡，人類就像是在社會主義官僚體系裡的低階職員，每天只要一打完卡，接下來就是等著別人去做點什麼事。但到了現代，人類自己成了負責的老闆，也就日夜不停感到壓力。\n\
    \n  整體而言，這種競賽就表現為不斷的動盪。在過去，社會和政治制度能夠歷經幾世紀而不衰，但現在，幾乎是每個世代都會打破舊世界、再創造新世界來取代。〈共產黨宣言〉說得精闢，現代世界就是自找著永遠的不安定和變動。各種固定的關係和古老的偏見，都遭到掃除；而新的結構等不到固定，便已經陳舊了。一切固定的東西都煙消雲散。在這樣混沌的世界，光是生活已不容易，要妥善管理，更是難上加難。\n\
    \n  因此，「現代」就得更加努力，以確保人類不論個人或整體，都不會想到要退出這場競賽（雖然這場競賽正是所有緊張和混沌的源頭）。為此，現代繼續高舉成長，做為最高價值的大纛，要求我們為此冒一切危險、做出任何犧牲。整體而言，現代鼓勵政府、企業和組織，以成長做為成功標準，並將穩定視為洪水猛獸。個人而言，現代要我們不斷提高收入和生活水準，就算目前的生活已經令你相當滿意，還是應該努力爭取更多。\n\
    \n  昨天的奢侈品，成了今天的必需品。曾經，一間三房的公寓、一輛車、加上一部桌上型電腦，就已經讓你相當滿意；到了現在，你就會想要擁有五房的獨棟住宅，車庫裡有兩輛車，加上有許多的\
    \ iPod、平板電腦和智慧型手機。\n\n  要說服個人「想要更多」，並非難事。人類很容易就會貪婪。真正的關鍵在於：必須說服像是國家或教會這種集合體，讓它們也遵循這種新的理想。幾千年來，社會努力抑制個人欲望，讓欲望達成某種平衡。大家都知道，雖然人人都想得到更多，但如果大餅只有固定大小，唯有克制，才能讓社會和諧，而貪婪就是件壞事。但是「現代」已經讓整個世界顛倒了是非，讓人類整體以為平衡比混沌更可怕，而貪婪因為能促進成長，反而成了一件好事。現代於是讓人開始追求更多，以致打破了長久以來抑制貪婪的紀律。\n\
    \n  混沌所造成的焦慮，有一大部分會因為自由市場資本主義而得到紓解，這也正是資本主義受歡迎的原因之一。資本主義思想家不斷安撫我們：「不用擔心，一切都會沒事的。只要經濟成長，其他一切交給市場那隻看不見的手，就行了。」資本主義就這樣批准了一個貪婪而混沌的系統，整個系統飛速成長，沒人知道究竟發生了什麼事、或是我們正在前往何方。（共產主義也同樣相信成長，並認為能夠透過國家計畫來操縱成長，避免混沌。雖然一開始曾有成效，但最終還是不敵混沌的自由市場大軍。）\n\
    \n## 人文主義來救援\n\n  如今，知識界常常抨擊自由市場資本主義。確實，由於資本主義主導了這個世界，我們應該盡全力瞭解它有何缺點，以免末日就在眼前。但是在批評資本主義的當下，我們仍應看到它的優點與成就。\n\
    \n  如果我們暫時忽略生態可能在未來崩潰，並以人口和成長做為成功的標準，資本主義可說是極其成功。以2016年為例，雖然我們的世界可能是充滿壓力、一片混沌，但各種關於崩潰和暴力的末日預言並未成真，反而是關於永遠成長和全球合作的吹牛誇口，確實實現。雖然偶爾也會出現經濟危機和國際戰爭，但是長期而言，資本主義不僅勝出，甚至還克服了饑荒、瘟疫和戰爭。在幾千年間，不論是祭司、神父、牧師、拉比、或是穆夫提（mufti，伊斯蘭教的法典說明官），都說人類不可能只靠自己就解決饑荒、瘟疫和戰爭等問題。但接著出現了銀行家、投資家和產業人士，不到兩百年的時光，就實現了這些夢想。\n\
    \n  於是，這份與現代的契約承諾，給予我們前所未有的力量，而且確實兌現了。但代價又如何？為了換來力量，這份契約要求我"
  mdcn: "## 人類大命運\n\n  至於新加坡這個徹底務實的城市國家，更是進一步貫徹這種思維，讓部長的薪資與國家GDP掛鉤。新加坡經濟若成長，政府部長就能加薪，彷彿這正是行政工作唯一的重點。\n\
    \n  我們可能覺得，對成長著迷再自然不過，但這只是因為我們生活在現代世界。過去可不是這樣的。不論是印度的大君、鄂圖曼的蘇丹、鎌倉的幕府、或是漢朝的皇帝，都很少會把自己的政治命運賭在經濟成長上，但莫迪、艾爾多安、安倍晉三和中國國家主席習近平，卻都這麼做了，可見「經濟成長」這回事是如何在全球各地成功取得了近乎宗教的地位。確實，把「相信經濟成長」稱為宗教並不會與事實出入太遠，因為這種信念號稱能解決許多、甚至是絕大多數的倫理難題。由於經濟成長據稱是一切美好事物的源頭，於是能鼓勵大家放下各種倫理的異見，共同採取任何能夠最大化長期成功的措施。因此，雖然莫迪所領導的印度有成千上萬的教派、黨派、運動和大師，而且終極目標可能各有不同，但卻都得通過同樣的經濟成長瓶頸，所以何不把大家集合在一起呢？\n\
    \n  於是乎，「更多東西」這項信條等於是在呼籲個人、公司和政府，不要在意任何可能阻礙經濟成長的事物，像是維持社會平等、確保生態和諧、或是孝順父母。在蘇聯，領導階層認為成長最快的方式就是國家控制的共產主義，所以任何妨礙集體化的事物，都會遭到掃除，包括幾百萬的富農（kulak）、言論自由、以及鹹海。現在普遍認為，某些版本的自由市場資本主義，更能確保長期成長；於是，我們保護了貪婪的大亨、富有的農民及言論自由，至於會妨礙自由市場資本主義的事物，則遭到摧殘，像是生態棲地、社會結構和傳統價值觀。\n\
    \n  舉個例子：某位任職高科技新創公司的軟體工程師，時薪一百美元。某天，她的父親不幸中風，需要有人協助買東西、做飯、甚至是洗澡。她可以讓父親搬過來和自己住，她一早去上班，晚上再早點回來，親自照顧父親。如此一來，不管是她的收入、或是新創公司的生產力，都會受到影響，但父親卻能享有女兒充滿愛和尊重的照顧。\n\
    \n  或者，這位工程師也能請一位墨西哥看護，時薪十二美元，和父親住在一起，照顧父親的所有需求。這樣一來，工程師、她任職的新創公司、甚至是這位看護和墨西哥的經濟，都將受益。\n\
    \n  這位工程師該怎麼選擇？\n\n  自由市場資本主義的答案非常明確。如果經濟成長要我們放下家人間的情感，鼓勵大家和父母分住，再從世界另一邊聘用看護，又有何不可？然而，這是個倫理判斷的問題，而不是事實聲明的問題。如果有人專心做軟體工程、有人專心照顧老人，我們無疑能製造出更多軟體，也能讓老人受到更多專業照護。然而，經濟成長真的比家人間的情感更重要嗎？一旦用自由市場資本主義的邏輯做出這樣的倫理判斷之後，自由市場資本主義也就從科學，跨界來到了宗教。\n\
    \n  多數資本家可能並不喜歡「宗教」這個標籤，但如果是宗教走向資本主義，宗教家倒是能抬頭挺胸。資本主義所應許的，並不像其他宗教那種空中的大餅，而是飄降在這個俗世上的奇蹟，而且有時還真能實現。許多讓人最後克服饑荒和瘟疫的信貸，都是出自對資本主義成長動能的強大信念。甚至，說到減少人類的暴力、增加寬容與合作，也得給資本主義一些掌聲。\n\
    \n  下一章將會提到，雖然還有其他因素，但資本主義讓人不再將經濟視為零和賽局（認為你獲利就是我損失），而是一種雙贏局面。\n\n## 資本主義的巨輪不會停轉\n\
    \n  資本主義深信「成長」這項最高價值，可說第一條誡命就是：將利潤投入有助於「增加成長」的事。在人類史上，王公貴族多半是把利潤虛擲在華麗的狂歡饗宴、豪奢的樓臺宮宇，以及不必要的戰爭衝突。又或是把金幣放入鐵箱，密封起來，深埋地底。今天，虔誠的資本主義信徒會用利潤來雇用新員工、擴大工廠規模，或是開發新產品。\n\
    \n  就算自己不懂這些事，他們也會把錢交給某些懂的人，像是銀行家、或是創投業者，再由這些人把錢借給各種需要錢的產業。拿了貸款，農民種新的麥田、營建承包商蓋新的房屋、能源公司探索新的油田、軍火業者開發新的武器。這一切活動得到的利潤，就讓這些產業能夠償還貸款，而且是連本帶利。於是，我們現在不但有了更多的小麥、房子、石油和武器，而且銀行和基金裡還有更多的錢，能夠繼續借出去。這是個永不停轉的巨輪，至少資本主義是這麼認為的。絕不會有某個時刻，資本主義忽然說：「好囉，成長夠了，我們輕鬆點吧。」\n\
    \n  如果想知道為什麼資本主義的巨輪絕不會停止，你可以花一個小時，與一個手上有十萬美元、想知道該怎麼辦最好的朋友談談。他會向你抱怨：「銀行利率這麼低，活存年利率才0.5%，我才不想把錢放在存款帳戶裡。如果丟到公債，大概可以賺2%。我有個表哥，去年在西雅圖買了一層公寓，現在漲了\
    \ 20% ！或許我也該去搞搞房地產；可是大家都在說房地產也要泡沫化了。那你覺得股市怎樣？我也有朋友說，現在最好是買新興市場的 ETF，像是巴西或中國。」在他中間喘口氣的時候，你可以問他：「為什麼你有了十萬美元，還不滿足呢？」他的解釋就能讓你知道，為什麼資本主義永不停息，絕對比我說得更清楚。\n\
    \n  透過各種無所不在的資本主義遊戲，這種概念甚至已經深深根植於兒童和青少年的心裡。像是西洋棋這種前現代的遊戲，假設的就是一種停滯的經濟。你在開局的時候有\
    \ 16 枚棋，而等到遊戲結束，也絕不可能多出任何 1 枚。雖然有些極少數情況，能讓你把兵變成王后，但就是不會有多出來的新棋子，也不可能把騎士升級成坦克。所以，西洋棋玩家永遠不用考慮投資這回事。相較之下，許多現代桌遊或電腦遊戲，都把投資成長當作重點。\n\
    \n  其中特別有趣的，是模仿文明的戰略遊戲，像是「當個創世神」(Minecraft)、「卡坦島」(The Settlers of Catan)，或是「文明帝國」(Sid\
    \ Meier's Civilization)。這些遊戲可能是設定在中世紀、石器時代、或某些想像的童話王國，但原則永遠相同，而且一定是出於資本主義。玩家的目標就是要建立一座城市、一個王國、或者是一整個文明。一開始可能只有一些很簡陋的基礎，可能是個村莊和附近的田野。你手上的資產能提供最早的一批小麥、木材、鐵或黃金，而你必須好好投資這筆財產：有些購買沒有生產力、但仍然必要的東西，像是士兵；也有些購買能用於生產的資產，像是更多村莊、田野和礦藏。這裡要致勝的策略，通常就是把能用於生產的資產盡可能最大化，至於沒有生產力但仍然必要的資產，則是勉強可維持就好。只要能蓋出更多村莊，就代表下一輪你能有更多收入，於於但可以購買更多士兵（只在有必要的時候），還能繼續擴大對生產的投資。很快的，村莊就能升級成城鎮；然後，能蓋出大學、港口和工廠；接著，能夠探索海洋；最終建立文明，贏得遊戲。\n\
    \n## 科學讓人類發現自己的無知\n\n  然而，經濟真能永遠維持成長嗎？會不會有一天耗盡資源，終歸停止？為了確保永遠成長，我們必須找到永不枯竭的資源。\n\
    \n  解決方法之一，就是探索、征服新的土地。幾個世紀以來，不論是歐洲經濟成長、或是資本主義制度擴張，確實都有賴於帝國在海外的征服行動。不過，地球上的島嶼和大陸就只有這麼多。雖然某些企業家確實也打算探索征服新的行星、甚至是星系，但與此同時，現代經濟還是得找到更好的擴張方式。\n\
    \n  這時，是科學為現代提供了這個答案。在前面的例子裡，狐狸經濟之所以不能成長，是因為狐狸不知道如何讓兔子生得更多。兔子經濟之所以停滯，是因為兔子不知道如何讓草長得更快。然而，人類經濟之所以能夠成長，是因為人類可以找出新的原料、新的能源。\n\
    \n  傳統把世界看成一塊固定大小的餅，隱藏的假設是世界上只有兩種資源：原物料和能源。事實上，資源有三種：原物料、能源，還有知識。原物料和能源取之有盡：用得愈多，就剩下愈少。相反的，知識卻是不斷成長：用得愈多，反而擁有愈多，而且隨著知識不斷增長，還能帶來更多原物料和能源。\n\
    \n  如果我投資一億美元探勘石油，而且在阿拉斯加成功找到一片油田，我手上會有更多石油，但我的孫子能擁有的石油就少了。較之下，如果我投資一億美元研究太陽能，而且成功找到更有效利用太陽能的新方法，我和我的孫子都能擁有更多能源。\n\
    \n  幾千年來，人類之所以無法用科學來推動成長，是因為大家誤以為各種宗教經典和古老傳統裡，已經提供了世界所有重要知識。如果石油公司相信已經找出了全球所有的油田，就不可能再浪費時間和金錢來探勘。同樣的，如果人類文化覺得已經知道了所有該知道的事，就不會費心尋找新的知識。而在現代之前，這正是大多數人類文明所持的立場。\n\
    \n  然而，科學革命打破了人類這種天真的信念。科學最大的發現正是讓人類發現自己的無知。人類發現自己對這個世界，所知竟如此之少，就突然有了很好的理由，要去追求新知，於是開啟了用科學推動進步的道路。\n\
    \n  一代接著一代，科學讓我們找到了新的能源、新的原物料、更好的機械技術、新的生產方法。到了此時此刻，人類手中的能源和原物料已遠超以往，整體產能一飛衝天。蒸汽機、內燃機和電腦等種種發明，打造出過去從來沒有的全新產業。\n\
    \n  展望二十年後的情形，我們可以信心滿滿，預期在2036年的生產和消費，都會遠超今日。我們相信奈米科技、基因工程和人工智慧，能夠再次為「生產」重新定義，在我們這個不斷擴大的超市裡開出新的商品區。\n\
    \n## 方舟症候群\n\n  因此，資源短缺的問題看來很有機會克服，但現代經濟真正的敵人是生態崩潰。不論是科學進步或經濟成長，都發生在地球這個脆弱的生物圈裡，而隨著進步和成長的大舉啟動，也就衝擊到生態穩定。如果想讓全球每個人都過著像美國人一般的豪奢生活，我們得要多幾個地球才行，但我們就只有一個地球。如果進步和成長最後破壞了整個生態系，要付出代價的不會只是吸血蝙蝠、狐狸和兔子：智人也無法置身事外。生態崩潰將造成經濟崩盤、政治動盪、人類生活水準下降，還可能對人類文明的存在造成威脅。\n\
    \n  想防患未然，方法之一就是放慢進步和成長的步調。如果投資者今年想要6%的報酬率，或許過了十年、他們可以學會只要有3%就滿足，過了二十年、只要有1%就滿足，那樣等到三十年後，經濟就能停止成長，而我們對現況也心滿意足。\n\
    \n  然而，成長的信條絕對會堅決反對這種異端想法，反而認為我們應該加快腳步。如果我們的發現和發明，讓生態系失去穩定、危及人類，那就該趕快再發現和發明些什麼，來保護自己——如果臭氧層變薄，增加了皮膚癌的風險，就該發明更好的防晒油、更佳的癌症療法，這樣也能刺激新的防晒和癌症治療產業成長。如果這些新產業汙染了大氣和海洋，造成全球暖化、大規模生物滅絕，那麼我們應該趕快打造虛擬世界和高科技避難所，就算地球變得像地獄一樣又熱又乾、汙染嚴重，也無礙我們繼續享受一切。\n\
    \n  北京的汙染狀況已經極度惡劣了，民眾必須避免戶外活動，而有錢人則會花上幾千美元，裝設室內空氣清淨系統。至於超級有錢人，甚至連院子都會蓋上保護設施。2013年，供外國外交官及中國高層子女入學的北京國際學校，甚至更進一步，斥資五百萬美元，在六個網球場及運動場地蓋起了巨大的圓頂帳篷。其他學校紛紛跟進，中國空氣清淨市場發展蓬勃。至於多數北京居民，當然自家不可能負擔如此的奢侈品，也無法把孩子送到國際學校。\n\
    \n  人類發現自己陷入了雙重的競賽。一方面，我們認為必須加快科學進步和經濟成長的腳步。十億中國人和十億印度人都希望過著像中產階級美國人一樣的生活——如果美國人都還是開著休旅車、逛著購物中心，中國人和印度人實在看不出，有什麼理由不去全力追求美式生活夢想。另一方面，我們又必須至少在生態世界末日來臨前懸崖勒馬。每一年，要處理這種雙重競賽的挑戰，都愈來愈艱巨，因為只要德里貧民窟的居民更接近美國夢一步，都是把地球更推近末日的邊緣。\n\
    \n  好消息是：人類已經享受了幾百年的經濟成長，卻一直沒成為生態崩潰的受害者。其他許多物種沒能撐過這個過程；人類也曾面臨一些經濟危機和生態災難，但總能化險為夷。\n\
    \n  但是，沒有任何自然律能夠保證未來繼續一帆風順。究竟科學能否永遠拯救經濟免於冰封、地球免於沸騰，實在沒人說得準。而且，由於腳步不斷加快，能夠犯錯的空間也不斷縮小。以前可能只要一個世紀發明出一項神奇的產品，便已足夠，但現在可能每兩年就得出現一項奇蹟。\n\
    \n  我們也該思考，生態末日對於不同的人類階級，又有什麼樣的不同後果。歷史從無正義。每當災難發生，就算這場悲劇根本是由富人所引起，但窮人受到的苦難幾乎總是遠遠高於富人。在乾旱的非洲國家，全球暖化已經開始影響窮人的生活，這些人受影響的程度遠比富裕的西方人來得高。矛盾的是，科學的力量愈大，反而可能愈危險；原因就在於這讓富人自鳴得意。\n\
    \n  以溫室氣體的排放為例。大多數學者和愈來愈多的政治家，已經開始體認到全球暖化的現實和危險程度，但也僅止於體認，而未有任何實際作為，未能真正改變我們的行事做法。對於全球暖化，我們談得很多，但到了實際作為，人類卻不願為了制止這場災難，而真正在經濟、社會或政治上有所犧牲。2000\
    \ 年到 2010 年間，溫室氣體排放量非但完全沒有減少，反而還以每年 2.2% 的速度成長；過去在 1970 年到 2000 年間，年成長率僅為 1.3%。\n\
    \n  1997 年協議減排溫室氣體的《京都議定書》，目標只是減緩、而非阻止全球暖化，但美國這個全球第一大污染者卻拒絕簽署，也全未嘗試大幅減少溫室氣體排放，惟恐有礙經濟成長。\n\
    \n  迄今，不管是所有關於全球暖化的言論，或是所有的研討會、高峰會和協議，都未能抑制全球溫室氣體排放。仔細觀察這張圖表，就會發現只有在經濟危機和經濟停滯期間，排放量才會減少。因此，溫室氣體排放之所以在\
    \ 2008 年至 2009 年間出現小幅下滑，並不是因為簽署了〈哥本哈根協議〉(Copenhagen Accord)，而是因為全球金融危機。唯一能確保阻止全球暖化的方式，就是停止經濟成長，但任何政府都不會願意。\n\
    \n  2015年12月，〈巴黎協定〉（Paris Agreement）訂出了較遠大的目標：在2100年以前，追求全球平均溫度升幅要低於1.5°C（以工業革命前的全球平均氣溫為準）。然而，有許多為了達成這項目標所必要的痛苦措施，卻都被輕描淡寫的延遲到2030年、甚至是二十一世紀的下半葉，其實也就是把燙手山芋丟給下一代。目前的主政者一派貌似環保，只想收割立即的政治利益，卻把減少排放（也就會減緩成長）的重大政治代價，留給未來的主政者。（本書寫作之時，即2016年1月，美國和其他最大汙染國是否會簽署〈巴黎協定〉及認真執行，看來仍在未定之數。）\n\
    \n  有太多的政客和選民認為，只要經濟繼續成長，科學家和工程師永遠都能拯救我們免於面對末日。談到氣候變遷的問題，「成長」的真正信徒還不只是希望奇蹟發生，而是認為奇蹟的出現是理所當然。\n\
    \n  把未來人類的希望，放在「假設未來的科學家能有些現今不可知、卻能拯救地球的發現」上，這種想法真的理性嗎？目前讓整個世界運作的多數總統、部長和執行長，都是非常理性的人。但是為什麼他們願意下這樣的賭注？或許是因為，他們覺得賭的不會是自己個人的未來。就算情況極度惡化，科學再也無法阻擋洪水襲來，工程師仍然能夠為上層階級，打造出一艘高科技的挪亞方舟，至於其他幾十億人，就隨波而去吧。\n\
    \n  這種對於高科技方舟的信念，正是對人類未來及整個生態系的最大威脅之一。如果有人一心相信自己死後能上天堂，就不該把核武交到這種人手中；出於同樣理由，要決定全球生態議題時，也不該交給相信這種高科技方舟的人。\n\
    \n  窮人又是怎麼回事？他們為什麼不抗議？畢竟萬一洪水真的來臨，將是窮人擔起所有代價。然而，如果經濟停滯，窮人也是首當其衝。在資本主義世界裡，窮人的生活唯有在經濟成長時，才可能有所改善。因此，如果得要放慢當下的經濟成長，以求減少未來的生態威脅，並不太可能得到他們的支持。保護環境是個好主意，但如果有人連房租都交不出來，對於沒錢的恐懼，就會遠遠高過對冰帽融化的擔心。\n\
    \n## 毫無意義的競賽追逐\n\n  就算人類動作夠快，能夠同時應付經濟和生態崩潰的危機，光是這場競賽本身，也是大有問題。對個人而言，這造成極高的緊張和壓力。經濟成長和科學進步已經為時數個世紀，我們會以為，至少在那些最先進的國家，應該能夠享有平靜、平和的生活。如果前人知道我們現在擁有什麼工具，一定會以為我們的生活如在天堂、無憂無慮。但事實卻絕非如此。雖然人類達成諸多成就，卻一直有股壓力，逼著我們繼續生產、繼續努力。\n\
    \n  我們怪自己、怪老闆、怪貸款、怪政府、怪學校，但罪魁禍首其實不是他們，而是這份「現代」的契約，我們都在出生的那一天就已然簽字畫押。在前現代的世界裡，人類就像是在社會主義官僚體系裡的低階職員，每天只要一打完卡，接下來就是等著別人去做點什麼事。但到了現代，人類自己成了負責的老闆，也就日夜不停感到壓力。\n\
    \n  整體而言，這種競賽就表現為不斷的動盪。在過去，社會和政治制度能夠歷經幾世紀而不衰，但現在，幾乎是每個世代都會打破舊世界、再創造新世界來取代。〈共產黨宣言〉說得精闢，現代世界就是自找著永遠的不安定和變動。各種固定的關係和古老的偏見，都遭到掃除；而新的結構等不到固定，便已經陳舊了。一切固定的東西都煙消雲散。在這樣混沌的世界，光是生活已不容易，要妥善管理，更是難上加難。\n\
    \n  因此，「現代」就得更加努力，以確保人類不論個人或整體，都不會想到要退出這場競賽（雖然這場競賽正是所有緊張和混沌的源頭）。為此，現代繼續高舉成長，做為最高價值的大纛，要求我們為此冒一切危險、做出任何犧牲。整體而言，現代鼓勵政府、企業和組織，以成長做為成功標準，並將穩定視為洪水猛獸。個人而言，現代要我們不斷提高收入和生活水準，就算目前的生活已經令你相當滿意，還是應該努力爭取更多。\n\
    \n  昨天的奢侈品，成了今天的必需品。曾經，一間三房的公寓、一輛車、加上一部桌上型電腦，就已經讓你相當滿意；到了現在，你就會想要擁有五房的獨棟住宅，車庫裡有兩輛車，加上有許多的\
    \ iPod、平板電腦和智慧型手機。\n\n  要說服個人「想要更多」，並非難事。人類很容易就會貪婪。真正的關鍵在於：必須說服像是國家或教會這種集合體，讓它們也遵循這種新的理想。幾千年來，社會努力抑制個人欲望，讓欲望達成某種平衡。大家都知道，雖然人人都想得到更多，但如果大餅只有固定大小，唯有克制，才能讓社會和諧，而貪婪就是件壞事。但是「現代」已經讓整個世界顛倒了是非，讓人類整體以為平衡比混沌更可怕，而貪婪因為能促進成長，反而成了一件好事。現代於是讓人開始追求更多，以致打破了長久以來抑制貪婪的紀律。\n\
    \n  混沌所造成的焦慮，有一大部分會因為自由市場資本主義而得到紓解，這也正是資本主義受歡迎的原因之一。資本主義思想家不斷安撫我們：「不用擔心，一切都會沒事的。只要經濟成長，其他一切交給市場那隻看不見的手，就行了。」資本主義就這樣批准了一個貪婪而混沌的系統，整個系統飛速成長，沒人知道究竟發生了什麼事、或是我們正在前往何方。（共產主義也同樣相信成長，並認為能夠透過國家計畫來操縱成長，避免混沌。雖然一開始曾有成效，但最終還是不敵混沌的自由市場大軍。）\n\
    \n## 人文主義來救援\n\n  如今，知識界常常抨擊自由市場資本主義。確實，由於資本主義主導了這個世界，我們應該盡全力瞭解它有何缺點，以免末日就在眼前。但是在批評資本主義的當下，我們仍應看到它的優點與成就。\n\
    \n  如果我們暫時忽略生態可能在未來崩潰，並以人口和成長做為成功的標準，資本主義可說是極其成功。以2016年為例，雖然我們的世界可能是充滿壓力、一片混沌，但各種關於崩潰和暴力的末日預言並未成真，反而是關於永遠成長和全球合作的吹牛誇口，確實實現。雖然偶爾也會出現經濟危機和國際戰爭，但是長期而言，資本主義不僅勝出，甚至還克服了饑荒、瘟疫和戰爭。在幾千年間，不論是祭司、神父、牧師、拉比、或是穆夫提（mufti，伊斯蘭教的法典說明官），都說人類不可能只靠自己就解決饑荒、瘟疫和戰爭等問題。但接著出現了銀行家、投資家和產業人士，不到兩百年的時光，就實現了這些夢想。\n\
    \n  於是，這份與現代的契約承諾，給予我們前所未有的力量，而且確實兌現了。但代價又如何？為了換來力量，這份契約要求我"
