    人類大命運


    像這樣透過設備、無情揭露一切真相來了解自己之後，可能就會讓人開始覺得：自己是許多生化系統的集合，而不是不可分割的個體；而且，這些人所做的決定，也愈來愈會反映其中各種系統需求的拉扯。27
    假設你每週有兩小時空檔，正在考慮該拿來下棋、還是打網球。可能有個好友會問：「你的心怎麼說？」但你的回答可能是：「心臟嗎？那當然打網球是比較好，而且這也更能控制膽固醇和血壓。只不過，我的
    fMRI 掃描也說，我該加強左前額葉皮質，畢竟我家族常有失智的病史，有個叔叔還很年輕，就出現症狀了。最新研究指出，每週下一次棋，能延緩失智症狀發生。」


    去到醫院的老年病房，還能找到更多透過設備進行外部調節的例子。人文主義總是頌揚老年，說這時期智慧滿溢、洞察世情。一位理想中的長者，雖然身體可能染病衰弱，但心靈敏銳明快，更有長達八十年的人生智慧可以分享，世事無不在其掌握，也總能為兒孫或其他訪客提出卓絕的建議。


    不過，到了二十一世紀，八十歲的人可能無法符合這個理想的長者形象，因為有太多人可以活超過八十歲了。隨著我們愈來愈瞭解人類生物學，醫學雖然能讓人活命延壽、一息尚存，但是心靈和那個「真正的自我」卻已經崩解潰散了。常常最後剩下的，只是各種已經功能失調的生物系統的集合，必須倚靠各種監測器、電腦和幫浦，才得以勉力維持下去。


