    例如第8章〈實驗室裡的定時炸彈〉提過美軍的「專注頭盔」，就是要幫助士兵專注在明確的任務上，加速決策過程。但這也可能降低這些人的同理心，讓他們忽略心中的種種懷疑和內在衝突。人文主義心理學家指出：感到憂鬱的人常常想要的，並不是簡單的解決方案，而是希望有人能夠聆聽他們的想法，同情他們的恐懼和疑慮。


