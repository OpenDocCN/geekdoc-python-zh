    # 心靈是什麼？


    另一種用來證明人類比其他動物優越的說法，是說地球上所有動物中，只有智人擁有心靈。


    心靈（mind）和靈魂大有不同。心靈並不是什麼神祕而永恆的概念，也不是眼睛或大腦之類的器官，而是腦中主觀經驗的流動，例如痛苦、快樂、憤怒和愛。這些心理上的經驗，就是各種緊密相連的感覺、情感和思想，忽然閃現、立刻消失……其他經驗再接著倏然浮現與消散，於電光石火間來去。（我們若回想起這些經驗，'
  merge: -1
