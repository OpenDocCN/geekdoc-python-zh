  md: '只不過，文字紀錄的神聖性通常造成的影響卻是負面居多。從1958年到1961年，毛澤東統治的共產中國實行大躍進，希望讓中國轉眼成為超級強國。為了有餘糧轉為資金，投入野心勃勃的工業和軍事計畫，毛澤東下令將農業產量增為兩倍和三倍。這項不可能的命令，從北京的辦公室沿著官僚階層一路傳下，透過省級行政人員一直下達到村長。地方官員不敢發出批評，也希望拍拍上級馬屁，於是捏造各種農業產量激增的假報告。這些虛假的數字又在官僚階層中一路回傳，每到一級就又誇大一些，在這裡添上一筆、那裡加一個零。


    於是，到了1958年底，中國政府報告上的糧食年產量，已經比實際多了50%。政府對報告深信不疑，向外國出售了幾百萬噸的稻米，換購武器和重型機器，以為還有足夠的餘糧養活中國人口。結果迎來史上最嚴重的饑荒，數千萬中國人死於非命。³


    同時，中國農業奇蹟的熱情報導傳向全世界。坦尚尼亞總統尼耶瑞瑞（Julius Nyerere）是個理想主義者，對中國的成功深感佩服。為了讓坦尚尼亞的農業現代化，尼耶瑞瑞決心依循中國模式，建立集體農場。農民起身反對這項計畫，但尼耶瑞瑞派出軍警，摧毀傳統村莊，並將數十萬農民強行安置到新的集體農場。


    坦尚尼亞政府的宣傳，把農場描繪得如同小天堂，但這些天堂多半只存在於政府文件中。在首都沙蘭港（Dar-a-Salam）寫出的方案和報告裡，宣稱著在這天或那天，這個或那個村落的村民已安置到了這座或那座農場。但在現實中，村民到達了目的地，卻發現那裡什麼都沒有——沒有房舍、沒有田地、沒有工具。但官員卻對自己和尼耶瑞瑞總統報告說，整個計畫無比成功。事實上，短短不到十年，坦尚尼亞就從非洲最大的食物出口國，轉成糧食淨進口國，'
