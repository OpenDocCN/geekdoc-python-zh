    形塑，雖然可能依據基因預設或隨機做出決定，但總之絕

    不能說是「完全自由的」。


    三、因此，外部演算法理論上有可能比我更瞭解我自己。如果

    能用某個演算法，監視組成身體和大腦的每個子系統，就

    能清楚掌握我是誰、我有什麼感覺、我又想要什麼。只要

    開發出這樣的演算法，重點就不再是什麼選民、顧客和看

    的人；而是演算法能夠做出最好的選擇，演算法永遠是對

    的，演算法覺得美、就是美。


    在十九世紀和二十世紀，由於沒有任何外部演算法能夠對個人

    有效監測，因此個人主義仍然是一種很實用的選擇。雖然國家和市

    場可能都很想對每個人進行有效的監測，但當時就是缺少必要的科

    技。不論是KGB還是FBI，對我的生化、基因組和大腦都無法完全

    掌握，而且就算特務偷聽我每次打的電話、監視我在街頭上和別人

    的每次互動，也沒有足夠的運算能力來分析這些資料。因此就二十

    世紀的科技而言，自由主義說得並沒錯，沒有人能比我更認識我。

    於是，人類有充分的理由認為自己是個自主的系統，聽從的是自己

    內在的聲音，而不是聽從什麼老大哥的命令。


    然而到了二十一世紀，科技已經讓外部演算法有能力「駭進人

    性」，比我更瞭解我自己。一旦如此，個人主義就即將崩潰，權威

    也將從個人轉向由演算法構成的網路。人類不會再認為自己是自主

    的個體、依據自己的期望而度日，而是習慣把整體人類看做一種生'
