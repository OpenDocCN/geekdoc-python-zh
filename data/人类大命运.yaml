    \n1.  學院會把一些早已收回製作成本的電子書折價銷售。\n2.  最新製作的電子書籍會開放列印功能，大家購買後有條件的可自行列印成書。\n\n天使神秘學院\n\
    2020年5月\n\n---\n\n### 目錄\n\n*   **第1章 人類的三大新議題**\n*   **第一部 智人征服世界**\n    *  \
    \ 第2章 人類世\n    *   第3章 人類的獨特之處\n*   **第二部 智人為世界賦予意義**\n    *   第4章 說書人\n    *\
    \   第5章 一對冤家\n    *   第6章 與「現代」的契約\n    *   第7章 人文主義革命\n*   **第三部 智人失去控制權**\n\
    \    *   第8章 實驗室裡的定時炸彈\n    *   第9章 自由主義大崩解\n    *   第10章 新宗教：科技人文主義\n    *  \
    \ 第11章 信數據得永生？\n    *   圖片來源\n    *   參考資料\n    *   誌謝\n\n---\n\n# 第1章\n## 人類的三大新議題\n\
    \n第三個千禧年開始之際，人類醒來，伸展手腳、揉了揉眼睛，腦子裡依稀記得某些可怕的噩夢。「好像有什麼鐵絲網啊、巨大的蘑菇雲之類的。但管它的呢，只是個噩夢吧。」人類走進浴室，洗洗臉，看看鏡子裡臉上的皺紋，沖了一杯咖啡，打開了行事曆，「來瞧瞧今天有什麼重要的事吧。」\n\
    \n幾千年來，這個問題的答案並沒有什麼改變，不管是二十世紀的中國人、中世紀的印度人、或是古代的埃及人，都面臨著同樣的三大問題：饑荒、瘟疫、戰爭。這三大問題永遠都是人們的心頭大患。一代又一代，人類向所有神明、天使和聖人祈禱膜拜，也發明無數工具、制度和社會；但是仍然不斷有數百萬人死於飢餓、流行病和暴力。許多思想家和先知於是認為：饑荒、瘟疫和戰爭一定是上帝整個宇宙計畫的一部分、又或是出自人類天生的不完美，除非走到時間盡頭，否則永遠不可能擺脫。\n\
    \n但在第三個千禧年開始之際，人類開始意識到一件驚人的事。雖然多數人很少想到這件事，但是在過去幾十年間，我們竟然已經成功遏制了饑荒、瘟疫和戰爭！當然這些問題還算不上完全解決，但已經從過去「不可理解、無法控制的自然力量」轉化為「可應付的挑戰」了。我們不再需要祈求某位神祇或聖人來解救人類，而已經相當瞭解，該怎樣做就能預防饑荒、瘟疫和戰爭，而且通常都能成功。\n\
    \n確實，還是有些時候事與願違，但面對這些失敗，人類不再只是聳聳肩，說「沒辦法，世界就是這樣不完美」或是「這是上帝的旨意」。現在如果再有饑荒、瘟疫和戰爭爆發，而不受人類控制，我們會覺得一定是有某個人出了問題，該成立調查委員會來研究研究，而且對自己許下承諾，下次一定要做得更好。\n\
    \n這套辦法還真行得通。饑荒、瘟疫和戰爭發生的次數及頻率都確實在下降。這是史上首見，因營養過剩而死亡的人數超越營養不良；因年老而死亡的人數超越傳染病死亡；自殺身亡的人數甚至超越被士兵、恐怖份子和犯罪份子殺害人數的總和。到了二十一世紀早期，平均來說，人類死於乾旱、伊波拉病毒或基地組織恐怖攻擊的可能性，還不及死於暴飲暴食麥當勞。\n\
    \n因此，雖然各國總統、閣揆和軍事將領的每日待辦議題仍然滿是經濟危機和軍事衝突，但就整個人類歷史的宏觀觀點來說，人類已經可以看向別處，開始尋找其他新議題了。如果我們確實已經讓饑荒、瘟疫和戰爭得到控制，什麼將取而代之、成為人類最重要的新議題？就像消防員忽然聽說再不會有火災了，人類到了二十一世紀，得自問一個前所未有的問題：我們接下來要做什麼？整個世界已經如此健康、繁榮又和諧，我們該把注意力和創造力投到什麼事情上？而因為生物科技及資訊科技為人類帶來強大的新力量，這個問題也變得加倍迫切。手上有了這些力量，究竟該如何運用？\n\
    \n要回答這個問題之前，我們對於饑荒、瘟疫和戰爭還得多談幾句。很多人可能會認為，說這些問題已經得到控制，是非常離譜、天真、或是麻木不仁的說法。不是還有幾十億人每天只有不到兩美元過日子嗎？非洲不是還在和愛滋病對抗？敘利亞和伊拉克不也正有戰爭肆虐嗎？\n\
    \n要回答這些問題，我們得先更仔細看看二十一世紀初的世界；至於探索未來幾十年的新議題，且待後續再談。\n\n### 生物貧窮線\n\n首先談談饑荒，這在幾千年來一直是人類最大的敵人。甚至在不久前，大多數人仍然只活在生物貧窮線的邊緣，再低一點就會落入營養不良和飢餓狀態。只要發生小失誤、或單純有點運氣不好，很有可能就等於把整個家庭或村莊判了死刑。如果一場大雨毀了你的麥田、或是強盜搶走了你養的羊群，你和親人可能就會餓死。如果是集體的愚蠢行徑或不幸，則會導致大規模的饑荒。在古埃及或中世紀印度，如果碰到嚴重乾旱（這並不少見），常常一下子總人口就會有5%或10%撒手人寰。遇上乾旱，就會出現糧食短缺；救援運輸又太過遲緩、成本也太高，無法進口足夠的食物；而且政府也太過疲弱，無力挽救局面。\n\
    \n隨便翻開哪本歷史書，幾乎都會讀到饑荒的慘況，讀到人在飢餓之下的瘋狂行徑。1694年4月，博韋（Beauvais）一地的法國官員描述了當地饑荒、糧價飆漲的影響，他說自己的轄地處處都是「無數可憐的靈魂，飢弱無力，匱乏而亡；沒有工作，也就沒有錢買麵包果腹。為求苟延殘喘、稍解飢餓，這些可憐人以不潔之物為食，如死貓、或是已剝皮而投入糞堆的死馬。還有人吃的則是宰殺牛隻流出的血，以及廚子扔到街上的內臟。其他可憐人則吃蕁麻、雜草、樹根、藥草，全部在水裡煮成一鍋。」\n\
    \n法國各地都出現了類似的景象。由於前兩年氣候不佳，整個王國嚴重歉收，到了1694年春天，糧倉已經完全見底。有錢人設法囤積糧食，以天價出售，而窮人則是大批餓死。從1692年到1694年間，法國約有二百八十萬人餓死，大約占總人口15%；與此同時，太陽王路易十四仍在凡爾賽宮，與眾家妃妾歌舞昇平。隔年（1695年），饑荒襲擊愛沙尼亞，人口損失達五分之一。1696年，則是在芬蘭肆虐，餓死了四分之一到三分之一的人口。從1695年到1698年間，蘇格蘭也遭受嚴重饑荒，部分地區餓死高達五分之一的居民。\n\
    \n多數讀者可能都知道，少吃一頓午餐是什麼感覺——可能是為了宗教因素而在幾個節日禁食，也可能是連續幾天只喝蔬果昔，號稱有某種神奇的功效。然而如果是連續多日，粒米未進，而且連下一口食物在哪都不知道，又是什麼感覺？今天，大多數人從未經歷這種痛苦煎熬，但很遺憾，我們的祖先對此再清楚不過。在他們向神祇高呼「拯救我們脫離饑荒！」的時候，心裡正是那種感覺。\n\
    \n過去幾百年間，科技、經濟和政治進步，張開了日益強健的安全網，將人類與生物貧窮線隔開。雖然時不時仍有大規模饑荒，但只能算是特例，而且幾乎都是因為政治因素、而非自然災害所致。世界上已經不再有自然造成的饑荒，只有政治造成的饑荒。如果現在還有人在敘利亞、蘇丹和索馬利亞餓死，罪魁禍首其實是那些政客。\n\
    \n在全球大部分地區，現在就算沒了工作、丟了全部家當，也不太可能活活餓死。私人保險、政府機構和國際非政府組織，可能無法讓他脫離貧困，但至少能提供足夠的熱量，讓他生存下去。全球貿易網路甚至還能將乾旱和洪災轉為商機，也能又快又便宜的克服糧食短缺危機。就算整個國家遭到戰爭、地震或海嘯摧殘，國際間的緊急援助，通常還是能成功避免大範圍的饑荒肆虐。雖然每天仍有幾億人陷於飢餓，但在大多數國家，已經很少有人真正餓死。\n\
    \n貧困確實會帶來許多其他健康問題，營養不良也會縮短預期壽命，即使地球上最富有的國家，也不免有這個難題。例如就算在法國，仍有六百萬人（約占總人口10%）陷於營養不安全（nutritional\
    \ insecurity）的狀態，一早醒來不知道中午能否有東西吃，常常得帶著飢餓入眠；而且就算吃到東西，營養也非常不均衡、不健康：往往有大量的澱粉、糖和鹽，卻沒有足夠的蛋白質和維生素。然而，營養不安全仍然算不上饑荒，二十一世紀的法國也已不是1694年的法國。就算在博韋或是巴黎最糟糕的貧民窟，現在也不會發生幾週沒得吃而餓死人的情形。\n\
    \n同樣的轉變也發生在其他許多國家，其中最值得一提的就是中國。從黃帝到紅色共產，幾千年來各個輪替的中國政權，都曾遭到饑荒肆虐。幾十年前，中國還曾經是糧食短缺的代名詞。在大躍進這場災難中，數百萬中國人活活餓死，而且當時專家也總是不斷預測這個問題只會繼續惡化。1974年，第一次世界糧食會議在羅馬召開，各國代表聽到彷若世界末日的前景。專家告訴他們，中國絕無可能養活十億人口，這個人口最多的國家正走向災難。但事實上，中國卻是邁向了歷史上最大的一場經濟奇蹟。自1974年以來，雖然仍有數億人深深苦於匱乏和營養不良，但也已有數億中國人擺脫貧困，這是史上首次，中國不再受到饑荒之苦。\n\
    \n事實上，現在的大多數國家，真正遠遠更嚴重的並不是饑荒，反而是飲食過量。在十八世紀，據稱法國王后瑪麗一安東尼（Marie-Antoinette）曾經向受餓的民眾說，如果沒有麵包可吃，何不吃蛋糕呢？但今天的窮人真的是如此！現今，住在比佛利山莊的有錢人吃生菜沙拉、清蒸豆腐佐紅藜，而住在貧民窟或貧民區的小女生則是大口嚼著美國的國民零食Twinkie蛋糕、奇多、漢堡和披薩。2014年，全球體重過重的人數超過二十一億，相較之下，營養不良的是八億五千萬人。預計到了2030年，全球會有半數人體重過重。\n\
    \n2010年，饑荒和營養不良合計奪走了約一百萬人的性命，但肥胖卻讓三百萬人命喪黃泉。\n\n繼飢荒之後，人類的第二大敵是瘟疫和傳染病。由川流不息的商人、官員和朝聖者所連結起來的繁華城市，既是人類文明的基石，也是病菌滋生的溫床。於是，住在古雅典或中世紀佛羅倫斯的民眾都心裡有數，可能忽然生病、短短一週就過世，也可能有某種流行病突然爆發，一下帶走他們的整個家庭。\n\
    \n最有名的一次流行病就是黑死病，始於1330年代的東亞或中亞某處，棲息在跳蚤身上的鼠疫桿菌（Yersinia pestis），開始透過跳蚤叮咬而感染人類。這批瘟疫大軍乘著老鼠和跳蚤，迅速蔓延全亞洲、歐洲和北非，不到二十年便已抵達大西洋沿岸。當時的死亡人數約在七千五百萬人到兩億人之間，超過歐亞大陸人口的四分之一。在英國，每十人就有四人死亡，人口從瘟疫前的三百七十萬人降到瘟疫後的二百二十萬人。佛羅倫斯的十萬居民，也有五萬不幸殞命。\n\
    \n面對這場災難，各國行政當局完全束手無策，只安排了大型的群眾祈禱和遊行，卻全然不知如何阻止疫情蔓延，更別說要治癒疾病。在近代之前，人類認為會生病是因為空氣不佳、惡魔心懷不軌、或是神明發怒，從未想過有細菌和病毒存在。人們很容易相信有天使或仙女，卻無法相信，光是一隻小小的跳蚤或一滴水，就可能帶著如同整批艦隊般的致命掠食者。\n\
    \n黑死病既非單一事件，甚至也不是史上最嚴重的瘟疫。曾經有更大的災難，隨著第一批歐洲人的腳步而來，襲擊了美洲、澳洲和太平洋島嶼。這些歐洲探險家和移民並不知道，自己身上帶著當地居民缺乏免疫力的傳染病，造成當地居民高達90%因此喪命。\n\
    \n[IMAGE]\n\n[IMAGE]\n\n1520年3月5日，一小群西班牙艦隊離開古巴，前往墨西哥。這些船上載著九百名西班牙士兵、馬、槍支，以及幾名非洲奴隸。其中一名奴隸艾奎亞（Francisco\
    \ de Eguía），身上帶著另一項遠遠更為致命的貨物。艾奎亞自己毫無所知，但在他的幾兆個細胞裡，有一枚正在滴答作響的生物定時炸彈——天花病毒。\n\n\
    艾奎亞登陸墨西哥後，病毒開始在他身體內，指數式的增殖，最後終於在全身皮膚迸發出可怕的皰疹。艾奎亞高燒不退，給帶到辛波阿蘭（Cempoallan）鎮一個美洲原住民的家裡，在床上休息。他感染這家人，這家人又感染了鄰居。短短十天，辛波阿蘭鎮就成了一片墓地。難民倉皇逃出，又將天花從辛波阿蘭鎮傳到了鄰近的城鎮。小城鎮一一陷落、無一倖免，嚇壞的難民一波又一波逃亡，將天花傳遍墨西哥，甚至超越國界。\n\
    \n在猶加敦半島的馬雅人認為，是三位惡神艾克普茲（Ekpetz）、烏贊卡克（Uzannkak）和索亞卡克（Sojakak），晚上從一個村莊飛到另一村莊，讓人染上這種惡疾的。阿茲特克人則是怪罪特茲卡特利波卡（Tezcatlipoca）和西沛托提克（Xipetotec）這兩個神，或者說是白人施展了某種黑魔法。病人找上了僧侶和醫師，他們建議病人祈禱、洗冷水澡、用瀝青擦身體，以及把黑甲蟲擠碎塗在傷口。可惜全然徒勞。成千上萬的屍體在街頭腐爛，無人敢接近、無人敢埋葬。許多家族短短幾天全部喪命，當局下令直接將房屋推倒，以掩埋屍體。在某些聚落，死亡人口達到一半。\n\
    \n1520年9月，疫情傳至墨西哥谷地；10月就進了阿茲特克首都特諾奇蒂特蘭（Tenochtitlan）。當時該城是一座人口達二十五萬人的宏偉都市，卻在兩個月內至少損失三分之一的人口，其中包括阿茲特克的皇帝庫伊特拉華克（Cuitláhuac）。1520年3月，西班牙艦隊抵達時，墨西哥城人口多達二千二百萬，但到了12月，僅餘一千四百萬。天花只不過是第一波攻擊而已。正當西班牙來的新主人忙著自肥、向當地人橫征暴斂，流感、麻疹等致命傳染病也一波一波襲向墨西哥；到了1580年，該城人口已經不到兩百萬人。\n\
    \n兩個世紀後，英國探險家庫克（James Cook）船長於1778年1月18日來到夏威夷。夏威夷群島當時人口稠密，足足有五十萬人，從未與歐洲或美國有過接觸，因此也從未暴露在歐洲及美國的疾病之下。庫克船長等人，就這樣把第一批的流感、肺結核及梅毒病原體，帶進了夏威夷，後續來到的歐洲人再加上了傷寒和天花。到了1853年，夏威夷的倖存人口只剩下七萬。\n\
    \n### 瘟疫不再蔓延\n\n時間進入二十世紀良久，各種流行病仍然繼續奪走幾千萬人的性命。1918年1月，身處法國北部戰壕的士兵，開始染上一種特別強的流感病毒，俗稱「西班牙流感」，數千人因而喪生。當時的戰場前線，背後是全球有史以來最有效率的後勤供應網路。士兵和彈藥從英、美、印、澳大批湧至，汽油來自中東，穀物和牛肉來自阿根廷，橡膠來自馬來西亞，銅則來自剛果。透過人流物流，這些地方都得到了西班牙流感。短短幾個月內，大約五億人（當時全球人口的三分之一）都感染了病毒。在印度，一千五百萬總人口有5%因而喪命；大溪地14%喪命；薩摩亞20%喪命。而在剛果的銅礦場，五分之一的工人因而死亡。總計在不到一年間，這次流感就帶走大約五千萬人到一億人的性命。相較之下，從1914年到1918年的第一次世界大戰，死亡人數還只有四千萬。\n\
    \n每隔幾十年，就會有這樣的大型流行病海嘯，向人類襲來，但另外也有些規模較小、頻率較高的流行病，每年帶走幾百萬人的性命。兒童的免疫力較低，特別容易染病，因此也有人將流行病稱為「兒童疾病」。直到二十世紀初，還有大約三分之一的兒童，會因為營養不良和疾病而夭折。\n\
    \n在二十世紀，由於人口成長、加上交通運輸進步，反而讓人類變得更容易受到流行病危害。對於流行病的病原體來說，像是東京或非洲剛果的首都金夏沙這種現代化大都市，會是比中世紀的佛羅倫斯或是1520年的特諾奇蒂特蘭更富饒的獵場，而全球交通運輸網路效率也遠比1918年時要高。現在，一株西班牙病毒用不著二十四小時，就能抵達非洲的剛果或南太平洋的大溪地。這麼說來，世界..."
