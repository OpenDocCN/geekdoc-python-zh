    並不是她的自由選擇，那為什麼她又要受罰呢？


    然而，如果我們已經接受「人沒有靈魂」、也沒有稱為自我的內在本質，這時再去問「自我如何選擇它想要的事物？」就是件不合理的事。這就像是問單身男子「你太太怎麼挑衣服？」一樣莫名其妙。事實上，人類有的就是一條意識流，欲望會在這條意識流中起伏來去，並沒有什麼永存不變的自我，能夠擁有這些欲望。如此說來，要問我到底是因為基因預設、隨機發生、還是自由意志而選擇了自己的欲望，其實是個沒有意義的問題。


    這個概念可能聽起來很複雜，但檢測的方式卻是意想不到的簡單。下次有個概念從你腦中跳出來，就趕快問問自己：「為什麼我會想到這個想法？我是在一分鐘前決定要想到這個想法、然後才想到的嗎？還是我自己並沒下任何指示或准許，這個想法就自己出現？如果我真的是自己思想和決定的主人，我能不能決定在接下來六十秒內，不要想到任何事？」請試試，看看情況如何。


    質疑是否有自由意志，並不只是一種哲學上的練習，而是確有實際的意義。如果生物確實沒有自由意志，也就意味著只要使用藥物、基因工程、或直接對腦做出刺激，就能操縱，甚至控制他們的欲望。


