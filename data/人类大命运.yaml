    了在一開始干預的時機，現在木已成舟，要改變現有制度真是難上加難。等到笨重的政府官僚制度終於下定決心，進行網路監管，網路早已又演進了十次。政府這隻烏龜，永遠追不上科技這隻野兔，就這樣被資料數據壓得無法動彈。美國國安局或許能夠監控每個人的每句話，但看到美國外交紕漏不斷，就知道華盛頓雖然拿著一切資料，卻沒人知道該怎麼運用。對於世界上正發生什麼事，史上從來沒有任何政府，能像現在的美國知道得如此清楚；但也鮮少有政府，能夠反應得像現在的美國一樣笨拙。這就像是打牌的時候明明知道對手有什麼牌，卻不知怎麼搞的，總是一輸再輸。


    在未來幾十年間，我們很可能還會看到更多類似網際網路的革命，而科技會搶走政治的所有風頭。人工智慧和生物科技可能即將徹底改變人類社會和經濟，甚至徹底改變人類的身體和心靈，但當前的政治體系對此卻幾乎毫無警覺。現今的民主制度，蒐集和處理相關資料數據的速度太過緩慢，而且大多數選民對生物學和模控學（cybernetics）的認識也不足，無法形成切中要點的意見。因此，傳統民主政治正逐漸失去對事態發展方向的控制力，也提不出有意義的未來願景。


    普通選民也開始意識到，民主機制已經不再能夠為他們帶來權力。世界正在變化，但他們摸不清變化的方式和原因。權力正在移轉，但選民不知道權力去了哪。在英國選民的想像中，以為權力是被歐盟奪走，所以他們投票給英國脫歐（Brexit）。在美國選民的想像中，以為是「當權派」壟斷了所有權力，所以他們支持反體制的候選人，像是桑德斯（Bernie
    Sanders）和川普（Donald Trump）。但可悲的事實是，沒人知道所有的權力去了哪。就算英國離開歐盟、川普接掌白宮，權力也絕對不會回到普通選民身上。


