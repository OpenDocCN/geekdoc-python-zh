    # 第二次認知革命


    七萬年前，認知革命改變了智人的心靈，讓原本毫不重要的非洲猿類成為世界的統治者。智人的心靈經過提升後，忽然能夠接觸到互為主體的領域，於是能夠創造神祇和企業、建立城市和帝國、發明文字和金錢，最後也能夠分裂原子、登上月球。據我們所知與推測，這種翻天覆地的革命，只是因為智人的DNA起了一點小變化，導致大腦稍微重新配線。如果真是如此，那麼科技人文主義或許也只需要對人類的基因組，再多做點改變，讓大腦再稍微重新配線，也就足以啟動第二次認知革命。


    第一次認知革命的心靈改造，是讓人類能夠接觸互為主體的領域，也就讓智人成了地球的統治者；第二次認知革命則可能會讓神人接觸到目前還難以想像的新領域，讓神人成為整個星系的主人。


    早在一個世紀前，進化人文主義就希望創造出超人類，而現在的科技人文主義則可說是舊夢想的新型態。希特勒等人的想法，是'
