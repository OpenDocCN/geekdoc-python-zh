    # 第11章


    # 信數據得永生？


    數據主義認為，宇宙是由資料流組成，任何現象或實體的價值就在於對資料處理的貢獻。¹讀者可能覺得這實在是極端的胡言亂語，但事實上，大部分的科學機構都已經改信了數據主義。


    數據主義是由兩大科學潮流爆炸性匯流而成的。在達爾文發表《物種原始論》一百五十年後，生命科學已經認為生物都是生化演算法。此外，在圖靈想出「圖靈機」（Turing
    Machine）這個概念的八十年後，資訊科學家也已經學會寫出愈來愈複雜的電子演算法。數據主義指出，同樣的數學定律能夠同時適用於生化演算法及電子演算法，於是讓兩者合而為一，打破了動物和機器之間的隔閡，並期待電子演算法終有一天能夠解開生化演算法，甚至有所超越。


    對於政府、企業或一般消費者來說，數據主義提供了突破性的科技和強大的全新力量。對於學者和知識份子來說，這也能提供我們幾世紀以來渴求的科學聖杯：從音樂學、經濟學到生物學，所有科學學門都能統一在單一理論之下。根據數據主義，貝多芬的第五號交響曲、股市泡沫和流感病毒，不過是資料流的三種不同模式，


