    齊奧塞斯庫和親信統治羅馬尼亞兩千萬人，長達四十年，靠的就是確保了三項重要條件。首先，將忠誠的共產官僚安插控制所有的合作網路，例如軍隊、工會、甚至是體育協會。第二，不論在政治、經濟或社會方面，只要是任何可能合作反共產的競爭組織，一律禁止成立。第三，他們擁有來自蘇聯和東歐共產政黨的支援。雖然偶有爭執，但這些共產政黨還是會在必要時互相伸出援手，或'
