    # 毫無意義的競賽追逐


    就算人類動作夠快，能夠同時應付經濟和生態崩潰的危機，光是這場競賽本身，也是大有問題。對個人而言，這造成極高的緊張和壓力。經濟成長和科學進步已經為時數個世紀，我們會以為，至少在那些最先進的國家，應該能夠享有平靜、平和的生活。如果前人知道我們現在擁有什麼工具，一定會以為我們的生活如在天堂、無憂無慮。但事實卻絕非如此。雖然人類達成諸多成就，卻一直有股壓力，逼著我們繼續生產、繼續努力。


    我們怪自己、怪老闆、怪貸款、怪政府、怪學校，但罪魁禍首其實不是他們，而是這份「現代」的契約，我們都在出生的那一天就已然簽字畫押。在前現代的世界裡，人類就像是在社會主義官僚體系裡的低階職員，每天只要一打完卡，接下來就是等著別人去做點什麼事。但到了現代，人類自己成了負責的老闆，也就日夜不停感到壓力。


    整體而言，這種競賽就表現為不斷的動盪。在過去，社會和政治制度能夠歷經幾世紀而不衰，但現在，幾乎是每個世代都會打破舊世界、再創造新世界來取代。〈共產黨宣言〉說得精闢，現代'
