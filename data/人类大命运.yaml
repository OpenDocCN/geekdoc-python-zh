    生。伊斯蘭基本教義派可以繼續像唸咒一般，複誦著「伊斯蘭就是答案」，但宗教只要與當今的科技現實脫節，恐怕就連民眾所問的問題都無法理解。


    例如：等到人工智慧在大多數的認知工作上超越人類，就業市場會有何改變？如果出現許多在經濟上完全沒有用處的人，形成一個龐大的新階級，會造成怎樣的政治衝擊？如果在奈米科技和再生醫學的力量下，未來的八十歲就像是現在的五十歲，對人際關係、家庭和退休基金又有何影響？如果生物科技讓我們能夠訂做嬰兒、並讓貧富之間出現前所未見的巨大鴻溝，人類社會又將如何發展？


    對於這些問題，在《古蘭經》或伊斯蘭律法、《聖經》或是《論語》裡都不可能找到解答，因為不論是中世紀中東、或是古代中國，都不會有人懂電腦、遺傳學和基因工程、或是奈米科技。激進伊斯蘭主義或許能承諾，可在這個充滿科技和經濟風暴的世界，提供一個下錨點。但如果想要衝出風暴，就不能只有下錨點，而是需要海圖和方向舵。因此，對於生於斯長於斯的人，激進伊斯蘭主義或許有吸引力，但對於失業的西班牙青年、或是焦慮的中國億萬富翁來說，激進伊斯蘭主義卻是絲毫不誘人。


    確實，現在還是有數億人口，虔誠信奉著伊斯蘭教、基督教或印度教。但對於歷史來說，單單人數的意義並不大。塑造歷史的，往往是一小群向前看的創新者，而不是向後看的大眾。一萬年前，多數人都是狩獵採集者，整個中東只有寥寥可數的少數先驅者是農民；但未來是屬於農民的。1850年，全球有超過90%的人是農民，而不管是在恆河、尼羅河或長江沿岸，都沒有人知道蒸汽機、鐵路或電報線。然而在曼徹斯特和伯明罕，一小群領導工業革命的工程師、政治家和金融家，就已經決定了這90%農民的命運。蒸汽機、鐵路和電報改變了食品、織品、車輛和武器的生產方式，讓工業強國擁有遠勝於傳統農業社會的決定性優勢。


    ## 十九世紀的迷惘


    然而，就算當工業革命傳遍世界各地，逆流而上滲透了恆河、尼羅河和長江沿岸，大多數人民還是繼續相信著《吠陀經》、《聖經》、《古蘭經》和《論語》，而非蒸汽機。不管是今日或十九世紀，世界上的各種祭司、神祕主義者或大師也從沒少過，個個都宣傳自己握有所有人類困境的解決方案，能處理包括工業革命後出現的種種新問題。


    例如在1820年代到1880年代之間，埃及（在英國支持下）征服了蘇丹國，希望讓該國現代化，納入新的國際貿易網路。他們的作為破壞了傳統蘇丹社會的穩定，民怨四起、反抗頻傳。1881年，地方宗教領袖阿卜杜拉（Muhammad
    Ahmad bin Abdallah）宣稱自己就是馬赫迪（Mahdi，伊斯蘭教典記載的救世主），由上帝所派，要在人間建立上帝的律法。他的支持者擊敗了英埃聯軍，並將聯軍指揮官戈登（Charles
    Gordon）將軍斬首，令維多利亞時代的英國大為震驚。這些人接著在蘇丹建立實行伊斯蘭律法的神權國家，直到1898年才被推翻。


    與此同時在印度，達耶難陀·娑羅室伐底（Dayananda Sarasvati）發動印度教復興運動，基本原則就是《吠陀經》絕對不會錯。1875年，他創立雅利安社（Arya
    Samaj，意為「貴族社會」），致力於傳播《吠陀經》的知識；但老實說，達耶難陀對《吠陀經》的解釋常與自由人文主義有驚人的相似度，例如，他早在西方出現平權思想之前，便已支持婦女應享有平等權利。


    與達耶難陀同時代的教宗碧岳九世（Pius IX），對女性的看法就保守得多，但與達耶難陀同樣認為「世上有高於一般人的權威」存在。碧岳九世發動了一系列天主教教義改革，確立「教宗一貫正確論」（Papal
    Infallibility）這項新教條，認定教宗在公告信仰教理上，不能夠有錯誤（並不是指教宗在任何事都永遠正確）。這種概念乍看之下可能還以為來自中世紀，但其實是近到1870年，才成為具有約束力的天主教教義，當時達爾文發表《物種原始論》已過了十一年。


    而在教宗確立自己應當「一貫正確」的三十年前，失意的清代文人洪秀全，大病一場，病中出現幻覺，看到上帝以一位老人的形象現身，說洪秀全是耶穌基督的弟弟。上帝接著交付洪秀全一項神聖的使命，要他驅逐自十七世紀以來統治中國的滿族「惡魔」，在大地上建立「太平天國」。當時，中國在鴉片戰爭遭到擊敗，現代工業與歐洲帝國步步進逼，數百萬清代人民深感絕望，而洪秀全的話則讓他們大受鼓舞。可惜的是，洪秀全並未把他們帶向太平的天國，只引發了反清的太平天國之亂，時間從1850年到1864年，是整個十九世紀最慘烈的一場戰爭，至少二千萬人喪命，人數遠超過拿破崙戰爭或美國內戰。


    就在工業化的工廠、鐵路和輪船遍布世界的同時，還是有數以億計的人，堅信洪秀全、達耶難陀、碧岳九世和馬赫迪提出的宗教教條。但對我們大多數人來說，講到十九世紀，並不會認為這是個信仰的時代。談到十九世紀有遠見的人，我們想到的大概不會是馬赫迪、碧岳九世或洪秀全，而是馬克思、恩格斯和列寧。確實也該是如此。雖然社會主義在1850年還只是個邊緣的運動，但聲勢成長迅猛，對世界帶來的改變，要遠大於中國和蘇丹那些自稱為救世主的人。如果你也認為全國的健康照護、退休基金和義務教育十分重要，該致謝的應該是馬克思和列寧（以及俾斯麥），大概不會是洪秀全或馬赫迪。


    ## 史上第一個科技宗教：共產主義


    到頭來，為什麼馬克思和列寧成功，洪秀全和馬赫迪失敗？並不是社會人文主義的哲學優於伊斯蘭教或基督教神學，而是馬克思和列寧更努力去理解當代的科技和經濟現實，他們並不會把時間耗費在細讀古代文本、或沉迷在先知的預言中。


    蒸汽機、鐵路、電報和電力造成前所未聞的問題，但也帶來前所未有的機會。都市無產居民已經形成一個新階級，而這些人的經驗、需求和希望，當然與《聖經》時代的農民大不相同。為了回應這些需求和希望，馬克思和列寧研究蒸汽機如何運作、煤礦如何經營、鐵路如何塑造經濟，以及電力如何影響政治。


    曾有人希望列寧用一句話來定義共產主義。他回答：「共產主義就是讓各個工人委員會有權力，加上全國的電力化。」沒有電力、鐵路、廣播，就不會有共產主義。所以，十六世紀的俄羅斯不可能建立共產主義政權，因為共產主義需要將資訊及資源集中在一個樞紐。要能達到馬克思所稱「各盡所能、各取所需」的理想，就必須讓距離遙遠的各種產品，都能夠方便蒐集及分配，而且整個國家也要能夠監控和協調國內所有的活動。


    馬克思等人瞭解新的科技現實及人類經驗，因此能夠針對工業社會的新問題，提出切中要點的答案，也能提出原創的想法，告訴眾人如何從這些前所未有的機會中得利。社會主義人士為這個美麗新世界，打造了一個美麗新宗教，承諾以科技與經濟提供救贖；於是，這成了史上第一個科技宗教，也改變了意識型態論述的基礎。


    在馬克思之前，人民對彼此定義和區分的標準，是在於對上帝的看法，而不是生產的方式。但在馬克思之後，比起關於靈魂和來世的辯論，科技與經濟結構的問題遠遠更加重要，造成的分裂也更加嚴重。在二十世紀下半葉，生產方式成了熱議的主題，叫人幾乎忘了人類自己的存在。即使是最嚴詞抨擊馬克思和列寧的人，也接受了他們對歷史和社會的基本態度，更仔細去思考科技和生產，而上帝和天堂就顯得沒那麼重要了。


    在十九世紀中葉，還很少有人如同馬克思一樣見識敏銳，因此只有少數國家快速踏上工業化。也就是這少數國家，征服了整個世界。大多數社會連發生什麼事都還不清楚，也就沒搭上這班進步的列車。像是達耶難陀的印度和馬赫迪的蘇丹，當時多半還是一心想著上帝，而非想著蒸汽機，以致遭到工業化後的英國占領和剝削。一直要到最近這幾年，印度才終於取得重大進展，縮小了和英國之間在經濟與地緣政治上的差距。至於蘇丹，目前仍在遙遠的後頭掙扎。


    ## 二十一世紀的末班車即將離站


    二十一世紀初，進步的列車又將再次離站，而且這可能是「智人」這站發出的末班車。錯過的人，永遠都不會再有上車的機會。想上車，就必須瞭解二十一世紀的科技，特別是生物科技和電腦演算法的力量。


    這些力量的潛能遠大於蒸汽機和電報，而且不會只用來生產食品、織品、車輛和武器。二十一世紀的主要產品將會是人的身體、大腦和心靈，懂得與不懂如何進行這些大腦及身體工程的兩種人，彼此的差距將遠遠大於狄更斯的英國和馬赫迪的蘇丹。事實上，還會大於智人與尼安德塔人之間的差距。在二十一世紀，搭上列車，就能獲得創造和毀滅的神力；留在原地，就面臨滅絕。


    一百年前曾經最先進的社會主義，就是沒有跟上新科技，才崩垮的。前蘇聯領導人布里茲涅夫和前古巴總統卡斯楚，兩人堅守著馬克思和列寧在蒸汽時代構思的想法，未能理解電腦和生物科技的力量。反觀自由主義，適應資訊時代的能力高出許多。這也就能夠部分解釋，為何赫魯雪夫在1956年的預言從未實現，為何最後竟然是自由主義的資本家埋葬了馬克思主義。如果馬克思重回人世，他可能會勸那些已寥寥可數的信眾，少花點時間讀《資本論》、多花點時間研究網際網路和人類基因組。


    激進伊斯蘭主義的處境，更比社會主義惡劣許多。它甚至還未能學會接受工業革命，也就難怪對基因工程和人工智慧幾乎是無話可說。伊斯蘭教、基督教和其他傳統宗教，至今仍在世界上扮演重要角色。然而他們現在多半是反動，而不像過去曾經是一股創新的力量。舉例來說，基督教過去就曾經傳播「上帝之前，人人平等」這種異端概念，這改變了人類的政治結構、社會階層制度、甚至是性別關係。耶穌在「山上寶訓」還更進一步，講到溫柔和受壓迫的人是上帝最愛的子民。這種觀點翻轉了整個權力金字塔，為世世代代的革命提供依據。


    除了社會和倫理上的改革，基督教也曾推動重要的經濟和科技創新。天主教會建立了中世紀歐洲最先進的行政系統，並率先使用檔案管理、目錄、時間表和其他資料處理技術。在十二世紀歐洲，最像矽谷的地方大概就是梵蒂岡。教會建立了歐洲最早的經濟合作組織：修道院，在一千年間帶領歐洲經濟，並引進先進的農業和行政措施。修道院是最早使用時鐘的機構，而且幾個世紀以來，修道院和主教座堂學校一直是歐洲最重要的學習中心，協助成立了諸多歐洲頂尖大學，例如波隆那大學、牛津大學、薩拉曼卡大學。


    今日，天主教會仍享有數億信眾的忠誠和什一奉獻。但天主教和其他有神論的宗教，卻早已從創造轉為反動，忙於守舊，而非率先開創新科技、新經濟方法，或是突破性的社會思想。他們現在主要做的，是對各種運動所擴展的科技、方法及思想，感到憤怒。生物學家發明避孕藥，而教宗不知該如何反應。電腦科學家發展網際網路，而拉比還在討論是否該允許正統派猶太教徒上網。女性主義思想家呼籲女性取回自己身體的所有權，而學識淵博的穆夫提還在辯論該如何應對如此煽動的想法。


    讓我們問問自己：二十世紀最有影響力的發現、發明或創造是什麼？你會發現這個問題很難回答，因為候選者實在太多，有像是抗生素之類的科學發現；有像是電腦之類的科技發明；也有像是女性主義之類的意識型態創造。


    讓我們再問問：在二十世紀，像是伊斯蘭教或基督教這類的傳統宗教，最有影響力的發現、發明或創造是什麼？你也會發現這個問題很難回答，但這是因為候選者實在太少。在二十世紀，神父、拉比和穆夫提究竟發現了什麼，值得和抗生素、電腦或女性主義相提並論？


    細察這兩個問題後，如果說二十一世紀將會發生重大改變，你認為會出自何處？是伊斯蘭國（Islamic State）、還是谷歌？確實，伊斯蘭國也懂怎麼把影片放上
    YouTube；但除了這種酷刑產業之外，最近的敘利亞或伊拉克究竟發明了什麼？


    目前仍有幾十億人，包括許多科學家，繼續將宗教經文視為權威的來源，但這些文本已經不再能夠帶來創造力。例如，基督宗教有些較進步的教派，已經能接受同性戀婚姻或女性神職人員。但他們之所以接受，肇因於何處？可不是因為讀了《聖經》、聖奧古斯丁或是馬丁·路德的文本，而是因為讀了傅柯（Michel
    Foucault）的《性事的歷史》，或是哈樂薇（Donna Haraway）的〈半機械人宣言〉。


    然而，不管多進步，只要是虔誠的基督宗教信徒，就無法坦承自己的倫理觀是來自傅柯或哈樂薇。所以他們又回到《聖經》、聖奧古斯丁和馬丁·路德的文本，翻天覆地的徹底搜索，一頁接著一頁、一個故事接著一個故事，集中最大的注意力，最後終於找到他們需要的箴言、比喻或裁定，只要解釋的方式夠有創意，就能代表上帝也為同性婚姻賜福、女性也能領授司鐸。然後，他們就能假裝這個想法是來自《聖經》，雖然其實是來自傅柯的《性事的歷史》。


    《聖經》早已不再真正啟發靈感，但仍獲尊為權威的來源。


    ## 還能依感覺繼續走下去嗎？


    就是因為如此，傳統宗教才無法提出對自由主義的替代品。傳統宗教的經文，對基因工程或人工智慧無法提出任何意見，不管是牧師、神父、拉比或穆夫提，多半都並不瞭解生物學和電腦科學的最新突破。想瞭解這些突破，別無他法，只能閱讀科學文章、進實驗室做實驗，而不是去背誦和辯論古代文本。


    但這也不代表自由主義就能安享榮耀、高枕無憂。確實，自由主義在人文主義宗教戰爭當中勝出，而且在當下，我們也沒有其他可行的替代選項。然而它成功的時候，可能也已播下敗亡的種子。


    獲勝的自由主義理想，正在推動人類走向長生不死、快樂幸福和化身為神。而由於據說顧客和選民的期望永遠都是對的，科學家和工程師也把愈來愈多的心力，投入這些自由主義的計畫。但是科學家所發現、工程師所開發的這一切，很有可能就會不知不覺暴露出自由主義世界觀的不足，以及顧客和選民又有哪裡錯誤。等到基因工程和人工智慧徹底發揮潛力，自由主義、民主和自由市場的概念，可能就會變得像燧石刀、錄音帶、伊斯蘭教和共產主義，一樣過時了。


    本書第一章〈人類的三大新議題〉，曾預測人類在二十一世紀會嘗試讓自己長生不死、幸福快樂、化身為神。這些預測並不是真那麼原創或有遠見，而只是反映自由人文主義的傳統理想。人文主義長期崇拜人類的生命、情感及欲望，於是人文主義文明希望讓人有最長的生命、最高的幸福、最大的力量，也就不足為奇。


    但本書的第三部〈智人失去控制權〉則要描述，為了實現這種人文主義夢想，將會釋放出新的後人文（post-humanist）科技，從根本上顛覆人文主義。


    人文主義相信自己的感覺，於是我們在與「現代」的契約中得利了，且無須付出代價。我們不需要有什麼神來限制我們的力量、賦予我們意義，只要依從顧客和選民的自由選擇，就能得到所需的所有意義。但這樣一來，如果我們發現，原來顧客和選民從來就沒有自由選擇，現在居然能用科技來計算他們的感覺、設計他們的感覺、或擊敗他們的感覺，一切會變得怎樣？


    現在的整個世界似乎都與人類經驗唇齒相依，但如果以後人類的經驗也成了可設計的產品，就像是能在超市裡買到的任何物品，情況又將如何發展？


    39. 人腦如電腦，電腦如人腦。人工智慧蓄勢待發，即將超越人類智能。


    # 第三部


    # 智人失去控制權


    人類還能繼續管理世界、賦予世界意義嗎？

    生物科技和人工智慧將如何威脅人文主義？

    誰可能繼承人類的角色，

    哪個新宗教可能取代人文主義？


    # 第8章


    # 實驗室裡的定時炸彈


    時至今日，主導世界的仍然是全套自由主義的各種思想：個人主義、人權、民主、自由市場。然而二十一世紀的科學，正在破壞自由主義秩序的基礎。如同前面章節提到的，科學不討論價值觀的問題，因此科學無法論斷自由主義的「自由比平等更重要」或「個人比集體更重要」這些抽象倫理判斷，究竟是對是錯；不過，自由主義的基礎同樣也有它自己深信不疑的事實聲明，但這些事實聲明就是過不了科學審查這一關。


    自由主義重視個人自由，是因為相信人類有自由意志。自由主義認為，選民和顧客的決定既不是命中注定、也不是任意隨機，雖然人都會受到外部力量和隨機事件的影響，但到頭來，人人都是揮舞著自由的魔杖，為自己做決定。正因如此，自由主義認為選民和顧客至上，也總告訴我們要隨心而為、做讓自己覺得快樂的事。是我們的自由意志讓整個宇宙充滿意義；外人絕不可能知道你真正的感覺、也不可能預測你會做什麼選擇，所以你也不該讓什麼「老大哥」來決定你的興趣和欲望。


    「人類有自由意志」看起來彷彿不是倫理判斷，而是對世界的事實描述。然而，這種說法雖然在洛克、盧梭或傑佛遜的時代可能很有道理，但根據生命科學的最新發現，卻已經不再成立。自由意志與當代科學之間的矛盾，已經成了實驗室裡的一頭大象（譯注：這是俚俗語，意思是：成了科學界的禁忌），許多人假裝專心看著顯微鏡和fMRI掃描儀，而不願面對這個問題。


    在十八世紀，智人就像個神祕的黑盒子，我們完全不知道內部如何運作。所以如果有人拿刀把另一個人刺死，學者想問原因的時候，一個聽來有說服力的答案會是：「因為他自己做了這個選擇，用自由意志選擇了謀殺；也如此，他必須對自己犯下的罪行，負起全責。」到了二十世紀，科學家打開了智人這個黑盒子，既沒找到靈魂、也沒找到自由意志，只找到基因、荷爾蒙、神經元——這些東西與現實世界的萬物都遵守著相同的物理定律和化學定律。時至今日，如果有個人拿刀把另一個人刺死，學者想問原因時，若有人再說是「因為他自己做了這個選擇」，這種話聽起來已經不再具有說服力了。反而是遺傳學家和大腦科學家，能夠提供更為詳細的答案：「他會這麼做，是因為特定基因構造讓大腦出現某種電化學反應，而基因構造反映的是從古至今的演化壓力及突變的結果。」


    會導致謀殺的大腦電化學反應，可能來自基因預設的指令、可能是隨機因素的結果，也可能是兩者的結合，但總之並非「自由意志」。例如，神經元之所以觸發，原因可能是基因預設的，只要遇到外部刺激便如此反應；也有可能是隨機事件，像是因為某個放射性原子忽然衰變。但不論是哪一種，都沒有「自由意志」插手的餘地。如果是遇到刺激、引發一連串生化事件的連鎖反應，每個事件都是由前一事件所決定，最後達成的決定當然不算是自由意志。如果是原子忽然衰變造成的決定，那也只是單純的隨機事件，當然也不算自由意志。至於隨機事件加上基因預設的情況，也就是後果可能發生、也可能不發生，這同樣不可能等於自由意志。


    ## 「自由意志」純屬想像？


    假設我們做出一具機器人，再把機器人的中央處理器連接到一團有放射性的鈾塊。只要遇到需要二選一的情境（例如要按右鍵或左鍵），機器人就會計算前一分鐘衰變的鈾原子數。數字是偶數，就按右鍵；數字是奇數，就按左鍵。這樣一來，我們永遠不可能預測這具機器人究竟會如何選擇——當然也不會有人認為這是機器人的「自由」選擇，也不可能讓它參與民主投票，或是要它對自己的選擇負起法律責任。


    所以就目前最先進的科學看來，人的選擇不是基因預設、就是隨機，兩者就像是把蛋糕一分為二，沒有哪一小塊是「自由意志」的份。到頭來，我們奉為神聖的自由，就像靈魂一樣，只是個空虛的詞彙，只存在人類發明的想像故事中。


    演化論像是為自由的棺材，釘上了最後一根釘子。「永恆的靈魂」在演化論面前就是說不通，而「自由意志」也是如此，否則如果人類真是自由的，哪有天擇的餘地？


